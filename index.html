  html,body{margin:0;padding:0;}
  body{

  .phone{

    display:flex; flex-direction:column; box-shadow:none;
  }
  .hd{

  .metric .mv{ font-size:26px; font-weight:700; line-height:1; }
  .metric .ml{ font-size:12.5px; color:var(--muted); margin-top:4px; }
  .devbtn{ position:absolute; right:14px; bottom:80px; z-index:60; display:inline-flex; align-items:center; gap:6px;
    background:var(--ink); color:#fff; border:0; border-radius:22px; padding:9px 14px; font-size:13px; font-weight:700;

  .devbtn i{ font-size:16px; }
  .devmenu{ position:absolute; right:14px; bottom:80px; z-index:61; width:248px; background:var(--surface);

  .devmenu .devhd{ display:flex; justify-content:space-between; align-items:center; padding:11px 14px;
    font-size:13px; font-weight:700; background:var(--n-bg); border-bottom:1px solid var(--line); }
  .devmenu .devhd i{ cursor:pointer; font-size:17px; }
  .devmenu button{ display:flex; align-items:center; gap:9px; width:100%; text-align:left; border:0; background:transparent;
    padding:11px 14px; font-size:14px; font-family:inherit; cursor:pointer; color:var(--ink); border-bottom:1px solid var(--line); }
  .devmenu button:last-child{ border-bottom:0; }
  .devmenu button:active{ background:var(--n-bg); }
  .devmenu button i{ font-size:18px; color:var(--muted); }

  @media (min-width:821px){
    body{ padding:24px; justify-content:center; }
    .phone{ max-width:1320px; width:100%; height:92vh; max-height:900px; border:1px solid var(--line2);
      border-radius:18px; box-shadow:0 24px 70px -30px rgba(0,0,0,.32); }
    #app.mode-full .full{ max-width:460px; margin:0 auto; width:100%; }
    #app.mode-app .tabbar{ position:absolute; top:0; left:0; bottom:0; width:230px; flex-direction:column;
      align-items:stretch; justify-content:flex-start; border-top:0; border-right:1px solid var(--line);
      padding:18px 0; gap:2px; background:var(--surface); border-radius:18px 0 0 18px; overflow-y:auto; z-index:2; }
    #app.mode-app .tabbar button{ flex:none; flex-direction:row; justify-content:flex-start; gap:13px;
      padding:13px 18px; margin:0 12px; font-size:15px; border-radius:10px; }
    #app.mode-app .tabbar button i{ font-size:22px; }
    #app.mode-app .tabbar button.on{ background:var(--accent-tint); color:var(--accent); }
    #app.mode-app .hd, #app.mode-full .hd{ padding:20px 32px 16px; }
    #app.mode-app .hd{ margin-left:230px; }
    #app.mode-app .screen{ margin-left:230px; }
    .screen{ padding:26px 34px 40px; }
    .hd h1{ font-size:21px; }
    /* card lists tile into a responsive grid (dashboard feel) */
    .screen .stack{ display:grid; grid-template-columns:repeat(auto-fit,minmax(310px,1fr)); gap:12px; align-items:start; }
    /* section headers and notes span the full width above their grid */
    .screen .sect, .screen .note, .screen .addr{ max-width:none; }
    /* forms / detail views keep a comfortable single column */
    .pane{ max-width:640px; margin:0 auto; }
    .pane .stack{ display:flex; flex-direction:column; }
    .dash{ grid-template-columns:repeat(4,1fr); }
    .devbtn,.devmenu{ bottom:24px; right:24px; }
  }
</style>

function inferType(name){

function cellText(v){
  if(v===null||v===undefined) return '';

    if(v.text!==undefined) return ''+v.text;

  }

}

/* ---------- persistence ---------- */
const SEED_VER='2026-06-13-jingbao';
function save(){ try{ localStorage.setItem('elg_state', JSON.stringify({seedVer:SEED_VER,products,customers,staff,sharedPIF,me,drafts,addTarget,addCust})); }catch(e){} }
function load(){
  try{
    const raw=localStorage.getItem('elg_state'); if(!raw) return;
    const d=JSON.parse(raw);
    if(d.seedVer!==SEED_VER) return;  // 資料版本更新 → 載入新的種子資料
    if(Array.isArray(d.products)){ products.length=0; d.products.forEach(x=>products.push(x)); }
    if(Array.isArray(d.customers)){ customers.length=0; d.customers.forEach(x=>customers.push(x)); }
    if(Array.isArray(d.staff)){ staff.length=0; d.staff.forEach(x=>staff.push(x)); }
    if(Array.isArray(d.sharedPIF)){ sharedPIF.length=0; d.sharedPIF.forEach(x=>sharedPIF.push(x)); }
    if(d.me) me=d.me;
    if(Array.isArray(d.drafts)) drafts=d.drafts;
    if(d.addTarget) addTarget=d.addTarget;
    if(d.addCust) addCust=d.addCust;
  }catch(e){}
}

/* ---------- input methods ---------- */
function parseLines(text){
  return (text||'').split(/\n+/).map(s=>s.trim()).filter(Boolean)
    .filter(l=>!/^(客戶|您好|你好|哈囉|嗨|謝謝|感謝|麻煩|再麻煩|拜託|hi|hello|thanks|thank)/i.test(l))
    .map(l=>{
      let qty='', spec='', name=l;
      const qm=l.match(/(\d+)\s*(支|瓶|片|顆|盒|包|罐|組|入|條)/);
      if(qm){ qty=qm[0]; name=name.replace(qm[0],''); }
      const sm=l.match(/(\d+(?:\.\d+)?\s*(?:ml|g|kg|cc|毫升|公克|克)\s*\/?\s*(?:瓶|片|支|顆|包|盒)?)/i);
      if(sm){ spec=sm[0].trim(); name=name.replace(sm[0],''); }
      name=name.replace(/[，,：:。.、\-x×*]+/g,' ').replace(/\s+/g,' ').trim();
      return { name:name||l, en:'', spec:spec, qty:qty };
    });
}

  const reg=active.concat(off);
  h+=`<div class="sect mt">已註冊帳號（${reg.length}）· 公司名</div>`;
  h+= reg.length ? `<div class="stack">`+reg.map(card).join('')+`</div>`
    : `<div class="card faint" style="text-align:center;padding:18px">尚無已註冊帳號</div>`;
  return h;
}

  async photoRecognized(input){
    const file=input&&input.files&&input.files[0]; if(!file) return;
    if(typeof Tesseract==='undefined'){ syncDrafts(); drafts.push({name:'（OCR 未載入，請手動填）',en:'',spec:'',qty:''}); render(); return; }
    ocrBusy=true; render();
    try{
      const res=await Tesseract.recognize(file,'chi_tra+eng');
      const got=parseLines((res&&res.data&&res.data.text)||'');
      syncDrafts();
      if(got.length) drafts=drafts.concat(got); else drafts.push({name:'（未辨識到品名，請手動填）',en:'',spec:'',qty:''});
      A.toast('辨識完成，'+got.length+' 筆');
    }catch(e){ syncDrafts(); drafts.push({name:'（辨識失敗，請手動填）',en:'',spec:'',qty:''}); A.toast('辨識失敗，請手動填'); }
    ocrBusy=false; render();
  },
  async importSongyan(input){
    const file=input&&input.files&&input.files[0]; if(!file) return;
    if(typeof ExcelJS==='undefined'){ A.toast('Excel 函式庫未載入'); return; }
    try{
      const wb=new ExcelJS.Workbook();
      await wb.xlsx.load(await file.arrayBuffer());
      const ws=wb.worksheets[0]; if(!ws){ A.toast('讀不到工作表'); return; }
      let lastCo='', nP=0, uid=Date.now(); const custSet=new Set();
      ws.eachRow((row,rn)=>{
        if(rn===1) return;
        const name=cellText(row.getCell(2).value).trim();
        if(!name) return;
        const en=cellText(row.getCell(3).value).trim();
        const spec=cellText(row.getCell(4).value).trim();
        const qty=cellText(row.getCell(5).value).trim();
        const f=cellText(row.getCell(6).value).trim()==='V';
        const g=cellText(row.getCell(7).value).trim()==='V';
        const hh=cellText(row.getCell(8).value).trim()==='V';
        let co=cellText(row.getCell(9).value).trim(); if(co) lastCo=co; else co=lastCo;
        const cm=parseCompany(co);
        if(cm.cname){
          if(!customers.find(c=>c.name===cm.cname)) customers.push({name:cm.cname,email:'',login:'匯入',status:'已啟用'});
          if(cm.caddr) CINFO[cm.cname]=cm.caddr;
          custSet.add(cm.cname);
        }
        const ty=inferType(name);
        products.push({id:'imp'+(uid++),name,en,spec,qty,amt:'',func:'',type:ty,
          t:{fang:f,chang:g,wen:hh},cust:cm.cname||'（未標客戶）',status:'testing',batch:'匯入'});
        nP++;
      });
      render(); A.toast('已匯入 '+nP+' 筆 · '+custSet.size+' 個客戶，已回送客戶端');
    }catch(e){ A.toast('匯入失敗：檔案格式不符'); }
  },
  async exportSongyan(explicitList){
    if(typeof ExcelJS==='undefined'){ A.toast('Excel 函式庫載入中，請稍候再按'); return; }
    const list=(explicitList && explicitList.length ? explicitList.slice() : products.filter(p=>p.status==='paid' && p.genSel!==false))
                       .sort((a,b)=>custName(a).localeCompare(custName(b),'zh-Hant'));
    if(!list.length){ A.toast('請先勾選要送驗的項目'); return; }
    const FN='E.L.G INTERNATIONAL TRADING CO., LTD.';
    const FA='No. 600, Zhaixing 2nd St., Jiaxing Vil., Jiali Dist., Tainan City 722013, Taiwan (R.O.C.)';
    const thin={style:'thin'}, BD={top:thin,left:thin,right:thin,bottom:thin};
    const wb=new ExcelJS.Workbook(), ws=wb.addWorksheet('Sheet1');
    [7.3,40.9,60.7,17.4,10.4,11.1,11.1,11.1,54.1,9.0].forEach((w,i)=>ws.getColumn(i+1).width=w);
    const heads=['序号','样品名称','英文名稱','型号规格','数量','防腐效能測驗\n$350','常规9项\n$200','穩定性測試\n$350','公司資料'];
    const hr=ws.getRow(1);
    heads.forEach((t,i)=>{ const c=hr.getCell(i+1); c.value=t;
      c.font={name:i===8?'新細明體':'仿宋',size:i===8?11:14};
      c.alignment={horizontal:'center',vertical:'middle',wrapText:true}; });
    hr.height=64.5;
    let r=2;
    list.forEach((p,idx)=>{
      const t=p.t||{}, row=ws.getRow(r);
      row.getCell(1).value=idx+1; row.getCell(2).value=p.name; row.getCell(3).value=p.en||'';
      row.getCell(4).value=p.spec; row.getCell(5).value=p.qty;
      row.getCell(6).value=t.fang?'V':null; row.getCell(7).value=t.chang?'V':null; row.getCell(8).value=t.wen?'V':null;
      const amt=(t.fang?350:0)+(t.chang?200:0)+(t.wen?350:0);
      row.getCell(10).value={formula:`IF(F${r}="V",350,0)+IF(G${r}="V",200,0)+IF(H${r}="V",350,0)`,result:amt};
      row.getCell(1).font={name:'新細明體',size:11}; row.getCell(1).alignment={horizontal:'center',vertical:'middle'};
      row.getCell(2).font={name:'新細明體',size:12}; row.getCell(2).alignment={vertical:'middle'};
      row.getCell(3).font={name:'新細明體',size:11}; row.getCell(3).alignment={vertical:'middle'};
      [4,5,6,7,8,10].forEach(c=>{ row.getCell(c).font={name:'新細明體',size:11}; row.getCell(c).alignment={horizontal:'center',vertical:'middle'}; });
      row.height=16.5; r++;
    });
    const last=r-1;
    let s=2;
    for(let i=2;i<=last+1;i++){
      const cur=i<=last?custName(list[i-2]):null, prev=custName(list[s-2]);
      if(cur!==prev){
        const e=i-1, pp=list[s-2], ic=ws.getCell(`I${s}`);
        ic.value=`公司名称：${custName(pp)}\n公司地址：${custAddr(pp)}\n工厂名称：${FN}\n工厂地址：${FA}`;
        ic.font={name:'新細明體',size:11}; ic.alignment={vertical:'middle',wrapText:true};
        if(e>s) ws.mergeCells(`I${s}:I${e}`);
        const n=e-s+1; if(n*16.5<66) ws.getRow(s).height=66-16.5*(n-1);
        s=i;
      }
    }
    const tr=last+1, cnt=k=>list.filter(p=>(p.t||{})[k]).length;
    ws.getCell(`F${tr}`).value={formula:`COUNTIF(F2:F${last},"V")*350`,result:cnt('fang')*350};
    ws.getCell(`G${tr}`).value={formula:`COUNTIF(G2:G${last},"V")*200`,result:cnt('chang')*200};
    ws.getCell(`H${tr}`).value={formula:`COUNTIF(H2:H${last},"V")*350`,result:cnt('wen')*350};
    const grand=cnt('fang')*350+cnt('chang')*200+cnt('wen')*350;
    ws.getCell(`I${tr}`).value={formula:`"共"&SUM(J2:J${last})&"元"`,result:`共${grand}元`};
    [6,7,8].forEach(c=>{ const cell=ws.getRow(tr).getCell(c); cell.font={name:'新細明體',size:11}; cell.alignment={horizontal:'center',vertical:'middle'}; });
    ws.getCell(`I${tr}`).font={name:'新細明體',size:11}; ws.getCell(`I${tr}`).alignment={vertical:'middle',wrapText:true};
    for(let row=1;row<=tr;row++) for(let col=1;col<=10;col++) ws.getRow(row).getCell(col).border=BD;
    ws.views=[{state:'frozen',ySplit:1}];
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob), a=document.createElement('a');
    a.href=url; a.download='送驗清單.xlsx'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    const ah=agreementHTML(list);
    const ab=new Blob(['\ufeff'+ah],{type:'application/msword'});
    const au=URL.createObjectURL(ab), aa=document.createElement('a');
    aa.href=au; aa.download='合作協議.doc'; document.body.appendChild(aa); aa.click(); aa.remove(); URL.revokeObjectURL(au);
    list.forEach(p=>{ p.status='testing'; delete p.genSel; });
    const vd=[...new Set(list.map(p=>custName(p)))].length;
    render(); A.toast('已生成合作協議＋樣品清單（'+vd+' 家廠商 · '+list.length+' 筆），轉為送驗中');
  },
  toggleShip(id){ const p=byId(id); p.shipSel=!p.shipSel; render(); },
  deleteMyProduct(id){
    const p=byId(id); if(!p||!ownedByMe(p)) return;

  setCustDrive(i,v){ if(customers[i]){ customers[i].drive=(v||'').trim(); save(); A.toast('已更新客戶 PIF 資料夾連結'); } },
  receive(id){ const p=byId(id); if(p){ p.status='received'; if(p.invSel===undefined)p.invSel=true; if(!p.feeSel)p.feeSel=5000; } render(); A.toast('已收樣，可到「請款」開收款單'); },
  issueInvoiceFor(cn){
    const sel=P('received').filter(p=>custName(p)===cn && p.invSel);

  confirmPay(id){ const p=byId(id); if(p) p.status='paid'; render(); A.toast('已確認收到貨款，待生成送驗合約'); },
  receiveReport(id){ const p=byId(id); if(p) p.status='reporting'; render(); A.toast('已收到檢驗報告，轉 PIF 製作中'); },
  complete(id){

    const p=byId(id); const c=customers.find(x=>x.name===custName(p));
    p.drive=(el&&el.value.trim())||(c&&c.drive)||'https://drive.google.com';

    render(); A.toast('已標記完成 PIF，客戶端可下載');
  },
  openDrive(id){ const p=byId(id); const c=customers.find(x=>x.name===custName(p)); const url=p.drive||(c&&c.drive); if(url) window.open(url,'_blank'); else A.toast('尚未設定雲端硬碟連結'); },

  _tt:null,
  toast(msg){
    const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
    clearTimeout(A._tt); A._tt=setTimeout(()=>t.classList.remove('show'),2200);
  }
};
window.A=A;
load();

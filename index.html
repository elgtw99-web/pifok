function elgCustomers(){
  const order=['applied','approved','shipped','received','invoiced','reported','paid','testing','reporting','completed'];
  // 客戶列表（含各廠商狀態分佈）
  if(!custView){
    const names=[...new Set(products.map(p=>custName(p)))].concat(customers.map(c=>c.name)).filter((v,i,a)=>v&&a.indexOf(v)===i);
    let h=`<div class="note" style="margin-bottom:12px"><i class="ti ti-users"></i>各廠商送驗狀態總覽 · 點廠商進入詳情，可逐件查看與手動修改狀態。</div>`;
    h+= srchBar('搜尋廠商…');
    h+=`<div class="stack">`+ names.map(nm=>{
      const its=products.filter(p=>custName(p)===nm);
      const cobj=customers.find(c=>c.name===nm);
      const chips=order.filter(k=>its.some(p=>p.status===k)).map(k=>{
        const n=its.filter(p=>p.status===k).length;
        return `<span class="pill pill--${SM[k][1]}" style="font-size:11px">${SM[k][0]} ${n}</span>`;
      }).join(' ');
      return `<div class="card" data-nm="${nm}" onclick="A.openCust('${nm}')" style="cursor:pointer">
        <div class="row"><span class="nm" style="font-size:15px"><i class="ti ti-building-store"></i> ${nm}${nm===ELG_SELF?' <span class="pill pill--s" style="font-size:10px">自有</span>':''}</span>
          <span class="muted" style="font-size:13px">${its.length} 件 <i class="ti ti-chevron-right faint"></i></span></div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px">${chips||'<span class="faint" style="font-size:12px">尚無送驗商品</span>'}</div>
        ${cobj&&cobj.drive?`<div class="sub" style="margin-top:6px"><i class="ti ti-cloud"></i> ${cobj.driveAuth?'雲端硬碟已授權客戶':'雲端硬碟已設、未授權'}</div>`:''}
      </div>`;
    }).join('')+`</div>`;
    return h;
  }
  // 客戶詳情：狀態儀表板 + 依狀態分組 + 逐件詳細＋手動修改
  const nm=custView;
  const its=products.filter(p=>custName(p)===nm);
  const cobj=customers.find(c=>c.name===nm);
  const selN=its.filter(p=>batch[p.id]).length;
  const optsel=order.map(k=>`<option value="${k}">${SM[k][0]}</option>`).join('');
  let h=`<div class="row" style="margin-bottom:10px;gap:10px"><button class="backbtn" onclick="A.openCust(null)"><i class="ti ti-arrow-left"></i> 客戶列表</button>
      <span class="nm" style="font-size:16px;flex:1;min-width:0">${nm}</span>
      <span class="pill pill--i">${its.length} 件</span></div>`;
  // 狀態儀表板
  const present=order.filter(k=>its.some(p=>p.status===k));
  const statusTabMap={applied:'apply',approved:'apply',shipped:'receive',received:'invoice',invoiced:'invoice',reported:'invoice',paid:'data',testing:'pif',reporting:'pif',completed:'pif'};
  const statusInvTab={received:'recv',invoiced:'issued',reported:'check'};
  h+=`<div class="dash" style="margin-bottom:14px">`+ present.map(k=>{
    const tab=statusTabMap[k]||'library';
    const invSub=statusInvTab[k]||'';
    return `<div class="metric" style="cursor:pointer" onclick="A.goStatusTab('${tab}','${invSub}')">
      <div class="mi" style="background:var(--${SM[k][1]}-bg);color:var(--${SM[k][1]})"><i class="ti ti-circle-dot"></i></div>
      <div class="mv">${its.filter(p=>p.status===k).length}</div><div class="ml">${SM[k][0]}</div></div>`;
  }).join('')
    + (present.length?'':`<div class="card faint" style="grid-column:1/-1;text-align:center;padding:16px">此廠商尚無送驗商品</div>`) +`</div>`;
  // 雲端硬碟：儲存 + 授權
  const dv=cobj?(cobj.drive||''):'';
  const auth=!!(cobj&&cobj.driveAuth);
  h+=`<div class="card" style="margin-bottom:12px">
      <div class="row" style="margin-bottom:8px"><span class="nm" style="font-size:14px"><i class="ti ti-cloud"></i> 雲端硬碟（PIF 資料夾）</span>
        <span class="pill pill--${auth?'s':'n'}">${auth?'已授權客戶':'未授權'}</span></div>
      <label class="lbl">資料夾連結（儲存）</label>
      <input class="fld" value="${dv}" placeholder="貼上分配給此客戶的 Google 雲端資料夾連結" onchange="A.setCustDriveByName('${nm}',this.value)">
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn--sm" style="${auth?'background:#C0392B':''}" ${dv?'':'disabled'} onclick="A.toggleCustAuth('${nm}')">
          <i class="ti ti-${auth?'lock':'lock-open'}"></i> ${auth?'取消授權':'授權客戶存取'}</button>
        ${dv?`<button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px" onclick="A.openCustDrive('${nm}')"><i class="ti ti-external-link"></i> 開啟</button>`:''}
      </div>
      <div class="faint" style="font-size:12px;margin-top:8px">${dv?(auth?'客戶已可在自己的看板開啟／下載此資料夾的 PIF。':'已儲存連結，但尚未授權；客戶端目前看不到。按「授權客戶存取」開放。'):'尚未儲存資料夾連結。'}</div>
    </div>`;
  // 批量工具列
  h+=`<div class="card" style="background:var(--n-bg);border:0;margin-bottom:12px">
      <div class="row"><span class="nm" data-selcount="cust">批量處理（已選 ${selN}）</span>
        <span class="muted" style="font-size:13px;font-weight:600;cursor:pointer" data-selall="cust" onclick="A.batchAll('${nm}')">${selN===its.length&&its.length?'取消全選':'全選'}</span></div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        <select class="fld" id="batchSt" style="flex:1;min-width:130px">${optsel}</select>
        <button class="btn btn--sm" style="width:auto;padding:0 14px" data-needsel ${selN?'':'disabled'} onclick="A.batchStatus()">套用狀態</button>
      </div>
      <button class="btn btn--sm" style="margin-top:8px" data-needsel ${selN?'':'disabled'} onclick="A.batchGen()"><i class="ti ti-file-stack"></i> 批量生成合約＋清單（已選 ${selN}）</button>
      <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
        <select class="fld fld--mini" id="batchCust" style="flex:1;min-width:140px">${vendorOpts(nm)}</select>
        <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px" data-needsel ${selN?'':'disabled'} onclick="A.batchReassign()"><i class="ti ti-arrows-exchange"></i> 轉移所選到此廠商</button>
      </div>
      <button class="btn btn--sm" style="margin-top:8px;background:${confirmDel==='batch'?'#C0392B':'#B23A3A'}" data-needsel ${selN?'':'disabled'} onclick="A.batchDelete()"><i class="ti ti-trash"></i> ${confirmDel==='batch'?'確認刪除？再按一次':'刪除所選'}</button>
    </div>`;
  // 表格式清單：勾選 + 可改規格/數量 + 內嵌狀態下拉
  const sorted=its.slice().sort((a,b)=> order.indexOf(a.status)-order.indexOf(b.status));
  h+=`<div class="tablewrap"><table class="dtable">
    <thead><tr><th style="width:34px"></th><th>品名</th><th>規格</th><th>數量</th><th>檢驗項目</th><th>費用</th><th>狀態（可改）</th></tr></thead>
    <tbody>`+ (sorted.length ? sorted.map(p=>`
      <tr class="${batch[p.id]?'sel':''}">
        <td data-label=""><span class="ck ${batch[p.id]?'on':''}" data-ckid="${p.id}" onclick="A.toggleBatch('${p.id}')" style="cursor:pointer"><i class="ti ti-check"></i></span></td>
        <td data-label="品名"><span class="nm" style="font-size:13.5px">${p.name}</span>${p.alias?`<br><span class="sub">配方名：${p.alias}</span>`:''}${p.cancelReq?`<br><span class="sub" style="color:var(--w)">客戶申請撤銷中</span>`:''}
          <div style="display:flex;gap:6px;align-items:center;margin-top:5px">
            <input class="fld fld--mini" style="flex:1;min-width:0" value="${(p.en||'').replace(/"/g,'&quot;')}" placeholder="英文名（檢驗用）" onchange="A.setField('${p.id}','en',this.value)">
            <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 9px" title="AI 生成英文名" onclick="A.genEnName('${p.id}')"><i class="ti ti-sparkles"></i> AI</button>
          </div></td>
        <td data-label="規格"><input class="fld fld--mini" value="${p.spec||''}" onchange="A.setField('${p.id}','spec',this.value)"></td>
        <td data-label="數量"><input class="fld fld--mini" value="${p.qty||''}" onchange="A.setField('${p.id}','qty',this.value)"></td>
        <td data-label="檢驗項目" style="white-space:nowrap">${testText(p.t)}</td>
        <td data-label="費用" style="white-space:nowrap">${money(feeOf(p.t))}</td>
        <td data-label="狀態"><select class="fld fld--mini" onchange="A.setStatus('${p.id}',this.value)">
          ${order.map(o=>`<option value="${o}" ${p.status===o?'selected':''}>${SM[o][0]}</option>`).join('')}
        </select>
        <button class="btn btn--ghost btn--sm" style="margin-top:6px;width:100%;${p.paused?'color:#C0392B':''}" onclick="A.togglePause('${p.id}')"><i class="ti ti-player-${p.paused?'play':'pause'}"></i> ${p.paused?'已暫停 · 點此恢復':'暫停（不退款）'}</button></td>
      </tr>`).join('') : `<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--muted)">此廠商尚無送驗商品</td></tr>`)
    +`</tbody></table></div>`;
  return h;
}
function elgReceive(){
  const waiting=P('shipped');
  const recent=P('received');
  let h=`<div class="dash" style="margin-bottom:16px">
      <div class="metric"><div class="mi" style="background:var(--w-bg);color:var(--w)"><i class="ti ti-truck-loading"></i></div><div class="mv">${waiting.length}</div><div class="ml">待收件</div></div>
      <div class="metric"><div class="mi" style="background:var(--s-bg);color:var(--s)"><i class="ti ti-package"></i></div><div class="mv">${recent.length}</div><div class="ml">已收樣</div></div>
    </div>`;
  h += `<div class="addr" style="margin-bottom:16px"><div class="t">收件地址（客戶寄樣到此）</div><div class="a">${ADDR}</div><div class="a" style="margin-top:2px">電話 ${ELG_TEL}</div></div>`;
  h += `<div class="row sect"><span>待收件</span><span class="pill pill--w">${waiting.length}</span></div>`;
  if(waiting.length) h+= selBar(waiting.map(p=>p.id), [{label:'批量接收',ic:'package',fn:'A.batchReceive()',cls:'btn--ok'}]);
  h += waiting.length ? `<div class="stack">`+ waiting.map(p=>`
      <div class="card" style="border-color:var(--w)"><div class="row" style="gap:10px">${selCk(p.id)}
        <span style="flex:1;min-width:0"><span class="nm">${p.name}</span><br><span class="sub">${custName(p)} · ${p.qty||'—'}</span></span>
        <button class="btn btn--ok btn--sm" style="width:auto;padding:0 16px" onclick="A.receive('${p.id}')">接收</button>
      </div></div>`).join('')+`</div>`
    : `<div class="card faint" style="text-align:center;padding:20px">沒有待收件樣品</div>`;
  h += `<div class="row sect mt"><span>已接收（待開收款單）</span><span class="pill pill--s">${recent.length}</span></div>`;
  if(recent.length){
    const recvCusts=[...new Set(recent.map(p=>custName(p)))];
    h+=recvCusts.map(cn=>{
      const items=recent.filter(p=>custName(p)===cn);
      return `<div class="card" style="margin-bottom:8px">
        <div class="row">
          <span>
            <span class="nm" style="font-size:14px"><i class="ti ti-building-store"></i> ${cn}</span>
            <span class="sub" style="margin-left:6px">${items.length} 筆已收樣</span>
          </span>
          <button class="btn btn--ok btn--sm" style="width:auto;padding:0 14px" onclick="A.goStatusTab('invoice','recv')">
            <i class="ti ti-receipt-2"></i> 去開收款單</button>
        </div>
        <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px">
          ${items.map(p=>`<span class="pill pill--s" style="font-size:11.5px">${p.name||'—'}</span>`).join('')}
        </div>
      </div>`;
    }).join('');
  } else {
    h+=`<div class="card faint" style="text-align:center;padding:20px">尚未有已接收樣品<br><span class="sub">接收後會出現在這裡，可直接跳到「帳款明細」開收款單</span></div>`;
  }
  return h;
}
function elgData(){
  const pool=products.filter(p=>p.status==='paid');
  if(!pool.length) return `<div class="empty"><i class="ti ti-file-off"></i>沒有待送驗的項目（需先完成收款查帳）</div>`;
  if(!dataPid || !pool.find(p=>p.id===dataPid)) dataPid=pool[0].id;
  const p=byId(dataPid); p.t=p.t||{fang:true,chang:true,wen:false};
  const prices={fang:350,chang:320,wen:350};
  const sum=Object.keys(prices).reduce((s,k)=>s+(p.t[k]?prices[k]:0),0);
  const testItems=[
    {k:'wen',  label:'穩定性測試（安定性）', price:350},
    {k:'fang', label:'防腐效能測驗',         price:350},
    {k:'chang',label:'常規9項＋白色念珠菌檢測', price:320},
  ];
  const trow=(k,label,price)=>`
    <div class="selrow ${p.t[k]?'on':''}" onclick="A.toggleTest('${k}')">
      <span class="ck"><i class="ti ti-check"></i></span>
      <span style="flex:1" class="nm">${label}</span><span class="muted">${money(price)}</span></div>`;
  const sel=pool.filter(x=>x.genSel!==false);
  const allVendors=[...new Set(pool.map(x=>custName(x)))];
  const missN=sel.filter(x=>!(x.en||'').trim()).length;

  // ===== 頂部：客戶篩選 + AI 補齊 =====
  let h=`<div class="pane">
    <div class="note" style="margin-bottom:14px"><i class="ti ti-file-invoice"></i>已收款待送驗的品項，可按客戶篩選、分批生成送驗清單。</div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:flex-end">
      <div style="flex:1;min-width:160px">
        <label class="lbl">篩選客戶</label>
        <select class="fld" onchange="A.filterDataVendor(this.value)" id="data_vendor_filter">
          <option value="">全部客戶（${allVendors.length} 家）</option>
          ${allVendors.map(v=>`<option value="${v}" ${dataVendorFilter===v?'selected':''}>${v}（${pool.filter(x=>custName(x)===v).length} 筆）</option>`).join('')}
        </select>
      </div>
      ${missN?`<button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px;color:var(--accent);white-space:nowrap" onclick="A.genEnMissing()">
        <i class="ti ti-sparkles"></i> AI 補齊英文名（${missN} 筆）</button>`
        :`<span class="sub" style="white-space:nowrap;padding:8px 0"><i class="ti ti-check" style="color:var(--s)"></i> 英文名已齊全</span>`}
    </div>`;

  // ===== 送驗清單（依客戶分組）=====
  const filteredVendors=dataVendorFilter ? allVendors.filter(v=>v===dataVendorFilter) : allVendors;
  const filteredPool=dataVendorFilter ? pool.filter(x=>custName(x)===dataVendorFilter) : pool;
  const filteredSel=filteredPool.filter(x=>x.genSel!==false);

  h+=`<div class="row" style="margin-bottom:4px">
    <span class="sect" style="margin:0">送驗清單（已勾 ${filteredSel.length}/${filteredPool.length} 筆）</span>
    <span class="muted" style="font-size:12px;font-weight:600;cursor:pointer" onclick="A.toggleGenAll()">${filteredPool.every(x=>x.genSel!==false)?'全不選':'全選'}</span>
  </div>`;

  h+=filteredVendors.map(v=>{
    const its=pool.filter(x=>custName(x)===v); const allSel=its.every(x=>x.genSel!==false);
    return `<div class="row" style="margin:12px 0 6px">
      <span class="nm" style="font-size:14px"><i class="ti ti-building-store"></i> ${v}</span>
      <span class="muted" style="font-size:12px;font-weight:600;cursor:pointer" onclick="A.toggleVendor('${v}')">${allSel?'全不選':'全選'}</span>
    </div>
    <div class="stack">`+ its.map(x=>`
      <div class="selrow ${x.genSel!==false?'on':''}" onclick="A.toggleGen('${x.id}')">
        <span class="ck"><i class="ti ti-check"></i></span>
        <span style="flex:1"><span class="nm">${x.name||'未命名'}</span><br>
          <span class="sub">${testText(x.t)} · ${x.spec||'未填規格'}
          ${(x.en||'').trim()?` · EN: ${x.en}`:'<span style="color:var(--w)"> · 缺英文名</span>'}</span></span>
      </div>`).join('') + `</div>`;
  }).join('');

  // ===== 設定檢驗項目 =====
  h+=`<label class="lbl" style="margin-top:16px">設定檢驗項目（選擇產品）</label>
    <select class="fld" onchange="A.pickData(this.value)" style="margin-bottom:14px">
      ${filteredPool.map(x=>`<option value="${x.id}" ${x.id===dataPid?'selected':''}>${custName(x)} · ${x.name||'未命名'}</option>`).join('')}
    </select>
    <table style="width:100%;border-collapse:collapse;font-size:13.5px;margin-bottom:14px">
      <tr style="border-bottom:1px solid var(--line)">
        <td style="padding:8px;color:var(--muted);font-size:12px;width:90px">送驗廠商</td>
        <td style="padding:8px;font-weight:600">${custName(p)||'—'}${(p.mine&&me.nameEn)?` / ${me.nameEn}`:''}</td>
      </tr>
      <tr style="border-bottom:1px solid var(--line)">
        <td style="padding:8px;color:var(--muted);font-size:12px">地址</td>
        <td style="padding:8px">${custAddr(p)||'—'}</td>
      </tr>
      <tr style="border-bottom:1px solid var(--line)">
        <td style="padding:8px;color:var(--muted);font-size:12px">工廠</td>
        <td style="padding:8px">${FACTORY}</td>
      </tr>
      <tr style="border-bottom:1px solid var(--line)">
        <td style="padding:8px;color:var(--muted);font-size:12px">產品名稱</td>
        <td style="padding:8px"><span class="nm">${p.name||'—'}</span> <span class="pill pill--s" style="font-size:10px">輸出至清單</span></td>
      </tr>
      <tr style="border-bottom:1px solid var(--line)">
        <td style="padding:8px;color:var(--muted);font-size:12px">英文名</td>
        <td style="padding:4px 8px"><input class="fld fld--mini" value="${(p.en||'').replace(/"/g,'&quot;')}" placeholder="English name" style="width:100%" onchange="A.setField('${dataPid}','en',this.value)"></td>
      </tr>
      <tr style="border-bottom:1px solid var(--line)">
        <td style="padding:8px;color:var(--muted);font-size:12px">別名</td>
        <td style="padding:8px">${p.alias||'—'} <span class="faint" style="font-size:11px">（內部對照，不輸出）</span></td>
      </tr>
      <tr style="border-bottom:1px solid var(--line)">
        <td style="padding:8px;color:var(--muted);font-size:12px">型號規格</td>
        <td style="padding:4px 8px"><input class="fld fld--mini" value="${(p.spec||'').replace(/"/g,'&quot;')}" placeholder="例：100ml/瓶" style="width:100%" onchange="A.setField('${dataPid}','spec',this.value)"></td>
      </tr>
      <tr style="border-bottom:1px solid var(--line)">
        <td style="padding:8px;color:var(--muted);font-size:12px">數量</td>
        <td style="padding:4px 8px"><input class="fld fld--mini" value="${(p.qty||'').replace(/"/g,'&quot;')}" placeholder="例：4瓶" style="width:100%" onchange="A.setField('${dataPid}','qty',this.value)"></td>
      </tr>
      <tr style="border-bottom:1px solid var(--line)">
        <td style="padding:8px;color:var(--muted);font-size:12px">產品類型</td>
        <td style="padding:4px 8px">
          <select class="fld fld--mini" onchange="A.setType('${p.id}',this.value)" style="width:100%">
            ${['油劑','面膜','液劑霜劑','其他'].map(t=>`<option ${(p.type||'')=== t?'selected':''}>${t}</option>`).join('')}
          </select>
        </td>
      </tr>
      <tr>
        <td style="padding:8px;color:var(--muted);font-size:12px">樣品量</td>
        <td style="padding:4px 8px"><input class="fld fld--mini" value="${(p.amt||'').toString().replace(/"/g,'&quot;')}" placeholder="如 50g" onchange="A.setAmt('${p.id}',this.value)" style="width:100%"></td>
      </tr>
    </table>
    <div class="sect mt" style="margin-bottom:6px">檢驗項目（依產品類型自動帶入 · 可調整）</div>
    <div class="faint" style="font-size:12px;margin:0 0 10px">油劑→安定性、面膜→微生物＋念珠菌、液劑霜劑→防腐＋常规</div>
    <table style="width:100%;border-collapse:collapse;font-size:13.5px">
      ${testItems.map(t=>`<tr style="border-bottom:1px solid var(--line);cursor:pointer" onclick="A.toggleTest('${t.k}')">
        <td style="padding:10px 8px;width:32px"><span class="ck ${p.t[t.k]?'on':''}" style="pointer-events:none"><i class="ti ti-check"></i></span></td>
        <td style="padding:10px 4px;font-weight:${p.t[t.k]?'700':'400'};color:${p.t[t.k]?'var(--ink)':'var(--muted)'}">${t.label}</td>
        <td style="padding:10px 8px;text-align:right;font-weight:700;color:${p.t[t.k]?'var(--s)':'var(--faint)'};white-space:nowrap">${money(t.price)}</td>
      </tr>`).join('')}
      <tr style="border-top:2px solid var(--accent);font-weight:700">
        <td colspan="2" style="padding:10px 8px">本筆送驗成本</td>
        <td style="padding:10px 8px;text-align:right;font-size:16px;color:var(--s)">${money(sum)}</td>
      </tr>
    </table>
    <div class="faint" style="font-size:12px;margin-top:6px">此為送驗成本，與對客戶請款（5000／10000）分開。</div>
    <label class="lbl" style="margin-top:16px">功能性測試（手寫輸入 · 選填）</label>
    <textarea class="fld" style="height:64px;line-height:1.5" placeholder="如需功能性測試，描述項目／方法" onchange="A.setFunc('${p.id}',this.value)">${p.func||''}</textarea>
    <button class="btn btn--ghost" style="margin-top:16px" onclick="A.openAddItems('eloga')"><i class="ti ti-plus"></i> 新增品項（手動／辨識）</button>
    <button class="btn" style="margin-top:10px" ${filteredSel.length?'':'disabled'} onclick="A.exportSongyan()">
      <i class="ti ti-file-stack"></i> 生成合作協議＋樣品清單並送驗${dataVendorFilter?'（'+dataVendorFilter+'　'+filteredSel.length+' 筆）':'（已勾選 '+filteredSel.length+' 筆）'}</button>
    <div class="faint" style="font-size:12px;margin-top:8px;text-align:center">同時產出：給實驗室的樣品清單 Excel（依客戶合併）＋ 依洛嘉與微化檢驗的合作協議 Word；並把這些項目轉為「送驗中」。</div>
    <label class="btn btn--ghost" style="margin-top:14px;display:flex;cursor:pointer">
      <i class="ti ti-file-import"></i> 匯入送驗清單 XLSX（回送客戶）
      <input type="file" accept=".xlsx" style="display:none" onchange="A.importSongyan(this)">
    </label>
    <div class="faint" style="font-size:12px;margin-top:8px;text-align:center">依「公司資料」對應客戶名稱，逐筆建立並回送到客戶端。</div></div>`;
  return h;
}
function elgInvoice(){
  const recv=P('received');
  const issued=P('invoiced');
  const toCheck=P('reported');
  const testing=P('testing');
  const testingUnpaid=products.filter(p=>
    (p.status==='paid'||p.status==='completed'||p.status==='testing'||p.status==='reporting') &&
    !p.pifFeePaid &&
    custName(p)!==ELG_SELF
  );
  const allPaid=products.filter(p=>['paid','testing','reporting','completed'].includes(p.status)&&p.payRecords&&p.payRecords.length);
  const totalCollected=allPaid.reduce((s,p)=>(p.payRecords||[]).reduce((a,r)=>a+r.amt,s),0);
  const byMethod={}; allPaid.forEach(p=>(p.payRecords||[]).forEach(r=>{ byMethod[r.method]=(byMethod[r.method]||0)+r.amt; }));
  const custs=[...new Set(recv.map(p=>custName(p)))];
  recv.forEach(p=>{ if(p.invSel===undefined) p.invSel=true; if(!p.feeSel) p.feeSel=10000; });

  // 頂部統計
  let h=`<div class="dash" style="margin-bottom:16px">
    <div class="metric"><div class="mi" style="background:var(--s-bg);color:var(--s)"><i class="ti ti-cash"></i></div><div class="mv">${money(totalCollected)}</div><div class="ml">已收總計</div></div>
    <div class="metric" onclick="A.setInvTab('recv')" style="cursor:pointer"><div class="mi" style="background:var(--w-bg);color:var(--w)"><i class="ti ti-inbox"></i></div><div class="mv">${recv.length}</div><div class="ml">待開收款單</div></div>
    <div class="metric" onclick="A.setInvTab('issued')" style="cursor:pointer"><div class="mi"><i class="ti ti-send"></i></div><div class="mv">${issued.length}</div><div class="ml">已開單待匯款</div></div>
    <div class="metric" onclick="A.setInvTab('check')" style="cursor:pointer"><div class="mi" style="background:var(--w-bg);color:var(--w)"><i class="ti ti-search"></i></div><div class="mv">${toCheck.length}</div><div class="ml">待查帳</div></div>
    <div class="metric" onclick="A.setInvTab('retro')" style="cursor:pointer"><div class="mi"><i class="ti ti-history"></i></div><div class="mv">${testingUnpaid.length}</div><div class="ml">補錄收款</div></div>
  </div>`;

  // 分頁導覽
  const tabs=[
    {id:'recv',  label:'開請款單', badge:recv.length, color:'var(--w)'},
    {id:'issued',label:'已開單',   badge:issued.length},
    {id:'check', label:'查帳',     badge:toCheck.length, color:'var(--w)'},
    {id:'retro', label:'補收PIF費', badge:testingUnpaid.length},
    {id:'query', label:'請款單查詢'},
  ];
  h+=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;border-bottom:2px solid var(--line);padding-bottom:10px">
    ${tabs.map(t=>`<button onclick="A.setInvTab('${t.id}')"
      style="padding:6px 16px;border:0;border-radius:20px;font-size:13px;font-family:inherit;cursor:pointer;
             background:${invTab===t.id?'var(--accent)':'var(--n-bg)'};
             color:${invTab===t.id?'#fff':'var(--ink)'};font-weight:${invTab===t.id?'700':'400'}">
      ${t.label}${t.badge?` <span style="background:${invTab===t.id?'rgba(255,255,255,.3)':t.color||'var(--line2)'};color:${invTab===t.id?'#fff':'var(--ink)'};border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700;margin-left:4px">${t.badge}</span>`:''}
    </button>`).join('')}
  </div>`;

  // ===== 補錄請款（已完成 PIF + 送驗中，尚無收款記錄）=====
  if(invTab==='retro'){
    const tCusts=[...new Set(testingUnpaid.map(p=>custName(p)))];
    // retroCust 可能是從收款匯總跳過來的，即使不在 tCusts 也要顯示（可能該客戶品項狀態略有不同）
    const activeCust=retroCust||(tCusts[0]||'');
    const items=testingUnpaid.filter(p=>custName(p)===activeCust);

    // 已建立的收款單（所有客戶）
    const myInvRecs=invoiceRecs.filter(r=>r.cust===activeCust);

    h+=`<div class="sect" style="margin-bottom:6px">補收 PIF 處理費 · 選客戶</div>`;
    h+=`<div class="note" style="margin-bottom:10px"><i class="ti ti-info-circle"></i>這些品項<b>檢驗費已收、已送驗</b>，此處補收「PIF 處理費」（對客戶的服務費）。選擇方案後建立收款單。</div>`;
    if(tCusts.length){
      h+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">
        ${tCusts.map(cn=>`<button onclick="A.setRetroCust('${cn}')"
          style="border:2px solid ${cn===activeCust?'var(--accent)':'var(--line2)'};
                 background:${cn===activeCust?'var(--accent-tint)':'var(--surface)'};
                 color:${cn===activeCust?'var(--accent)':'var(--ink)'};
                 border-radius:20px;padding:5px 14px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:${cn===activeCust?'700':'400'}">
          ${cn}</button>`).join('')}
      </div>`;
    }

    if(activeCust){
      // 自動納入的品項（已收檢驗費/送驗中等）
      const autoItems=products.filter(p=>
        (p.status==='paid'||p.status==='completed'||p.status==='testing'||p.status==='reporting') &&
        custName(p)===activeCust
      );
      // 手動追加的品項（其他狀態，但被標記 retroForce）
      const forcedItems=products.filter(p=>
        custName(p)===activeCust && p.retroForce &&
        !autoItems.includes(p)
      );
      const allCustItems=[...autoItems, ...forcedItems];
      // 可開單候選（樣品庫挑選用）：不在自動清單、未強制加入
      const addCandidates=products.filter(p=>
        custName(p)===activeCust &&
        !autoItems.includes(p) && !p.retroForce
      );
      // PIF 分期感知：用 invoices 帳本判斷
      const pifInvs=p=>itemInvoices(p).filter(iv=>iv.kind==='pif');
      const pifDueOf=p=>pifInvs(p).reduce((s,iv)=>{ const pd=(iv.payRecords||[]).reduce((a,r)=>a+(r.amt||0),0); return s+Math.max(0,(iv.amount||0)-pd); },0);
      const pifBilledOf=p=>pifInvs(p).reduce((s,iv)=>s+(iv.amount||0),0);
      // 待開：可再開一張 PIF 單的品項（一律列出，方便分期反覆開單）
      const notInvoiced=allCustItems;
      // 請款中：有 PIF 單但還有待收的
      const invoicing=allCustItems.filter(p=> pifInvs(p).length>0 && pifDueOf(p)>0 );
      // 已收：有 PIF 單且全部收齊
      const pifDone=allCustItems.filter(p=> pifInvs(p).length>0 && pifDueOf(p)<=0 );

      // 手動追加面板（樣品庫挑選 + 手寫新增），兩處共用
      const retroAddPanel=(compact)=>{
        const addOpen=!!pifGroupClosed['retroAddOpen_'+activeCust];
        let a=`<div style="${compact?'margin-top:12px;padding-top:10px;border-top:1px dashed var(--line2)':'margin-top:6px'}">
          <div style="display:flex;align-items:center;cursor:pointer" onclick="A.toggleRetroAdd('${activeCust}')">
            <span style="font-size:${compact?'12px':'13px'};font-weight:700;color:var(--accent);flex:1"><i class="ti ti-plus"></i> 手動追加品項${addCandidates.length?'（樣品庫 '+addCandidates.length+' 項可加）':''}</span>
            <i class="ti ti-chevron-${addOpen?'up':'down'}" style="color:var(--accent)"></i>
          </div>`;
        if(addOpen){
          // 手寫新增
          a+=`<div class="card" style="margin-top:8px;background:var(--accent-tint);border-color:var(--accent)">
            <div style="font-size:11.5px;font-weight:700;color:var(--accent);margin-bottom:6px"><i class="ti ti-pencil"></i> 直接手寫品名新增</div>
            <div style="display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap">
              <div style="flex:1;min-width:140px"><input class="fld fld--mini" id="retro_newname_${activeCust}" placeholder="輸入品名，如：玫瑰精華液" style="width:100%"></div>
              <button class="btn btn--ok btn--sm" style="width:auto;padding:0 14px;font-size:11px" onclick="A.retroAddNew('${activeCust}')"><i class="ti ti-plus"></i> 新增並加入</button>
            </div>
          </div>`;
          // 從樣品庫（現有品項）挑
          if(addCandidates.length){
            a+=`<div class="note" style="margin:8px 0;font-size:11px"><i class="ti ti-database"></i>或從樣品庫挑選該客戶現有品項加入：</div>`;
            a+=`<div class="stack">`+addCandidates.map(p=>`
              <div class="card compact row" style="gap:8px;padding:8px 10px">
                <span style="flex:1;min-width:0"><span class="nm" style="font-size:12.5px">${p.name||'—'}</span>
                  <span class="pill pill--n" style="font-size:9.5px;margin-left:4px">${SM[p.status]?SM[p.status][0]:p.status}</span></span>
                <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 12px;font-size:11px;color:var(--accent);border-color:var(--accent)" onclick="A.retroAddItem('${p.id}')"><i class="ti ti-plus"></i> 加入</button>
              </div>`).join('')+`</div>`;
          } else {
            a+=`<div class="sub" style="font-size:11px;margin-top:8px">樣品庫中此客戶無其他可追加品項，可用上方手寫新增。</div>`;
          }
        }
        a+=`</div>`;
        return a;
      };

      // === 狀態總覽 ===
      h+=`<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <div class="card compact" style="flex:1;min-width:90px;text-align:center;padding:10px;border-color:var(--n)"><div style="font-size:20px;font-weight:700;color:var(--ink)">${notInvoiced.length}</div><div class="sub" style="font-size:11px">未開單</div></div>
        <div class="card compact" style="flex:1;min-width:90px;text-align:center;padding:10px;border-color:var(--w)"><div style="font-size:20px;font-weight:700;color:var(--w)">${invoicing.length}</div><div class="sub" style="font-size:11px">請款中</div></div>
        <div class="card compact" style="flex:1;min-width:90px;text-align:center;padding:10px;border-color:var(--s)"><div style="font-size:20px;font-weight:700;color:var(--s)">${pifDone.length}</div><div class="sub" style="font-size:11px">PIF費已收</div></div>
      </div>`;

      // === 1. 未開單：可勾選建立收款單 ===
      if(notInvoiced.length){
        const selItems=notInvoiced.filter(p=>p.retroSel!==false);
        const custTotal=selItems.reduce((s,p)=>{
          const sel=p.retroPlans||['shared'];
          return s+PIF_PLANS.filter(pl=>sel.includes(pl.id)).reduce((a,pl)=>a+pl.amt,0);
        },0);
        h+=`<div class="card" style="border-color:var(--accent);margin-bottom:14px">
          <div class="row" style="margin-bottom:8px">
            <span class="nm" style="font-size:14px"><i class="ti ti-receipt-2"></i> 待開 PIF 收款單（${notInvoiced.length}）</span>
            <span class="muted" style="font-size:12px;font-weight:600;cursor:pointer" onclick="A.retroSelAll('${activeCust}')">${selItems.length===notInvoiced.length?'全不選':'全選'}</span>
          </div>
          <div class="note" style="margin-bottom:10px"><i class="ti ti-info-circle"></i>勾選要開單的品項、選 PIF 方案、填「本單說明」（例：訂金、尾款），建立收款單。<b>每開一張都是獨立記錄，不會覆蓋先前已收的明細。</b></div>
          ${notInvoiced.map(p=>{
            const sel=p.retroPlans||['shared'];
            const itemTotal=PIF_PLANS.filter(pl=>sel.includes(pl.id)).reduce((s,pl)=>s+pl.amt,0);
            const statusLabel=p.status==='completed'?'已完成 PIF':p.status==='reporting'?'PIF製作中':'送驗中';
            const on=p.retroSel!==false;
            return `<div class="card compact" style="margin-bottom:8px;${on?'':'opacity:.5'}">
              <div class="row" style="margin-bottom:8px;gap:8px">
                <span class="ck ${on?'on':''}" onclick="A.retroToggleSel('${p.id}')" style="cursor:pointer;flex:none"><i class="ti ti-check"></i></span>
                <span style="flex:1;min-width:0">
                  <span class="nm" style="font-size:13px">${p.name}</span>
                  <span class="pill pill--n" style="font-size:10px;margin-left:6px">${statusLabel}</span>
                </span>
                <span class="amt" style="font-size:14px;color:var(--s)">${money(itemTotal)}</span>
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:4px">
                ${PIF_PLANS.map(pl=>{
                  const plOn=sel.includes(pl.id);
                  return `<button onclick="A.retroTogglePlan('${p.id}','${pl.id}','${activeCust}')"
                    style="border:1.5px solid ${plOn?'var(--accent)':'var(--line2)'};background:${plOn?'var(--accent-tint)':'var(--surface)'};
                    color:${plOn?'var(--accent)':'var(--muted)'};border-radius:6px;padding:3px 10px;cursor:pointer;
                    font-size:11px;font-family:inherit;font-weight:${plOn?'700':'400'}">
                    ${pl.label} ${money(pl.amt)}</button>`;
                }).join('')}
              </div>
            </div>`;
          }).join('')}
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:flex-end">
            <div><label class="lbl">收款日期</label><input class="fld fld--mini" type="date" id="retro_date_all" value="${new Date().toISOString().slice(0,10)}" style="width:130px"></div>
            <div><label class="lbl">付款方式</label><select class="fld fld--mini" id="retro_method_all">${PAY_METHODS.map(m=>`<option>${m}</option>`).join('')}</select></div>
            <div style="flex:1;min-width:140px"><label class="lbl">本單說明（區分多張單）</label><input class="fld fld--mini" id="retro_note_all" placeholder="例：訂金 / 尾款 / 末五碼12345"></div>
            <button class="btn btn--ok btn--sm" style="width:auto;padding:0 16px;flex:none;align-self:flex-end" ${selItems.length?'':'disabled'} onclick="A.createInvoiceRec('${activeCust}')">
              <i class="ti ti-file-invoice"></i> 建立收款單（${selItems.length} 筆 · ${money(custTotal)}）</button>
          </div>
          ${retroAddPanel(true)}
        </div>`;
      } else {
        // 即使沒有自動品項，也提供手動追加入口
        h+=`<div class="card" style="border-color:var(--accent);margin-bottom:14px">
          ${retroAddPanel(false)}
        </div>`;
      }

      // === 2. 請款中：已開單等收款（逐張分期單顯示，互不覆蓋）===
      if(invoicing.length){
        h+=`<div class="sect" style="font-size:13px;margin-top:14px">請款中（已開單 · 待收款）${invoicing.length}</div>`;
        h+=`<div class="stack">`+invoicing.map(p=>{
          const dues=pifInvs(p).filter(iv=>{ const pd=(iv.payRecords||[]).reduce((a,r)=>a+(r.amt||0),0); return (iv.amount||0)-pd>0; });
          const rows=dues.map(iv=>{
            const pd=(iv.payRecords||[]).reduce((a,r)=>a+(r.amt||0),0);
            const due=Math.max(0,(iv.amount||0)-pd);
            return `<div class="row" style="gap:8px;padding:6px 0;border-top:1px dashed var(--line2)">
              <span style="flex:1;min-width:0">
                <span class="sub" style="font-size:11.5px;color:var(--ink);font-weight:600">${iv.note||iv.label||'PIF費'}</span>
                <span class="sub" style="font-size:10.5px;margin-left:6px">${iv.id||''}${iv.date?' · '+iv.date:''}${pd>0?' · 已收 '+money(pd):''}</span>
              </span>
              <span class="amt" style="font-size:13px;color:var(--w);margin-right:4px">${money(due)}</span>
              <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 8px;color:#C0392B;border-color:#E7C3BD;flex:none"
                onclick="A.revertPifInvoiceLedger('${p.id}','${iv.id}')">
                <i class="ti ti-arrow-back-up"></i> ${confirmDel==='rpil'+p.id+'_'+iv.id?'確認撤銷':'撤銷此單'}</button>
            </div>`;
          }).join('');
          return `<div class="card compact" style="border-color:var(--w)">
            <span class="nm" style="font-size:13px">${p.name}</span>
            ${rows}
          </div>`;
        }).join('')+`</div>`;
        h+=`<div class="faint" style="font-size:11.5px;margin-top:6px"><i class="ti ti-info-circle"></i> 收到匯款後，到下方「已建立的收款單」展開 → 標記已收款；或在「收款匯總」逐張確認。每張單獨立計算，不會互相覆蓋。</div>`;
      }

      // === 3. PIF 費已收 ===
      if(pifDone.length){
        const doneOpen=pifGroupClosed['retro_done_'+activeCust]==='open';
        const doneTotal=pifDone.reduce((s,p)=>s+pifBilledOf(p),0);
        h+=`<div class="card" style="margin-top:14px;padding:0;overflow:hidden;border-color:var(--s)">
          <div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--s-bg);cursor:pointer" onclick="A.toggleRetroDone('${activeCust}')">
            <span style="flex:1;min-width:0"><span class="nm" style="font-size:13px;color:var(--s)"><i class="ti ti-circle-check"></i> PIF 費已收</span>
              <span class="sub" style="font-size:11px;margin-left:6px">${pifDone.length} 筆 · ${money(doneTotal)} · 明細見下方收款單</span></span>
            <i class="ti ti-chevron-${doneOpen?'up':'down'}" style="color:var(--s);flex:none"></i>
          </div>
          ${doneOpen?`<div style="padding:8px 12px"><div class="stack">`+pifDone.map(p=>`
            <div class="card compact" style="border-color:var(--s)">
              <span class="nm" style="font-size:13px">${p.name}</span>
              ${pifInvs(p).map(iv=>`<div class="row" style="gap:8px;padding:4px 0;border-top:1px dashed var(--line2)">
                <span class="sub" style="font-size:11px;flex:1">${iv.note||iv.label||'PIF費'}${iv.id?' · '+iv.id:''}</span>
                <span class="pill pill--s" style="font-size:10px">✓ ${money(iv.amount||0)}</span></div>`).join('')}
            </div>`).join('')+`</div></div>`:''}
        </div>`;
      }

      if(!notInvoiced.length && !invoicing.length && !pifDone.length){
        h+=`<div class="card faint" style="text-align:center;padding:14px;margin-bottom:14px">「${activeCust}」目前沒有待處理 PIF 費的品項</div>`;
      }

      // 已建立的收款單列表
      if(myInvRecs.length){
        h+=`<div class="sect" style="margin:14px 0 8px">已建立的收款單（${myInvRecs.length} 張）</div>`;
        h+=myInvRecs.slice().reverse().map(rec=>{
          const open=invDetailOpen===rec.id;
          const statusColor=rec.status==='paid'?'var(--s)':'var(--w)';
          return `<div class="card compact" style="margin-bottom:8px">
            <div class="row" style="cursor:pointer" onclick="A.toggleInvDetail('${rec.id}')">
              <span style="flex:1;min-width:0">
                <span class="nm" style="font-size:13px;color:var(--accent)">${rec.id}</span>
                <span class="pill" style="font-size:10px;background:${statusColor}15;color:${statusColor};margin-left:6px;border:1px solid ${statusColor}40">
                  ${rec.status==='paid'?'已收款':'待收款'}</span><br>
                <span class="sub" style="font-size:11.5px">${rec.date} · ${rec.method} · ${rec.items.length} 筆</span>
              </span>
              <span class="amt" style="font-size:15px;color:${statusColor}">${money(rec.total)}</span>
              <i class="ti ti-chevron-${open?'up':'down'}" style="color:var(--muted);margin-left:8px"></i>
            </div>
            ${open?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--line)">
              <table style="width:100%;font-size:12.5px;border-collapse:collapse">
                <tr style="color:var(--muted);font-weight:600">
                  <td style="padding:3px 6px">品名</td><td style="padding:3px 6px">狀態</td><td style="padding:3px 6px">方案</td><td style="padding:3px 6px;text-align:right">金額</td>
                </tr>
                ${rec.items.map(it=>`<tr style="border-top:1px solid var(--line)">
                  <td style="padding:4px 6px">${it.name}</td>
                  <td style="padding:4px 6px;color:var(--muted)">${it.statusLabel||''}</td>
                  <td style="padding:4px 6px;color:var(--muted)">${it.plan}</td>
                  <td style="padding:4px 6px;text-align:right;font-weight:700;color:var(--s)">${money(it.amt)}</td>
                </tr>`).join('')}
                <tr style="border-top:2px solid var(--line);font-weight:700">
                  <td colspan="3" style="padding:6px 6px">合計</td>
                  <td style="padding:6px 6px;text-align:right;color:var(--s)">${money(rec.total)}</td>
                </tr>
              </table>
              <div style="margin-top:8px">備註：${rec.note||'—'}</div>
              <div style="display:flex;gap:6px;margin-top:10px">
                ${rec.status!=='paid'?`<button class="btn btn--ok btn--sm" style="width:auto;padding:0 14px" onclick="A.markInvPaid('${rec.id}')"><i class="ti ti-check"></i> 標記已收款</button>`:''}
                <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px;color:#C0392B;border-color:#E7C3BD" onclick="A.deleteInvRec('${rec.id}')"><i class="ti ti-trash"></i> 刪除此收款單</button>
              </div>
            </div>`:''}
          </div>`;
        }).join('');
      }
    } else {
      h+=`<div class="card faint" style="text-align:center;padding:20px">目前所有品項都已有收款記錄</div>`;
    }
  } // end invTab==='retro'

  // ===== 開請款單 =====
  if(invTab==='recv'){
  h+=`<div class="note" style="margin-bottom:14px"><i class="ti ti-users"></i>依客戶分開開單：勾選樣品、選費用方案，確認合計後開收款單回傳給客戶。</div>`;
  h += `<div class="row sect"><span>開收款單（已收樣）</span><span class="pill pill--i">${recv.length}</span></div>`;
  h += recv.length ? custs.map(cn=>{
    const items=recv.filter(p=>custName(p)===cn);
    const tot=items.filter(p=>p.invSel).reduce((s,p)=>s+(p.feeSel||0),0);
    const cobj=customers.find(c=>c.name===cn); const isC=cobj&&cobj.contract; const bal=cobj?(cobj.balance||0):0;
    return `<div class="card" style="margin-bottom:12px">
      <div class="row" style="margin-bottom:8px">
        <span class="nm" style="font-size:15px"><i class="ti ti-building-store"></i> ${cn}${isC?' <span class="pill pill--s" style="font-size:10px">合約制</span>':''}</span>
        <span class="muted" style="font-size:12px;font-weight:600;cursor:pointer" onclick="A.toggleInvVendor('${cn}')">${items.every(p=>p.invSel)?'全不選':'全選'}</span>
      </div>
      ${isC?`<div class="sub" style="margin-bottom:4px">合約餘額：<b style="color:${bal>=tot?'var(--s)':'var(--w)'}">${money(bal)}</b>${bal<tot?'（不足，差額將改開收款單）':''}</div>`:''}
      ${items.map(p=>{
        const selPlans=p.feeSelPlans||['shared'];
        const itemTotal=PIF_PLANS.filter(pl=>selPlans.includes(pl.id)).reduce((s,pl)=>s+pl.amt,0);
        p.feeSel=itemTotal;
        return `
        <div style="border-top:1px solid var(--line);padding:8px 0;display:flex;align-items:center;gap:10px">
          <span class="ck ${p.invSel?'on':''}" data-inv="${p.id}" onclick="A.toggleInv('${p.id}')" style="cursor:pointer;flex:none"><i class="ti ti-check"></i></span>
          <span style="flex:1;cursor:pointer;min-width:0" onclick="A.toggleInv('${p.id}')">
            <span class="nm">${p.name}</span>
            <span class="sub" style="margin-left:6px;font-size:12px">${PIF_PLANS.filter(pl=>selPlans.includes(pl.id)).map(pl=>pl.label).join('＋')}</span>
          </span>
          <span class="amt" style="font-size:15px;font-weight:700;color:${p.invSel?'var(--s)':'var(--faint)'};flex:none">${money(itemTotal)}</span>
        </div>`;
      }).join('')}
      <div class="total" style="margin-top:12px">
        <span class="muted">${cn} 合計</span>
        <span class="amt" style="font-size:20px" data-inv-tot="${cn}">${money(tot)}</span>
      </div>
      ${cn===ELG_SELF
        ? `<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
            <button class="btn btn--ok btn--sm" style="width:auto;padding:0 16px" onclick="A.waiveInvoice('${cn}')"><i class="ti ti-check"></i> 批量免收款（依洛嘉自有）</button>
            <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px" onclick="A.issueInvoiceFor('${cn}')"><i class="ti ti-send"></i> 正常開單</button>
           </div>`
        : isC
          ? `<button class="btn btn--ok btn--sm" style="margin-top:10px" ${tot?'':'disabled'} onclick="A.settleByContract('${cn}')"><i class="ti ti-wallet"></i> 依合約餘額自動結算（不足改開收款單）</button>`
          : `<button class="btn btn--sm" style="margin-top:10px" ${tot?'':'disabled'} data-inv-btn="${cn}" onclick="A.issueInvoiceFor('${cn}')"><i class="ti ti-send"></i> 開收款單給 ${cn}（合計 ${money(tot)}）</button>`}
    </div>`;
  }).join('') : `<div class="card faint" style="text-align:center;padding:16px">沒有待開單的樣品</div>`;
  } // end invTab==='recv'

  // ===== 已開單 =====
  if(invTab==='issued'){
  h += `<div class="row sect"><span>已開收款單（待客戶匯款）</span><span class="pill pill--i">${issued.length}</span></div>`;
  if(issued.length){
    const icusts=[...new Set(issued.map(p=>custName(p)))];
    h += icusts.map(cn=>{
      const its=issued.filter(p=>custName(p)===cn);
      const tot=its.reduce((s,p)=>s+(p.charge||0),0);
      return `<div class="card" style="margin-bottom:12px;border-color:var(--w)">
        <div class="row" style="margin-bottom:6px">
          <span class="nm" style="font-size:15px"><i class="ti ti-receipt-2"></i> ${cn}</span>
          <span class="pill pill--w">待匯款</span>
        </div>
        ${its.map(p=>`
          <div class="miniline" style="align-items:center">
            <span style="flex:1">${p.name}</span>
            <span style="margin-right:10px">${money(p.charge||0)}</span>
            <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 8px;font-size:12px;color:#C0392B;border-color:#E7C3BD" onclick="A.voidInvoiceItem('${p.id}')" title="撤回此筆收款單">
              <i class="ti ti-arrow-back-up"></i> 撤回
            </button>
          </div>`).join('')}
        <div class="total" style="margin-top:8px">
          <span class="muted">${cn} 收款單合計</span>
          <span class="amt">${money(tot)}</span>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
          <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px;color:#C0392B;border-color:#E7C3BD" onclick="A.voidInvoiceAll('${cn}')">
            <i class="ti ti-x"></i> 整張撤回（全部退回待請款）
          </button>
          <button class="btn btn--ok btn--sm" style="width:auto;padding:0 14px" onclick="A.markAllReported('${cn}')">
            <i class="ti ti-check"></i> 客戶已匯款（整批轉查帳）
          </button>
        </div>
        <div class="note" style="margin-top:8px"><i class="ti ti-info-circle"></i>撤回後品項回到「待開收款單」，可修改費用或廠商後重新開單。</div>
      </div>`;
    }).join('');
  } else {
    h += `<div class="card faint" style="text-align:center;padding:16px">尚無已開出的收款單</div>`;
  }
  } // end invTab==='issued'

  // ===== 查帳 =====
  if(invTab==='check'){
  h += `<div class="row sect"><span>收款查帳（客戶已回報匯款）</span><span class="pill pill--w">${toCheck.length}</span></div>`;
  if(toCheck.length){
    const checkCusts=[...new Set(toCheck.map(p=>custName(p)))];
    h+=checkCusts.map(cn=>{
      const items=toCheck.filter(p=>custName(p)===cn);
      const tot=items.reduce((s,p)=>s+(p.charge||0),0);
      const payNote=items.map(p=>p.payNote).filter(Boolean)[0]||'—';
      const custKey=cn.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'_');
      const dupItems=items.filter(p=>(p.payRecords||[]).length>0);
      return `<div class="card" style="border-color:var(--w);margin-bottom:12px">
        <div class="row" style="margin-bottom:8px">
          <span>
            <span class="nm" style="font-size:15px"><i class="ti ti-building-store"></i> ${cn}</span><br>
            <span class="sub">${items.length} 筆 · 應收合計 ${money(tot)}</span>
          </span>
          <span class="pill pill--w">待查帳</span>
        </div>
        ${dupItems.length?`<div class="note" style="margin-bottom:10px;background:#FDECEA;border-color:#E7C3BD;color:#C0392B"><i class="ti ti-alert-triangle"></i> 重複收款警示：${dupItems.length} 筆已有收款記錄（${dupItems.map(p=>p.name).slice(0,3).join('、')}${dupItems.length>3?'…':''}），確認前請先檢查是否已收過款。</div>`:''}
        <div class="sub" style="margin-bottom:10px;padding:8px 12px;background:var(--n-bg);border-radius:8px">
          <i class="ti ti-cash"></i> 客戶匯款資訊：<b>${payNote}</b>
        </div>
        <table style="width:100%;font-size:13px;border-collapse:collapse;margin-bottom:10px">
          <tr style="color:var(--muted);font-size:12px;font-weight:600"><td style="padding:4px 8px">品名</td><td style="padding:4px 8px;text-align:right">應收金額</td></tr>
          ${items.map(p=>`<tr style="border-top:1px solid var(--line)">
            <td style="padding:6px 8px">${p.name}</td>
            <td style="padding:6px 8px;text-align:right;font-weight:700">${money(p.charge||0)}</td>
          </tr>`).join('')}
          <tr style="border-top:2px solid var(--accent);font-weight:700;font-size:14px">
            <td style="padding:8px">合計</td>
            <td style="padding:8px;text-align:right;color:var(--s)">${money(tot)}</td>
          </tr>
        </table>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px">
          <div style="flex:1;min-width:120px">
            <label class="lbl">實收金額</label>
            <input class="fld fld--mini" id="chk_amt_${custKey}" value="${tot}" type="number">
          </div>
          <div style="flex:1;min-width:120px">
            <label class="lbl">付款方式</label>
            <select class="fld fld--mini" id="chk_method_${custKey}">>
              ${PAY_METHODS.map(m=>`<option>${m}</option>`).join('')}
            </select>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn--ok btn--sm" style="flex:1;min-width:140px" onclick="A.confirmPayBatch('${cn}')">
            <i class="ti ti-checkbook"></i> 整批確認收到貨款（${items.length} 筆）</button>
          <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px;color:#C0392B;border-color:#E7C3BD" onclick="A.rejectPayBatch('${cn}')">
            <i class="ti ti-arrow-back-up"></i> 退回重開</button>
        </div>
      </div>`;
    }).join('');
  } else {
    // 診斷：說明開出的請款單目前在哪一關
    const nInvoiced=P('invoiced').length;  // 已開單待匯款
    const nReceived=P('received').length;  // 已收樣待開單
    const nPaid=P('paid').length+P('testing').length+P('reporting').length+P('completed').length; // 已收款後
    h+=`<div class="card faint" style="padding:16px">
      <p class="nm" style="font-size:14px;margin-bottom:8px">沒有待查帳項目</p>
      <p class="sub" style="line-height:1.9;font-size:12.5px">查帳分頁只顯示「<b>客戶已回報匯款末五碼</b>」的請款單。若你開了單卻沒看到，請依下面確認它卡在哪一關：</p>
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">
        <div class="card compact row" style="cursor:pointer" onclick="A.setInvTab('issued')">
          <span style="flex:1"><b>${nInvoiced}</b> 筆在「<b>已開單</b>」<br><span class="sub" style="font-size:11px">已開請款單，但客戶還沒回報匯款 → 等客戶回報，或代客戶在這裡操作</span></span>
          <i class="ti ti-chevron-right faint"></i>
        </div>
        <div class="card compact row" style="cursor:pointer" onclick="A.setInvTab('recv')">
          <span style="flex:1"><b>${nReceived}</b> 筆在「<b>開請款單</b>」<br><span class="sub" style="font-size:11px">已收樣但還沒開請款單 → 去這裡開單</span></span>
          <i class="ti ti-chevron-right faint"></i>
        </div>
        <div class="card compact row">
          <span style="flex:1"><b>${nPaid}</b> 筆<b>已確認收款</b><br><span class="sub" style="font-size:11px">已收款，進入送驗/PIF 流程，不再需要查帳</span></span>
        </div>
      </div>
    </div>`;
  }
  } // end invTab==='check'

  // ===== 請款單查詢 =====
  if(invTab==='query'){
    // 收集所有客戶（有任何請款單或請款記錄的）
    const batchCusts=new Set();
    // 檢驗費批次：products 有 batch 的
    products.forEach(p=>{ if(p.batch && p.batch.startsWith('INV-') && custName(p)!==ELG_SELF) batchCusts.add(custName(p)); });
    // PIF 費收款單：invoiceRecs
    invoiceRecs.forEach(r=>batchCusts.add(r.cust));
    const qCustList=[...batchCusts].sort();
    const activeCust=(retroCust && qCustList.includes(retroCust))?retroCust:(qCustList[0]||'');

    h+=`<div class="note" style="margin-bottom:10px"><i class="ti ti-file-search"></i>查詢開給各客戶的所有請款單與明細。包含「檢驗費批次單」與「PIF 處理費單」。</div>`;

    if(!qCustList.length){
      h+=`<div class="card faint" style="text-align:center;padding:24px">目前還沒有開過任何請款單</div>`;
      return h;
    }

    // 客戶選擇器
    h+=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">${qCustList.map(cn=>`
      <button onclick="A.setRetroCust('${cn}')" style="padding:6px 14px;border:1.5px solid ${cn===activeCust?'var(--accent)':'var(--line2)'};
        background:${cn===activeCust?'var(--accent-tint)':'var(--surface)'};color:${cn===activeCust?'var(--accent)':'var(--muted)'};
        border-radius:20px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:${cn===activeCust?'700':'400'}">${cn}</button>`).join('')}</div>`;

    // === 該客戶的檢驗費批次單 ===
    const custBatchProds=products.filter(p=>p.batch && p.batch.startsWith('INV-') && custName(p)===activeCust);
    const batchGroups={};
    custBatchProds.forEach(p=>{ (batchGroups[p.batch]=batchGroups[p.batch]||[]).push(p); });
    const batchKeys=Object.keys(batchGroups).sort().reverse();

    // === 該客戶的 PIF 費收款單 ===
    const custPifRecs=invoiceRecs.filter(r=>r.cust===activeCust).slice().reverse();

    const totalCount=batchKeys.length+custPifRecs.length;
    h+=`<div class="card" style="border-color:var(--accent);margin-bottom:12px;padding:12px 16px">
      <div class="row"><span class="nm" style="font-size:15px"><i class="ti ti-building-store"></i> ${activeCust}</span>
      <span class="pill pill--s">共 ${totalCount} 張請款單</span></div>
      <div class="sub" style="margin-top:4px">檢驗費批次 ${batchKeys.length} 張 · PIF 處理費 ${custPifRecs.length} 張</div>
    </div>`;

    // 檢驗費批次單列表
    if(batchKeys.length){
      h+=`<div class="sect" style="font-size:13px">檢驗費批次單</div>`;
      h+=batchKeys.map(bk=>{
        const items=batchGroups[bk];
        const tot=items.reduce((s,p)=>s+(p.charge||0),0);
        const allPaid=items.every(p=>paidSum(p)>0);
        const someStatus=items[0].status;
        const stLabel = allPaid?'已收款':(['invoiced','reported'].includes(someStatus)?'待收款':'處理中');
        const stColor = allPaid?'var(--s)':'var(--w)';
        const payNote=items.map(p=>p.payNote).filter(Boolean)[0]||'';
        return `<div class="card" style="margin-bottom:8px;border-color:${stColor}40">
          <div class="row" style="margin-bottom:6px">
            <span><span class="nm" style="font-size:13.5px;color:var(--accent)">${bk}</span>
              <span class="pill" style="font-size:10px;margin-left:6px;background:${stColor}15;color:${stColor};border:1px solid ${stColor}40">${stLabel}</span></span>
            <span class="amt" style="font-size:14px">${money(tot)}</span>
          </div>
          ${payNote?`<div class="sub" style="font-size:11px;margin-bottom:6px"><i class="ti ti-cash"></i> 匯款資訊：${payNote}</div>`:''}
          <div style="border-top:1px solid var(--line);padding-top:6px">
            ${items.map(p=>{
              const hasPif=p.pifFeeInvoice||p.pifFeePaid;
              return `<div style="display:flex;align-items:center;gap:6px;font-size:12.5px;padding:4px 0;border-bottom:1px solid var(--line)">
                <span style="flex:1">${p.name||'—'} <span class="sub" style="font-size:10.5px">${SM[p.status]?SM[p.status][0]:p.status}</span></span>
                ${hasPif
                  ? `<span class="pill pill--s" style="font-size:10px">${p.pifFeePaid?'PIF費已收':'PIF費請款中'}</span>`
                  : `<button onclick="A.setRetroCust('${custName(p)}');A.go('invoice');A.setInvTab('retro')"
                      style="border:1px solid var(--accent);background:var(--accent-tint);color:var(--accent);
                      border-radius:6px;padding:2px 8px;font-size:11px;font-family:inherit;cursor:pointer;white-space:nowrap">
                      <i class="ti ti-plus" style="font-size:11px"></i> 補請PIF費</button>`}
                <span style="font-weight:600;min-width:52px;text-align:right">${money(p.charge||0)}</span>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('');
    }

    // PIF 費收款單列表
    if(custPifRecs.length){
      h+=`<div class="sect" style="font-size:13px;margin-top:14px">PIF 處理費單</div>`;
      h+=custPifRecs.map(rec=>{
        const stColor=rec.status==='paid'?'var(--s)':'var(--w)';
        return `<div class="card" style="margin-bottom:8px;border-color:${stColor}40">
          <div class="row" style="margin-bottom:6px">
            <span><span class="nm" style="font-size:13.5px;color:var(--accent)">${rec.id}</span>
              <span class="pill" style="font-size:10px;margin-left:6px;background:${stColor}15;color:${stColor};border:1px solid ${stColor}40">${rec.status==='paid'?'已收款':'待收款'}</span></span>
            <span class="amt" style="font-size:14px">${money(rec.total)}</span>
          </div>
          <div class="sub" style="font-size:11px;margin-bottom:6px">${rec.date} · ${rec.method}${rec.note?' · '+rec.note:''}</div>
          <div style="border-top:1px solid var(--line);padding-top:6px">
            ${rec.items.map(it=>`<div style="display:flex;justify-content:space-between;font-size:12.5px;padding:3px 0">

      </div>`).join('')+`</div>`;
  }

  return h;
}

/* ---------- input methods ---------- */
function parseLines(text){
  return (text||'').split(/\n+/).map(s=>s.trim()).filter(Boolean)
    .filter(l=>!/^(客戶|您好|你好|哈囉|嗨|謝謝|感謝|麻煩|再麻煩|拜託|hi|hello|thanks|thank)/i.test(l))
    .map(l=>{
      let qty='', spec='', name=l;
      const qm=l.match(/(\d+)\s*(支|瓶|片|顆|盒|包|罐|組|入|條)/);
      if(qm){ qty=qm[0]; name=name.replace(qm[0],''); }
      const sm=l.match(/(\d+(?:\.\d+)?\s*(?:ml|g|kg|cc|毫升|公克|克)\s*\/?\s*(?:瓶|片|支|顆|包|盒)?)/i);
      if(sm){ spec=sm[0].trim(); name=name.replace(sm[0],''); }
      name=name.replace(/[，,：:。.、\-x×*]+/g,' ').replace(/\s+/g,' ').trim();
      return { name:name||l, en:'', spec:spec, qty:qty };
    });
}

}

    </div>`;

  // ===== 未綁定 Gmail 的帳號（最優先處理）=====

            <span class="sub">${prodN} 筆產品 · ${c.email||'尚未綁定 Gmail'}</span>

          <button class="btn btn--ok btn--sm" style="width:auto;padding:0 14px;flex:none" onclick="A.activateTempCust(${i})"><i class="ti ti-check"></i> 啟用</button>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  // ===== 客戶申請（待審核）=====
  if(pend.length){ h+=`<div class="sect mt">客戶申請（待審核）</div><div class="stack">`+pend.map(card).join('')+`</div>`; }

  // ===== 已註冊帳號 =====
  const reg=active.concat(off);
  h+=`<div class="sect mt">已註冊帳號（${reg.length}）· 公司名</div>`;
  h+= reg.length ? `<div class="stack">`+reg.map(card).join('')+`</div>`
    : `<div class="card faint" style="text-align:center;padding:18px">尚無已註冊帳號</div>`;
  if(custAddOpen){
    h += `<div class="card" style="margin-top:14px;border-color:var(--accent)">
      <p class="nm" style="font-size:15px;margin-bottom:6px"><i class="ti ti-building-plus"></i> 代註冊新客戶</p>
      <p class="sub" style="margin-bottom:12px">填入公司名與客戶 Gmail，客戶直接用那個 Gmail 登入就能進入客戶端，不需要另外申請。</p>
      <label class="lbl">公司名（廠商名）</label>
      <input id="c_name" class="fld" placeholder="例：晶寶企業行" style="margin-bottom:10px">

/* ---------- actions ---------- */
const A = {
  setRole(r){ role=r; render(); },
  goLogin(side){ view = side==='eloga'?'eloga-login':'customer-login'; window._loginSide=side; render(); },
  backEntry(){ view='entry'; render(); },
  loginEloga(){ role='eloga'; zone='back'; const a=ELG_TABS[elgRole]||ELG_TABS['主要管理者']; elgTab=a[0]; view='app'; render(); A.toast('以「'+elgRole+'」身分登入'); },
  setZone(z){ zone=z; if(view==='eloga-accounts') view='app'; render(); },
  openAddItems(target){ if(addTarget!==target) drafts=[]; addTarget=target; if(target!=='eloga' && addMode==='photo') addMode='text'; if(!addCust) addCust=(customers[0]&&customers[0].name)||''; view='add-items'; render(); },
  closeAddItems(){ view='app'; if(addTarget==='eloga') elgTab='data'; else custTab='submit'; render(); },
  clearDrafts(){ drafts=[]; save(); render(); A.toast('已清空草稿'); },
  syncSave(){ syncDrafts(); save(); },
  setAddMode(m){ if(m==='photo' && addTarget!=='eloga') return; syncDrafts(); addMode=m; render(); },
  setAddCust(v){ addCust=v; },
  recognizeText(){ syncDrafts(); const got=parseLines(dval('pastebox','')); if(!got.length){ A.toast('沒有辨識到品名'); return; } drafts=drafts.concat(got); render(); A.toast('辨識出 '+got.length+' 筆，請確認'); },
  photoRecognized(){ syncDrafts(); drafts.push({name:'（截圖辨識品名，請確認）',en:'',spec:'',qty:''}); render(); A.toast('已辨識 1 筆（示意），請確認'); },
  addManual(){ const g=id=>((document.getElementById(id)||{}).value||'').trim(); const n=g('mi_n'); if(!n){ A.toast('請填正確產品品名'); return; } syncDrafts(); drafts.push({name:n,alias:g('mi_alias'),en:g('mi_e'),spec:g('mi_s'),qty:g('mi_q')}); render(); A.toast('已加入待確認'); },
  rmDraft(i){ syncDrafts(); drafts.splice(i,1); render(); },
  commitDrafts(){
    syncDrafts(); if(!drafts.length){ A.toast('沒有可加入的品項'); return; }
    let uid=Date.now();
    drafts.forEach(d=>{
      const ty=inferType(d.name);
      const base={id:'n'+(uid++),name:d.name,alias:d.alias||'',en:d.en||'',spec:d.spec||'',qty:d.qty||'',amt:'',func:'',type:ty,t:defTests(ty)};
      if(addTarget==='eloga') Object.assign(base,{cust:addCust,status:'received',batch:'今日',invSel:true,feeSel:5000});
      else Object.assign(base,{cust:(me.nameCh||CUST),mine:(me.nameCh===CUST),status:'applied'});
      products.push(base);
    });
    const n=drafts.length; drafts=[]; view='app';
    if(addTarget==='eloga') elgTab='data'; else custTab='submit';
    render(); A.toast('已加入 '+n+' 筆');
  },
  pickElgRole(r){ elgRole=r; render(); },
  toggleGen(id){ const p=byId(id); if(p) p.genSel = (p.genSel===false); render(); },
  toggleVendor(v){ const its=products.filter(p=>p.status==='paid'&&custName(p)===v); const allSel=its.every(p=>p.genSel!==false); its.forEach(p=>p.genSel = allSel?false:true); render(); },
  go(t){ elgTab=t; confirmDel=null; render(); },
  goReceive(){ elgTab='receive'; render(); },
  openCust(nm){ custView=nm; batch={}; confirmDel=null; render(); },
  setStatus(id,st){
    const p=byId(id); if(!p) return;
    p.status=st;
    if(st==='completed'){
      p.batch='已完成';
      if(!p.pifPlan) p.pifPlan='shared';
      if(!p.pifPlanLabel) p.pifPlanLabel='VIP客戶價';
      if(!p.charge) p.charge=10000;
    }
    save(); render();
    if(st==='completed') A.toast('已設為完成 PIF，請到「完成 PIF」分頁補上連結與費用');
  },
  setField(id,f,v){ const p=byId(id); if(p){ p[f]=v; save(); } },
  async genEnName(id){
    const p=byId(id); if(!p) return;
    if(!getApiKey()){ A.toast('請先在設定填入 Anthropic API key'); A.openApiKeySetting(); return; }
    A.toast('AI 生成英文名中…');
    try{
      const en=await aiEnName(p.name,p.type);
      if(en){ p.en=en; save(); render(); A.toast('✓ 已生成：'+en); }
      else A.toast('生成失敗，請手動填');
    }catch(e){
      if(e.message==='no_key') A.toast('請先設定 API key');
      else A.toast('AI 失敗：'+(e.message||'請檢查 API key 是否正確'));
    }
  },
  async genEnMissing(){
    if(!getApiKey()){ A.toast('請先在設定填入 Anthropic API key'); A.openApiKeySetting(); return; }

  scanCache(){
    const lines=[];
    // 1. 暫存勾選狀態（UI 用，非資料）
    const selFlags=products.filter(p=>p.shipSel||p.invSel||p.genSel===false||p.retroSel===false).length;
    lines.push('暫存勾選狀態：'+selFlags+' 筆品項');
    // 2. 孤兒收款單（invoiceRecs 指向已不存在的品項）
    const orphanRecs=invoiceRecs.filter(r=>(r.items||[]).every(it=>!byId(it.pid))).length;
    lines.push('孤兒收款單（品項已刪）：'+orphanRecs+' 張');
    // 3. 空金額的收款記錄
    let emptyPayRecs=0;
    products.forEach(p=>{ (p.payRecords||[]).forEach(r=>{ if(!r.amt||r.amt<=0) emptyPayRecs++; }); });
    lines.push('空金額收款記錄：'+emptyPayRecs+' 筆');
    // 4. 共用清單重複品名
    const nc={}; sharedPIF.forEach(it=>{ nc[it.name]=(nc[it.name]||0)+1; });
    const dupShared=Object.keys(nc).filter(n=>nc[n]>1).reduce((s,n)=>s+(nc[n]-1),0);
    lines.push('共用清單重複項：'+dupShared+' 筆');
    // 5. 過期記事本（已超過 90 天）— 僅統計
    let oldNotes=0;
    try{ const ns=JSON.parse(localStorage.getItem('elg_notes')||'[]'); oldNotes=ns.filter(n=>n.ts&&(Date.now()-new Date(n.ts).getTime())>90*864e5).length; }catch(e){}
    lines.push('90天前舊記事：'+oldNotes+' 則');
    const total=selFlags+orphanRecs+emptyPayRecs+dupShared+oldNotes;
    cacheReport='掃描結果（可安全清除）：<br>'+lines.map(l=>'· '+l).join('<br>')+'<br><b>合計可清 '+total+' 項</b>';
    render();
    A.toast(total?('找到 '+total+' 項可清除的垃圾資料'):'系統很乾淨，沒有需要清除的');
  },
  cleanCache(){
    let cleaned=0;
    // 1. 清暫存勾選狀態
    products.forEach(p=>{ if(p.shipSel){delete p.shipSel;cleaned++;} if(p.invSel){delete p.invSel;cleaned++;} if(p.genSel===false){delete p.genSel;cleaned++;} if(p.retroSel===false){delete p.retroSel;cleaned++;} });
    // 2. 移除孤兒收款單
    const before=invoiceRecs.length;
    invoiceRecs=invoiceRecs.filter(r=>(r.items||[]).some(it=>byId(it.pid)));
    cleaned+=(before-invoiceRecs.length);
    // 3. 移除空金額收款記錄
    products.forEach(p=>{ if(p.payRecords&&p.payRecords.length){ const b=p.payRecords.length; p.payRecords=p.payRecords.filter(r=>r.amt&&r.amt>0); cleaned+=(b-p.payRecords.length); } });
    // 4. 移除共用清單重複（保留第一筆）
    const seen={}; const ns=[];
    sharedPIF.forEach(it=>{ if(seen[it.name]){ cleaned++; } else { seen[it.name]=true; ns.push(it); } });
    sharedPIF.length=0; ns.forEach(it=>sharedPIF.push(it));
    // 5. 清 90 天前舊記事
    try{ const arr=JSON.parse(localStorage.getItem('elg_notes')||'[]'); const keep=arr.filter(n=>!(n.ts&&(Date.now()-new Date(n.ts).getTime())>90*864e5)); cleaned+=(arr.length-keep.length); localStorage.setItem('elg_notes',JSON.stringify(keep)); }catch(e){}
    // 重置 UI 暫存狀態
    batch={}; pifSel={}; confirmDel=null; cacheReport='';
    save(); render();
    A.toast('已清除 '+cleaned+' 項垃圾資料，關鍵資料與雲端不受影響');
  },

  confirmAllPaidFor(cn){
    if(confirmDel!=='cap'+cn){ confirmDel='cap'+cn; render(); A.toast('再按一次確認：把「'+cn+'」所有待收款請款單標記為已收齊，客戶端請款單將撤下'); return; }
    const ds=new Date().toLocaleDateString('zh-TW');
    let labN=0, pifN=0;
    // 1. 檢驗費批次：invoiced/reported 且尚未收款 → 補收款記錄、推進到 paid
    products.filter(p=>custName(p)===cn && ['invoiced','reported'].includes(p.status)
      && (p.payRecords||[]).filter(r=>!r.note||!r.note.startsWith('PIF費')).reduce((s,r)=>s+(r.amt||0),0)===0
    ).forEach(p=>{
      const amt=p.charge||0;
      p.payRecords=p.payRecords||[];
      p.payRecords.push({date:ds, amt, method:p.payMethod||'手動確認', note:'確認已收齊（'+(p.batch||'')+'）'});
      p.paidAmt=(p.paidAmt||0)+amt;
      if(!['paid','testing','reporting','completed'].includes(p.status)) p.status='paid';
      delete p.disputed; delete p.disputedAt;
      labN++;
    });
    // 2. PIF 費單：未收的 → 標記收款 + 品項 pifFeePaid
    invoiceRecs.filter(r=>r.cust===cn&&r.kind==='pif'&&r.status!=='paid').forEach(rec=>{
      rec.status='paid'; rec.paidAt=new Date().toISOString();
      (rec.items||[]).forEach(it=>{
        const p=byId(it.pid); if(!p) return;
        p.payRecords=p.payRecords||[];
        if(!p.payRecords.some(r=>r.note==='PIF費 '+rec.id)){
          p.payRecords.push({date:ds, amt:it.amt, method:rec.method||'手動確認', note:'PIF費 '+rec.id});
          p.paidAmt=(p.paidAmt||0)+it.amt;
        }
        p.pifFeePaid=true; p.pifCharge=it.amt;
        pifN++;
      });
    });
    // 3. 也處理「品項有 pifFeeInvoice 但 invoiceRecs 找不到」的舊資料
    products.filter(p=>custName(p)===cn&&p.pifFeeInvoice&&!p.pifFeePaid).forEach(p=>{
      const amt=p.pifCharge||0;
      p.payRecords=p.payRecords||[];
      if(!p.payRecords.some(r=>r.note&&r.note.startsWith('PIF費 '+p.pifFeeInvoice))){
        p.payRecords.push({date:ds, amt, method:'手動確認', note:'PIF費 '+p.pifFeeInvoice});
        p.paidAmt=(p.paidAmt||0)+amt;
      }
      p.pifFeePaid=true; pifN++;
    });
    confirmDel=null; save(); render();
    A.toast('✓ 已確認「'+cn+'」全部收齊（檢驗費 '+labN+' 筆、PIF費 '+pifN+' 筆），客戶端請款單已撤下');
  },
  retroReopen(cn){
    // 把收款匯總中勾選的品項，重設 PIF 費狀態（清掉已開單/已收標記），退回「未開單」，再跳到補錄分頁重新開單
    const sel=products.filter(p=>custName(p)===cn && pifGroupClosed['sumSel_'+p.id]);
    if(!sel.length){ A.toast('請先勾選要補開請款的品項'); return; }
    let reset=0;
    sel.forEach(p=>{
      // 若先前有 PIF 費收款記錄，一併清除（視為要重收）
      if(p.payRecords) p.payRecords=p.payRecords.filter(r=>!(r.note&&r.note.startsWith('PIF費')));
      if(p.pifFeeInvoice){
        // 從對應收款單移除此品項
        const rec=invoiceRecs.find(r=>r.id===p.pifFeeInvoice);
        if(rec){
          rec.items=(rec.items||[]).filter(it=>it.pid!==p.id);
          rec.total=(rec.items||[]).reduce((s,it)=>s+(it.amt||0),0);
          if(!rec.items.length){ invoiceRecs=invoiceRecs.filter(r=>r.id!==p.pifFeeInvoice); if(typeof FB!=='undefined'&&FB.on&&FB.db) FB.db.collection('invoiceRecs').doc(p.pifFeeInvoice).delete().catch(()=>{}); }
        }
      }
      delete p.pifFeeInvoice; delete p.pifFeePaid; delete p.pifPlanLabel; delete p.pifCharge;
      delete pifGroupClosed['sumSel_'+p.id]; // 清掉勾選
      reset++;
    });
    retroCust=cn;
    save();
    A.go('invoice'); A.setInvTab('retro');
    A.toast('已將 '+reset+' 筆退回補錄分頁，請選方案後重新開 PIF 費收款單');
  },

  collectInstall(pid,ix){
    const p=byId(pid); if(!p||!p.invoices||!p.invoices[ix]) return;
    if(confirmDel!=='ci'+pid+'_'+ix){ confirmDel='ci'+pid+'_'+ix; render(); A.toast('再按一次確認：標記此張請款單已收款'); return; }
    const iv=p.invoices[ix];
    const ivPaid=(iv.payRecords||[]).reduce((s,r)=>s+(r.amt||0),0);
    const due=Math.max(0,(iv.amount||0)-ivPaid);

    [7.3,40.9,60.7,17.4,10.4,11.1,11.1,11.1,54.1,9.0].forEach((w,i)=>ws.getColumn(i+1).width=w);

      c.alignment={horizontal:'center',vertical:'middle',wrapText:true}; });
    hr.height=64.5;
    let r=2;
    list.forEach((p,idx)=>{
      const t=p.t||{}, row=ws.getRow(r);

      row.getCell(4).value=p.spec; row.getCell(5).value=p.qty;
      row.getCell(6).value=t.fang?'V':null; row.getCell(7).value=t.chang?'V':null; row.getCell(8).value=t.wen?'V':null;
      const amt=(t.fang?350:0)+(t.chang?320:0)+(t.wen?350:0);
      row.getCell(10).value={formula:`IF(F${r}="V",350,0)+IF(G${r}="V",200,0)+IF(H${r}="V",350,0)`,result:amt};
      row.getCell(1).font={name:'新細明體',size:11}; row.getCell(1).alignment={horizontal:'center',vertical:'middle'};
      row.getCell(2).font={name:'新細明體',size:12}; row.getCell(2).alignment={vertical:'middle'};
      row.getCell(3).font={name:'新細明體',size:11}; row.getCell(3).alignment={vertical:'middle'};
      [4,5,6,7,8,10].forEach(c=>{ row.getCell(c).font={name:'新細明體',size:11}; row.getCell(c).alignment={horizontal:'center',vertical:'middle'}; });
      row.height=16.5; r++;
    });
    const last=r-1;
    let s=2;
    for(let i=2;i<=last+1;i++){
      const cur=i<=last?custName(list[i-2]):null, prev=custName(list[s-2]);
      if(cur!==prev){
        const e=i-1, pp=list[s-2], ic=ws.getCell(`I${s}`);
        ic.value=`公司名称：${custName(pp)}\n公司地址：${custAddr(pp)}\n工厂名称：${FN}\n工厂地址：${FA}`;
        ic.font={name:'新細明體',size:11}; ic.alignment={vertical:'middle',wrapText:true};
        if(e>s) ws.mergeCells(`I${s}:I${e}`);
        const n=e-s+1; if(n*16.5<66) ws.getRow(s).height=66-16.5*(n-1);
        s=i;
      }
    }
    const tr=last+1, cnt=k=>list.filter(p=>(p.t||{})[k]).length;
    ws.getCell(`F${tr}`).value={formula:`COUNTIF(F2:F${last},"V")*350`,result:cnt('fang')*350};
    ws.getCell(`G${tr}`).value={formula:`COUNTIF(G2:G${last},"V")*320`,result:cnt('chang')*320};
    ws.getCell(`H${tr}`).value={formula:`COUNTIF(H2:H${last},"V")*350`,result:cnt('wen')*350};
    const grand=cnt('fang')*350+cnt('chang')*320+cnt('wen')*350;
    ws.getCell(`I${tr}`).value={formula:`"共"&SUM(J2:J${last})&"元"`,result:`共${grand}元`};
    [6,7,8].forEach(c=>{ const cell=ws.getRow(tr).getCell(c); cell.font={name:'新細明體',size:11}; cell.alignment={horizontal:'center',vertical:'middle'}; });
    ws.getCell(`I${tr}`).font={name:'新細明體',size:11}; ws.getCell(`I${tr}`).alignment={vertical:'middle',wrapText:true};
    for(let row=1;row<=tr;row++) for(let col=1;col<=10;col++) ws.getRow(row).getCell(col).border=BD;
    ws.views=[{state:'frozen',ySplit:1}];
    try{
      const buf=await wb.xlsx.writeBuffer();
      const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
      const url=URL.createObjectURL(blob), a=document.createElement('a');
      a.href=url; a.download='送驗清單.xlsx'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      const ah=agreementHTML(list);
      const ab=new Blob(['\ufeff'+ah],{type:'application/msword'});
      const au=URL.createObjectURL(ab), aa=document.createElement('a');
      aa.href=au; aa.download='合作協議.doc'; document.body.appendChild(aa); aa.click(); aa.remove(); URL.revokeObjectURL(au);
    }catch(e){
      A.toast('檔案生成失敗：'+e.message+'（狀態仍會更新）'); console.warn(e);
    }
    list.forEach(p=>{ p.status='testing'; delete p.genSel; });
    const vd=[...new Set(list.map(p=>custName(p)))].length;
    dataVendorFilter='';
    save(); render(); A.toast('已生成送驗清單（'+vd+' 家廠商 · '+list.length+' 筆），轉為送驗中');
  },

  createInvoiceRec(cn){
    const items=products.filter(p=>
      custName(p)===cn && p.retroSel!==false &&
      (['paid','completed','testing','reporting'].includes(p.status) || p.retroForce)
    );
    if(!items.length){ A.toast('請先勾選要開單的品項'); return; }
    const dateEl=document.getElementById('retro_date_all');
    const methodEl=document.getElementById('retro_method_all');
    const noteEl=document.getElementById('retro_note_all');
    const date=dateEl?dateEl.value:new Date().toLocaleDateString('zh-TW');
    const method=methodEl?methodEl.value:'匯款';
    const note=noteEl?noteEl.value.trim():'';
    const invItems=items.map(p=>{
      const sel=p.retroPlans||['shared'];
      const plans=PIF_PLANS.filter(pl=>sel.includes(pl.id));
      const amt=plans.reduce((s,pl)=>s+pl.amt,0)||10000;
      const planLabel=plans.map(pl=>pl.label).join('＋');
      return {pid:p.id, name:p.name, amt, plan:planLabel, statusLabel:p.status==='completed'?'已完成 PIF':'送驗中'};
    });
    const total=invItems.reduce((s,it)=>s+it.amt,0);
    const rec={id:genInvNo(), cust:cn, date, method, note, items:invItems, total, status:'pending', kind:'pif', createdAt:new Date().toISOString()};
    invoiceRecs.push(rec);
    // 只「新增」一張獨立請款單到 invoices 桶，絕不動 charge / payRecords / 其他 invoices
    invItems.forEach(it=>{
      const p=byId(it.pid); if(!p) return;
      if(!Array.isArray(p.invoices)) p.invoices=[];
      p.invoices.push({
        id:rec.id, label:note||it.plan||'PIF費', amount:it.amt,
        date, method, note, kind:'pif',
        status:'pending', payRecords:[]
      });
      delete p.retroPlans;
      delete p.retroForce;
    });
    invDetailOpen=rec.id;
    save(); render();
    A.toast('已新增獨立請款單 '+rec.id+'（'+money(total)+'）'+(note?'｜'+note:'')+'，先前明細完整保留');
  },
  metricBreakdown(kind){
    const allProd=products.filter(p=>['invoiced','reported','paid','testing','reporting','completed'].includes(p.status)&&custName(p)!==ELG_SELF);
    let title='', rows=[], total=0;

    // 收集每個品項對此指標的貢獻
    const push=(p,label,amt,extra)=>{ if(amt!==0){ rows.push({cust:custName(p),name:p.name||'—',label,amt,extra:extra||''}); total+=amt; } };

    if(kind==='received'){
      title='實收總計｜每筆已收款的來源';
      allProd.forEach(p=>{
        (p.payRecords||[]).forEach(r=>{ if(r.amt>0) push(p,'檢驗費',r.amt,(r.date||'')+' '+(r.method||'')+(r.note?' · '+r.note:'')); });
        itemInvoices(p).forEach(iv=>(iv.payRecords||[]).forEach(r=>{ if(r.amt>0) push(p,iv.note||iv.label||'請款單',r.amt,(r.date||'')+' '+(r.method||iv.method||'')+' · '+(iv.id||'')); }));
      });
    } else if(kind==='pending'){
      title='待收款｜每筆尚未收到的款項';
      allProd.forEach(p=>{
        const lb=legacyBilled(p), lp=legacyPaid(p), ld=Math.max(0,lb-lp);
        if(ld>0) push(p,'檢驗費 待收',ld,'應收 '+money(lb)+' / 已收 '+money(lp));
        itemInvoices(p).forEach(iv=>{ const ip=invPaidSum(iv); const id=Math.max(0,(iv.amount||0)-ip); if(id>0) push(p,(iv.note||iv.label||'請款單')+' 待收',id,(iv.id||'')+' 應收 '+money(iv.amount||0)+(ip>0?' / 已收 '+money(ip):'')); });
      });
    } else if(kind==='billed'){
      title='應收總計｜每筆應收金額的來源';
      allProd.forEach(p=>{
        const lb=legacyBilled(p);
        if(lb>0) push(p,'檢驗費',lb,'');
        itemInvoices(p).forEach(iv=>{ if((iv.amount||0)>0) push(p,iv.note||iv.label||'請款單',iv.amount||0,iv.id||''); });
      });
    } else if(kind.startsWith('method:')){
      const m=kind.slice(7);
      title=m+'｜以此方式收到的每一筆款';
      allProd.forEach(p=>{
        (p.payRecords||[]).forEach(r=>{ if(r.amt>0 && (r.method||'其他')===m) push(p,'檢驗費',r.amt,(r.date||'')+(r.note?' · '+r.note:'')); });
        itemInvoices(p).forEach(iv=>(iv.payRecords||[]).forEach(r=>{ if(r.amt>0 && (r.method||iv.method||'其他')===m) push(p,iv.note||iv.label||'請款單',r.amt,(r.date||'')+' · '+(iv.id||'')); }));
      });
    }

    // 依客戶分組顯示
    const byCust={};
    rows.forEach(r=>{ (byCust[r.cust]=byCust[r.cust]||[]).push(r); });
    const custNames=Object.keys(byCust).sort();

    let body='';
    if(!rows.length){
      body=`<div class="card faint" style="text-align:center;padding:20px">沒有可顯示的明細</div>`;
    } else {
      custNames.forEach(cn=>{
        const list=byCust[cn];
        const sub=list.reduce((s,r)=>s+r.amt,0);
        body+=`<div style="margin-bottom:10px">
          <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1.5px solid var(--line2)">
            <span style="font-weight:700;font-size:13px;flex:1">${cn}</span>
            <span style="font-weight:700;font-size:13px;color:var(--accent)">${money(sub)}</span>
          </div>`;
        list.forEach(r=>{
          body+=`<div style="display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--line);font-size:12px">
            <span style="flex:1;min-width:0"><span style="font-weight:600">${r.name}</span>
              <span class="sub" style="font-size:10.5px;margin-left:4px">${r.label}</span>
              ${r.extra?`<br><span class="sub" style="font-size:10px">${r.extra}</span>`:''}</span>
            <span style="font-weight:700;text-align:right">${money(r.amt)}</span>
          </div>`;
        });
        body+=`</div>`;
      });
    }

    const overlay=document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px';
    overlay.onclick=e=>{ if(e.target===overlay) overlay.remove(); };
    overlay.innerHTML=`<div style="background:var(--surface);border-radius:14px;width:100%;max-width:560px;max-height:85vh;overflow:auto;padding:18px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:15px;font-weight:700;flex:1">${title}</span>
        <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 12px" onclick="this.closest('div[style*=fixed]').remove()">關閉</button>
      </div>
      <div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px">合計：${money(total)}（${rows.length} 筆）</div>
      ${body}
    </div>`;
    document.body.appendChild(overlay);
  },

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234a6741'/><text x='16' y='23' text-anchor='middle' font-size='20' font-family='serif' fill='white'>дҫқ</text></svg>">
<title>дҫқжҙӣеҳүйҖҒй©—зі»зөұ В· жөҒзЁӢеҺҹеһӢ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.7.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js"></script>
<style>
  :root{
    --bg:#E8E6E0; --surface:#FFFFFF; --ink:#1A1A1C; --muted:#6E6E73; --faint:#A0A09A;
    --line:#EAE8E3; --line2:#DBD9D2; --accent:#0E7C6B; --accent-tint:#E2F0EC;
    --i:#1D4ED8; --i-bg:#EAEEFB; --w:#A45A09; --w-bg:#F7EEDC;
    --s:#15803D; --s-bg:#E7F2EB; --n:#5B5B60; --n-bg:#EFEEEA;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",Roboto,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:0;
  }
  .roleseg{
    display:flex; gap:4px; background:var(--surface); border:1px solid var(--line2);
    border-radius:13px; padding:4px; width:100%; max-width:390px; margin-bottom:14px;
  }
  .roleseg button{
    flex:1; border:0; background:transparent; color:var(--muted); font-size:15px; font-weight:600;
    padding:10px; border-radius:9px; cursor:pointer; font-family:inherit;
  }
  .roleseg button.on{ background:var(--ink); color:#fff; }

  .phone{
    width:100%; max-width:100%; height:100vh; height:100dvh; background:var(--surface);
    border:0; border-radius:0; overflow:hidden; position:relative;
    display:flex; flex-direction:column; box-shadow:none;
  }
  .hd{
    padding:18px 20px 14px; border-bottom:1px solid var(--line); display:flex;
    align-items:center; justify-content:space-between; gap:10px; flex:none;
  }
  .hd h1{ margin:0; font-size:19px; font-weight:700; letter-spacing:-.01em; }
  .hd p{ margin:3px 0 0; font-size:13px; color:var(--muted); }
  .hd .av{ width:38px;height:38px;border-radius:50%;background:var(--accent-tint);color:var(--accent);
    display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex:none;}
  .hd .ic{ font-size:23px;color:var(--faint); }

  .screen{ flex:1; overflow-y:auto; padding:18px 20px 24px; }
  .tabbar{ display:flex; border-top:1px solid var(--line); flex:none; background:var(--surface); }
  #fab{ position:absolute; z-index:62; left:16px; bottom:88px; }
  #fab.hide{ display:none; }
  .fabbtn{ height:48px; border-radius:999px; border:0; background:#06C755; color:#fff;
    box-shadow:0 4px 16px rgba(0,200,80,.45); display:inline-flex; align-items:center; gap:0;
    cursor:pointer; font-family:inherit; transition:transform .12s,box-shadow .12s; padding:0; overflow:hidden; }
  .fabbtn:active{ transform:scale(.94); box-shadow:0 2px 8px rgba(0,200,80,.3); }
  .fab-ic{ width:48px; height:48px; display:flex; align-items:center; justify-content:center; font-size:26px; flex:none; }
  .fab-lbl{ font-size:13.5px; font-weight:800; letter-spacing:.5px; padding:0 14px 0 2px; white-space:nowrap; }
  .backbtn{ display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); background:var(--surface);
    border-radius:10px; padding:7px 13px; font-family:inherit; font-size:13.5px; font-weight:600; color:var(--ink); cursor:pointer; }
  .backbtn:active{ background:var(--n-bg); }
  .backbtn i{ font-size:17px; }
  .tabbar button{
    flex:1; border:0; background:transparent; padding:9px 2px 12px; cursor:pointer; font-family:inherit;
    color:var(--muted); font-size:11.5px; font-weight:700; display:flex; flex-direction:column; align-items:center; gap:4px;
    transition:color .12s;
  }
  .tabbar button i{ font-size:22px; }
  .tabbar button.on{ color:var(--accent); }
  .tabbar button.on i{ color:var(--accent); }

  .sect{ font-size:15px; font-weight:700; margin:0 0 10px; }
  .grphd{ display:flex;align-items:center;gap:7px;margin:16px 0 8px; }
  .grphd .dot{ width:8px;height:8px;border-radius:50%;flex:none; }
  .grphd .gn{ font-size:12px;font-weight:700;color:var(--muted); }
  .card.compact{ padding:11px 13px; }
  .srch{ display:flex;align-items:center;gap:8px;border:1px solid var(--line2);border-radius:10px;padding:0 12px;height:42px;margin:0 0 14px;background:var(--surface); }
  .srch i{ color:var(--faint);font-size:18px; }
  .srch input{ border:0;outline:0;background:transparent;flex:1;font:inherit;font-size:14px;color:var(--ink);height:100%; }
  .grp{ margin-bottom:4px; }
  .grphd2{ display:flex;align-items:center;gap:8px;padding:9px 4px;cursor:pointer;user-select:none; }
  .grphd2 .gn{ font-size:12.5px;font-weight:700;color:var(--muted); }
  .grphd2 .chev{ font-size:16px;color:var(--faint);transition:transform .15s; }
  .grp.collapsed .chev{ transform:rotate(-90deg); }
  .grp.collapsed .grpbody{ display:none; }
  .pifgrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(168px,1fr)); gap:10px; }
  .pifgrid .card{ padding:11px 12px; display:flex; flex-direction:column; gap:4px; }
  .screen.searching .grp .grpbody{ display:block; }
  .screen.searching .grp .chev{ transform:rotate(0deg); }
  .chips{ display:flex;flex-wrap:wrap;gap:7px;margin:0 0 12px; }
  .fchip{ font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:9px;border:1.5px solid var(--line2);color:var(--muted);cursor:pointer;user-select:none; }
  .fchip.on{ background:var(--ink);border-color:var(--ink);color:#fff; }
  .tablewrap{ overflow-x:auto;border:1px solid var(--line2);border-radius:12px;background:var(--surface); }
  table.dtable{ width:100%;border-collapse:collapse;font-size:13px;min-width:760px; }
  table.dtable th{ text-align:left;font-weight:700;font-size:11.5px;color:var(--muted);padding:10px 12px;border-bottom:1.5px solid var(--line2);white-space:nowrap;background:var(--n-bg); }
  table.dtable td{ padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle; }
  table.dtable tr:last-child td{ border-bottom:0; }
  table.dtable tr.sel td{ background:var(--i-bg); }
  table.dtable .ck{ width:20px;height:20px; }
  .libbar{ display:flex;flex-wrap:wrap;align-items:center;gap:8px; }
  input.fld--mini, select.fld--mini{ height:34px;padding:0 8px;font-size:12.5px;min-width:84px;margin:0;border-radius:8px; }
  table.dtable td .fld--mini{ width:100%; }
  .sect.mt{ margin-top:22px; }
  .muted{ color:var(--muted); } .faint{ color:var(--faint); }
  .card{ border:1px solid var(--line2); border-radius:14px; padding:15px; background:var(--surface); }
  .card+.card{ margin-top:10px; }
  .row{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .stack{ display:flex; flex-direction:column; gap:10px; }
  .nm{ font-size:15px; font-weight:600; }
  .sub{ font-size:13px; color:var(--muted); margin-top:3px; }

  .pill{ font-size:12px; font-weight:600; padding:4px 11px; border-radius:9px; white-space:nowrap; }
  .pill--n{ background:var(--n-bg); color:var(--n); }
  .pill--i{ background:var(--i-bg); color:var(--i); }
  .pill--w{ background:var(--w-bg); color:var(--w); }
  .pill--s{ background:var(--s-bg); color:var(--s); }

  .btn{ width:100%; border:0; background:var(--ink); color:#fff; font-size:16px; font-weight:600;
    height:50px; border-radius:13px; cursor:pointer; font-family:inherit;
    display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn i{ font-size:20px; }
  .btn:disabled{ opacity:.4; cursor:default; }
  .btn--sm{ height:44px; font-size:15px; }
  .btn--ghost{ background:var(--surface); color:var(--ink); border:1px solid var(--line2); }
  .btn--ok{ background:var(--accent); }

  .lnk{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:14px 15px;
    border:1px solid var(--line2); border-radius:14px; cursor:pointer; }
  .lnk .l{ display:flex; align-items:center; gap:12px; }
  .lnk i.lead{ font-size:23px; color:var(--accent); }

  .selrow{ display:flex; align-items:center; gap:12px; padding:13px 14px; border:1px solid var(--line2);
    border-radius:13px; cursor:pointer; }
  .selrow.on{ border-color:var(--accent); background:var(--accent-tint); }
  .ck{ width:22px;height:22px;border-radius:7px;border:2px solid var(--line2);flex:none;
    display:flex;align-items:center;justify-content:center;color:#fff; }
  .ck i{ font-size:15px; opacity:0; }
  .selrow.on .ck{ background:var(--accent); border-color:var(--accent); }
  .selrow.on .ck i{ opacity:1; }
  .ck.on{ background:var(--accent); border-color:var(--accent); }
  .ck.on i{ opacity:1; }

  .seg{ display:flex; gap:8px; margin-top:10px; }
  .seg button{ flex:1; height:42px; border:1px solid var(--line2); background:var(--surface); color:var(--ink);
    border-radius:11px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; }
  .seg button.on{ border-color:var(--accent); background:var(--accent-tint); color:var(--accent); }

  .total{ display:flex; align-items:baseline; justify-content:space-between; margin-top:14px;
    padding-top:13px; border-top:1px solid var(--line); }
  .total .amt{ font-size:24px; font-weight:700; }

  .note{ display:flex; gap:8px; align-items:flex-start; background:var(--n-bg); border-radius:12px;
    padding:11px 14px; font-size:13px; color:var(--muted); }
  .note i{ font-size:18px; margin-top:1px; }

  input.fld{ width:100%; height:44px; border:1px solid var(--line2); border-radius:11px; padding:0 13px;
    font-size:15px; font-family:inherit; color:var(--ink); background:var(--surface); }
  input.fld::placeholder{ color:var(--faint); }
  label.lbl{ display:block; font-size:13px; font-weight:600; color:var(--muted); margin:0 0 6px; }
  select.fld{ width:100%; height:46px; border:1px solid var(--line2); border-radius:12px; padding:0 12px;
    font-size:15px; font-family:inherit; background:var(--surface); color:var(--ink); }

  .addr{ background:var(--n-bg); border-radius:12px; padding:11px 14px; }
  .addr .t{ font-size:12px; color:var(--muted); } .addr .a{ font-size:13px; margin-top:2px; }

  .empty{ text-align:center; color:var(--faint); padding:48px 16px; font-size:14px; }
  .empty i{ font-size:34px; display:block; margin-bottom:10px; }

  .toast{ position:absolute; left:16px; right:16px; bottom:78px; background:var(--ink); color:#fff;
    padding:13px 16px; border-radius:13px; font-size:14px; text-align:center; opacity:0;
    transform:translateY(8px); transition:.25s; pointer-events:none; }
  .toast.show{ opacity:1; transform:translateY(0); }
  .miniline{ display:flex; justify-content:space-between; font-size:14px; padding:5px 0; }

  #app{ flex:1; display:flex; flex-direction:column; min-height:0; }
  /* дёҚеҗҢз«Ҝзҡ„жҹ”е’Ңеә•иүІпјҢж–№дҫҝжё¬и©ҰиҫЁиӯҳ */
  #app.end-entry{ --endbg:var(--bg); }
  #app.end-customer{ --endbg:#EAF2F1; }   /* е®ўжҲ¶з«Ҝ В· жҹ”е’Ңж№–з¶  */
  #app.end-back{ --endbg:#F3EEE5; }        /* дҫқжҙӣеҳүеҫҢиҮә В· жҹ”е’Ңзұіз Ӯ */
  #app.end-front{ --endbg:#ECE9F5; }       /* дҫқжҙӣеҳүеүҚиҮә В· жҹ”е’Ңи–°иЎЈиҚү */
  #app.end-board{ --endbg:#ECF1EB; }       /* е…ұеҗҢзңӢжқҝ В· жҹ”е’Ңж·әйј е°ҫиҚү */
  #app .hd, #app .screen{ background:var(--endbg, var(--surface)); }
  .full{ flex:1; padding:28px 24px; display:flex; flex-direction:column; overflow-y:auto; }
  .brand{ text-align:center; margin-top:36px; }
  .logo{ width:64px;height:64px;border-radius:18px;background:var(--ink);color:#fff;font-size:28px;font-weight:700;
    display:flex;align-items:center;justify-content:center;margin:0 auto 16px; }
  .logo.sm{ width:52px;height:52px;font-size:22px;border-radius:15px;margin-bottom:14px; }
  .brand h1{ margin:0;font-size:23px;font-weight:700;letter-spacing:-.01em; }
  .brand p{ margin:6px 0 0; }
  .entrycard{ display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--surface);
    border:1px solid var(--line2);border-radius:16px;padding:16px;cursor:pointer;font-family:inherit; }
  .ec-ic{ width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex:none; }
  .ec-t{ flex:1;display:flex;flex-direction:column; } .ec-t .sub{ margin-top:2px; }
  .back{ background:transparent;border:0;color:var(--muted);font-size:15px;font-weight:600;font-family:inherit;
    display:flex;align-items:center;gap:6px;cursor:pointer;padding:0;margin-bottom:8px; }
  .back i{ font-size:19px; }
  .logintop{ text-align:center;margin:22px 0 26px; } .logintop h2{ margin:0;font-size:21px;font-weight:700; }
  .logintop p{ margin:4px 0 0; }
  .linebtn{ background:#06C755; }
  .iconbtn{ background:transparent;border:0;color:var(--faint);cursor:pointer;padding:0;display:flex;font-family:inherit; }
  .iconbtn i{ font-size:22px; }
  .ztog{ display:inline-flex; gap:3px; background:var(--n-bg); border-radius:11px; padding:3px; }
  .ztog button{ border:0; background:transparent; color:var(--muted); font-size:14px; font-weight:600;
    padding:7px 16px; border-radius:8px; cursor:pointer; font-family:inherit; }
  .ztog button.on{ background:var(--surface); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.10); }
  .hbtn{ display:inline-flex; align-items:center; gap:5px; border:1px solid var(--line2); background:var(--surface);
    color:var(--ink); font-size:13px; font-weight:600; padding:8px 11px; border-radius:10px; cursor:pointer; font-family:inherit; }
  .hbtn i{ font-size:17px; }
  .modeseg{ display:flex; gap:8px; }
  .modeseg button{ flex:1; height:44px; border:1px solid var(--line2); background:var(--surface); color:var(--muted);
    border-radius:11px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit;
    display:flex; align-items:center; justify-content:center; gap:5px; }
  .modeseg button.on{ border-color:var(--accent); background:var(--accent-tint); color:var(--accent); }
  .modeseg button i{ font-size:17px; }
  .uparea{ border:1.5px dashed var(--line2); border-radius:14px; padding:24px; text-align:center; }
  textarea.fld{ height:auto; padding:10px 13px; resize:none; }
  .btn--danger{ background:#C0392B; }
  .dash{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .metric{ background:var(--surface); border:1px solid var(--line2); border-radius:14px; padding:14px; cursor:pointer; }
  .metric:active{ transform:scale(.99); }
  .metric .mi{ width:34px; height:34px; border-radius:9px; background:var(--accent-tint); color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-size:19px; margin-bottom:8px; }
  .metric .mv{ font-size:26px; font-weight:700; line-height:1; }
  .metric .ml{ font-size:12.5px; color:var(--muted); margin-top:4px; }
  .devbtn{ position:absolute; right:14px; bottom:80px; z-index:60; display:inline-flex; align-items:center; gap:6px;
    background:var(--ink); color:#fff; border:0; border-radius:22px; padding:9px 14px; font-size:13px; font-weight:700;
    font-family:inherit; cursor:pointer; box-shadow:0 6px 18px -6px rgba(0,0,0,.45); opacity:.92; }
  .devbtn i{ font-size:16px; }
  .notepad-overlay{ position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:180;display:flex;justify-content:flex-end; }
  .notepad-panel{ width:380px;max-width:100%;height:100%;background:var(--surface);box-shadow:-4px 0 24px rgba(0,0,0,.15);display:flex;flex-direction:column;animation:slideIn .2s ease; }
  @keyframes slideIn{ from{transform:translateX(100%)} to{transform:translateX(0)} }
  .notepad-panel .np-hd{ padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px; }
  .notepad-panel .np-body{ flex:1;overflow-y:auto;padding:14px 18px; }
  .notepad-panel .np-note{ border:1px solid var(--line2);border-radius:10px;padding:12px;margin-bottom:10px;cursor:pointer;transition:border-color .15s; }
  .notepad-panel .np-note:hover{ border-color:var(--accent); }
  .notepad-panel .np-note.editing{ border-color:var(--accent);background:var(--accent-tint); }
  .notepad-panel .np-note textarea{ width:100%;border:0;background:transparent;resize:vertical;font-family:inherit;font-size:13.5px;line-height:1.7;outline:none;min-height:80px; }
  .devmenu{ position:absolute; right:14px; bottom:80px; z-index:61; width:248px; background:var(--surface);
    border:1px solid var(--line2); border-radius:14px; box-shadow:0 14px 40px -12px rgba(0,0,0,.4); overflow:hidden; }
  .devmenu .devhd{ display:flex; justify-content:space-between; align-items:center; padding:11px 14px;
    font-size:13px; font-weight:700; background:var(--n-bg); border-bottom:1px solid var(--line); }
  .devmenu .devhd i{ cursor:pointer; font-size:17px; }
  .devmenu button{ display:flex; align-items:center; gap:9px; width:100%; text-align:left; border:0; background:transparent;
    padding:11px 14px; font-size:14px; font-family:inherit; cursor:pointer; color:var(--ink); border-bottom:1px solid var(--line); }
  .devmenu button:last-child{ border-bottom:0; }
  .devmenu button:active{ background:var(--n-bg); }
  .devmenu button i{ font-size:18px; color:var(--muted); }

  @media (min-width:821px){
    body{ padding:24px; justify-content:center; }
    .phone{ max-width:1320px; width:100%; height:92vh; max-height:900px; border:1px solid var(--line2);
      border-radius:18px; box-shadow:0 24px 70px -30px rgba(0,0,0,.32); }
    #app.mode-full .full{ max-width:460px; margin:0 auto; width:100%; }
    #app.mode-app .tabbar{ position:absolute; top:0; left:0; bottom:0; width:230px; flex-direction:column;
      align-items:stretch; justify-content:flex-start; border-top:0; border-right:1px solid var(--line);
      padding:18px 0; gap:2px; background:var(--surface); border-radius:18px 0 0 18px; overflow-y:auto; z-index:2; }
    #app.mode-app .tabbar button{ flex:none; flex-direction:row; justify-content:flex-start; gap:13px;
      padding:13px 18px; margin:0 12px; font-size:15px; border-radius:10px; }
    #app.mode-app .tabbar button i{ font-size:22px; }
    #app.mode-app .tabbar button.on{ background:var(--accent-tint); color:var(--accent); }
    #app.mode-app .hd, #app.mode-full .hd{ padding:20px 32px 16px; }
    #app.mode-app .hd{ margin-left:230px; }
    #app.mode-app .screen{ margin-left:230px; }
    .screen{ padding:26px 34px 40px; }
    .hd h1{ font-size:21px; }
    /* card lists tile into a responsive grid (dashboard feel) */
    .screen .stack{ display:grid; grid-template-columns:repeat(auto-fit,minmax(310px,1fr)); gap:12px; align-items:start; }
    /* section headers and notes span the full width above their grid */
    .screen .sect, .screen .note, .screen .addr{ max-width:none; }
    /* forms / detail views keep a comfortable single column */
    .pane{ max-width:640px; margin:0 auto; }
    .pane .stack{ display:flex; flex-direction:column; }
    .dash{ grid-template-columns:repeat(4,1fr); }
    .devbtn,.devmenu{ bottom:24px; right:24px; }
    #fab{ left:auto; right:24px; bottom:88px; }
  }
  /* ===== MOBILE: иЎЁж јиҮӘеӢ•жӢҶжҲҗд№ҫж·ЁеҚЎзүҮпјҲйӣ»и…Ұз«Ҝз¶ӯжҢҒиЎЁж јеҢҜзёҪпјү ===== */
  @media (max-width:820px){
    .tablewrap{ border:0; overflow:visible; }
    table.dtable{ min-width:0; width:100%; display:block; }
    table.dtable thead{ display:none; }
    table.dtable tbody{ display:block; }

/* ---------- persistence ---------- */
const SEED_VER='2026-06-17-pif7-fixed';
function save(){
  if(FB_SYNC_READY && typeof FB!=='undefined' && FB.on && FB.user && FB.role && FB.role!=='pending'){ clearTimeout(FB.syncT); FB.syncT=setTimeout(()=>{ fbSync(); FB.syncT=null; },800); }
  try{ localStorage.setItem('elg_state', JSON.stringify({seedVer:SEED_VER,products,customers,staff,sharedPIF,publicShowcase,showcase,invoiceRecs,me,drafts,addTarget,addCust,libDrafts,libImpStatus,CINFO})); }catch(e){}
}
function load(){
  try{
    const raw=localStorage.getItem('elg_state'); if(!raw) return;
    const d=JSON.parse(raw);
    if(d.seedVer!==SEED_VER) return;  // иіҮж–ҷзүҲжң¬жӣҙж–° вҶ’ ијүе…Ҙж–°зҡ„зЁ®еӯҗиіҮж–ҷ
    if(Array.isArray(d.products)){ products.length=0; d.products.forEach(x=>products.push(x)); }
    if(Array.isArray(d.customers)){ customers.length=0; d.customers.forEach(x=>customers.push(x)); }
    if(Array.isArray(d.staff)){ staff.length=0; d.staff.forEach(x=>staff.push(x)); }
    if(Array.isArray(d.sharedPIF)){ sharedPIF.length=0; d.sharedPIF.forEach(x=>sharedPIF.push(x)); }
    if(Array.isArray(d.publicShowcase)){ publicShowcase.length=0; d.publicShowcase.forEach(x=>publicShowcase.push(x)); }
    if(Array.isArray(d.showcase)){ showcase.length=0; d.showcase.forEach(x=>showcase.push(x)); }
    if(Array.isArray(d.invoiceRecs)){ invoiceRecs.length=0; d.invoiceRecs.forEach(x=>invoiceRecs.push(x)); }
    if(d.me) me=d.me;
    if(Array.isArray(d.drafts)) drafts=d.drafts;
    if(Array.isArray(d.libDrafts)) libDrafts=d.libDrafts;
    if(d.libImpStatus) libImpStatus=d.libImpStatus;
    if(d.CINFO && typeof d.CINFO==='object'){ Object.keys(d.CINFO).forEach(k=>{ CINFO[k]=d.CINFO[k]; }); }
    if(d.addTarget) addTarget=d.addTarget;
    if(d.addCust) addCust=d.addCust;
    normalizeVendors();
  }catch(e){}
}

function elgSummary(){
  // зөұдёҖзңҹзӣёдҫҶжәҗпјҡ
  //  жҮүж”¶ = жӘўй©—иІ»(charge) + PIFиІ»(pifChargeпјҢе·Ій–Ӣе–®жүҚз®—)
  //  е·Іж”¶ = payRecords еҠ зёҪпјҲеҗ«жӘўй©—иІ»ж”¶ж¬ҫ + PIFиІ»ж”¶ж¬ҫпјү
  const paidOf=p=>(p.payRecords||[]).reduce((s,r)=>s+(r.amt||0),0);
  // жҜҸзӯҶжҮүж”¶пјҡжӘўй©—иІ» + пјҲе·Ій–Ӣе–®зҡ„пјүPIF иІ»
  const chargeOf=p=>(p.charge||0)+((p.pifFeeInvoice||p.pifFeePaid)?(p.pifCharge||0):0);
  const billable=p=>['invoiced','reported','paid','testing','reporting','completed'].includes(p.status) && chargeOf(p)>0;

  const billedProd=products.filter(billable);
  const totalCharge=billedProd.reduce((s,p)=>s+chargeOf(p),0);        // жҮүж”¶зёҪиЁҲ
  const total=billedProd.reduce((s,p)=>s+paidOf(p),0);                 // е·Іж”¶зёҪиЁҲпјҲзўәиӘҚеҲ°ж¬ҫпјү
  const totalDiff=totalCharge-total;
  // и«Ӣж¬ҫдёӯпјҡе·Ій–Ӣе–®жңӘзўәиӘҚж”¶ж¬ҫзҡ„йҮ‘йЎҚпјҲжӘўй©—иІ» + PIFиІ»пјү
  const invoicingTotal=billedProd
    .filter(p=>['invoiced','reported'].includes(p.status) && paidOf(p)===0)
    .reduce((s,p)=>s+(p.charge||0),0)
    + billedProd.filter(p=>p.pifFeeInvoice&&!p.pifFeePaid).reduce((s,p)=>s+(p.pifCharge||0),0);

  // ж”¶ж¬ҫж–№ејҸзөұиЁҲпјҲеҸӘзөұиЁҲеҜҰйҡӣж”¶ж¬ҫиЁҳйҢ„пјү
  const byMethod={};
  billedProd.forEach(p=>(p.payRecords||[]).forEach(r=>{ if(r.amt>0) byMethod[r.method]=(byMethod[r.method]||0)+r.amt; }));

  const sumQ=(libQ||'').trim().toLowerCase();
  let h=``;

  // й ӮйғЁзөұиЁҲ
  h+=`<div class="dash" style="margin-bottom:14px">
    <div class="metric"><div class="mi" style="background:var(--s-bg);color:var(--s)"><i class="ti ti-cash"></i></div><div class="mv">${money(total)}</div><div class="ml">е·Іж”¶зёҪиЁҲ</div></div>
    <div class="metric"><div class="mi" style="background:var(--w-bg);color:var(--w)"><i class="ti ti-send"></i></div><div class="mv">${money(invoicingTotal)}</div><div class="ml">и«Ӣж¬ҫдёӯ</div></div>
    <div class="metric"><div class="mi" style="background:var(--n-bg)"><i class="ti ti-receipt"></i></div><div class="mv">${money(totalCharge)}</div><div class="ml">жҮүж”¶зёҪиЁҲ</div></div>
    <div class="metric"><div class="mi"><i class="ti ti-coin"></i></div><div class="mv" style="color:${totalDiff>0?'var(--w)':'var(--s)'}">${money(Math.abs(totalDiff))}</div><div class="ml">${totalDiff>0?'жңӘж”¶е·®йЎҚ':'е…ЁйғЁзөҗжё…'}</div></div>
    ${Object.keys(byMethod).map(m=>`<div class="metric"><div class="mi"><i class="ti ti-${m==='еҢҜж¬ҫ'?'building-bank':m==='еҗҲзҙ„жүЈж¬ҫ'?'file-invoice':m==='дҝЎз”ЁеҚЎ'?'credit-card':'coins'}"></i></div><div class="mv" style="font-size:14px">${money(byMethod[m])}</div><div class="ml">${m}</div></div>`).join('')}
  </div>`;

  h+=srchBar('жҗңе°Ӣе®ўжҲ¶жҲ–е“ҒеҗҚвҖҰ');
  h+=`<div style="text-align:right;margin:-4px 0 10px"><button class="btn btn--ghost btn--sm" style="width:auto;padding:0 12px;font-size:11.5px" onclick="A.repairCharges()"><i class="ti ti-wand"></i> дҝ®жӯЈйҮҚиӨҮйҮ‘йЎҚ</button></div>`;

  // дҫқе®ўжҲ¶еҲҶзө„
  const allCusts=[...new Set(billedProd.map(p=>custName(p)))].sort();
  const filtCusts=sumQ ? allCusts.filter(cn=>cn.toLowerCase().includes(sumQ)||billedProd.some(p=>custName(p)===cn&&(p.name||'').toLowerCase().includes(sumQ))) : allCusts;

  h+=filtCusts.map(cn=>{
    const custProd=billedProd.filter(p=>custName(p)===cn&&(!sumQ||(p.name||'').toLowerCase().includes(sumQ)||cn.toLowerCase().includes(sumQ)));
    if(!custProd.length) return '';
    const custCharge=custProd.reduce((s,p)=>s+chargeOf(p),0);
    const custPaid=custProd.reduce((s,p)=>s+paidOf(p),0);
    const diff=custCharge-custPaid;
    // и«Ӣж¬ҫдёӯпјҡе·Ій–Ӣе–®пјҲinvoiced/reportedпјүдҪҶйӮ„жІ’зўәиӘҚж”¶ж¬ҫзҡ„е“Ғй …
    const invoicing=custProd.filter(p=>['invoiced','reported'].includes(p.status) && paidOf(p)===0).length;
    // PIF иІ»и«Ӣж¬ҫдёӯпјҡе·Ій–Ӣ PIF ж”¶ж¬ҫе–®дҪҶжңӘзўәиӘҚж”¶ж¬ҫ
    const pifInvoicing=custProd.filter(p=>p.pifFeeInvoice && !p.pifFeePaid).length;
    const open=!pifGroupClosed['sum_'+cn];

    // зӢҖж…ӢеҲӨж–·
    let statusLabel, statusColor;
    if(diff<=0 && custPaid>0 && invoicing===0 && pifInvoicing===0){
      statusLabel='вң“ е·Ізөҗжё…'; statusColor='var(--s)';
    } else if(invoicing>0 || pifInvoicing>0){
      statusLabel='и«Ӣж¬ҫдёӯ'; statusColor='var(--w)';
    } else if(diff>0){
      statusLabel='ж¬  '+money(diff); statusColor='var(--w)';
    } else {
      statusLabel='жңӘй–Ӣе–®'; statusColor='var(--faint)';
    }

    return `<div class="card" style="margin-bottom:10px;padding:0;overflow:hidden">
      <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--n-bg);cursor:pointer;border-bottom:${open?'1px solid var(--line)':'0'}" onclick="A.togglePifGroup('sum_${cn}')">
        <span style="flex:1;min-width:0">
          <span class="nm" style="font-size:14px">${cn}</span>
          <span class="sub" style="font-size:12px;margin-left:8px">${custProd.length} зӯҶ${invoicing||pifInvoicing?' В· '+(invoicing+pifInvoicing)+' зӯҶи«Ӣж¬ҫдёӯ':''}</span>

  }
  // жҗңе°Ӣ
  const doneQ=(libQ||'').trim().toLowerCase();

  if(doneFilt.length){
    // дҫқе®ўжҲ¶еҲҶзө„
    const custGroups=[...new Set(doneFilt.map(p=>custName(p)))];

      const items=doneFilt.filter(p=>custName(p)===cn);

      const allPaid=diff===0&&totalPaid>0;
      const custBatchIds=items.map(p=>p.id);
      const custSelN=custBatchIds.filter(id=>batch[id]).length;
      const groupOpen=!pifGroupClosed[cn];

      return `<div class="card" style="margin-bottom:12px;padding:0;overflow:hidden">
        <!-- е®ўжҲ¶зө„жЁҷйЎҢ -->
        <div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--n-bg);border-bottom:${groupOpen?'1px solid var(--line)':'0'};cursor:pointer" onclick="A.togglePifGroup('${cn}')">
          <span class="ck ${custSelN===items.length&&items.length>0?'on':custSelN>0?'partial':''}"
            onclick="event.stopPropagation();A.togglePifGroupSel('${cn}')"
            style="cursor:pointer;flex:none"><i class="ti ti-check"></i></span>
          <span style="flex:1;min-width:0">
            <span class="nm" style="font-size:14px">${cn}</span>
            <span class="sub" style="font-size:12px;margin-left:8px">${items.length} зӯҶ</span>

            <span style="font-weight:700;color:${allPaid?'var(--s)':diff>0?'var(--w)':'var(--ink)'}">
              ${allPaid?'вң“ е·Ід»ҳжё…':diff>0?'ж¬  '+money(diff):money(totalPaid)}
            </span>
            <br><span class="sub" style="font-size:11px">жҮүж”¶ ${money(totalCharge)}</span>
          </span>
          <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 10px;flex:none;font-size:12px" onclick="event.stopPropagation();A.batchChangeCustFor(${JSON.stringify(custBatchIds)})">
            <i class="ti ti-building-store"></i> жҸӣе®ўжҲ¶</button>
          <i class="ti ti-chevron-${groupOpen?'up':'down'}" style="color:var(--muted);flex:none"></i>
        </div>
        <!-- е“Ғй …жё…е–®пјҲжҠҳз–Ҡпјү -->
        ${groupOpen?`<div style="padding:8px 10px">
          ${items.map(p=>{
            const paid=(p.payRecords||[]).reduce((s,r)=>s+r.amt,0);
            const charge=p.charge||0;
            const diff=charge-paid;
            const plans=p.pifPlans||[p.pifPlan||'shared'];

            return `<div style="display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--line)">
              <span class="ck ${batch[p.id]?'on':''}" onclick="A.toggleSel('${p.id}')" style="cursor:pointer;flex:none"><i class="ti ti-check"></i></span>
              <span style="flex:1;min-width:0;font-size:13px;font-weight:600">${p.name}</span>
              <!-- иІ»з”Ёж–№жЎҲпјҲз·Ҡж№Ҡпјү -->
              <div style="display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end">
                ${PIF_PLANS.map(pl=>{
                  const on=plans.includes(pl.id);
                  return `<button onclick="A.togglePifPlanDone('${p.id}','${pl.id}')"
                    style="border:1.5px solid ${on?'var(--accent)':'var(--line2)'};background:${on?'var(--accent-tint)':'transparent'};

                    ${pl.label.replace('е®ўжҲ¶е…¬е®ҡ','').replace('PIF иҷ•зҗҶиІ»','еҗ«жӘўжё¬').replace('е…ұз”ЁеҗҲзҙ„','еҗҲзҙ„').replace('жҸӣеҗҚ','жҸӣеҗҚ')} ${money(pl.amt)}</button>`;
                }).join('')}

              <!-- ж”¶ж¬ҫзӢҖж…Ӣ -->

              <!-- ж“ҚдҪң -->
              <div style="display:flex;gap:4px;flex:none">
                <button class="btn btn--ghost btn--sm" style="width:32px;padding:0" onclick="A.togglePifDetail('${p.id}')" title="${paid>0?'ж”¶ж¬ҫиЁҳйҢ„':'иЈңйҢ„ж”¶ж¬ҫ'}">
                  <i class="ti ti-${pifDetailOpen===p.id?'chevron-up':paid>0?'receipt':'plus'}"></i></button>

              </div>

  // дёҖйҚөжҠҠдҫқжҙӣеҳүиҮӘжңүз”ўе“ҒеҠ е…Ҙе…ұз”ЁпјҲе»әзҪ®дёӯпјү

    return `<div class="card compact row" style="gap:10px;${st==='hidden'?'opacity:.6':''}">
        <span class="ck ${pifSel[i]?'on':''}" onclick="A.togglePifSel(${i})" style="cursor:pointer;flex:0 0 auto"><i class="ti ti-check"></i></span>

        <select class="fld fld--mini" style="width:auto;min-width:118px;flex:0 0 auto" onchange="A.setShareState(${i},this.value)">

  h += `<div class="row sect mt"><span><i class="ti ti-sparkles"></i> е…¬е…ұеұ•зӨәзүҶпјҲе…Қзҷ»е…ҘзҖҸиҰҪпјү</span><span class="pill pill--s">${publicShowcase.length} й …еұ•зӨәдёӯ</span></div>`;
  h += `<div class="note" style="margin:6px 0 10px"><i class="ti ti-world"></i>еұ•зӨәзүҶжҳҜ<b>е°ҚеӨ–е…¬й–ӢгҖҒе…Қзҷ»е…Ҙ</b>зҡ„з”ўе“Ғж«ҘзӘ—пјҢиЁӘе®ўеҫһе…ҘеҸЈй ҒгҖҢPIF з”ўе“Ғеұ•зӨәзүҶгҖҚйҖІе…ҘеҚіеҸҜзҖҸиҰҪгҖӮеҸҜж”ҫдҫқжҙӣеҳүиҮӘжңүеҸҜе…ұз”Ё PIFпјҢжҲ–е®ўжҲ¶йЎҳж„Ҹе…¬й–Ӣзҡ„е·Іе®ҢжҲҗ PIF е•Ҷе“ҒгҖӮ</div>`;

  // еҸҜеҠ е…Ҙеұ•зӨәзүҶзҡ„еҖҷйҒёпјҡе·Іе®ҢжҲҗ PIF зҡ„з”ўе“Ғ + е·Іе…¬й–Ӣзҡ„ sharedPIF
  const completedProd=products.filter(p=>p.status==='completed');
  const candidates=[
    ...completedProd.map(p=>({key:'p_'+p.id, name:p.name, type:p.type||'еҢ–еҰқе“Ғ', owner:custName(p), en:p.en||'', src:'product'})),
    ...sharedPIF.filter(it=>shareState(it)==='public').map(it=>({key:'s_'+it.id, name:it.name, type:it.type||'еҢ–еҰқе“Ғ', owner:ELG_SELF, en:'', src:'shared'})),

      <p class="sub" style="margin-bottom:10px">й»һгҖҢеҠ е…Ҙеұ•зӨәгҖҚжҠҠз”ўе“Ғж”ҫдёҠе…¬е…ұеұ•зӨәзүҶгҖӮе®ўжҲ¶з”ўе“ҒйңҖзўәиӘҚе°Қж–№йЎҳж„Ҹе…¬й–ӢгҖӮ</p>
      <div class="stack">`+candidates.slice(0,30).map(c=>`
        <div class="card compact row" style="gap:8px">
          <span style="flex:1;min-width:0"><span class="nm" style="font-size:13px">${c.name}</span><br><span class="sub">${c.type} В· ${c.owner}</span></span>
          <button class="btn btn--ok btn--sm" style="width:auto;padding:0 12px" onclick="A.addToPublicShowcase('${c.key}')"><i class="ti ti-plus"></i> еҠ е…Ҙеұ•зӨә</button>
        </div>`).join('')+`</div>
      ${candidates.length>30?`<div class="faint" style="font-size:11.5px;margin-top:8px;text-align:center">еғ…йЎҜзӨәеүҚ 30 й …</div>`:''}
    </div>`;
  }

  // е·ІеңЁеұ•зӨәзүҶзҡ„й …зӣ®
  if(publicShowcase.length){
    h += `<div class="sect" style="font-size:13px">еұ•зӨәдёӯй …зӣ®</div>`;
    h += `<div class="stack">`+publicShowcase.map((it,i)=>`
      <div class="card compact" style="gap:8px">
        <div class="row" style="align-items:flex-start;gap:8px">
          <span style="flex:1;min-width:0">

            <br><span class="sub">${it.type||'еҢ–еҰқе“Ғ'} В· ${it.owner||''}</span>

        <textarea class="fld fld--mini" style="margin-top:6px;height:54px;line-height:1.6" placeholder="з”ўе“Ғд»Ӣзҙ№пјҲйҒёеЎ«пјҢжңғйЎҜзӨәеңЁеұ•зӨәзүҶпјү" onchange="A.setPublicShowcaseField(${i},'desc',this.value)">${(it.desc||'').replace(/</g,'&lt;')}</textarea>
      </div>`).join('')+`</div>`;
  }

  return h;
}

/* ---------- input methods ---------- */
function parseLines(text){
  return (text||'').split(/\n+/).map(s=>s.trim()).filter(Boolean)
    .filter(l=>!/^(е®ўжҲ¶|жӮЁеҘҪ|дҪ еҘҪ|е“Ҳеӣү|е—Ё|и¬қи¬қ|ж„ҹи¬қ|йә»з…©|еҶҚйә»з…©|жӢңиЁ—|hi|hello|thanks|thank)/i.test(l))
    .map(l=>{
      let qty='', spec='', name=l;
      const qm=l.match(/(\d+)\s*(ж”Ҝ|з“¶|зүҮ|йЎҶ|зӣ’|еҢ…|зҪҗ|зө„|е…Ҙ|жўқ)/);
      if(qm){ qty=qm[0]; name=name.replace(qm[0],''); }

  toggleContract(i){ const c=customers[i]; if(!c) return; c.contract=!c.contract; if(c.contract && c.balance===undefined) c.balance=0; save(); render(); A.toast(c.contract?(c.name+' е·ІиЁӯзӮәеҗҲзҙ„еҲ¶'):(c.name+' е·ІеҸ–ж¶ҲеҗҲзҙ„еҲ¶')); },

  settleByContract(cn){
    const c=customers.find(x=>x.name===cn); if(!c){ A.toast('жүҫдёҚеҲ°е®ўжҲ¶'); return; }
    const items=P('received').filter(p=>custName(p)===cn && p.invSel);

// Firestore иҰҸеүҮиЁӯеҘҪ + йҰ–ж¬ЎдёҠеӮіеҫҢпјҢж”№зӮә true е•ҹз”ЁйӣІз«ҜеҗҢжӯҘ

let FB={on:false,db:null,auth:null,user:null,role:null,unsub:[],last:{},ready:false,syncT:null,seeded:false,cloudEmpty:false};

function fbInit(){

function fbHandleRedirect(){

function stripId(o){ const c=Object.assign({},o); delete c.id; return c; }
function fbDetach(){ FB.unsub.forEach(u=>{try{u();}catch(e){}}); FB.unsub=[]; FB.seeded=false; FB.cloudEmpty=false; }
function snapApply(name, arr, docs){
  // products з©әпјҲFirestore е°ҡжңӘдёҠеӮіпјүвҶ’ дҝқз•ҷжң¬ж©ҹзЁ®еӯҗпјҢдёҚжё…з©ә
  if(name==='products' && docs.length===0 && arr.length>0){ FB.cloudEmpty=true; return; }
  if(name==='products' && docs.length>0){ FB.cloudEmpty=false; FB.seeded=true; }
  // жңү pending sync йӮ„жІ’жҸҗдәӨ вҶ’ и·ійҒҺйҖҷж¬Ў snapshotпјҢйҒҝе…ҚиҰҶи“Ӣжң¬ж©ҹжңҖж–°зӢҖж…Ӣ
  if(FB.syncT) return;
  // е…¶д»–йӣҶеҗҲиӢҘ products е°ҡжңӘдёҠеӮід№ҹе…Ҳдҝқз•ҷ
  if(FB.cloudEmpty && docs.length===0 && arr.length>0) return;
  arr.length=0; const m={};
  docs.forEach(d=>{ const o=Object.assign({}, d.data()); o.id=d.id; arr.push(o); m[d.id]=JSON.stringify(stripId(o)); });
  FB.last[name]=m;
}
function emailMap(){ const m={}; customers.forEach(c=>{ if(c.name) m[c.name]=c.email||''; }); m[ELG_SELF]=''; return m; }
function attachAdmin(){
  fbDetach();
  // зӣ®еүҚ Firestore иҰҸеүҮе°ҡжңӘй–Ӣж”ҫпјҢеҸӘеҒҡиә«еҲҶй©—иӯүпјҢиіҮж–ҷе®Ңе…Ёиө°жң¬ж©ҹзЁ®еӯҗ
  // зӯү Firestore иҰҸеүҮиЁӯеҘҪеҫҢпјҢе°ҮдёӢж–№ FB_SYNC_READY ж”№зӮә true е•ҹз”ЁеҗҢжӯҘ
  if(!FB_SYNC_READY) return;
  const C=(name,arr)=>FB.unsub.push(FB.db.collection(name).onSnapshot(s=>{ snapApply(name,arr,s.docs); FB.ready=true; render(); }, e=>console.warn(name,e)));
  C('products',products); C('customers',customers); C('staff',staff); C('sharedPIF',sharedPIF); C('showcase',showcase); C('publicShowcase',publicShowcase);
}
function attachCustomer(email){
  fbDetach();
  if(!FB_SYNC_READY){
    FB.ready=true; render(); return;
  }
  const myName=me.nameCh||'';
  // иЁӮй–ұ FirestoreпјҡжҠ“ customerEmail еҢ№й…Қзҡ„з”ўе“Ғ
  FB.unsub.push(FB.db.collection('products').where('customerEmail','==',email).onSnapshot(s=>{
    if(s.docs.length>0){
      snapApply('products',products,s.docs); FB.ready=true; render();
    } else {
      FB.ready=true; FB.cloudEmpty=true; render();
    }
  }, e=>{ FB.ready=true; render(); console.warn(e); }));
  // йЎҚеӨ–иЁӮй–ұпјҡжҠ“е…¬еҸёеҗҚеҢ№й…ҚдҪҶжІ’ customerEmail зҡ„иҲҠз”ўе“ҒпјҢдёҰиЈңдёҠ customerEmail
  if(myName){
    FB.unsub.push(FB.db.collection('products').where('cust','==',myName).onSnapshot(s=>{
      s.docs.forEach(d=>{
        const data=d.data();
        if(!data.customerEmail){
          // иЈңеҜ« customerEmailпјҢи®“д№ӢеҫҢзҡ„ ownedByMe иҲҮиЁӮй–ұйғҪиғҪе°ҚжҮү
          FB.db.collection('products').doc(d.id).update({customerEmail:email}).catch(()=>{});
        }
        // еҗҲдҪөйҖІжң¬ж©ҹ productsпјҲиӢҘдёҚеӯҳеңЁпјү
        if(!products.some(p=>p.id===d.id)){
          const o=Object.assign({},data); o.id=d.id; o.customerEmail=o.customerEmail||email;
          products.push(o);
        }
      });
      if(s.docs.length>0){ FB.ready=true; render(); }
    }, e=>console.warn(e)));
  }
  FB.unsub.push(FB.db.collection('customers').where('email','==',email).onSnapshot(s=>{
    if(s.docs.length>0) snapApply('customers',customers,s.docs);
    render();
  }, e=>console.warn(e)));
  FB.unsub.push(FB.db.collection('sharedPIF').where('state','in',['public','building']).onSnapshot(s=>{
    if(s.docs.length>0) snapApply('sharedPIF',sharedPIF,s.docs);
    render();
  }, e=>console.warn(e)));
  FB.unsub.push(FB.db.collection('showcase').onSnapshot(s=>{
    if(s.docs.length>0) snapApply('showcase',showcase,s.docs);
    render();
  }, e=>console.warn(e)));
}
function fbStart(){
  if(!FB.on) return;
  FB.auth.onAuthStateChanged(async user=>{
    FB.user=user;
    if(!user){ FB.role=null; FB.ready=false; fbDetach(); return; }
    try{
      // еҰӮжһңеҫһе®ўжҲ¶е…ҘеҸЈзҷ»е…ҘпјҢдёҚжӘўжҹҘ staffпјҢзӣҙжҺҘиө°е®ўжҲ¶жөҒзЁӢ
      const fromCustomerPortal = window._loginSide==='customer';
      if(!fromCustomerPortal){
        const sd=await FB.db.collection('staff').doc(user.uid).get();
        if(sd.exists){
          FB.role='eloga'; role='eloga'; elgRole=(sd.data()&&sd.data().role)||'дё»иҰҒз®ЎзҗҶиҖ…'; zone='back'; elgTab='home'; view='app';
          attachAdmin(); render(); return;
        }
        // ж–№ејҸ BпјҡжҹҘ email жҳҜеҗҰеңЁйӮҖи«ӢеҗҚе–®пјҲFirestore staffпјү
        const sq=await FB.db.collection('staff').where('email','==',user.email.toLowerCase()).limit(1).get();
        if(!sq.empty){
          const inv=sq.docs[0].data(); const invId=sq.docs[0].id;
          await FB.db.collection('staff').doc(user.uid).set({
            name: inv.name||user.displayName||user.email,
            email: user.email.toLowerCase(),
            role: inv.role||'з®ЎзҗҶ',
            uid: user.uid
          });
          if(invId!==user.uid) await FB.db.collection('staff').doc(invId).delete();
          FB.role='eloga'; role='eloga'; elgRole=inv.role||'з®ЎзҗҶ'; zone='back'; elgTab='home'; view='app';
          attachAdmin(); render(); A.toast('еёіиҷҹе·ІиҮӘеӢ•й–ӢйҖҡпјҢжӯЎиҝҺ '+(inv.name||user.email)); return;
        }
      }
      // жҹҘжҳҜеҗҰзӮәе·ІзҹҘе®ўжҲ¶пјҲе…ҲжҹҘ Firestore lowercaseпјҢеҶҚжҹҘжң¬ж©ҹпјү
      const emailLower=user.email.toLowerCase();
      let q=await FB.db.collection('customers').where('email','==',emailLower).limit(1).get();
      if(q.empty) q=await FB.db.collection('customers').where('email','==',user.email).limit(1).get();
      const localCust=customers.find(c=>c.email&&c.email.toLowerCase()===emailLower);
      // е®ўжҲ¶зҷ»е…ҘеҫҢпјҡе…ҲйҖІиіҮж–ҷзўәиӘҚй ҒпјҢзўәиӘҚеҫҢжүҚйҖІдё»з•«йқў
      const custData=!q.empty ? q.docs[0].data() : localCust || null;
      if(custData){
        FB.role='customer'; role='customer';
        // иЁӯе®ҡ me зҡ„еҹәжң¬иіҮж–ҷ
        me=Object.assign({}, me, {nameCh:custData.name, nameEn:custData.nameEn||'', addrCh:CINFO[custData.name]||custData.addrCh||me.addrCh||'', email:user.email, phone:custData.phone||me.phone||'', filled:false});
        attachCustomer(user.email);
        view='customer-confirm'; render(); // е…ҲйҖІзўәиӘҚй Ғ
      } else {
        FB.role='pending'; role='guest'; view='fb-pending'; render();
      }
    }catch(e){ A.toast('зҷ»е…ҘеҫҢи®ҖеҸ–еӨұж•—пјҡ'+e.message); console.warn(e); }
  });
}
function fbSync(){
  if(!FB.on||!FB.user||!FB.ready||FB.role==='pending') return;
  try{
    const em=emailMap();
    const cols = FB.role==='eloga' ? ['products','customers','staff','sharedPIF','showcase','publicShowcase'] : ['products'];
    const ref={products,customers,staff,sharedPIF,showcase,publicShowcase};
    const batch=FB.db.batch(); let ops=0;
    cols.forEach(name=>{
      const arr=ref[name]||[]; const last=FB.last[name]||{}; const seen={};
      arr.forEach(o=>{
        if(!o.id) o.id=FB.db.collection(name).doc().id;
        const data=stripId(o);
        if(name==='products' && !data.customerEmail) { data.customerEmail=em[data.cust]||''; o.customerEmail=data.customerEmail; }
        seen[o.id]=true;
        const j=JSON.stringify(data);
        if(last[o.id]!==j){ batch.set(FB.db.collection(name).doc(o.id),data); last[o.id]=j; ops++; }
      });
      Object.keys(last).forEach(id=>{ if(!seen[id]){ batch.delete(FB.db.collection(name).doc(id)); delete last[id]; ops++; } });
      FB.last[name]=last;
    });
    if(FB.role==='eloga'){ batch.set(FB.db.collection('meta').doc('config'),{CINFO},{merge:true}); ops++; }
    if(ops>0 && ops<=450) batch.commit().catch(e=>console.warn('sync',e));
  }catch(e){ console.warn('fbSync',e); }
}

    <div class="card" style="margin-top:20px">
      <p class="nm" style="font-size:15px"><i class="ti ti-user-question"></i> йҖҷеҖӢ Google еёіиҷҹе°ҡжңӘй–ӢйҖҡ</p>

              <i class="ti ti-user-plus"></i> з”іи«Ӣе®ўжҲ¶еёіиҷҹ

      <div style="border-top:1px solid var(--line);margin-top:14px;padding-top:14px">

        <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px" onclick="A.fbLogout()"><i class="ti ti-logout"></i> зҷ»еҮә</button>

async function fbUploadSeed(){
  if(!FB.on||!FB.user||FB.role!=='eloga'){ A.toast('йңҖд»Ҙдҫқжҙӣеҳүз®ЎзҗҶиҖ…зҷ»е…ҘеҫҢеҶҚдёҠеӮі'); return; }
  const S=SEED_SNAPSHOT; if(!S){ A.toast('жүҫдёҚеҲ°зЁ®еӯҗиіҮж–ҷ'); return; }
  try{
    const ex=await FB.db.collection('products').limit(1).get();
    if(!ex.empty){ A.toast('йӣІз«Ҝе·ІжңүиіҮж–ҷпјҢзӮәйҒҝе…ҚиҰҶи“Ӣе·Із•ҘйҒҺ'); return; }
    A.toast('дёҠеӮізЁ®еӯҗиіҮж–ҷдёӯвҖҰ');
    const em={}; (S.customers||[]).forEach(c=>{ if(c.name) em[c.name]=c.email||''; }); em[ELG_SELF]='';
    const writeAll=async(name,arr,stamp)=>{ arr=arr||[]; for(let i=0;i<arr.length;i+=400){ const b=FB.db.batch(); arr.slice(i,i+400).forEach(o=>{ const id=o.id||FB.db.collection(name).doc().id; const data=stripId(o); if(stamp)stamp(data); b.set(FB.db.collection(name).doc(id),data); }); await b.commit(); } };
    await writeAll('products',S.products,d=>{ if(!d.customerEmail) d.customerEmail=em[d.cust]||''; });
    await writeAll('customers',S.customers);
    await writeAll('sharedPIF',S.sharedPIF);
    await writeAll('showcase',S.showcase);
    await FB.db.collection('staff').doc(FB.user.uid).set({role:elgRole||'дё»иҰҒз®ЎзҗҶиҖ…', name:'дҫқжҙӣеҳү'},{merge:true});
    await FB.db.collection('meta').doc('config').set({CINFO:S.CINFO},{merge:true});
    A.toast('е·ІдёҠеӮізЁ®еӯҗиіҮж–ҷеҲ°йӣІз«ҜпјҢз•«йқўе°ҮиҮӘеӢ•жӣҙж–°');
  }catch(e){ A.toast('дёҠеӮіеӨұж•—пјҡ'+e.message); console.warn(e); }
}
A.googleSignIn=function(){
  if(!FB.on){ A.toast('Firebase е°ҡжңӘијүе…ҘпјҢи«ӢжӘўжҹҘз¶Іи·Ҝ'); return; }
  const p=new firebase.auth.GoogleAuthProvider();
  p.setCustomParameters({prompt:'select_account'});
  FB.auth.signInWithPopup(p).catch(e=>{
    if(e.code==='auth/popup-blocked'||e.code==='auth/operation-not-supported-in-this-environment'){
      // popup иў«ж“ӢпјҢж”№з”Ё redirect
      FB.auth.signInWithRedirect(p).catch(e2=>A.toast('зҷ»е…ҘеӨұж•—пјҡ'+e2.message));
    } else {
      A.toast('зҷ»е…ҘеӨұж•—пјҡ'+e.message);
    }
  });
};
A.fbLogout=function(){ try{ if(FB.on&&FB.user) FB.auth.signOut(); }catch(e){} FB.user=null; FB.role=null; FB.ready=false; role='customer'; me={}; view='entry'; render(); };
A.fbUploadSeed=function(){ fbUploadSeed(); };
A.reloadPage=function(){
  if(typeof FB!=='undefined'&&FB.on&&FB.auth){
    const user=FB.user;
    if(user){ fbDetach(); fbStart(); }
    else { try{ location.reload(); }catch(e){} }
  } else { try{ location.reload(); }catch(e){} }
};

fbInit();
fbHandleRedirect();
SEED_SNAPSHOT = JSON.parse(JSON.stringify({products,customers,staff,sharedPIF,showcase,CINFO}));
load();
render();
fbStart();
</script>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234a6741'/><text x='16' y='23' text-anchor='middle' font-size='20' font-family='serif' fill='white'>依</text></svg>">
<title>依洛嘉送驗系統 · 流程原型</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.7.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js"></script>
<style>
  :root{
    --bg:#E8E6E0; --surface:#FFFFFF; --ink:#1A1A1C; --muted:#6E6E73; --faint:#A0A09A;
    --line:#EAE8E3; --line2:#DBD9D2; --accent:#0E7C6B; --accent-tint:#E2F0EC;
    --i:#1D4ED8; --i-bg:#EAEEFB; --w:#A45A09; --w-bg:#F7EEDC;
    --s:#15803D; --s-bg:#E7F2EB; --n:#5B5B60; --n-bg:#EFEEEA;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",Roboto,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:0;
  }
  .roleseg{
    display:flex; gap:4px; background:var(--surface); border:1px solid var(--line2);
    border-radius:13px; padding:4px; width:100%; max-width:390px; margin-bottom:14px;
  }
  .roleseg button{
    flex:1; border:0; background:transparent; color:var(--muted); font-size:15px; font-weight:600;
    padding:10px; border-radius:9px; cursor:pointer; font-family:inherit;
  }
  .roleseg button.on{ background:var(--ink); color:#fff; }

  .phone{
    width:100%; max-width:100%; height:100vh; height:100dvh; background:var(--surface);
    border:0; border-radius:0; overflow:hidden; position:relative;
    display:flex; flex-direction:column; box-shadow:none;
  }
  .hd{
    padding:18px 20px 14px; border-bottom:1px solid var(--line); display:flex;
    align-items:center; justify-content:space-between; gap:10px; flex:none;
  }
  .hd h1{ margin:0; font-size:19px; font-weight:700; letter-spacing:-.01em; }
  .hd p{ margin:3px 0 0; font-size:13px; color:var(--muted); }
  .hd .av{ width:38px;height:38px;border-radius:50%;background:var(--accent-tint);color:var(--accent);
    display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex:none;}
  .hd .ic{ font-size:23px;color:var(--faint); }

  .screen{ flex:1; overflow-y:auto; padding:18px 20px 24px; }
  .tabbar{ display:flex; border-top:1px solid var(--line); flex:none; background:var(--surface);
    overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .tabbar::-webkit-scrollbar{ display:none; }
  #fab{ position:absolute; z-index:62; left:16px; bottom:88px; }
  #fab.hide{ display:none; }
  .fabbtn{ height:48px; border-radius:999px; border:0; background:#06C755; color:#fff;
    box-shadow:0 4px 16px rgba(0,200,80,.45); display:inline-flex; align-items:center; gap:0;
    cursor:pointer; font-family:inherit; transition:transform .12s,box-shadow .12s; padding:0; overflow:hidden; }
  .fabbtn:active{ transform:scale(.94); box-shadow:0 2px 8px rgba(0,200,80,.3); }
  .fab-ic{ width:48px; height:48px; display:flex; align-items:center; justify-content:center; font-size:26px; flex:none; }
  .fab-lbl{ font-size:13.5px; font-weight:800; letter-spacing:.5px; padding:0 14px 0 2px; white-space:nowrap; }
  .backbtn{ display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); background:var(--surface);
    border-radius:10px; padding:7px 13px; font-family:inherit; font-size:13.5px; font-weight:600; color:var(--ink); cursor:pointer; }
  .backbtn:active{ background:var(--n-bg); }
  .backbtn i{ font-size:17px; }
  .tabbar button{
    flex:0 0 auto; min-width:66px; border:0; background:transparent; padding:9px 8px 12px; cursor:pointer; font-family:inherit;
    color:var(--muted); font-size:11px; font-weight:700; display:flex; flex-direction:column; align-items:center; gap:4px;
    transition:color .12s; white-space:nowrap;
  }
  .tabbar button i{ font-size:22px; }
  .tabbar button.on{ color:var(--accent); }
  .tabbar button.on i{ color:var(--accent); }

  .sect{ font-size:15px; font-weight:700; margin:0 0 10px; }
  .grphd{ display:flex;align-items:center;gap:7px;margin:16px 0 8px; }
  .grphd .dot{ width:8px;height:8px;border-radius:50%;flex:none; }
  .grphd .gn{ font-size:12px;font-weight:700;color:var(--muted); }
  .card.compact{ padding:11px 13px; }
  .srch{ display:flex;align-items:center;gap:8px;border:1px solid var(--line2);border-radius:10px;padding:0 12px;height:42px;margin:0 0 14px;background:var(--surface); }
  .srch i{ color:var(--faint);font-size:18px; }
  .srch input{ border:0;outline:0;background:transparent;flex:1;font:inherit;font-size:14px;color:var(--ink);height:100%; }
  .grp{ margin-bottom:4px; }
  .grphd2{ display:flex;align-items:center;gap:8px;padding:9px 4px;cursor:pointer;user-select:none; }
  .grphd2 .gn{ font-size:12.5px;font-weight:700;color:var(--muted); }
  .grphd2 .chev{ font-size:16px;color:var(--faint);transition:transform .15s; }
  .grp.collapsed .chev{ transform:rotate(-90deg); }
  .grp.collapsed .grpbody{ display:none; }
  .pifgrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(168px,1fr)); gap:10px; }
  .pifgrid .card{ padding:11px 12px; display:flex; flex-direction:column; gap:4px; }
  .screen.searching .grp .grpbody{ display:block; }
  .screen.searching .grp .chev{ transform:rotate(0deg); }
  .chips{ display:flex;flex-wrap:wrap;gap:7px;margin:0 0 12px; }
  .fchip{ font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:9px;border:1.5px solid var(--line2);color:var(--muted);cursor:pointer;user-select:none; }
  .fchip.on{ background:var(--ink);border-color:var(--ink);color:#fff; }
  .tablewrap{ overflow-x:auto;border:1px solid var(--line2);border-radius:12px;background:var(--surface); }
  table.dtable{ width:100%;border-collapse:collapse;font-size:13px;min-width:760px; }
  table.dtable th{ text-align:left;font-weight:700;font-size:11.5px;color:var(--muted);padding:10px 12px;border-bottom:1.5px solid var(--line2);white-space:nowrap;background:var(--n-bg); }
  table.dtable td{ padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle; }
  table.dtable tr:last-child td{ border-bottom:0; }
  table.dtable tr.sel td{ background:var(--i-bg); }
  table.dtable .ck{ width:20px;height:20px; }
  .libbar{ display:flex;flex-wrap:wrap;align-items:center;gap:8px; }
  input.fld--mini, select.fld--mini{ height:34px;padding:0 8px;font-size:12.5px;min-width:84px;margin:0;border-radius:8px; }
  table.dtable td .fld--mini{ width:100%; }
  .sect.mt{ margin-top:22px; }
  .muted{ color:var(--muted); } .faint{ color:var(--faint); }
  .card{ border:1px solid var(--line2); border-radius:14px; padding:15px; background:var(--surface); }
  .card+.card{ margin-top:10px; }
  .row{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .stack{ display:flex; flex-direction:column; gap:10px; }
  .nm{ font-size:15px; font-weight:600; }
  .sub{ font-size:13px; color:var(--muted); margin-top:3px; }

  .pill{ font-size:12px; font-weight:600; padding:4px 11px; border-radius:9px; white-space:nowrap; }
  .pill--n{ background:var(--n-bg); color:var(--n); }
  .pill--i{ background:var(--i-bg); color:var(--i); }
  .pill--w{ background:var(--w-bg); color:var(--w); }
  .pill--s{ background:var(--s-bg); color:var(--s); }

  .btn{ width:100%; border:0; background:var(--ink); color:#fff; font-size:16px; font-weight:600;
    height:50px; border-radius:13px; cursor:pointer; font-family:inherit;
    display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn i{ font-size:20px; }
  .btn:disabled{ opacity:.4; cursor:default; }
  .btn--sm{ height:44px; font-size:15px; }
  .btn--ghost{ background:var(--surface); color:var(--ink); border:1px solid var(--line2); }
  .btn--ok{ background:var(--accent); }

  .lnk{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:14px 15px;
    border:1px solid var(--line2); border-radius:14px; cursor:pointer; }
  .lnk .l{ display:flex; align-items:center; gap:12px; }
  .lnk i.lead{ font-size:23px; color:var(--accent); }

  .selrow{ display:flex; align-items:center; gap:12px; padding:13px 14px; border:1px solid var(--line2);
    border-radius:13px; cursor:pointer; }
  .selrow.on{ border-color:var(--accent); background:var(--accent-tint); }
  .ck{ width:22px;height:22px;border-radius:7px;border:2px solid var(--line2);flex:none;
    display:flex;align-items:center;justify-content:center;color:#fff; }
  .ck i{ font-size:15px; opacity:0; }
  .selrow.on .ck{ background:var(--accent); border-color:var(--accent); }
  .selrow.on .ck i{ opacity:1; }
  .ck.on{ background:var(--accent); border-color:var(--accent); }
  .ck.on i{ opacity:1; }

  .seg{ display:flex; gap:8px; margin-top:10px; }
  .seg button{ flex:1; height:42px; border:1px solid var(--line2); background:var(--surface); color:var(--ink);
    border-radius:11px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; }
  .seg button.on{ border-color:var(--accent); background:var(--accent-tint); color:var(--accent); }

  .total{ display:flex; align-items:baseline; justify-content:space-between; margin-top:14px;
    padding-top:13px; border-top:1px solid var(--line); }
  .total .amt{ font-size:24px; font-weight:700; }

  .note{ display:flex; gap:8px; align-items:flex-start; background:var(--n-bg); border-radius:12px;
    padding:11px 14px; font-size:13px; color:var(--muted); }
  .note i{ font-size:18px; margin-top:1px; }

  input.fld{ width:100%; height:44px; border:1px solid var(--line2); border-radius:11px; padding:0 13px;
    font-size:15px; font-family:inherit; color:var(--ink); background:var(--surface); }
  input.fld::placeholder{ color:var(--faint); }
  label.lbl{ display:block; font-size:13px; font-weight:600; color:var(--muted); margin:0 0 6px; }
  select.fld{ width:100%; height:46px; border:1px solid var(--line2); border-radius:12px; padding:0 12px;
    font-size:15px; font-family:inherit; background:var(--surface); color:var(--ink); }

  .addr{ background:var(--n-bg); border-radius:12px; padding:11px 14px; }
  .addr .t{ font-size:12px; color:var(--muted); } .addr .a{ font-size:13px; margin-top:2px; }

  .empty{ text-align:center; color:var(--faint); padding:48px 16px; font-size:14px; }
  .empty i{ font-size:34px; display:block; margin-bottom:10px; }

  .toast{ position:absolute; left:16px; right:16px; bottom:78px; background:var(--ink); color:#fff;
    padding:13px 16px; border-radius:13px; font-size:14px; text-align:center; opacity:0;
    transform:translateY(8px); transition:.25s; pointer-events:none; }
  .toast.show{ opacity:1; transform:translateY(0); }
  .miniline{ display:flex; justify-content:space-between; font-size:14px; padding:5px 0; }

  #app{ flex:1; display:flex; flex-direction:column; min-height:0; }
  /* 不同端的柔和底色，方便測試辨識 */
  #app.end-entry{ --endbg:var(--bg); }
  #app.end-customer{ --endbg:#EAF2F1; }   /* 客戶端 · 柔和湖綠 */
  #app.end-back{ --endbg:#F3EEE5; }        /* 依洛嘉後臺 · 柔和米砂 */
  #app.end-front{ --endbg:#ECE9F5; }       /* 依洛嘉前臺 · 柔和薰衣草 */
  #app.end-board{ --endbg:#ECF1EB; }       /* 共同看板 · 柔和淺鼠尾草 */
  #app .hd, #app .screen{ background:var(--endbg, var(--surface)); }
  .full{ flex:1; padding:28px 24px; display:flex; flex-direction:column; overflow-y:auto; }
  .brand{ text-align:center; margin-top:36px; }
  .logo{ width:64px;height:64px;border-radius:18px;background:var(--ink);color:#fff;font-size:28px;font-weight:700;
    display:flex;align-items:center;justify-content:center;margin:0 auto 16px; }
  .logo.sm{ width:52px;height:52px;font-size:22px;border-radius:15px;margin-bottom:14px; }
  .brand h1{ margin:0;font-size:23px;font-weight:700;letter-spacing:-.01em; }
  .brand p{ margin:6px 0 0; }
  .entrycard{ display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--surface);
    border:1px solid var(--line2);border-radius:16px;padding:16px;cursor:pointer;font-family:inherit; }
  .ec-ic{ width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex:none; }
  .ec-t{ flex:1;display:flex;flex-direction:column; } .ec-t .sub{ margin-top:2px; }
  .back{ background:transparent;border:0;color:var(--muted);font-size:15px;font-weight:600;font-family:inherit;
    display:flex;align-items:center;gap:6px;cursor:pointer;padding:0;margin-bottom:8px; }
  .back i{ font-size:19px; }
  .logintop{ text-align:center;margin:22px 0 26px; } .logintop h2{ margin:0;font-size:21px;font-weight:700; }
  .logintop p{ margin:4px 0 0; }
  .linebtn{ background:#06C755; }
  .iconbtn{ background:transparent;border:0;color:var(--faint);cursor:pointer;padding:0;display:flex;font-family:inherit; }
  .iconbtn i{ font-size:22px; }
  .ztog{ display:inline-flex; gap:3px; background:var(--n-bg); border-radius:11px; padding:3px; }
  .ztog button{ border:0; background:transparent; color:var(--muted); font-size:14px; font-weight:600;
    padding:7px 16px; border-radius:8px; cursor:pointer; font-family:inherit; }
  .ztog button.on{ background:var(--surface); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.10); }
  .hbtn{ display:inline-flex; align-items:center; gap:5px; border:1px solid var(--line2); background:var(--surface);
    color:var(--ink); font-size:13px; font-weight:600; padding:8px 11px; border-radius:10px; cursor:pointer; font-family:inherit; }
  .hbtn i{ font-size:17px; }
  .modeseg{ display:flex; gap:8px; }
  .modeseg button{ flex:1; height:44px; border:1px solid var(--line2); background:var(--surface); color:var(--muted);
    border-radius:11px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit;
    display:flex; align-items:center; justify-content:center; gap:5px; }
  .modeseg button.on{ border-color:var(--accent); background:var(--accent-tint); color:var(--accent); }
  .modeseg button i{ font-size:17px; }
  .uparea{ border:1.5px dashed var(--line2); border-radius:14px; padding:24px; text-align:center; }
  textarea.fld{ height:auto; padding:10px 13px; resize:none; }
  .btn--danger{ background:#C0392B; }
  .dash{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .metric{ background:var(--surface); border:1px solid var(--line2); border-radius:14px; padding:14px; cursor:pointer; }
  .metric:active{ transform:scale(.99); }
  .metric .mi{ width:34px; height:34px; border-radius:9px; background:var(--accent-tint); color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-size:19px; margin-bottom:8px; }
  .metric .mv{ font-size:26px; font-weight:700; line-height:1; }
  .metric .ml{ font-size:12.5px; color:var(--muted); margin-top:4px; }
  .devbtn{ position:absolute; right:14px; bottom:80px; z-index:60; display:inline-flex; align-items:center; gap:6px;
    background:var(--ink); color:#fff; border:0; border-radius:22px; padding:9px 14px; font-size:13px; font-weight:700;
    font-family:inherit; cursor:pointer; box-shadow:0 6px 18px -6px rgba(0,0,0,.45); opacity:.92; }
  .devbtn i{ font-size:16px; }
  .notepad-overlay{ position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:180;display:flex;justify-content:flex-end; }
  .notepad-panel{ width:380px;max-width:100%;height:100%;background:var(--surface);box-shadow:-4px 0 24px rgba(0,0,0,.15);display:flex;flex-direction:column;animation:slideIn .2s ease; }
  @keyframes slideIn{ from{transform:translateX(100%)} to{transform:translateX(0)} }
  .notepad-panel .np-hd{ padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px; }
  .notepad-panel .np-body{ flex:1;overflow-y:auto;padding:14px 18px; }
  .notepad-panel .np-note{ border:1px solid var(--line2);border-radius:10px;padding:12px;margin-bottom:10px;cursor:pointer;transition:border-color .15s; }
  .notepad-panel .np-note:hover{ border-color:var(--accent); }
  .notepad-panel .np-note.editing{ border-color:var(--accent);background:var(--accent-tint); }
  .notepad-panel .np-note textarea{ width:100%;border:0;background:transparent;resize:vertical;font-family:inherit;font-size:13.5px;line-height:1.7;outline:none;min-height:80px; }
  .devmenu{ position:absolute; right:14px; bottom:80px; z-index:61; width:248px; background:var(--surface);
    border:1px solid var(--line2); border-radius:14px; box-shadow:0 14px 40px -12px rgba(0,0,0,.4); overflow:hidden; }
  .devmenu .devhd{ display:flex; justify-content:space-between; align-items:center; padding:11px 14px;
    font-size:13px; font-weight:700; background:var(--n-bg); border-bottom:1px solid var(--line); }
  .devmenu .devhd i{ cursor:pointer; font-size:17px; }
  .devmenu button{ display:flex; align-items:center; gap:9px; width:100%; text-align:left; border:0; background:transparent;
    padding:11px 14px; font-size:14px; font-family:inherit; cursor:pointer; color:var(--ink); border-bottom:1px solid var(--line); }
  .devmenu button:last-child{ border-bottom:0; }
  .devmenu button:active{ background:var(--n-bg); }
  .devmenu button i{ font-size:18px; color:var(--muted); }

  @media (min-width:821px){
    body{ padding:24px; justify-content:center; }
    .phone{ max-width:1320px; width:100%; height:92vh; max-height:900px; border:1px solid var(--line2);
      border-radius:18px; box-shadow:0 24px 70px -30px rgba(0,0,0,.32); }
    #app.mode-full .full{ max-width:460px; margin:0 auto; width:100%; }
    #app.mode-app .tabbar{ position:absolute; top:0; left:0; bottom:0; width:230px; flex-direction:column;
      align-items:stretch; justify-content:flex-start; border-top:0; border-right:1px solid var(--line);
      padding:18px 0; gap:2px; background:var(--surface); border-radius:18px 0 0 18px; overflow-y:auto; overflow-x:hidden; z-index:2; }
    #app.mode-app .tabbar button{ flex:none; flex-direction:row; justify-content:flex-start; gap:13px;
      padding:13px 18px; margin:0 12px; font-size:15px; border-radius:10px; }
    #app.mode-app .tabbar button i{ font-size:22px; }
    #app.mode-app .tabbar button.on{ background:var(--accent-tint); color:var(--accent); }
    #app.mode-app .hd, #app.mode-full .hd{ padding:20px 32px 16px; }
    #app.mode-app .hd{ margin-left:230px; }
    #app.mode-app .screen{ margin-left:230px; }
    .screen{ padding:26px 34px 40px; }
    .hd h1{ font-size:21px; }
    /* card lists tile into a responsive grid (dashboard feel) */
    .screen .stack{ display:grid; grid-template-columns:repeat(auto-fit,minmax(310px,1fr)); gap:12px; align-items:start; }
    /* section headers and notes span the full width above their grid */
    .screen .sect, .screen .note, .screen .addr{ max-width:none; }
    /* forms / detail views keep a comfortable single column */
    .pane{ max-width:640px; margin:0 auto; }
    .pane .stack{ display:flex; flex-direction:column; }
    .dash{ grid-template-columns:repeat(4,1fr); }
    .devbtn,.devmenu{ bottom:24px; right:24px; }
    #fab{ left:auto; right:24px; bottom:88px; }
  }
  /* ===== MOBILE: 表格自動拆成乾淨卡片（電腦端維持表格匯總） ===== */
  @media (max-width:820px){
    .tablewrap{ border:0; overflow:visible; }
    table.dtable{ min-width:0; width:100%; display:block; }
    table.dtable thead{ display:none; }
    table.dtable tbody{ display:block; }
    table.dtable tr{ display:block; border:1px solid var(--line2); border-radius:13px; padding:12px 14px; margin-bottom:10px; }
    table.dtable tr.sel{ border-color:var(--accent); background:var(--accent-tint); }
    table.dtable td{ display:flex; align-items:center; justify-content:space-between; gap:12px; border:0; padding:5px 0; white-space:normal; }
    table.dtable td::before{ content:attr(data-label); font-size:12px; font-weight:700; color:var(--muted); flex:none; }

  if(dev){
    if(!devOpen){
      dev.innerHTML=``;

      dev.innerHTML=`<div class="devmenu">

        ${(typeof FB!=='undefined'&&FB.on&&FB.user)?`<button onclick="A.devLogoutSwitch()" style="color:#C0392B"><i class="ti ti-logout"></i> 先登出 Firebase 再切換</button>`:''}

        <button onclick="A.devGo('manage')"><i class="ti ti-briefcase"></i> 依洛嘉後臺 · 管理</button>
        <button onclick="A.devGo('board')"><i class="ti ti-clipboard-list"></i> 客戶公共平臺（免登入）</button>
        <button onclick="A.devGo('entry')"><i class="ti ti-home"></i> 入口頁</button>

  // 記事本面板
  const npEl=document.getElementById('notepad');
  if(npEl){

    else {
      const notes=JSON.parse(localStorage.getItem('elg_notes')||'[]');
      npEl.innerHTML=`<div class="notepad-overlay" onclick="A.toggleNotepad()">
        <div class="notepad-panel" onclick="event.stopPropagation()">
          <div class="np-hd">
            <i class="ti ti-notebook" style="font-size:20px;color:var(--accent)"></i>
            <span style="flex:1;font-size:16px;font-weight:700">系統記事本</span>
            <button onclick="A.addNote()" style="border:0;background:var(--accent);color:#fff;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600"><i class="ti ti-plus"></i> 新增</button>
            <button onclick="A.toggleNotepad()" style="border:0;background:none;cursor:pointer;font-size:20px;color:var(--muted)"><i class="ti ti-x"></i></button>
          </div>
          <div class="np-body">
            ${notes.length ? notes.map((n,i)=>`
              <div class="np-note ${n.editing?'editing':''}">
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
                  <input style="flex:1;border:0;background:transparent;font-size:14px;font-weight:700;font-family:inherit;outline:none;color:var(--ink)"
                    value="${(n.title||'').replace(/"/g,'&quot;')}" placeholder="標題"
                    onfocus="A.noteEditing(${i},true)" onblur="A.saveNoteField(${i},'title',this.value)">
                  <span style="font-size:11px;color:var(--faint);white-space:nowrap">${n.updatedAt||''}</span>
                  <button onclick="A.delNote(${i})" style="border:0;background:none;cursor:pointer;color:var(--faint);font-size:15px" title="刪除"><i class="ti ti-trash"></i></button>
                  <button onclick="A.pinNote(${i})" style="border:0;background:none;cursor:pointer;color:${n.pinned?'var(--accent)':'var(--faint)'};font-size:15px" title="${n.pinned?'取消置頂':'置頂'}"><i class="ti ti-pin${n.pinned?'-filled':''}"></i></button>
                </div>
                <textarea placeholder="寫點什麼…"
                  onfocus="A.noteEditing(${i},true)"
                  onblur="A.saveNoteField(${i},'content',this.value)">${(n.content||'').replace(/</g,'&lt;')}</textarea>
              </div>`).join('')
            : `<div style="text-align:center;color:var(--faint);padding:40px 0">
                <i class="ti ti-notebook" style="font-size:40px;opacity:.3"></i>
                <p style="margin-top:10px">還沒有筆記</p>
                <p style="font-size:12px">按「新增」開始記錄</p>
              </div>`}
          </div>
        </div>
      </div>`;
    }
  }
}

function custSubmit(){
  const applied = products.filter(p=>ownedByMe(p) && p.status==='applied');
  const approved = products.filter(p=>ownedByMe(p) && (p.status==='approved'||p.status==='pending'));
  const prog = products.filter(p=>ownedByMe(p) && ['shipped','received','invoiced','reported','paid','testing','reporting'].includes(p.status));
  const n = approved.filter(p=>p.shipSel).length;
  const myc = customers.find(c=>c.name===me.nameCh);
  let h = `<div class="lnk" onclick="A.editProfile()" style="margin-bottom:10px">
      <span class="l"><i class="ti ti-building-store lead"></i>
      <span><span class="nm">廠商資料 · 已填</span><br><span class="sub">${me.nameCh} · ${me.addrCh||''}</span></span></span>
      <span class="muted" style="font-size:13px;font-weight:600">編輯</span></div>`;
  h += `<div class="lnk" onclick="A.openSharedPIF()" style="margin-bottom:10px">
      <span class="l"><i class="ti ti-files lead"></i>
      <span><span class="nm">依洛嘉 PIF 共用清單</span><br><span class="sub">可共用 ${sharedPIF.filter(it=>shareState(it)==='public').length} 項</span></span></span>
      <i class="ti ti-chevron-right faint" style="font-size:20px"></i></div>`;
  h += `<div class="lnk" onclick="A.openMyFolder()">
      <span class="l"><i class="ti ti-cloud lead"></i>
      <span><span class="nm">我的 PIF 雲端資料夾</span><br><span class="sub">${(myc&&myc.drive&&myc.driveAuth)?'由依洛嘉提供，點擊開啟':(myc&&myc.drive?'依洛嘉尚未授權存取':'依洛嘉尚未提供連結')}</span></span></span>
      <i class="ti ti-external-link faint" style="font-size:18px"></i></div>`;

  h += `<div class="row sect mt"><span>我要送驗的產品</span><span class="muted" style="font-size:13px;font-weight:600;cursor:pointer" onclick="A.openAddItems('customer')">+ 新增送驗產品</span></div>`;

  if(drafts.length && addTarget==='customer'){
    h += `<div class="lnk" onclick="A.openAddItems('customer')" style="border-color:var(--w);margin-bottom:10px">
        <span class="l"><i class="ti ti-edit lead" style="color:var(--w)"></i>
        <span><span class="nm">未完成草稿（${drafts.length} 筆）</span><br><span class="sub">已自動暫存，點此繼續填寫</span></span></span>
        <span class="pill pill--w">繼續</span></div>`;
  }

  if(applied.length){
    h += `<div class="faint" style="font-size:13px;margin:0 0 8px">申請中（待依洛嘉確認 · 可自行撤銷）</div><div class="stack">`+ applied.map(p=>`
      <div class="card compact"><div class="row"><span><span class="nm" style="font-size:14px">${p.name}</span>${p.alias?`<br><span class="sub">別名：${p.alias}</span>`:''}</span>${pill(p.status)}</div>
        <button class="btn btn--ghost btn--sm" style="margin-top:10px;color:#C0392B;border-color:#E7C3BD" onclick="A.deleteMyProduct('${p.id}')"><i class="ti ti-trash"></i> 撤銷並刪除</button>
      </div>`).join('')+`</div>`;
  }
  if(approved.length){
    h += `<div class="row" style="margin:14px 0 8px"><span class="faint" style="font-size:13px">可寄送（依洛嘉已允許 · 勾選後安排寄送）</span>
        <span class="muted" style="font-size:12px;font-weight:600;cursor:pointer" onclick="A.shipAll()">${approved.every(p=>p.shipSel)?'全不選':'全選'}</span></div><div class="stack">`+ approved.map(p=>`
      <div class="card compact">
        <div class="selrow ${p.shipSel?'on':''}" style="border:0;padding:0" onclick="A.toggleShip('${p.id}')">
          <span class="ck"><i class="ti ti-check"></i></span>
          <span style="flex:1"><span class="nm" style="font-size:14px">${p.name}</span><br><span class="sub">${p.alias?'別名：'+p.alias+' · ':''}${p.spec||'—'} · ${p.qty||'—'}</span></span>
        </div>
        ${p.cancelReq
          ? `<div class="sub" style="margin-top:8px;color:var(--w)"><i class="ti ti-clock"></i> 撤銷申請中，待依洛嘉同意 · <span style="cursor:pointer;text-decoration:underline" onclick="A.undoCancelReq('${p.id}')">取消申請</span></div>`
          : `<button class="btn btn--ghost btn--sm" style="margin-top:8px" onclick="A.requestCancel('${p.id}')"><i class="ti ti-ban"></i> 申請撤銷</button>`}
      </div>`).join('') + `</div>`;
    h += `<div class="addr" style="margin-top:12px"><div class="t">寄送至</div><div class="a">${ADDR}</div><div class="a" style="margin-top:2px">電話 ${ELG_TEL}</div></div>`;
    h += `<button class="btn" style="margin-top:10px" ${n?'':'disabled'} onclick="A.arrange()">
            <i class="ti ti-truck-delivery"></i> 安排寄送（${n}）</button>`;
  }
  if(!applied.length && !approved.length){
    h += `<div class="card faint" style="text-align:center;padding:22px">尚無待處理的送驗產品</div>`;
  }

  h += `<div class="sect mt">進行中</div>`;
  if(prog.length){
    const porder=['shipped','received','invoiced','reported','paid','testing','reporting','completed'];
    const cancelable=['shipped','received','invoiced','reported','paid'];
    const present=porder.filter(k=>prog.some(p=>p.status===k));
    h += srchBar('搜尋進行中品名…');
    h += present.map(k=>{
      const grp=prog.filter(p=>p.status===k);
      const canCancel=cancelable.includes(k);
      const body=`<div class="stack">`+ grp.map(p=>{
        let right;
        if(p.paused) right=`<span class="pill pill--n" style="font-size:11px"><i class="ti ti-player-pause"></i> 已暫停</span>`;
        else if(canCancel) right = p.cancelReq
            ? `<span class="sub" style="color:var(--w);white-space:nowrap"><i class="ti ti-clock"></i> 撤銷申請中 · <span style="cursor:pointer;text-decoration:underline" onclick="A.undoCancelReq('${p.id}')">取消</span></span>`
            : `<span class="sub" style="color:#C0392B;cursor:pointer;white-space:nowrap" onclick="A.requestCancel('${p.id}')"><i class="ti ti-ban"></i> 申請撤銷</span>`;
        else right=`<span class="sub faint" style="white-space:nowrap">送驗中不可撤銷</span>`;
        return `<div class="card compact" data-nm="${p.name}"><div class="row" style="align-items:center;gap:10px">
            <span class="nm" style="font-size:14px;flex:1">${p.name}</span>${right}</div></div>`;
      }).join('')+`</div>`;
      return collGroup(SM[k][1], SM[k][0], grp.length, body);
    }).join('');
  } else {
    h += `<div class="empty"><i class="ti ti-progress"></i>還沒有進行中的樣品</div>`;
  }
  return h;
}
function custBilling(){
  const inv = products.filter(p=>ownedByMe(p) && p.status==='invoiced');
  const batches=[...new Set(inv.map(p=>p.batch))];
  let h = ``;
  const myc=customers.find(c=>c.name===me.nameCh);
  if(myc && myc.contract){
    const led=(myc.ledger||[]).slice(0,8);
    h += `<div class="card" style="border-color:var(--s)">
        <div class="row"><span class="nm"><i class="ti ti-wallet"></i> 合約預付餘額</span><span class="amt" style="color:var(--s)">${money(myc.balance||0)}</span></div>
        <div class="sub" style="margin-top:4px">送驗檢驗費會自動從此餘額扣除，餘額不足的品項才會另開收款單。</div>
        ${led.length?`<div style="margin-top:10px;border-top:1px solid var(--line);padding-top:8px">
          <div class="sub" style="margin-bottom:4px">近期扣款</div>
          ${led.map(e=>`<div class="miniline"><span>${e.t} · ${e.name}</span><span>-${money(e.amt)} · 餘 ${money(e.bal)}</span></div>`).join('')}
        </div>`:''}
      </div>`;
  }
  h += `<div class="sect${myc&&myc.contract?' mt':''}">待匯款</div>`;
  if(batches.length){
    h += batches.map(b=>{
      const items=inv.filter(p=>p.batch==b);
      const tot=items.reduce((s,p)=>s+(p.charge||0),0);
      const bLabel=b||'收款單';
      const isDisputed=items.some(p=>p.disputed);
      return `<div class="card" style="border-color:${isDisputed?'#C0392B':'var(--w)'}">
        <div class="row"><span class="nm">${bLabel}</span>
          ${isDisputed
            ? `<span class="pill" style="background:#FDECEA;color:#C0392B;border:1px solid #E7C3BD">⚠ 申訴中</span>`
            : `<span class="pill pill--w">待匯款</span>`}
        </div>
        <div class="sub" style="margin-bottom:8px">${items.length} 項樣品</div>
        ${items.map(p=>`<div class="miniline"><span>${p.name||'—'}</span><span>${money(p.charge||0)}</span></div>`).join('')}
        <div class="total"><span class="muted">整批合計</span><span class="amt">${money(tot)}</span></div>
        ${isDisputed
          ? `<div class="note" style="margin-top:10px;background:#FDECEA;border-color:#E7C3BD;color:#C0392B"><i class="ti ti-alert-triangle"></i>已送出申訴，請等待依洛嘉確認後重新開單。</div>`
          : `<label class="lbl" style="margin-top:12px">匯款末五碼 或 匯款人姓名</label>
        <input class="fld" id="pn_${b||'default'}" placeholder="例：12345 或 王小明">
        <button class="btn" style="margin-top:10px" onclick="A.reportPay('${b||'default'}')"><i class="ti ti-check"></i> 匯款回報</button>
        <button class="btn btn--ghost" style="margin-top:8px;color:#C0392B;border-color:#E7C3BD" onclick="A.disputeBatch('${b||'default'}')">
          <i class="ti ti-alert-triangle"></i> 金額有誤，請依洛嘉確認
        </button>`}
      </div>`;
    }).join('');
  } else {
    h += `<div class="card faint" style="text-align:center;padding:22px">目前沒有待匯款的批次</div>`;
  }
  const recent = products.filter(p=>ownedByMe(p) && ['reported','paid','testing','reporting','completed'].includes(p.status));
  h += `<div class="sect mt">近期批次</div>`;
  if(recent.length){
    h += srchBar('搜尋批次品名…');
    const rorder=['reported','paid','testing','reporting','completed'];
    const present=rorder.filter(k=>recent.some(p=>p.status===k));
    h += present.map(k=>{
      const grp=recent.filter(p=>p.status===k);
      // paid 以上代表依洛嘉已確認收款
      const isPaidConfirmed=['paid','testing','reporting','completed'].includes(k);
      const groupLabel=isPaidConfirmed?'✓ 依洛嘉已確認收款 · '+SM[k][0]:SM[k][0];
      const body=`<div class="stack">`+ grp.map(p=>{
        const paidAmt=paidSum(p);
        return `<div class="card compact row" data-nm="${p.name}"><span><span class="nm" style="font-size:13.5px">${p.name}</span><br>
          <span class="sub">${p.batch||''} 批次 · ${p.pifPlanLabel?p.pifPlanLabel+'　':''}${money(p.charge||0)}${isPaidConfirmed&&paidAmt>0?'　<span style="color:var(--s)">✓ 已收 '+money(paidAmt)+'</span>':''}</span></span>
        ${p.status==='completed'?`<button class="btn btn--ghost btn--sm" style="width:auto;padding:0 12px" onclick="A.openDrive('${p.id}')"><i class="ti ti-download"></i> PIF</button>`:''}</div>`;
      }).join('')+`</div>`;
      return collGroup(isPaidConfirmed?'s':SM[k][1], groupLabel, grp.length, body);
    }).join('');
  } else {
    h += `<div class="empty"><i class="ti ti-history"></i>尚無紀錄</div>`;
  }
  return h;
}
function custBoard(){
  const mine=products.filter(p=>ownedByMe(p));
  const myc=customers.find(c=>c.name===me.nameCh);
  const cnt=st=>mine.filter(p=>p.status===st).length;
  const grp=st=>mine.filter(p=>p.status===st);
  const total=mine.length;

  // 階段定義：對齊依洛嘉動作
  const phases=[
    { title:'申請與寄送', icon:'truck-delivery', statuses:[
      {id:'applied',  label:'等待確認中',   who:'依洛嘉確認允許寄送', color:'var(--w)', ic:'clock'},
      {id:'approved', label:'可寄送',       who:'請備樣寄出到依洛嘉', color:'var(--accent)', ic:'package-export'},
      {id:'shipped',  label:'已寄出',       who:'依洛嘉收件中',       color:'var(--accent)', ic:'truck'},
    ]},
    { title:'收款流程', icon:'receipt-2', statuses:[
      {id:'received', label:'依洛嘉已收樣', who:'依洛嘉開收款單中',   color:'var(--accent)', ic:'inbox'},
      {id:'invoiced', label:'收到收款單',   who:'請匯款並回報',       color:'var(--w)', ic:'cash'},
      {id:'reported', label:'已回報匯款',   who:'依洛嘉查帳中',       color:'var(--accent)', ic:'search'},
    ]},
    { title:'送驗與製作', icon:'flask', statuses:[
      {id:'paid',      label:'✓ 依洛嘉已確認收款', who:'依洛嘉安排送驗',      color:'var(--s)', ic:'circle-check'},
      {id:'testing',   label:'送驗中',     who:'檢測中心檢測進行中',  color:'var(--accent)', ic:'flask'},
      {id:'reporting', label:'PIF 製作中', who:'依洛嘉製作 PIF 報告', color:'var(--accent)', ic:'file-text'},
    ]},
    { title:'已完成', icon:'circle-check', statuses:[
      {id:'completed', label:'已完成 PIF', who:'可到雲端資料夾下載',  color:'var(--s)', ic:'download'},
    ]},
  ];

  let h='';

  // 總覽統計
  const activeN=mine.filter(p=>p.status!=='completed').length;
  const doneN=cnt('completed');
  h+=`<div class="dash" style="margin-bottom:16px">
    <div class="metric"><div class="mi" style="background:var(--accent-tint);color:var(--accent)"><i class="ti ti-list-check"></i></div><div class="mv">${total}</div><div class="ml">全部品項</div></div>
    <div class="metric"><div class="mi" style="background:var(--w-bg);color:var(--w)"><i class="ti ti-loader"></i></div><div class="mv">${activeN}</div><div class="ml">進行中</div></div>
    <div class="metric"><div class="mi" style="background:var(--s-bg);color:var(--s)"><i class="ti ti-circle-check"></i></div><div class="mv">${doneN}</div><div class="ml">已完成</div></div>
  </div>`;

  // 雲端資料夾
  h+=`<div class="lnk" onclick="A.openMyFolder()" style="margin-bottom:16px">
    <span class="l"><i class="ti ti-cloud lead"></i>
    <span><span class="nm">我的 PIF 雲端資料夾</span><br><span class="sub">${(myc&&myc.drive&&myc.driveAuth)?'點此開啟下載 PIF':(myc&&myc.drive?'依洛嘉尚未授權存取':'依洛嘉尚未提供連結')}</span></span></span>
    <i class="ti ti-external-link faint" style="font-size:18px"></i></div>`;

  // 搜尋
  if(mine.length>5) h+=srchBar('搜尋我的產品…');

  // 各階段流程
  phases.forEach(phase=>{
    const phaseItems=phase.statuses.flatMap(s=>grp(s.id));
    if(!phaseItems.length) return; // 沒品項的階段不顯示

    h+=`<div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <i class="ti ti-${phase.icon}" style="font-size:18px;color:var(--accent)"></i>
        <span class="nm" style="font-size:15px">${phase.title}</span>
        <span class="sub" style="font-size:12px">${phaseItems.length} 筆</span>
      </div>`;

    phase.statuses.forEach(st=>{
      const items=grp(st.id);
      if(!items.length) return;

      h+=`<div class="card" style="margin-bottom:8px;border-left:4px solid ${st.color};padding:12px 14px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:${items.length>0?'8':'0'}px">
          <i class="ti ti-${st.ic}" style="color:${st.color};font-size:18px;flex:none"></i>
          <span style="flex:1">
            <span class="nm" style="font-size:13.5px">${st.label}</span>
            <span class="pill" style="font-size:10px;margin-left:6px;background:${st.color}15;color:${st.color};border:1px solid ${st.color}40">${items.length}</span>
            <br><span class="sub" style="font-size:11.5px;color:var(--muted)">${st.who}</span>
          </span>
        </div>
        ${items.map(p=>`
          <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--line);margin-left:26px" data-nm="${p.name}">
            <span style="flex:1;min-width:0">
              <span style="font-size:13px;font-weight:600">${p.name}</span>
              ${p.alias?`<span class="sub" style="margin-left:4px;font-size:11px">（${p.alias}）</span>`:''}
              ${p.paused?'<span class="pill pill--n" style="font-size:10px;margin-left:4px"><i class="ti ti-player-pause"></i> 暫停</span>':''}
            </span>
            ${st.id==='invoiced'?`<span style="font-weight:700;color:var(--w);font-size:13px">${money(p.charge||0)}</span>`:''}
            ${st.id==='completed'?`<button class="btn btn--ghost btn--sm" style="width:auto;padding:0 10px;font-size:12px" onclick="A.openDrive('${p.id}')"><i class="ti ti-download"></i> PIF</button>`:''}
          </div>`).join('')}
      </div>`;
    });

    h+=`</div>`;
  });

  if(!mine.length){
    h+=`<div class="empty"><i class="ti ti-clipboard"></i>還沒有產品，請到「送驗」新增</div>`;
  }

  // 可共用 PIF
  h+=`<div style="margin-top:20px;padding-top:16px;border-top:2px solid var(--line)">
    <div class="sect">依洛嘉可共用的 PIF 產品</div>`;
  const pubS=sharedPIF.filter(it=>shareState(it)==='public');
  if(pubS.length){
    h+=`<div class="stack">`+pubS.map((it,i)=>`
      <div class="card compact row" data-nm="${it.name}"><span><span class="nm" style="font-size:13.5px">${it.name}</span><br><span class="sub">${it.type} · 已有 PIF</span></span>
        <button class="btn btn--ok btn--sm" style="width:auto;padding:0 14px" onclick="A.sharePIF(${sharedPIF.indexOf(it)})">共用</button></div>`).join('')+`</div>`;
  } else {
    h+=`<div class="card faint" style="text-align:center;padding:14px">目前沒有可共用的 PIF</div>`;
  }
  const bldS=sharedPIF.filter(it=>shareState(it)==='building');
  if(bldS.length){
    h+=`<div class="stack" style="margin-top:8px">`+bldS.map(it=>`
      <div class="card compact row" data-nm="${it.name}"><span><span class="nm" style="font-size:13.5px">${it.name}</span><br><span class="sub">${it.type} · PIF 建置中</span></span>
        <span class="pill pill--w" style="font-size:11px">建置中</span></div>`).join('')+`</div>`;
  }
  h+=`</div>`;
  h+=`<div class="faint" style="font-size:12px;margin-top:12px"><i class="ti ti-lock"></i> 只顯示你自己的產品，看不到其他客戶資料。</div>`;
  return h;
}

function scGrid(admin){
  const PER=6, q=scQ.trim().toLowerCase();
  const items=showcase.filter(it=>!q || (it.name+' '+(it.en||'')+' '+(it.tagline||'')).toLowerCase().includes(q));
  const pages=Math.max(1,Math.ceil(items.length/PER));
  if(scPage>=pages) scPage=pages-1; if(scPage<0) scPage=0;
  const slice=items.slice(scPage*PER,scPage*PER+PER);
  let h=`<div style="position:relative;margin-bottom:12px"><i class="ti ti-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--faint)"></i>
    <input class="fld" style="padding-left:36px" value="${scQ.replace(/"/g,'&quot;')}" placeholder="搜尋新品（名稱／英文／介紹）· 輸入後按 Enter" onchange="A.scSearch(this.value)"></div>`;
  h+= items.length ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">`+slice.map(it=>scCard(it,admin)).join('')+`</div>`
    : `<div class="card faint" style="text-align:center;padding:20px">${q?'找不到符合的新品':'尚無新品介紹'}</div>`;
  if(pages>1){
    h+=`<div class="row" style="justify-content:center;gap:14px;margin-top:14px">
      <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 12px" ${scPage===0?'disabled':''} onclick="A.scGo(${scPage-1})"><i class="ti ti-chevron-left"></i></button>
      <span class="muted" style="font-size:13px;font-weight:600">第 ${scPage+1} / ${pages} 頁</span>
      <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 12px" ${scPage>=pages-1?'disabled':''} onclick="A.scGo(${scPage+1})"><i class="ti ti-chevron-right"></i></button>
    </div>`;
  }
  return h;
}
function showcaseDetail(id, admin){

}

        <span class="nm" style="font-size:13px;cursor:pointer" onclick="A.scSelAll(${allOn?'false':'true'})">全選</span>
        <span class="muted" style="font-size:12.5px">已選 ${selN} 筆</span>

}
function elgSummary(){
  // ── 收款匯總：方案金額(charge)就是總收費，一張收款單收一次，無 PIF 費二次收款 ──
  const paidOf=p=>(p.payRecords||[]).reduce((s,r)=>s+(r.amt||0),0);

  const allProd=products.filter(p=>
    ['invoiced','reported','paid','testing','reporting','completed'].includes(p.status)
    && custName(p)!==ELG_SELF
  );

  // 頂部加總（分期感知）
  const totalReceived=allProd.reduce((s,p)=>s+itemPaid(p),0);
  const totalPending =allProd.reduce((s,p)=>s+itemDue(p),0);
  const totalCharge  =allProd.reduce((s,p)=>s+itemBilled(p),0);

  // 收款方式統計（兩桶都算：檢驗費 payRecords + 各請款單 payRecords）
  const byMethod={};
  const addM=(m,amt)=>{ if(amt>0){ const k=m||'其他'; byMethod[k]=(byMethod[k]||0)+amt; } };
  allProd.forEach(p=>{
    (p.payRecords||[]).forEach(r=>addM(r.method,r.amt||0));
    itemInvoices(p).forEach(iv=>(iv.payRecords||[]).forEach(r=>addM(r.method||iv.method,r.amt||0)));
  });

  const sumQ=(libQ||'').trim().toLowerCase();
  let h='';

  // 頂部四格（可點擊查看來源明細）
  h+=`<div class="dash" style="margin-bottom:16px">
    <div class="metric" style="cursor:pointer" onclick="A.metricBreakdown('received')"><div class="mi" style="background:var(--s-bg);color:var(--s)"><i class="ti ti-cash"></i></div>
      <div class="mv">${money(totalReceived)}</div><div class="ml">實收總計 <i class="ti ti-search" style="font-size:10px;opacity:.5"></i></div></div>
    <div class="metric" style="cursor:pointer" onclick="A.metricBreakdown('pending')"><div class="mi" style="background:var(--w-bg);color:var(--w)"><i class="ti ti-clock"></i></div>
      <div class="mv">${money(totalPending)}</div><div class="ml">待收款 <i class="ti ti-search" style="font-size:10px;opacity:.5"></i></div></div>
    <div class="metric" style="cursor:pointer" onclick="A.metricBreakdown('billed')"><div class="mi" style="background:var(--n-bg)"><i class="ti ti-receipt"></i></div>
      <div class="mv">${money(totalCharge)}</div><div class="ml">應收總計 <i class="ti ti-search" style="font-size:10px;opacity:.5"></i></div></div>
    ${Object.keys(byMethod).map(m=>`<div class="metric" style="cursor:pointer" onclick="A.metricBreakdown('method:${m}')"><div class="mi"><i class="ti ti-${m==='匯款'?'building-bank':m==='合約扣款'?'file-invoice':m==='信用卡'?'credit-card':m==='手動確認'?'hand-stop':'coins'}"></i></div><div class="mv" style="font-size:14px">${money(byMethod[m])}</div><div class="ml">${m} <i class="ti ti-search" style="font-size:10px;opacity:.5"></i></div></div>`).join('')}
  </div>`;

  h+=srchBar('搜尋客戶或品名…');
  h+=`<div style="text-align:right;margin:-4px 0 10px;display:flex;gap:6px;justify-content:flex-end">
    <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 12px;font-size:11.5px" onclick="A.diagPayData()"><i class="ti ti-stethoscope"></i> 診斷資料</button>
    <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 12px;font-size:11.5px" onclick="A.repairCharges()"><i class="ti ti-wand"></i> 清理重複資料</button>
  </div>`;

  // 依客戶分組
  const allCusts=[...new Set(allProd.map(p=>custName(p)))].sort();
  const filtCusts=sumQ
    ? allCusts.filter(cn=>cn.toLowerCase().includes(sumQ)||allProd.some(p=>custName(p)===cn&&(p.name||'').toLowerCase().includes(sumQ)))
    : allCusts;

  const renderCust=cn=>{
    const prods=allProd.filter(p=>custName(p)===cn&&(!sumQ||(p.name||'').toLowerCase().includes(sumQ)||cn.toLowerCase().includes(sumQ)));
    if(!prods.length) return '';
    let o='';

    const received=prods.reduce((s,p)=>s+itemPaid(p),0);

    const pending=prods.reduce((s,p)=>s+itemDue(p),0);
    const isAllDone = pending<=0 && received>0;

    // 合約客戶資訊
    const cobj=customers.find(c=>c.name===cn);
    const isContract=cobj&&cobj.contract;
    const contractBal=cobj?(cobj.balance||0):0;
    const contractDeducted=prods.reduce((s,p)=>s+(p.payRecords||[]).filter(r=>r.method==='合約扣款').reduce((a,r)=>a+(r.amt||0),0),0);

      ? '<br><span class="sub" style="font-size:11px"><i class="ti ti-wallet"></i> 合約餘額 <b style="color:var(--i)">'+money(contractBal)+'</b>'+(contractDeducted>0?'　已扣 '+money(contractDeducted):'')+'</span>'
      : '';

    const open=!pifGroupClosed['sum_'+cn];

    let badge='';
    if(isContract) badge=`<span class="pill pill--i" style="font-size:11px">合約制</span>`;
    else if(isAllDone) badge=`<span class="pill pill--s" style="font-size:11px">✓ 已結清</span>`;
    else if(pending>0) badge=`<span class="pill pill--w" style="font-size:11px">待收 ${money(pending)}</span>`;

    o+=`<div class="card" style="margin-bottom:10px;padding:0;overflow:hidden${isContract?';border-color:var(--i)40':isAllDone?';border-color:var(--s)40':''}">
      <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:${isContract?'var(--i-bg)':isAllDone?'var(--s-bg)':'var(--n-bg)'};cursor:pointer;border-bottom:${open?'1px solid var(--line)':'0'}"
           onclick="A.togglePifGroup('sum_${cn}')">
        <span style="flex:1;min-width:0">
          <span class="nm" style="font-size:14px">${cn}</span>
          <span class="sub" style="font-size:12px;margin-left:6px">${prods.length} 筆</span>
          ${badge?'&nbsp;'+badge:''}
          ${contractInfo}
        </span>
        <span style="text-align:right;margin-right:6px;line-height:1.6">
          <span style="font-size:13px;font-weight:700;color:var(--s)">已收 ${money(received)}</span>
          ${pending>0?`<br><span style="font-size:11px;color:var(--w)">${isContract?'待扣':'待收'} ${money(pending)}</span>`:''}
        </span>
        <i class="ti ti-chevron-${open?'up':'down'}" style="color:var(--muted);flex:none"></i>
      </div>`;

    if(open){
      o+=`<div style="padding:10px 14px 14px">`;

      // ── 待收款請款單（舊式批次，僅非分期品項）──
      const inProgress=prods.filter(p=>['invoiced','reported'].includes(p.status)&&!hasInstall(p)&&paidOf(p)===0);
      const batchMap={};
      inProgress.forEach(p=>{ if(p.batch&&p.batch.startsWith('INV-')){ (batchMap[p.batch]=batchMap[p.batch]||[]).push(p); } });

      if(pendingBatches.length){
        o+=`<div style="display:flex;gap:6px;margin-bottom:8px">
          <button class="btn btn--ok btn--sm" style="flex:1" onclick="A.confirmAllPaidFor('${cn}')">
            <i class="ti ti-checks"></i> ${confirmDel==='cap'+cn?'再按一次：全部標記已收齊':'確認全部已收齊（撤下客戶請款單）'}</button>
        </div>`;
        o+=`<div style="font-size:12px;font-weight:700;color:var(--w);margin-bottom:8px"><i class="ti ti-clock"></i> 待收款（${pendingBatches.length} 張）</div>`;

        pendingBatches.forEach(bk=>{
          const items=batchMap[bk];
          const tot=items.reduce((s,p)=>s+(p.charge||0),0);
          const payNote=items.map(p=>p.payNote).filter(Boolean)[0]||'';
          const disputed=items.some(p=>p.disputed);
          o+=`<div class="card compact" style="margin-bottom:8px;border-color:${disputed?'#C0392B':'var(--w)'}">
            <div class="row" style="margin-bottom:6px">
              <span>
                <span class="nm" style="font-size:13px;color:var(--accent)">${bk}</span>
                ${disputed?`<span class="pill" style="font-size:10px;background:#FDECEA;color:#C0392B;border:1px solid #E7C3BD;margin-left:4px">⚠ 客戶申訴</span>`:''}
                <br><span class="sub" style="font-size:11px">${items.length} 筆${payNote?' · 末五碼 '+payNote:''}</span>
              </span>
              <span class="amt" style="color:var(--w)">${money(tot)}</span>
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              ${disputed
                ? `<button class="btn btn--sm" style="flex:1;background:#C0392B" onclick="A.voidBatch('${bk}')"><i class="ti ti-arrow-back-up"></i> ${confirmDel==='vb'+bk?'再按確認':'撤回重開'}</button>`
                : `<button class="btn btn--ok btn--sm" style="flex:1" onclick="A.confirmBatchPaid('${bk}')"><i class="ti ti-check"></i> ${confirmDel==='cfb'+bk?'再按一次確認':'確認已收款'}</button>
                   <button class="btn btn--ghost btn--sm" style="flex:1;color:var(--accent);border-color:var(--accent)" onclick="A.manualConfirmBatchPaid('${bk}')"><i class="ti ti-hand-stop"></i> ${confirmDel==='mcfb'+bk?'再按一次確認':'手動確認（免匯款）'}</button>`}
            </div>
          </div>`;
        });
      }

      // ── 品項明細（可勾選補開請款）──
      const selKey=p=>'sumSel_'+p.id;
      const selList=prods.filter(p=>pifGroupClosed[selKey(p)]);
      o+=`<div style="display:flex;align-items:center;gap:8px;margin-top:${pendingBatches.length?'12px':'0'}">
        <span style="font-size:11px;font-weight:700;color:var(--muted);flex:1"><i class="ti ti-list"></i> 品項明細（${prods.length} 筆）</span>
        ${selList.length?`<button class="btn btn--sm" style="width:auto;padding:0 12px;font-size:12px" onclick="A.retroReopen('${cn}')">
          <i class="ti ti-file-invoice"></i> 補開請款（${selList.length} 筆）</button>`:''}
      </div>`;
      o+=`<div style="display:grid;grid-template-columns:20px 1fr auto auto;gap:8px;align-items:center;font-size:11px;font-weight:700;color:var(--muted);padding:6px 0;border-bottom:1px solid var(--line2)">
        <span></span><span>品名</span><span style="text-align:right">金額</span><span style="text-align:right">收款</span>
      </div>`;
      prods.forEach(p=>{
        const billed=itemBilled(p);
        const paid=itemPaid(p);
        const due=itemDue(p);
        const isSel=!!pifGroupClosed[selKey(p)];
        const invs=itemInvoices(p);
        const useInstall=invs.length>0;
        const detailOpen=!!pifGroupClosed['itemOpen_'+p.id];

        // 收款狀態標籤
        let payTag;
        if(billed>0 && due<=0) payTag=`<span style="color:var(--s);font-weight:700">✓ 已收齊</span>`;
        else if(paid>0) payTag=`<span style="color:var(--w)">部分 欠${money(due)}</span>`;
        else if(['invoiced','reported'].includes(p.status)) payTag=`<span style="color:var(--w)">待收</span>`;
        else payTag=`<span style="color:var(--faint)">—</span>`;

        o+=`<div style="display:grid;grid-template-columns:20px 1fr auto auto;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:12.5px;cursor:pointer" onclick="A.toggleItemDetail('${p.id}')">
          <span class="ck ${isSel?'on':''}" style="cursor:pointer;width:18px;height:18px;border-radius:5px;flex:none" onclick="event.stopPropagation();A.toggleSumSel('${p.id}')" title="勾選後可補開請款">
            <i class="ti ti-check" style="font-size:12px;opacity:${isSel?1:0}"></i></span>
          <span style="min-width:0">
            <span style="font-weight:600">${p.name||'—'}</span>
            <span class="sub" style="font-size:10.5px;margin-left:4px">${SM[p.status]?SM[p.status][0]:p.status}</span>
            ${useInstall?`<span class="pill pill--i" style="font-size:9.5px;margin-left:4px">分期 ${invs.length} 單</span>`:''}
            <br><span class="sub" style="font-size:10px">應收 ${money(billed)} · 已收 <b style="color:var(--s)">${money(paid)}</b>${due>0?' · 欠 <b style="color:var(--w)">'+money(due)+'</b>':''}</span>
          </span>
          <span style="text-align:right;font-weight:700">${money(billed)}</span>
          <span style="text-align:right;font-size:11px">${payTag} <i class="ti ti-chevron-${detailOpen?'up':'down'}" style="font-size:13px;color:var(--faint)"></i></span>
        </div>`;

        // 展開：檢驗費桶 + 各張請款單 + 操作
        if(detailOpen){
          o+=`<div style="padding:6px 0 10px 28px;border-bottom:1px solid var(--line);background:var(--n-bg)40">`;

          // ① 檢驗費桶（舊資料）：有 charge 或 payRecords 才顯示
          const lb=legacyBilled(p), lp=legacyPaid(p);
          const recs=p.payRecords||[];
          if(lb>0 || recs.length){
            const ldue=Math.max(0,lb-lp);
            const lc=ldue<=0&&lp>0?'var(--s)':'var(--w)';
            o+=`<div class="card compact" style="margin:6px 8px 6px 0;border-color:${lc}40">
              <div class="row" style="margin-bottom:4px">
                <span style="font-size:12px;font-weight:600">檢驗費
                  <span class="pill" style="font-size:9px;margin-left:4px;background:${lc}15;color:${lc};border:1px solid ${lc}40">${lp>0&&ldue<=0?'已收':lp>0?'已收 '+money(lp):'待收'}</span>
                </span>
                <span style="font-size:12px;font-weight:700">${money(lb)}</span>
              </div>`;
            recs.forEach((r,ri)=>{
              o+=`<div style="display:flex;align-items:center;gap:8px;font-size:10.5px;padding:2px 0;color:var(--muted)">
                <span style="flex:1">${r.date||''} · ${r.method||''}${r.note?' · '+r.note:''}</span>
                <span style="font-weight:700;color:var(--ink)">${money(r.amt||0)}</span>
                <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 6px;font-size:10px;color:#C0392B;border-color:#E7C3BD" onclick="A.delPayRecord('${p.id}',${ri})"><i class="ti ti-trash" style="font-size:10px"></i> ${confirmDel==='dpr'+p.id+'_'+ri?'確認':'刪'}</button>
              </div>`;
            });
            o+=`</div>`;
          }

          // ② 各張獨立請款單（PIF 費／分期款）
          invs.forEach((iv,ix)=>{
            const ivPaid=invPaidSum(iv);
            const ivDue=Math.max(0,(iv.amount||0)-ivPaid);
            const ivColor=ivDue<=0&&ivPaid>0?'var(--s)':'var(--w)';
            o+=`<div class="card compact" style="margin:6px 8px 6px 0;border-color:${ivColor}40">
              <div class="row" style="margin-bottom:4px">
                <span style="font-size:12px;font-weight:600">${iv.note||iv.label||('請款單 '+(ix+1))}
                  <span class="pill" style="font-size:9px;margin-left:4px;background:${ivColor}15;color:${ivColor};border:1px solid ${ivColor}40">${ivDue<=0&&ivPaid>0?'已收':'待收 '+money(ivDue)}</span>
                </span>
                <span style="font-size:12px;font-weight:700">${money(iv.amount||0)}</span>
              </div>
              <div class="sub" style="font-size:10px;margin-bottom:6px">${iv.id||''}${iv.date?' · '+iv.date:''}${iv.method?' · '+iv.method:''}${ivPaid>0?' · 已收 '+money(ivPaid):''}</div>
              <div style="display:flex;gap:6px;flex-wrap:wrap">
                ${ivDue>0?`<button class="btn btn--ok btn--sm" style="width:auto;padding:0 10px;font-size:11px" onclick="A.collectInstall('${p.id}',${ix})"><i class="ti ti-check"></i> ${confirmDel==='ci'+p.id+'_'+ix?'再按確認收款':'確認收款 '+money(ivDue)}</button>`:''}
                <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 10px;font-size:11px;color:#C0392B;border-color:#E7C3BD" onclick="A.delInstall('${p.id}',${ix})"><i class="ti ti-trash"></i> ${confirmDel==='di'+p.id+'_'+ix?'確認刪除':'刪除此單'}</button>
              </div>
            </div>`;
          });

          if(lb<=0 && !recs.length && !invs.length){
            o+=`<div class="sub" style="font-size:11px;padding:4px 0">尚無任何請款單或收款記錄</div>`;
          }

          // 新增分期請款單表單
          o+=`<div style="margin:8px 8px 0 0;padding-top:8px;border-top:1px dashed var(--line2)">
            <div style="font-size:11px;font-weight:700;color:var(--accent);margin-bottom:6px"><i class="ti ti-plus"></i> 新增一張分期請款單</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end">
              <div><label class="lbl" style="font-size:10px">金額</label><input class="fld fld--mini" id="inst_amt_${p.id}" placeholder="如 6000" style="width:90px"></div>
              <div><label class="lbl" style="font-size:10px">說明</label><input class="fld fld--mini" id="inst_note_${p.id}" placeholder="如 尾款" style="width:110px"></div>
              <button class="btn btn--ok btn--sm" style="width:auto;padding:0 12px;font-size:11px" onclick="A.addInstall('${p.id}')"><i class="ti ti-file-plus"></i> 開單</button>
            </div>
          </div>`;

          o+=`</div>`;
        }
      });
      if(selList.length){
        o+=`<div class="note" style="margin-top:8px"><i class="ti ti-info-circle"></i>已勾選 ${selList.length} 筆，點上方「補開請款」跳到補錄分頁重新開單。</div>`;
      }

      o+=`</div>`;
    }
    o+=`</div>`;
    return o;
  };

  // 分成「進行中」與「已結清」（合約客戶一律留在進行中，方便隨時查餘額）
  const isClearedCust=cn=>{
    const cobj=customers.find(c=>c.name===cn);
    if(cobj&&cobj.contract) return false;  // 合約客戶不收進已結清
    const prods=allProd.filter(p=>custName(p)===cn);
    const received=prods.reduce((s,p)=>s+itemPaid(p),0);
    const due=prods.reduce((s,p)=>s+itemDue(p),0);
    return due<=0 && received>0;
  };
  const activeCusts =filtCusts.filter(cn=>!isClearedCust(cn));
  const clearedCusts=filtCusts.filter(cn=> isClearedCust(cn));

  // 進行中（展開顯示）
  activeCusts.forEach(cn=>{ h+=renderCust(cn); });

  // 已結清（折疊收納）
  if(clearedCusts.length){
    const clearedOpen=!pifGroupClosed['sum_cleared_section'];
    const clearedTotal=clearedCusts.reduce((s,cn)=>s+allProd.filter(p=>custName(p)===cn).reduce((a,p)=>a+paidOf(p),0),0);
    const clearedInner=clearedOpen ? clearedCusts.map(cn=>renderCust(cn)).join('') : '';
    h+=`<div class="card" style="margin-bottom:10px;padding:0;overflow:hidden;border-color:var(--s)40">
      <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--s-bg);cursor:pointer" onclick="A.togglePifGroup('sum_cleared_section')">
        <span style="flex:1;min-width:0">
          <span class="nm" style="font-size:14px;color:var(--s)"><i class="ti ti-circle-check"></i> 已結清客戶</span>
          <span class="sub" style="font-size:12px;margin-left:8px">${clearedCusts.length} 家 · 已收 ${money(clearedTotal)}</span>
        </span>
        <i class="ti ti-chevron-${clearedOpen?'up':'down'}" style="color:var(--s);flex:none"></i>
      </div>
      ${clearedOpen?`<div style="padding:10px 12px;background:var(--surface)">${clearedInner}</div>`:''}
    </div>`;
  }

  if(!filtCusts.length){
    h+=`<div class="card faint" style="text-align:center;padding:24px">尚無收款記錄</div>`;
  }

  return h;
}

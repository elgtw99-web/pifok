  closeAddItems(){ view='app'; if(addTarget==='eloga') elgTab='data'; else custTab='submit'; render(); },
  clearDrafts(){ drafts=[]; save(); render(); A.toast('已清空草稿'); },
  syncSave(){ syncDrafts(); save(); },
  setAddMode(m){ syncDrafts(); addMode=m; render(); },
  setAddCust(v){ addCust=v; },
  recognizeText(){ syncDrafts(); const got=parseLines(dval('pastebox','')); if(!got.length){ A.toast('沒有辨識到品名'); return; } drafts=drafts.concat(got); render(); A.toast('辨識出 '+got.length+' 筆，請確認'); },
  photoRecognized(){ syncDrafts(); drafts.push({name:'（截圖辨識品名，請確認）',en:'',spec:'',qty:''}); render(); A.toast('已辨識 1 筆（示意），請確認'); },
  addManual(){ const g=id=>((document.getElementById(id)||{}).value||'').trim(); const n=g('mi_n'); if(!n){ A.toast('請填正確產品品名'); return; } syncDrafts(); drafts.push({name:n,alias:g('mi_alias'),en:g('mi_e'),spec:g('mi_s'),qty:g('mi_q')}); render(); A.toast('已加入待確認'); },
  rmDraft(i){ syncDrafts(); drafts.splice(i,1); render(); },
  commitDrafts(){
    syncDrafts(); if(!drafts.length){ A.toast('沒有可加入的品項'); return; }
    let uid=Date.now();
    drafts.forEach(d=>{
      const ty=inferType(d.name);
      const base={id:'n'+(uid++),name:d.name,alias:d.alias||'',en:d.en||'',spec:d.spec||'',qty:d.qty||'',amt:'',func:'',type:ty,t:defTests(ty)};
      if(addTarget==='eloga') Object.assign(base,{cust:addCust,status:'received',batch:'今日',invSel:true,feeSel:5000});
      else Object.assign(base,{cust:(me.nameCh||CUST),mine:(me.nameCh===CUST),status:'applied'});
      products.push(base);
    });
    const n=drafts.length; drafts=[]; view='app';
    if(addTarget==='eloga') elgTab='data'; else custTab='submit';
    render(); A.toast('已加入 '+n+' 筆');
  },
  pickElgRole(r){ elgRole=r; render(); },
  toggleGen(id){ const p=byId(id); if(p) p.genSel = (p.genSel===false); render(); },
  toggleVendor(v){ const its=products.filter(p=>p.status==='paid'&&custName(p)===v); const allSel=its.every(p=>p.genSel!==false); its.forEach(p=>p.genSel = allSel?false:true); render(); },
  go(t){ elgTab=t; confirmDel=null; render(); },
  goReceive(){ elgTab='receive'; render(); },
  openCust(nm){ custView=nm; batch={}; confirmDel=null; render(); },
  setStatus(id,st){ const p=byId(id); if(p) p.status=st; render(); },
  setField(id,f,v){ const p=byId(id); if(p){ p[f]=v; save(); } },
  toggleGrp(el){ const g=el.closest('.grp'); if(g) g.classList.toggle('collapsed'); },
  listSearch(v){ const scr=document.querySelector('.screen'); if(!scr) return; const q=(v||'').trim();
    scr.classList.toggle('searching', !!q);
    scr.querySelectorAll('.card[data-nm]').forEach(c=>{ c.style.display=(!q||(c.getAttribute('data-nm')||'').indexOf(q)>=0)?'':'none'; }); },
  toggleBatch(id){
    const wasConfirm = confirmDel!==null;
    batch[id]=!batch[id]; confirmDel=null;
    if(wasConfirm){ render(); return; }
    const cb=document.querySelector('[data-ckid="'+id+'"]');
    if(!cb){ render(); return; }
    cb.classList.toggle('on', !!batch[id]);
    const tr=cb.closest('tr'); if(tr) tr.classList.toggle('sel', !!batch[id]);
    refreshSelUI();
  },
  batchAll(nm){ const its=products.filter(p=>custName(p)===nm); const all=its.every(p=>batch[p.id]); its.forEach(p=>batch[p.id]=all?false:true); render(); },
  batchStatus(){ const st=(document.getElementById('batchSt')||{}).value; const ids=Object.keys(batch).filter(k=>batch[k]); if(!ids.length){ A.toast('請先勾選項目'); return; } ids.forEach(id=>{ const p=byId(id); if(p) p.status=st; }); A.toast('已將 '+ids.length+' 筆設為「'+SM[st][0]+'」'); render(); },
  batchGen(){ const ids=Object.keys(batch).filter(k=>batch[k]); const list=products.filter(p=>ids.includes(p.id)); if(!list.length){ A.toast('請先勾選項目'); return; } batch={}; A.exportSongyan(list); },
  setCustDriveByName(nm,v){ const c=customers.find(x=>x.name===nm); if(c){ c.drive=(v||'').trim(); if(!c.drive) c.driveAuth=false; save(); A.toast('已更新 PIF 資料夾連結'); render(); } },
  toggleCustAuth(nm){ const c=customers.find(x=>x.name===nm); if(!c) return; if(!c.drive){ A.toast('請先儲存資料夾連結'); return; } c.driveAuth=!c.driveAuth; save(); A.toast(c.driveAuth?('已授權 '+nm+' 存取雲端硬碟'):'已取消授權'); render(); },
  openCustDrive(nm){ const c=customers.find(x=>x.name===nm); if(c&&c.drive) window.open(c.drive,'_blank'); else A.toast('尚未設定連結'); },
  libToggleStat(k){ libStatOff[k]=!libStatOff[k]; render(); },
  libToggleCust(nm){ libCustOff[nm]=!libCustOff[nm]; render(); },
  libSearch(v){ libQ=v||''; document.querySelectorAll('table.dtable tbody tr[data-nm]').forEach(tr=>{ tr.style.display=(!libQ || (tr.getAttribute('data-nm')||'').indexOf(libQ)>=0)?'':'none'; }); },
  libAll(){ const rows=products.filter(p=> !libStatOff[p.status] && !libCustOff[custName(p)] && (!libQ||p.name.indexOf(libQ)>=0)); const all=rows.length&&rows.every(p=>batch[p.id]); rows.forEach(p=>batch[p.id]=all?false:true); render(); },
  libApply(){ const st=(document.getElementById('batchSt')||{}).value; const ids=Object.keys(batch).filter(k=>batch[k]); if(!ids.length){ A.toast('請先勾選樣品'); return; } ids.forEach(id=>{ const p=byId(id); if(p) p.status=st; }); save(); A.toast('已將 '+ids.length+' 筆設為「'+SM[st][0]+'」並同步到客戶狀態看板'); render(); },
  setLibImpCust(v){ libImpCust=v||''; },
  setLibImpStatus(v){ libImpStatus=v||'applied'; },
  _impCust(){ return libImpCust || [...new Set(products.map(p=>custName(p)))].concat(customers.map(c=>c.name)).filter(Boolean)[0] || CUST; },
  importPaste(){
    const txt=(document.getElementById('libPaste')||{}).value||'';
    const got=parseLines(txt);
    if(!got.length){ A.toast('未辨識到品名，請檢查貼上的文字'); return; }
    libDrafts=libDrafts.concat(got.map(g=>({name:g.name||'',spec:g.spec||'',qty:g.qty||'',en:g.en||'',cust:'',t:null}))); libImpStatus='applied';
    render(); A.toast('辨識 '+got.length+' 筆，請核對後確認匯入');
  },
  async importPhoto(input){
    const file=input&&input.files&&input.files[0]; if(!file) return;
    if(typeof Tesseract==='undefined'){ A.toast('辨識模型未載入，請檢查網路'); return; }
    ocrBusy=true; render();
    try{
      const res=await Tesseract.recognize(file,'chi_tra+eng');
      const got=parseLines((res&&res.data&&res.data.text)||'');
      if(got.length){ libDrafts=libDrafts.concat(got.map(g=>({name:g.name||'',spec:g.spec||'',qty:g.qty||'',en:g.en||'',cust:'',t:null}))); libImpStatus='applied'; A.toast('辨識 '+got.length+' 筆，請核對後確認匯入'); }
      else A.toast('未辨識到品名，請改用貼文字或手動');
    }catch(e){ A.toast('辨識失敗，請重試或改用手動'); }
    ocrBusy=false; render();
  },
  libDraftSet(i,f,v){ if(libDrafts[i]){ libDrafts[i][f]=v; save(); } },
  delProduct(id){
    if(confirmDel!==id){ confirmDel=id; render(); A.toast('再按一次垃圾桶以確認刪除'); return; }
    const i=products.findIndex(x=>x.id===id); if(i>=0) products.splice(i,1);
    delete batch[id]; confirmDel=null; save(); render(); A.toast('已刪除該樣品');
  },
  batchDelete(){
    const ids=Object.keys(batch).filter(k=>batch[k]); if(!ids.length){ A.toast('請先勾選要刪除的項目'); return; }
    if(confirmDel!=='batch'){ confirmDel='batch'; render(); A.toast('再按一次「刪除所選」以確認刪除 '+ids.length+' 筆'); return; }
    ids.forEach(id=>{ const i=products.findIndex(x=>x.id===id); if(i>=0) products.splice(i,1); });
    batch={}; confirmDel=null; save(); render(); A.toast('已刪除 '+ids.length+' 筆');
  },
  batchReassign(){
    const sel=(document.getElementById('batchCust')||{}).value; if(!sel){ A.toast('請選擇目標廠商'); return; }
    const ids=Object.keys(batch).filter(k=>batch[k]); if(!ids.length){ A.toast('請先勾選要轉移的項目'); return; }
    ids.forEach(id=>{ const p=byId(id); if(p){ if(sel===CUST){ p.cust=CUST; p.mine=true; } else { p.cust=sel; p.mine=false; } } });
    batch={}; save(); render(); A.toast('已將 '+ids.length+' 筆轉移到「'+sel+'」');
  },
  libDraftDel(i){ libDrafts.splice(i,1); render(); },
  libClearDrafts(){ libDrafts=[]; render(); A.toast('已清空待確認清單'); },
  libCommitDrafts(){
    const rows=libDrafts.filter(d=>(d.name||'').trim());
    if(!rows.length){ A.toast('沒有可匯入的品名'); return; }
    const uid=Date.now(); const cset=new Set();
    rows.forEach((g,i)=>{
      const cust=(g.cust||'').trim() || A._impCust();
      if(cust && cust!=='（未標客戶）' && !customers.find(c=>c.name===cust)) customers.push({name:cust,email:'',login:'匯入',status:'已啟用'});
      if(g.caddr) CINFO[cust]=g.caddr;
      cset.add(cust);
      const ty=inferType(g.name);
      products.push({id:'imp'+(uid+i),name:g.name.trim(),alias:'',en:g.en||'',spec:g.spec||'',qty:g.qty||'',type:ty,t:g.t||defTests(ty),cust,mine:cust===CUST,status:libImpStatus,batch:''});
    });
    libDrafts=[]; save(); render(); A.toast('已確認匯入 '+rows.length+' 筆 · '+cset.size+' 個客戶（'+SM[libImpStatus][0]+'）');
  },
  toggleDev(){ devOpen=!devOpen; render(); },
  devGo(which){
    devOpen=false;
    if(which==='customer'){ role='customer'; Object.assign(me,SAMPLE_ME); me.filled=true; custTab='submit'; view='app'; }
    else if(which==='customer2'){ role='customer'; Object.assign(me,SAMPLE_ME2); me.filled=true; custTab='submit'; view='app'; }
    else if(which==='admin'){ role='eloga'; elgRole='主要管理者'; zone='back'; elgTab='home'; view='app'; }
    else if(which==='manage'){ role='eloga'; elgRole='管理'; zone='back'; elgTab='home'; view='app'; }
    else if(which==='board'){ role='guest'; view='board'; }
    else { view='entry'; }
    render();
  },
  openBoard(){ role='guest'; view='board'; render(); },
  approveCust(i){ customers[i].status='已啟用'; render(); A.toast('已審核通過：'+customers[i].name); },
  disableCust(i){ customers[i].status='已停用'; render(); A.toast('已停用：'+customers[i].name); },
  enableCust(i){ customers[i].status='已啟用'; render(); A.toast('已重新啟用：'+customers[i].name); },
  delCustomer(i){
    const c=customers[i]; if(!c) return;
    if(confirmDel!=='ca'+i){ confirmDel='ca'+i; render(); A.toast('再按一次「刪除帳號」以確認刪除'); return; }
    const nm=c.name; customers.splice(i,1); confirmDel=null; save(); render();
    A.toast('已刪除客戶帳號：'+nm+'（其樣品仍保留，可在樣品庫處理）');
  },
  openCustAdd(){ custAddOpen=true; render(); },
  closeCustAdd(){ custAddOpen=false; render(); },
  addCustomer(){
    const nm=(dval('c_name','')||'').trim(); if(!nm){ A.toast('請輸入公司名'); return; }
    if(customers.find(c=>c.name===nm)){ A.toast('已有同名客戶'); return; }
    customers.push({name:nm, email:(dval('c_mail','')||'').trim(), login:dval('c_login','手動')||'手動', status:'已啟用'});
    custAddOpen=false; save(); render(); A.toast('已新增客戶：'+nm);
  },
  loginCustomer(provider){
    role='customer'; custTab='submit';
    if(!me.nameCh){ Object.assign(me, SAMPLE_ME); }
    if(!me.filled){ editingProfile=false; view='customer-profile'; } else { view='app'; }
    render(); A.toast(provider+' 登入成功');
  },
  editProfile(){ editingProfile=true; view='customer-profile'; render(); },
  profileBack(){ view = editingProfile? 'app' : 'customer-login'; render(); },
  saveProfile(){
    const g=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
    me.nameCh=g('m_nch')||me.nameCh; me.nameEn=g('m_nen'); me.addrCh=g('m_ach'); me.addrEn=g('m_aen'); me.phone=g('m_tel');
    me.filled=true; view='app'; custTab='submit'; render(); A.toast('廠商資料已儲存');
  },
  logout(){ view='entry'; render(); },
  openAccounts(){ view='eloga-accounts'; acctTab='staff'; addOpen=false; wipeOpen=false; render(); },
  openWipe(){ wipeOpen=true; render(); },
  cancelWipe(){ wipeOpen=false; render(); },
  doWipe(){
    const pw=((document.getElementById('wipe_pw')||{}).value||'').trim();
    if(pw!=='ELG2025'){ A.toast('密碼錯誤'); return; }
    products.length=0; customers.length=0; drafts=[]; dataPid=null;
    me={ nameCh:'', nameEn:'', addrCh:'', addrEn:'', phone:'', filled:false };
    try{ localStorage.removeItem('elg_state'); }catch(e){}
    wipeOpen=false; render(); A.toast('已清空所有資料');
  },
  closeAccounts(){ view='app'; render(); },
  acctTab(t){ acctTab=t; addOpen=false; custAddOpen=false; confirmDel=null; render(); },
  openAdd(){ addOpen=true; render(); },
  addStaff(){
    const g=id=>((document.getElementById(id)||{}).value||'').trim();
    const nm=g('s_name'), ml=g('s_mail'), rl=(document.getElementById('s_role')||{}).value||'管理';
    if(!nm||!ml){ A.toast('請填姓名與 Email'); return; }
    staff.push({name:nm,email:ml,role:rl}); addOpen=false; render(); A.toast('已建立內部帳號：'+rl);
  },
  addCustomer(){
    const g=id=>((document.getElementById(id)||{}).value||'').trim();
    const nm=g('c_name'), ml=g('c_mail');
    if(!nm){ A.toast('請填廠商名稱'); return; }
    customers.push({name:nm,email:ml,login:'—',status:'邀請中'}); addOpen=false; render(); A.toast('已建立客戶並寄出邀請');
  },
  setCustTab(t){ custTab=t; render(); },
  setElgTab(t){ elgTab=t; render(); },
  pickData(id){ dataPid=id; render(); },
  toggleTest(k){ const p=byId(dataPid); if(p){ p.t=p.t||{fang:true,chang:true,wen:false}; p.t[k]=!p.t[k]; } render(); },
  setType(id,v){ const p=byId(id); if(p){ p.type=v; p.t=defTests(v); } render(); },
  setAmt(id,v){ const p=byId(id); if(p) p.amt=v; save(); },
  setFunc(id,v){ const p=byId(id); if(p) p.func=v; save(); },
  openSharedPIF(){ view='shared-pif'; render(); },
  closeSharedPIF(){ view='app'; custTab='submit'; render(); },
  sharePIF(i){ const it=sharedPIF[i]; if(!it) return;
    products.push({id:'s'+Date.now(),name:it.name,alias:'',en:'',spec:'',qty:'',amt:'',func:'',type:it.type,t:defTests(it.type),cust:(me.nameCh||CUST),mine:(me.nameCh===CUST),status:'applied',shared:true});
    render(); A.toast('已共用至計劃：'+it.name); },
  async photoRecognized(input){
    const file=input&&input.files&&input.files[0]; if(!file) return;
    if(typeof Tesseract==='undefined'){ syncDrafts(); drafts.push({name:'（OCR 未載入，請手動填）',en:'',spec:'',qty:''}); render(); return; }
    ocrBusy=true; render();
    try{
      const res=await Tesseract.recognize(file,'chi_tra+eng');
      const got=parseLines((res&&res.data&&res.data.text)||'');
      syncDrafts();
      if(got.length) drafts=drafts.concat(got); else drafts.push({name:'（未辨識到品名，請手動填）',en:'',spec:'',qty:''});
      A.toast('辨識完成，'+got.length+' 筆');
    }catch(e){ syncDrafts(); drafts.push({name:'（辨識失敗，請手動填）',en:'',spec:'',qty:''}); A.toast('辨識失敗，請手動填'); }
    ocrBusy=false; render();
  },
  async importSongyan(input){
    const file=input&&input.files&&input.files[0]; if(!file) return;
    if(typeof ExcelJS==='undefined'){ A.toast('Excel 函式庫未載入'); return; }
    try{
      const wb=new ExcelJS.Workbook();
      await wb.xlsx.load(await file.arrayBuffer());
      const ws=wb.worksheets[0]; if(!ws){ A.toast('讀不到工作表'); return; }
      let lastCo='', n=0; const staged=[];
      ws.eachRow((row,rn)=>{
        if(rn===1) return;
        const name=cellText(row.getCell(2).value).trim();
        if(!name) return;
        const en=cellText(row.getCell(3).value).trim();
        const spec=cellText(row.getCell(4).value).trim();
        const qty=cellText(row.getCell(5).value).trim();
        const f=cellText(row.getCell(6).value).trim()==='V';
        const g=cellText(row.getCell(7).value).trim()==='V';
        const hh=cellText(row.getCell(8).value).trim()==='V';
        let co=cellText(row.getCell(9).value).trim(); if(co) lastCo=co; else co=lastCo;
        const cm=parseCompany(co);
        staged.push({name,en,spec,qty,cust:cm.cname||'',caddr:cm.caddr||'', t:(f||g||hh)?{fang:f,chang:g,wen:hh}:null});
        n++;
      });
      if(!n){ A.toast('Excel 沒有讀到樣品列'); return; }
      libDrafts=libDrafts.concat(staged); libImpStatus='testing';
      render(); A.toast('已讀取 '+n+' 筆，請於「待確認」核對後匯入');
    }catch(e){ A.toast('匯入失敗：檔案格式不符'); }
  },
  async exportSongyan(explicitList){
    if(typeof ExcelJS==='undefined'){ A.toast('Excel 函式庫載入中，請稍候再按'); return; }
    const list=(explicitList && explicitList.length ? explicitList.slice() : products.filter(p=>p.status==='paid' && p.genSel!==false))
                       .sort((a,b)=>custName(a).localeCompare(custName(b),'zh-Hant'));
    if(!list.length){ A.toast('請先勾選要送驗的項目'); return; }
    const FN='E.L.G INTERNATIONAL TRADING CO., LTD.';
    const FA='No. 600, Zhaixing 2nd St., Jiaxing Vil., Jiali Dist., Tainan City 722013, Taiwan (R.O.C.)';
    const thin={style:'thin'}, BD={top:thin,left:thin,right:thin,bottom:thin};
    const wb=new ExcelJS.Workbook(), ws=wb.addWorksheet('Sheet1');
    [7.3,40.9,60.7,17.4,10.4,11.1,11.1,11.1,54.1,9.0].forEach((w,i)=>ws.getColumn(i+1).width=w);
    const heads=['序号','样品名称','英文名稱','型号规格','数量','防腐效能測驗\n$350','常规9项\n$200','穩定性測試\n$350','公司資料'];
    const hr=ws.getRow(1);
    heads.forEach((t,i)=>{ const c=hr.getCell(i+1); c.value=t;
      c.font={name:i===8?'新細明體':'仿宋',size:i===8?11:14};
      c.alignment={horizontal:'center',vertical:'middle',wrapText:true}; });
    hr.height=64.5;
    let r=2;
    list.forEach((p,idx)=>{
      const t=p.t||{}, row=ws.getRow(r);
      row.getCell(1).value=idx+1; row.getCell(2).value=p.name; row.getCell(3).value=p.en||'';
      row.getCell(4).value=p.spec; row.getCell(5).value=p.qty;
      row.getCell(6).value=t.fang?'V':null; row.getCell(7).value=t.chang?'V':null; row.getCell(8).value=t.wen?'V':null;
      const amt=(t.fang?350:0)+(t.chang?200:0)+(t.wen?350:0);
      row.getCell(10).value={formula:`IF(F${r}="V",350,0)+IF(G${r}="V",200,0)+IF(H${r}="V",350,0)`,result:amt};
      row.getCell(1).font={name:'新細明體',size:11}; row.getCell(1).alignment={horizontal:'center',vertical:'middle'};
      row.getCell(2).font={name:'新細明體',size:12}; row.getCell(2).alignment={vertical:'middle'};
      row.getCell(3).font={name:'新細明體',size:11}; row.getCell(3).alignment={vertical:'middle'};
      [4,5,6,7,8,10].forEach(c=>{ row.getCell(c).font={name:'新細明體',size:11}; row.getCell(c).alignment={horizontal:'center',vertical:'middle'}; });
      row.height=16.5; r++;
    });
    const last=r-1;
    let s=2;
    for(let i=2;i<=last+1;i++){
      const cur=i<=last?custName(list[i-2]):null, prev=custName(list[s-2]);
      if(cur!==prev){
        const e=i-1, pp=list[s-2], ic=ws.getCell(`I${s}`);
        ic.value=`公司名称：${custName(pp)}\n公司地址：${custAddr(pp)}\n工厂名称：${FN}\n工厂地址：${FA}`;
        ic.font={name:'新細明體',size:11}; ic.alignment={vertical:'middle',wrapText:true};
        if(e>s) ws.mergeCells(`I${s}:I${e}`);
        const n=e-s+1; if(n*16.5<66) ws.getRow(s).height=66-16.5*(n-1);
        s=i;
      }
    }
    const tr=last+1, cnt=k=>list.filter(p=>(p.t||{})[k]).length;
    ws.getCell(`F${tr}`).value={formula:`COUNTIF(F2:F${last},"V")*350`,result:cnt('fang')*350};
    ws.getCell(`G${tr}`).value={formula:`COUNTIF(G2:G${last},"V")*200`,result:cnt('chang')*200};
    ws.getCell(`H${tr}`).value={formula:`COUNTIF(H2:H${last},"V")*350`,result:cnt('wen')*350};
    const grand=cnt('fang')*350+cnt('chang')*200+cnt('wen')*350;
    ws.getCell(`I${tr}`).value={formula:`"共"&SUM(J2:J${last})&"元"`,result:`共${grand}元`};
    [6,7,8].forEach(c=>{ const cell=ws.getRow(tr).getCell(c); cell.font={name:'新細明體',size:11}; cell.alignment={horizontal:'center',vertical:'middle'}; });
    ws.getCell(`I${tr}`).font={name:'新細明體',size:11}; ws.getCell(`I${tr}`).alignment={vertical:'middle',wrapText:true};
    for(let row=1;row<=tr;row++) for(let col=1;col<=10;col++) ws.getRow(row).getCell(col).border=BD;
    ws.views=[{state:'frozen',ySplit:1}];
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob), a=document.createElement('a');
    a.href=url; a.download='送驗清單.xlsx'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    const ah=agreementHTML(list);
    const ab=new Blob(['\ufeff'+ah],{type:'application/msword'});
    const au=URL.createObjectURL(ab), aa=document.createElement('a');
    aa.href=au; aa.download='合作協議.doc'; document.body.appendChild(aa); aa.click(); aa.remove(); URL.revokeObjectURL(au);
    list.forEach(p=>{ p.status='testing'; delete p.genSel; });
    const vd=[...new Set(list.map(p=>custName(p)))].length;
    render(); A.toast('已生成合作協議＋樣品清單（'+vd+' 家廠商 · '+list.length+' 筆），轉為送驗中');
  },
  toggleShip(id){ const p=byId(id); p.shipSel=!p.shipSel; render(); },
  deleteMyProduct(id){
    const p=byId(id); if(!p||!ownedByMe(p)) return;
    if(p.status!=='applied'){ A.toast('已確認項目請改用「申請撤銷」'); return; }
    const i=products.findIndex(x=>x.id===id); if(i>=0) products.splice(i,1);
    render(); A.toast('已撤銷並刪除');
  },
  requestCancel(id){ const p=byId(id); if(!p) return; if(['testing','reporting','completed'].includes(p.status)){ A.toast('已進入送驗，無法撤銷（如需暫停請洽依洛嘉）'); return; } p.cancelReq=true; render(); A.toast('已送出撤銷申請，待依洛嘉同意'); },
  togglePause(id){ const p=byId(id); if(p){ p.paused=!p.paused; if(p.paused) delete p.cancelReq; save(); render(); A.toast(p.paused?'已暫停此樣品（不退款）':'已恢復此樣品'); } },
  undoCancelReq(id){ const p=byId(id); if(p){ delete p.cancelReq; } render(); A.toast('已取消撤銷申請'); },
  approveCancel(id){ const i=products.findIndex(x=>x.id===id); if(i>=0) products.splice(i,1); render(); A.toast('已同意撤銷並移除'); },
  rejectCancel(id){ const p=byId(id); if(p){ delete p.cancelReq; } render(); A.toast('已駁回撤銷申請'); },
  toggleInv(id){ const p=byId(id); p.invSel=!p.invSel; render(); },
  setFee(id,v){ byId(id).feeSel=v; render(); },
  toggleSelClass(){},

  arrange(){
    const sel=products.filter(p=>ownedByMe(p) && (p.status==='approved'||p.status==='pending') && p.shipSel);
    if(!sel.length) return;
    sel.forEach(p=>{ p.status='shipped'; p.shipSel=false; });
    render(); A.toast(`已安排寄送 ${sel.length} 項，清單已送依洛嘉前臺收件`);
  },
  allowShip(id){ const p=byId(id); if(p){ p.status='approved'; p.shipSel=true; } render(); A.toast('已確認允許寄送，回送客戶端'); },
  openMyFolder(){ const c=customers.find(x=>x.name===me.nameCh); if(c&&c.drive&&c.driveAuth) window.open(c.drive,'_blank'); else A.toast(c&&c.drive&&!c.driveAuth?'依洛嘉尚未授權存取你的 PIF 雲端資料夾':'依洛嘉尚未提供你的 PIF 雲端資料夾連結'); },
  setCustDrive(i,v){ if(customers[i]){ customers[i].drive=(v||'').trim(); save(); A.toast('已更新客戶 PIF 資料夾連結'); } },
  receive(id){ const p=byId(id); if(p){ p.status='received'; if(p.invSel===undefined)p.invSel=true; if(!p.feeSel)p.feeSel=5000; } render(); A.toast('已收樣，可到「請款」開收款單'); },
  issueInvoiceFor(cn){
    const sel=P('received').filter(p=>custName(p)===cn && p.invSel);
    if(!sel.length){ A.toast('請先勾選 '+cn+' 的樣品'); return; }
    sel.forEach(p=>{ p.status='invoiced'; p.charge=p.feeSel; });
    render(); A.toast('已開收款單給 '+cn+'（'+sel.length+' 項），回送該客戶');
  },
  toggleContract(i){ const c=customers[i]; if(!c) return; c.contract=!c.contract; if(c.contract && c.balance===undefined) c.balance=0; save(); render(); A.toast(c.contract?(c.name+' 已設為合約制'):(c.name+' 已取消合約制')); },
  setBalance(i){ const c=customers[i]; if(!c) return; const v=Number((dval('bal_'+i,'')||'').replace(/[^0-9.-]/g,'')); if(isNaN(v)){ A.toast('請輸入金額'); return; } c.balance=v; c.contract=true; save(); render(); A.toast(c.name+' 合約餘額設為 '+money(v)); },
  settleByContract(cn){
    const c=customers.find(x=>x.name===cn); if(!c){ A.toast('找不到客戶'); return; }
    const items=P('received').filter(p=>custName(p)===cn && p.invSel);
    if(!items.length){ A.toast('請先勾選 '+cn+' 的樣品'); return; }
    let bal=c.balance||0, deducted=0, dN=0, invN=0;
    c.ledger=c.ledger||[]; const ds=new Date().toLocaleDateString('zh-TW');
    items.forEach(p=>{
      const fee=p.feeSel||0; p.charge=fee;
      if(bal>=fee){ bal-=fee; deducted+=fee; dN++; p.status='paid'; p.paidVia='contract'; c.ledger.unshift({t:ds,name:p.name,amt:fee,bal:bal}); }
      else { p.status='invoiced'; invN++; }
    });
    c.balance=bal; save(); render();
    A.toast(`合約扣款 ${dN} 筆共 ${money(deducted)}，餘額 ${money(bal)}`+(invN?`；${invN} 筆餘額不足已改開收款單`:''));
  },
  reportPay(batch){
    const note=((document.getElementById('pn_'+batch)||{}).value||'').trim();
    if(!note){ A.toast('請填匯款末五碼或匯款人姓名'); return; }
    products.filter(p=>ownedByMe(p) && p.status==='invoiced' && p.batch===batch).forEach(p=>{ p.status='reported'; p.payNote=note; });
    render(); A.toast('已回報匯款（'+note+'），依洛嘉查帳中');
  },
  confirmPay(id){ const p=byId(id); if(p) p.status='paid'; render(); A.toast('已確認收到貨款，待生成送驗合約'); },
  receiveReport(id){ const p=byId(id); if(p) p.status='reporting'; render(); A.toast('已收到檢驗報告，轉 PIF 製作中'); },
  complete(id){
    const el=document.getElementById('dl_'+id);
    const p=byId(id); const c=customers.find(x=>x.name===custName(p));
    p.drive=(el&&el.value.trim())||(c&&c.drive)||'https://drive.google.com';
    p.status='completed';
    render(); A.toast('已標記完成 PIF，客戶端可下載');
  },
  openDrive(id){ const p=byId(id); const c=customers.find(x=>x.name===custName(p)); const url=p.drive||(c&&c.drive); if(url) window.open(url,'_blank'); else A.toast('尚未設定雲端硬碟連結'); },

  _tt:null,
  toast(msg){
    const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
    clearTimeout(A._tt); A._tt=setTimeout(()=>t.classList.remove('show'),2200);
  }
};
window.A=A;
load();
render();
</script>

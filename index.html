<style>

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{

  .brand h1{ margin:0;font-size:23px;font-weight:700;letter-spacing:-.01em; }
  .brand p{ margin:6px 0 0; }
  .entrycard{ display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--surface);

  .ec-ic{ width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex:none; }
  .ec-t{ flex:1;display:flex;flex-direction:column; } .ec-t .sub{ margin-top:2px; }
  .back{ background:transparent;border:0;color:var(--muted);font-size:15px;font-weight:600;font-family:inherit;

  .back i{ font-size:19px; }
  .logintop{ text-align:center;margin:22px 0 26px; } .logintop h2{ margin:0;font-size:21px;font-weight:700; }

  .linebtn{ background:#06C755; }
  .iconbtn{ background:transparent;border:0;color:var(--faint);cursor:pointer;padding:0;display:flex;font-family:inherit; }

  .ztog{ display:inline-flex; gap:3px; background:var(--n-bg); border-radius:11px; padding:3px; }

async function aiEnName(name, type){
  const key=getApiKey();
  if(!key) throw new Error('no_key');
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body:JSON.stringify({
      model:"claude-sonnet-4-5",
      max_tokens:60,
      messages:[{role:"user",content:`You are a cosmetics product naming expert. Translate the following Chinese cosmetic product name into a natural, professional English name suitable for inspection reports and product labels. Reply ONLY with the English name itself—no quotes, no explanation, no punctuation at the start.\nProduct type: ${type||'cosmetic'}\nChinese name: ${name}`}]
    })
  });
  if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||'api_error'); }
  const data=await res.json();
  const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
  return txt.replace(/^["'「」\s]+|["'「」\s]+$/g,'').trim();
}
function cellText(v){
  if(v===null||v===undefined) return '';
  if(typeof v==='object'){
    if(Array.isArray(v.richText)) return v.richText.map(t=>t.text).join('');
    if(v.text!==undefined) return ''+v.text;
    if(v.result!==undefined) return ''+v.result;
    if(v.formula!==undefined) return '';
    return '';
  }
  return ''+v;
}

function custScreen(){
  if(custTab==='submit') return custSubmit();
  if(custTab==='billing') return custBilling();
  if(custTab==='news') return custShowcase();
  return custBoard();
}
function custSubmit(){
  const applied = products.filter(p=>ownedByMe(p) && p.status==='applied');
  const approved = products.filter(p=>ownedByMe(p) && (p.status==='approved'||p.status==='pending'));
  const prog = products.filter(p=>ownedByMe(p) && ['shipped','received','invoiced','reported','paid','testing','reporting'].includes(p.status));
  const n = approved.filter(p=>p.shipSel).length;
  const myc = customers.find(c=>c.name===me.nameCh);
  let h = `<div class="lnk" onclick="A.editProfile()" style="margin-bottom:10px">
      <span class="l"><i class="ti ti-building-store lead"></i>
      <span><span class="nm">廠商資料 · 已填</span><br><span class="sub">${me.nameCh} · ${me.addrCh||''}</span></span></span>
      <span class="muted" style="font-size:13px;font-weight:600">編輯</span></div>`;
  h += `<div class="lnk" onclick="A.openSharedPIF()" style="margin-bottom:10px">
      <span class="l"><i class="ti ti-files lead"></i>
      <span><span class="nm">依洛嘉 PIF 共用清單</span><br><span class="sub">可共用 ${sharedPIF.filter(it=>shareState(it)==='public').length} 項</span></span></span>
      <i class="ti ti-chevron-right faint" style="font-size:20px"></i></div>`;
  h += `<div class="lnk" onclick="A.openMyFolder()">
      <span class="l"><i class="ti ti-cloud lead"></i>
      <span><span class="nm">我的 PIF 雲端資料夾</span><br><span class="sub">${(myc&&myc.drive&&myc.driveAuth)?'由依洛嘉提供，點擊開啟':(myc&&myc.drive?'依洛嘉尚未授權存取':'依洛嘉尚未提供連結')}</span></span></span>
      <i class="ti ti-external-link faint" style="font-size:18px"></i></div>`;

  h += `<div class="row sect mt"><span>我要送驗的產品</span><span class="muted" style="font-size:13px;font-weight:600;cursor:pointer" onclick="A.openAddItems('customer')">+ 新增送驗產品</span></div>`;

  if(drafts.length && addTarget==='customer'){
    h += `<div class="lnk" onclick="A.openAddItems('customer')" style="border-color:var(--w);margin-bottom:10px">
        <span class="l"><i class="ti ti-edit lead" style="color:var(--w)"></i>
        <span><span class="nm">未完成草稿（${drafts.length} 筆）</span><br><span class="sub">已自動暫存，點此繼續填寫</span></span></span>
        <span class="pill pill--w">繼續</span></div>`;
  }

  if(applied.length){
    h += `<div class="faint" style="font-size:13px;margin:0 0 8px">申請中（待依洛嘉確認 · 可自行撤銷）</div><div class="stack">`+ applied.map(p=>`
      <div class="card compact"><div class="row"><span><span class="nm" style="font-size:14px">${p.name}</span>${p.alias?`<br><span class="sub">別名：${p.alias}</span>`:''}</span>${pill(p.status)}</div>
        <button class="btn btn--ghost btn--sm" style="margin-top:10px;color:#C0392B;border-color:#E7C3BD" onclick="A.deleteMyProduct('${p.id}')"><i class="ti ti-trash"></i> 撤銷並刪除</button>
      </div>`).join('')+`</div>`;
  }
  if(approved.length){
    h += `<div class="row" style="margin:14px 0 8px"><span class="faint" style="font-size:13px">可寄送（依洛嘉已允許 · 勾選後安排寄送）</span>
        <span class="muted" style="font-size:12px;font-weight:600;cursor:pointer" onclick="A.shipAll()">${approved.every(p=>p.shipSel)?'全不選':'全選'}</span></div><div class="stack">`+ approved.map(p=>`
      <div class="card compact">
        <div class="selrow ${p.shipSel?'on':''}" style="border:0;padding:0" onclick="A.toggleShip('${p.id}')">
          <span class="ck"><i class="ti ti-check"></i></span>
          <span style="flex:1"><span class="nm" style="font-size:14px">${p.name}</span><br><span class="sub">${p.alias?'別名：'+p.alias+' · ':''}${p.spec} · ${p.qty}</span></span>
        </div>
        ${p.cancelReq
          ? `<div class="sub" style="margin-top:8px;color:var(--w)"><i class="ti ti-clock"></i> 撤銷申請中，待依洛嘉同意 · <span style="cursor:pointer;text-decoration:underline" onclick="A.undoCancelReq('${p.id}')">取消申請</span></div>`
          : `<button class="btn btn--ghost btn--sm" style="margin-top:8px" onclick="A.requestCancel('${p.id}')"><i class="ti ti-ban"></i> 申請撤銷</button>`}
      </div>`).join('') + `</div>`;
    h += `<div class="addr" style="margin-top:12px"><div class="t">寄送至</div><div class="a">${ADDR}</div><div class="a" style="margin-top:2px">電話 ${ELG_TEL}</div></div>`;
    h += `<button class="btn" style="margin-top:10px" ${n?'':'disabled'} onclick="A.arrange()">
            <i class="ti ti-truck-delivery"></i> 安排寄送（${n}）</button>`;
  }
  if(!applied.length && !approved.length){
    h += `<div class="card faint" style="text-align:center;padding:22px">尚無待處理的送驗產品</div>`;
  }

  h += `<div class="sect mt">進行中</div>`;
  if(prog.length){
    const porder=['shipped','received','invoiced','reported','paid','testing','reporting','completed'];
    const cancelable=['shipped','received','invoiced','reported','paid'];
    const present=porder.filter(k=>prog.some(p=>p.status===k));
    h += srchBar('搜尋進行中品名…');
    h += present.map(k=>{
      const grp=prog.filter(p=>p.status===k);
      const canCancel=cancelable.includes(k);
      const body=`<div class="stack">`+ grp.map(p=>{
        let right;
        if(p.paused) right=`<span class="pill pill--n" style="font-size:11px"><i class="ti ti-player-pause"></i> 已暫停</span>`;
        else if(canCancel) right = p.cancelReq
            ? `<span class="sub" style="color:var(--w);white-space:nowrap"><i class="ti ti-clock"></i> 撤銷申請中 · <span style="cursor:pointer;text-decoration:underline" onclick="A.undoCancelReq('${p.id}')">取消</span></span>`
            : `<span class="sub" style="color:#C0392B;cursor:pointer;white-space:nowrap" onclick="A.requestCancel('${p.id}')"><i class="ti ti-ban"></i> 申請撤銷</span>`;
        else right=`<span class="sub faint" style="white-space:nowrap">送驗中不可撤銷</span>`;
        return `<div class="card compact" data-nm="${p.name}"><div class="row" style="align-items:center;gap:10px">
            <span class="nm" style="font-size:14px;flex:1">${p.name}</span>${right}</div></div>`;
      }).join('')+`</div>`;
      return collGroup(SM[k][1], SM[k][0], grp.length, body);
    }).join('');
  } else {
    h += `<div class="empty"><i class="ti ti-progress"></i>還沒有進行中的樣品</div>`;
  }
  return h;
}
function custBilling(){
  const inv = products.filter(p=>ownedByMe(p) && p.status==='invoiced');
  const batches=[...new Set(inv.map(p=>p.batch))];
  let h = ``;
  const myc=customers.find(c=>c.name===me.nameCh);
  if(myc && myc.contract){
    const led=(myc.ledger||[]).slice(0,8);
    h += `<div class="card" style="border-color:var(--s)">
        <div class="row"><span class="nm"><i class="ti ti-wallet"></i> 合約預付餘額</span><span class="amt" style="color:var(--s)">${money(myc.balance||0)}</span></div>
        <div class="sub" style="margin-top:4px">送驗檢驗費會自動從此餘額扣除，餘額不足的品項才會另開收款單。</div>
        ${led.length?`<div style="margin-top:10px;border-top:1px solid var(--line);padding-top:8px">
          <div class="sub" style="margin-bottom:4px">近期扣款</div>
          ${led.map(e=>`<div class="miniline"><span>${e.t} · ${e.name}</span><span>-${money(e.amt)} · 餘 ${money(e.bal)}</span></div>`).join('')}
        </div>`:''}
      </div>`;
  }
  h += `<div class="sect${myc&&myc.contract?' mt':''}">待匯款</div>`;
  if(batches.length){
    h += batches.map(b=>{
      const items=inv.filter(p=>p.batch===b);
      const tot=items.reduce((s,p)=>s+p.charge,0);
      return `<div class="card" style="border-color:var(--w)">
        <div class="row"><span class="nm">${b} 收款單</span><span class="pill pill--w">待匯款</span></div>
        <div class="sub" style="margin-bottom:8px">${items.length} 項樣品</div>
        ${items.map(p=>`<div class="miniline"><span>${p.name}</span><span>${money(p.charge)}</span></div>`).join('')}
        <div class="total"><span class="muted">整批合計</span><span class="amt">${money(tot)}</span></div>
        <label class="lbl" style="margin-top:12px">匯款末五碼 或 匯款人姓名</label>
        <input class="fld" id="pn_${b}" placeholder="例：12345 或 王小明">
        <button class="btn" style="margin-top:10px" onclick="A.reportPay('${b}')"><i class="ti ti-check"></i> 匯款回報</button>
      </div>`;
    }).join('');
  } else {
    h += `<div class="card faint" style="text-align:center;padding:22px">目前沒有待匯款的批次</div>`;
  }
  const recent = products.filter(p=>ownedByMe(p) && ['reported','paid','testing','reporting','completed'].includes(p.status));
  h += `<div class="sect mt">近期批次</div>`;
  if(recent.length){
    h += srchBar('搜尋批次品名…');
    const rorder=['reported','paid','testing','reporting','completed'];
    const present=rorder.filter(k=>recent.some(p=>p.status===k));
    h += present.map(k=>{
      const grp=recent.filter(p=>p.status===k);
      const body=`<div class="stack">`+ grp.map(p=>`
        <div class="card compact row" data-nm="${p.name}"><span><span class="nm" style="font-size:13.5px">${p.name}</span><br>
          <span class="sub">${p.batch||''} 批次 · ${p.pifPlanLabel?p.pifPlanLabel+'　':''}${money(p.charge||0)}</span></span>
        ${p.status==='completed'?`<button class="btn btn--ghost btn--sm" style="width:auto;padding:0 12px" onclick="A.openDrive('${p.id}')"><i class="ti ti-download"></i> PIF</button>`:''}</div>`).join('')+`</div>`;
      return collGroup(SM[k][1], SM[k][0], grp.length, body);
    }).join('');
  } else {
    h += `<div class="empty"><i class="ti ti-history"></i>尚無紀錄</div>`;
  }
  return h;
}
function custBoard(){
  const mine=products.filter(p=>ownedByMe(p));
  const myc=customers.find(c=>c.name===me.nameCh);
  const cnt=st=>mine.filter(p=>p.status===st).length;
  const grp=st=>mine.filter(p=>p.status===st);
  const total=mine.length;

  // 階段定義：對齊依洛嘉動作
  const phases=[
    { title:'申請與寄送', icon:'truck-delivery', statuses:[
      {id:'applied',  label:'等待確認中',   who:'依洛嘉確認允許寄送', color:'var(--w)', ic:'clock'},
      {id:'approved', label:'可寄送',       who:'請備樣寄出到依洛嘉', color:'var(--accent)', ic:'package-export'},
      {id:'shipped',  label:'已寄出',       who:'依洛嘉收件中',       color:'var(--accent)', ic:'truck'},
    ]},
    { title:'收款流程', icon:'receipt-2', statuses:[
      {id:'received', label:'依洛嘉已收樣', who:'依洛嘉開收款單中',   color:'var(--accent)', ic:'inbox'},
      {id:'invoiced', label:'收到收款單',   who:'請匯款並回報',       color:'var(--w)', ic:'cash'},
      {id:'reported', label:'已回報匯款',   who:'依洛嘉查帳中',       color:'var(--accent)', ic:'search'},
    ]},
    { title:'送驗與製作', icon:'flask', statuses:[
      {id:'paid',      label:'已確認收款', who:'依洛嘉安排送驗',      color:'var(--accent)', ic:'check'},
      {id:'testing',   label:'送驗中',     who:'檢測中心檢測進行中',  color:'var(--accent)', ic:'flask'},
      {id:'reporting', label:'PIF 製作中', who:'依洛嘉製作 PIF 報告', color:'var(--accent)', ic:'file-text'},
    ]},
    { title:'已完成', icon:'circle-check', statuses:[
      {id:'completed', label:'已完成 PIF', who:'可到雲端資料夾下載',  color:'var(--s)', ic:'download'},
    ]},
  ];

  let h='';

  // 總覽統計
  const activeN=mine.filter(p=>p.status!=='completed').length;
  const doneN=cnt('completed');
  h+=`<div class="dash" style="margin-bottom:16px">
    <div class="metric"><div class="mi" style="background:var(--accent-tint);color:var(--accent)"><i class="ti ti-list-check"></i></div><div class="mv">${total}</div><div class="ml">全部品項</div></div>
    <div class="metric"><div class="mi" style="background:var(--w-bg);color:var(--w)"><i class="ti ti-loader"></i></div><div class="mv">${activeN}</div><div class="ml">進行中</div></div>
    <div class="metric"><div class="mi" style="background:var(--s-bg);color:var(--s)"><i class="ti ti-circle-check"></i></div><div class="mv">${doneN}</div><div class="ml">已完成</div></div>
  </div>`;

  // 雲端資料夾
  h+=`<div class="lnk" onclick="A.openMyFolder()" style="margin-bottom:16px">
    <span class="l"><i class="ti ti-cloud lead"></i>
    <span><span class="nm">我的 PIF 雲端資料夾</span><br><span class="sub">${(myc&&myc.drive&&myc.driveAuth)?'點此開啟下載 PIF':(myc&&myc.drive?'依洛嘉尚未授權存取':'依洛嘉尚未提供連結')}</span></span></span>
    <i class="ti ti-external-link faint" style="font-size:18px"></i></div>`;

  // 搜尋
  if(mine.length>5) h+=srchBar('搜尋我的產品…');

  // 各階段流程
  phases.forEach(phase=>{
    const phaseItems=phase.statuses.flatMap(s=>grp(s.id));
    if(!phaseItems.length) return; // 沒品項的階段不顯示

    h+=`<div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <i class="ti ti-${phase.icon}" style="font-size:18px;color:var(--accent)"></i>
        <span class="nm" style="font-size:15px">${phase.title}</span>
        <span class="sub" style="font-size:12px">${phaseItems.length} 筆</span>
      </div>`;

    phase.statuses.forEach(st=>{
      const items=grp(st.id);
      if(!items.length) return;

      h+=`<div class="card" style="margin-bottom:8px;border-left:4px solid ${st.color};padding:12px 14px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:${items.length>0?'8':'0'}px">
          <i class="ti ti-${st.ic}" style="color:${st.color};font-size:18px;flex:none"></i>
          <span style="flex:1">
            <span class="nm" style="font-size:13.5px">${st.label}</span>
            <span class="pill" style="font-size:10px;margin-left:6px;background:${st.color}15;color:${st.color};border:1px solid ${st.color}40">${items.length}</span>
            <br><span class="sub" style="font-size:11.5px;color:var(--muted)">${st.who}</span>
          </span>
        </div>
        ${items.map(p=>`
          <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--line);margin-left:26px" data-nm="${p.name}">
            <span style="flex:1;min-width:0">
              <span style="font-size:13px;font-weight:600">${p.name}</span>
              ${p.alias?`<span class="sub" style="margin-left:4px;font-size:11px">（${p.alias}）</span>`:''}

            </span>

            ${st.id==='completed'?`<button class="btn btn--ghost btn--sm" style="width:auto;padding:0 10px;font-size:12px" onclick="A.openDrive('${p.id}')"><i class="ti ti-download"></i> PIF</button>`:''}
          </div>`).join('')}
      </div>`;
    });

    h+=`</div>`;
  });

  if(!mine.length){
    h+=`<div class="empty"><i class="ti ti-clipboard"></i>還沒有產品，請到「送驗」新增</div>`;
  }

  // 可共用 PIF
  h+=`<div style="margin-top:20px;padding-top:16px;border-top:2px solid var(--line)">
    <div class="sect">依洛嘉可共用的 PIF 產品</div>`;
  const pubS=sharedPIF.filter(it=>shareState(it)==='public');
  if(pubS.length){
    h+=`<div class="stack">`+pubS.map((it,i)=>`
      <div class="card compact row" data-nm="${it.name}"><span><span class="nm" style="font-size:13.5px">${it.name}</span><br><span class="sub">${it.type} · 已有 PIF</span></span>
        <button class="btn btn--ok btn--sm" style="width:auto;padding:0 14px" onclick="A.sharePIF(${sharedPIF.indexOf(it)})">共用</button></div>`).join('')+`</div>`;
  } else {
    h+=`<div class="card faint" style="text-align:center;padding:14px">目前沒有可共用的 PIF</div>`;
  }
  const bldS=sharedPIF.filter(it=>shareState(it)==='building');
  if(bldS.length){
    h+=`<div class="stack" style="margin-top:8px">`+bldS.map(it=>`
      <div class="card compact row" data-nm="${it.name}"><span><span class="nm" style="font-size:13.5px">${it.name}</span><br><span class="sub">${it.type} · PIF 建置中</span></span>
        <span class="pill pill--w" style="font-size:11px">建置中</span></div>`).join('')+`</div>`;
  }
  h+=`</div>`;
  h+=`<div class="faint" style="font-size:12px;margin-top:12px"><i class="ti ti-lock"></i> 只顯示你自己的產品，看不到其他客戶資料。</div>`;
  return h;
}

function scGrid(admin){
  const PER=6, q=scQ.trim().toLowerCase();
  const items=showcase.filter(it=>!q || (it.name+' '+(it.en||'')+' '+(it.tagline||'')).toLowerCase().includes(q));
  const pages=Math.max(1,Math.ceil(items.length/PER));
  if(scPage>=pages) scPage=pages-1; if(scPage<0) scPage=0;
  const slice=items.slice(scPage*PER,scPage*PER+PER);
  let h=`<div style="position:relative;margin-bottom:12px"><i class="ti ti-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--faint)"></i>
    <input class="fld" style="padding-left:36px" value="${scQ.replace(/"/g,'&quot;')}" placeholder="搜尋新品（名稱／英文／介紹）· 輸入後按 Enter" onchange="A.scSearch(this.value)"></div>`;
  h+= items.length ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">`+slice.map(it=>scCard(it,admin)).join('')+`</div>`
    : `<div class="card faint" style="text-align:center;padding:20px">${q?'找不到符合的新品':'尚無新品介紹'}</div>`;
  if(pages>1){
    h+=`<div class="row" style="justify-content:center;gap:14px;margin-top:14px">
      <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 12px" ${scPage===0?'disabled':''} onclick="A.scGo(${scPage-1})"><i class="ti ti-chevron-left"></i></button>

      <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 12px" ${scPage>=pages-1?'disabled':''} onclick="A.scGo(${scPage+1})"><i class="ti ti-chevron-right"></i></button>

  return h;
}

function elgSummary(){
  // 統計
  const allPaidP=products.filter(p=>p.payRecords&&p.payRecords.length);
  const total=allPaidP.reduce((s,p)=>(p.payRecords||[]).reduce((a,r)=>a+r.amt,s),0);
  const totalCharge=products.filter(p=>p.charge>0&&['completed','testing','reporting'].includes(p.status)).reduce((s,p)=>s+(p.charge||0),0);
  const totalDiff=totalCharge-total;
  const byMethod={};
  allPaidP.forEach(p=>(p.payRecords||[]).forEach(r=>{ byMethod[r.method]=(byMethod[r.method]||0)+r.amt; }));

  // 搜尋狀態
  const sumQ=(libQ||'').trim().toLowerCase();

  let h=``;

  // 頂部統計
  h+=`<div class="dash" style="margin-bottom:14px">
    <div class="metric"><div class="mi" style="background:var(--s-bg);color:var(--s)"><i class="ti ti-cash"></i></div><div class="mv">${money(total)}</div><div class="ml">已收總計</div></div>
    <div class="metric"><div class="mi" style="background:var(--w-bg);color:var(--w)"><i class="ti ti-receipt"></i></div><div class="mv">${money(totalCharge)}</div><div class="ml">應收總計</div></div>
    <div class="metric"><div class="mi"><i class="ti ti-coin"></i></div><div class="mv" style="color:${totalDiff>0?'var(--w)':'var(--s)'}">${money(Math.abs(totalDiff))}</div><div class="ml">${totalDiff>0?'未收差額':'全部結清'}</div></div>
    ${Object.keys(byMethod).map(m=>`<div class="metric"><div class="mi"><i class="ti ti-${m==='匯款'?'building-bank':m==='合約扣款'?'file-invoice':m==='信用卡'?'credit-card':'coins'}"></i></div><div class="mv" style="font-size:14px">${money(byMethod[m])}</div><div class="ml">${m}</div></div>`).join('')}
  </div>`;

  h+=srchBar('搜尋客戶或品名…');

  // 依客戶分組
  const allCusts=[...new Set(products.filter(p=>p.charge>0).map(p=>custName(p)))].sort();
  const filtCusts=sumQ ? allCusts.filter(cn=>cn.toLowerCase().includes(sumQ)||products.some(p=>custName(p)===cn&&p.name.toLowerCase().includes(sumQ))) : allCusts;

  h+=filtCusts.map(cn=>{
    const custProd=products.filter(p=>custName(p)===cn&&p.charge>0&&(!sumQ||p.name.toLowerCase().includes(sumQ)||cn.toLowerCase().includes(sumQ)));
    if(!custProd.length) return '';
    const custCharge=custProd.reduce((s,p)=>s+(p.charge||0),0);
    const custPaid=custProd.reduce((s,p)=>(p.payRecords||[]).reduce((a,r)=>a+r.amt,s),0);
    const diff=custCharge-custPaid;
    const allCleared=diff===0&&custPaid>0;
    const open=!pifGroupClosed['sum_'+cn];
    const custInvRecs=invoiceRecs.filter(r=>r.cust===cn);

    return `<div class="card" style="margin-bottom:10px;padding:0;overflow:hidden">
      <!-- 客戶組標題，點擊折疊 -->
      <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--n-bg);cursor:pointer;border-bottom:${open?'1px solid var(--line)':'0'}" onclick="A.togglePifGroup('sum_${cn}')">
        <span style="flex:1;min-width:0">
          <span class="nm" style="font-size:14px">${cn}</span>
          <span class="sub" style="font-size:12px;margin-left:8px">${custProd.length} 筆</span>
        </span>
        <span style="text-align:right;margin-right:6px">
          <span style="font-weight:700;font-size:15px;color:${allCleared?'var(--s)':diff>0?'var(--w)':'var(--ink)'}">
            ${allCleared?'✓ 已結清':diff>0?'欠 '+money(diff):money(custPaid)}
          </span><br>
          <span class="sub" style="font-size:11px">已收 ${money(custPaid)} / 應收 ${money(custCharge)}</span>
        </span>
        <i class="ti ti-chevron-${open?'up':'down'}" style="color:var(--muted);flex:none"></i>
      </div>
      ${open?`<div style="padding:0 0 8px">
        <!-- 收款單列表 -->
        ${custInvRecs.length?`<div style="padding:8px 14px 0">
          <div class="sub" style="font-size:11.5px;font-weight:700;margin-bottom:6px;color:var(--muted)">收款單（${custInvRecs.length} 張）</div>
          ${custInvRecs.map(rec=>{

                <span style="font-size:12px;font-weight:700;color:var(--accent);flex:none">${rec.id}</span>
                <span class="sub" style="font-size:11px;flex:1">${rec.date} · ${rec.method} · ${rec.items.length} 筆</span>
                <span style="font-weight:700;color:${rec.status==='paid'?'var(--s)':'var(--w)'};">${money(rec.total)}</span>
                <span class="pill" style="font-size:10px;background:${rec.status==='paid'?'var(--s)':'var(--w)'}20;color:${rec.status==='paid'?'var(--s)':'var(--w)'};border:1px solid ${rec.status==='paid'?'var(--s)':'var(--w)'}40;flex:none">${rec.status==='paid'?'已收款':'待確認'}</span>

                  <tr style="border-top:2px solid var(--line);font-weight:700"><td colspan="3" style="padding:6px 4px">合計</td><td style="padding:6px 4px;text-align:right;color:var(--s)">${money(rec.total)}</td></tr>

        </div>`:''}
        <!-- 品項明細 -->
        <div style="padding:0 14px">
          ${custProd.map(p=>{
            const paid=(p.payRecords||[]).reduce((s,r)=>s+r.amt,0);
            const diff=(p.charge||0)-paid;
            return `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px">
              <span style="flex:1;min-width:0">

                <span class="sub" style="font-size:11px;margin-left:6px">${SM[p.status]?SM[p.status][0]:p.status}</span>
              </span>
              <span style="color:${diff>0?'var(--w)':paid>0?'var(--s)':'var(--faint)'};font-weight:700;font-size:12.5px;white-space:nowrap">
                ${paid>0?money(paid):'未收款'}${diff>0?` / 欠${money(diff)}`:''}
              </span>
            </div>`;
          }).join('')}
        </div>
      </div>`:''}
    </div>`;
  }).join('');

  if(!filtCusts.length||!h.trim()){
    h+=`<div class="card faint" style="text-align:center;padding:24px">尚無收款記錄</div>`;
  }

  return h;
}

      </tr>`).join('') : `<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--muted)">此廠商尚無送驗商品</td></tr>`)

  return h;
}
function elgReceive(){
  const waiting=P('shipped');
  const recent=P('received');
  let h=`<div class="dash" style="margin-bottom:16px">
      <div class="metric"><div class="mi" style="background:var(--w-bg);color:var(--w)"><i class="ti ti-truck-loading"></i></div><div class="mv">${waiting.length}</div><div class="ml">待收件</div></div>
      <div class="metric"><div class="mi" style="background:var(--s-bg);color:var(--s)"><i class="ti ti-package"></i></div><div class="mv">${recent.length}</div><div class="ml">已收樣</div></div>
    </div>`;
  h += `<div class="addr" style="margin-bottom:16px"><div class="t">收件地址（客戶寄樣到此）</div><div class="a">${ADDR}</div><div class="a" style="margin-top:2px">電話 ${ELG_TEL}</div></div>`;
  h += `<div class="row sect"><span>待收件</span><span class="pill pill--w">${waiting.length}</span></div>`;
  if(waiting.length) h+= selBar(waiting.map(p=>p.id), [{label:'批量接收',ic:'package',fn:'A.batchReceive()',cls:'btn--ok'}]);
  h += waiting.length ? `<div class="stack">`+ waiting.map(p=>`
      <div class="card" style="border-color:var(--w)"><div class="row" style="gap:10px">${selCk(p.id)}
        <span style="flex:1;min-width:0"><span class="nm">${p.name}</span><br><span class="sub">${custName(p)} · ${p.qty}</span></span>
        <button class="btn btn--ok btn--sm" style="width:auto;padding:0 16px" onclick="A.receive('${p.id}')">接收</button>
      </div></div>`).join('')+`</div>`
    : `<div class="card faint" style="text-align:center;padding:20px">沒有待收件樣品</div>`;
  h += `<div class="row sect mt"><span>已接收</span><span class="pill pill--s">${recent.length}</span></div>`;
  h += recent.length ? `<div class="stack">`+ recent.map(p=>`
      <div class="card row"><span><span class="nm" style="font-size:15px">${p.name}</span><br><span class="sub">${custName(p)}</span></span>
      <span class="pill pill--s"><i class="ti ti-check"></i> 已接收</span></div>`).join('')+`</div>`
    : `<div class="empty" style="padding:24px"><i class="ti ti-inbox"></i>尚未接收</div>`;
  return h;
}

    <div class="faint" style="font-size:12px;margin-top:8px;text-align:center">同時產出：給實驗室的樣品清單 Excel（依客戶合併）＋ 依洛嘉與微化檢驗的合作協議 Word；並把這些項目轉為「送驗中」。</div>
    <label class="btn btn--ghost" style="margin-top:14px;display:flex;cursor:pointer">
      <i class="ti ti-file-import"></i> 匯入送驗清單 XLSX（回送客戶）
      <input type="file" accept=".xlsx" style="display:none" onchange="A.importSongyan(this)">
    </label>
    <div class="faint" style="font-size:12px;margin-top:8px;text-align:center">依「公司資料」對應客戶名稱，逐筆建立並回送到客戶端。</div></div>`;
}
function elgInvoice(){
  const recv=P('received');
  const issued=P('invoiced');
  const toCheck=P('reported');
  const testing=P('testing');
  const testingUnpaid=products.filter(p=>
    (p.status==='completed'||p.status==='testing') &&
    (!p.paidAmt||p.paidAmt===0) &&
    custName(p)!==ELG_SELF
  );
  const allPaid=products.filter(p=>['paid','testing','reporting','completed'].includes(p.status)&&p.payRecords&&p.payRecords.length);
  const totalCollected=allPaid.reduce((s,p)=>(p.payRecords||[]).reduce((a,r)=>a+r.amt,s),0);
  const byMethod={}; allPaid.forEach(p=>(p.payRecords||[]).forEach(r=>{ byMethod[r.method]=(byMethod[r.method]||0)+r.amt; }));
  const custs=[...new Set(recv.map(p=>custName(p)))];
  recv.forEach(p=>{ if(p.invSel===undefined) p.invSel=true; if(!p.feeSel) p.feeSel=10000; });

  // 頂部統計
  let h=`<div class="dash" style="margin-bottom:16px">
    <div class="metric"><div class="mi" style="background:var(--s-bg);color:var(--s)"><i class="ti ti-cash"></i></div><div class="mv">${money(totalCollected)}</div><div class="ml">已收總計</div></div>
    <div class="metric" onclick="A.setInvTab('recv')" style="cursor:pointer"><div class="mi" style="background:var(--w-bg);color:var(--w)"><i class="ti ti-inbox"></i></div><div class="mv">${recv.length}</div><div class="ml">待開收款單</div></div>
    <div class="metric" onclick="A.setInvTab('issued')" style="cursor:pointer"><div class="mi"><i class="ti ti-send"></i></div><div class="mv">${issued.length}</div><div class="ml">已開單待匯款</div></div>
    <div class="metric" onclick="A.setInvTab('check')" style="cursor:pointer"><div class="mi" style="background:var(--w-bg);color:var(--w)"><i class="ti ti-search"></i></div><div class="mv">${toCheck.length}</div><div class="ml">待查帳</div></div>
    <div class="metric" onclick="A.setInvTab('retro')" style="cursor:pointer"><div class="mi"><i class="ti ti-history"></i></div><div class="mv">${testingUnpaid.length}</div><div class="ml">補錄收款</div></div>
  </div>`;

  // 分頁導覽
  const tabs=[
    {id:'recv',  label:'開請款單', badge:recv.length, color:'var(--w)'},
    {id:'issued',label:'已開單',   badge:issued.length},
    {id:'check', label:'查帳',     badge:toCheck.length, color:'var(--w)'},
    {id:'retro', label:'補錄收款', badge:testingUnpaid.length},
  ];
  h+=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;border-bottom:2px solid var(--line);padding-bottom:10px">
    ${tabs.map(t=>`<button onclick="A.setInvTab('${t.id}')"
      style="padding:6px 16px;border:0;border-radius:20px;font-size:13px;font-family:inherit;cursor:pointer;
             background:${invTab===t.id?'var(--accent)':'var(--n-bg)'};
             color:${invTab===t.id?'#fff':'var(--ink)'};font-weight:${invTab===t.id?'700':'400'}">
      ${t.label}${t.badge?` <span style="background:${invTab===t.id?'rgba(255,255,255,.3)':t.color||'var(--line2)'};color:${invTab===t.id?'#fff':'var(--ink)'};border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700;margin-left:4px">${t.badge}</span>`:''}
    </button>`).join('')}
  </div>`;

  // ===== 補錄請款（已完成 PIF + 送驗中，尚無收款記錄）=====
  if(invTab==='retro'){
    const tCusts=[...new Set(testingUnpaid.map(p=>custName(p)))];
    const activeCust=(retroCust && tCusts.includes(retroCust))?retroCust:(tCusts[0]||'');
    const items=testingUnpaid.filter(p=>custName(p)===activeCust);

    // 已建立的收款單（所有客戶）
    const myInvRecs=invoiceRecs.filter(r=>r.cust===activeCust);

    h+=`<div class="sect" style="margin-bottom:10px">補錄收款 · 選客戶</div>`;
    if(tCusts.length){
      h+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">
        ${tCusts.map(cn=>`<button onclick="A.setRetroCust('${cn}')"
          style="border:2px solid ${cn===activeCust?'var(--accent)':'var(--line2)'};
                 background:${cn===activeCust?'var(--accent-tint)':'var(--surface)'};
                 color:${cn===activeCust?'var(--accent)':'var(--ink)'};
                 border-radius:20px;padding:5px 14px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:${cn===activeCust?'700':'400'}">
          ${cn}</button>`).join('')}
      </div>`;
    }

    if(activeCust){
      // 未收款品項（可勾選建立新收款單）
      if(items.length){
        const custTotal=items.reduce((s,p)=>{
          const sel=p.retroPlans||['shared'];
          return s+PIF_PLANS.filter(pl=>sel.includes(pl.id)).reduce((a,pl)=>a+pl.amt,0);
        },0);
        h+=`<div class="card" style="border-color:var(--w);margin-bottom:14px">
          <div class="row" style="margin-bottom:10px">
            <span class="nm" style="font-size:14px"><i class="ti ti-receipt-2"></i> 建立新收款單</span>
            <span class="amt" style="color:var(--s)">${money(custTotal)}</span>
          </div>
          <div class="note" style="margin-bottom:10px"><i class="ti ti-info-circle"></i>廠商在新增 PIF 時已確定，補錄收款不可更改。</div>
          ${items.map(p=>{
            const sel=p.retroPlans||['shared'];
            const itemTotal=PIF_PLANS.filter(pl=>sel.includes(pl.id)).reduce((s,pl)=>s+pl.amt,0);
            const statusLabel=p.status==='completed'?'已完成 PIF':'送驗中';
            const statusColor=p.status==='completed'?'var(--s)':'var(--accent)';
            return `<div class="card compact" style="margin-bottom:8px">
              <div class="row" style="margin-bottom:8px">
                <span style="flex:1">
                  <span class="nm" style="font-size:13px">${p.name}</span>
                  <span class="pill" style="font-size:10px;background:${statusColor}15;color:${statusColor};border:1px solid ${statusColor}40;margin-left:6px">${statusLabel}</span><br>
                  <span class="sub" style="font-size:11px">${p.batch||''}</span>
                </span>
                <span class="amt" style="font-size:14px;color:var(--s)">${money(itemTotal)}</span>
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">
                ${PIF_PLANS.map(pl=>{
                  const on=sel.includes(pl.id);
                  return `<button onclick="A.retroTogglePlan('${p.id}','${pl.id}','${activeCust}')"
                    style="border:1.5px solid ${on?'var(--accent)':'var(--line2)'};background:${on?'var(--accent-tint)':'var(--surface)'};
                    color:${on?'var(--accent)':'var(--muted)'};border-radius:6px;padding:3px 10px;cursor:pointer;
                    font-size:11px;font-family:inherit;font-weight:${on?'700':'400'}">
                    ${pl.label} ${money(pl.amt)}</button>`;
                }).join('')}
              </div>
            </div>`;
          }).join('')}
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:flex-end">
            <div><label class="lbl">收款日期</label><input class="fld fld--mini" type="date" id="retro_date_all" value="${new Date().toISOString().slice(0,10)}" style="width:130px"></div>
            <div><label class="lbl">付款方式</label><select class="fld fld--mini" id="retro_method_all">${PAY_METHODS.map(m=>`<option>${m}</option>`).join('')}</select></div>
            <div style="flex:1;min-width:120px"><label class="lbl">備註</label><input class="fld fld--mini" id="retro_note_all" placeholder="例：末五碼 12345"></div>
            <button class="btn btn--ok btn--sm" style="width:auto;padding:0 16px;flex:none;align-self:flex-end" onclick="A.createInvoiceRec('${activeCust}')">
              <i class="ti ti-file-invoice"></i> 建立收款單（${money(custTotal)}）</button>
          </div>
        </div>`;
      } else {
        h+=`<div class="card faint" style="text-align:center;padding:14px;margin-bottom:14px">「${activeCust}」目前沒有未收款的品項</div>`;
      }

      // 已建立的收款單列表
      if(myInvRecs.length){
        h+=`<div class="sect" style="margin:14px 0 8px">已建立的收款單（${myInvRecs.length} 張）</div>`;
        h+=myInvRecs.slice().reverse().map(rec=>{
          const open=invDetailOpen===rec.id;
          const statusColor=rec.status==='paid'?'var(--s)':'var(--w)';
          return `<div class="card compact" style="margin-bottom:8px">
            <div class="row" style="cursor:pointer" onclick="A.toggleInvDetail('${rec.id}')">
              <span style="flex:1;min-width:0">
                <span class="nm" style="font-size:13px;color:var(--accent)">${rec.id}</span>
                <span class="pill" style="font-size:10px;background:${statusColor}15;color:${statusColor};margin-left:6px;border:1px solid ${statusColor}40">
                  ${rec.status==='paid'?'已收款':'待收款'}</span><br>
                <span class="sub" style="font-size:11.5px">${rec.date} · ${rec.method} · ${rec.items.length} 筆</span>
              </span>
              <span class="amt" style="font-size:15px;color:${statusColor}">${money(rec.total)}</span>
              <i class="ti ti-chevron-${open?'up':'down'}" style="color:var(--muted);margin-left:8px"></i>
            </div>
            ${open?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--line)">
              <table style="width:100%;font-size:12.5px;border-collapse:collapse">
                <tr style="color:var(--muted);font-weight:600">
                  <td style="padding:3px 6px">品名</td><td style="padding:3px 6px">狀態</td><td style="padding:3px 6px">方案</td><td style="padding:3px 6px;text-align:right">金額</td>
                </tr>
                ${rec.items.map(it=>`<tr style="border-top:1px solid var(--line)">
                  <td style="padding:4px 6px">${it.name}</td>
                  <td style="padding:4px 6px;color:var(--muted)">${it.statusLabel||''}</td>
                  <td style="padding:4px 6px;color:var(--muted)">${it.plan}</td>
                  <td style="padding:4px 6px;text-align:right;font-weight:700;color:var(--s)">${money(it.amt)}</td>
                </tr>`).join('')}
                <tr style="border-top:2px solid var(--line);font-weight:700">
                  <td colspan="3" style="padding:6px 6px">合計</td>
                  <td style="padding:6px 6px;text-align:right;color:var(--s)">${money(rec.total)}</td>
                </tr>
              </table>
              <div style="margin-top:8px">備註：${rec.note||'—'}</div>
              <div style="display:flex;gap:6px;margin-top:10px">
                ${rec.status!=='paid'?`<button class="btn btn--ok btn--sm" style="width:auto;padding:0 14px" onclick="A.markInvPaid('${rec.id}')"><i class="ti ti-check"></i> 標記已收款</button>`:''}
                <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px;color:#C0392B;border-color:#E7C3BD" onclick="A.deleteInvRec('${rec.id}')"><i class="ti ti-trash"></i> 刪除此收款單</button>
              </div>
            </div>`:''}
          </div>`;
        }).join('');
      }
    } else {
      h+=`<div class="card faint" style="text-align:center;padding:20px">目前所有品項都已有收款記錄</div>`;
    }
  } // end invTab==='retro'

  // ===== 開請款單 =====
  if(invTab==='recv'){
  h+=`<div class="note" style="margin-bottom:14px"><i class="ti ti-users"></i>依客戶分開開單：勾選樣品、選費用方案，確認合計後開收款單回傳給客戶。</div>`;
  h += `<div class="row sect"><span>開收款單（已收樣）</span><span class="pill pill--i">${recv.length}</span></div>`;
  h += recv.length ? custs.map(cn=>{
    const items=recv.filter(p=>custName(p)===cn);
    const tot=items.filter(p=>p.invSel).reduce((s,p)=>s+(p.feeSel||0),0);
    const cobj=customers.find(c=>c.name===cn); const isC=cobj&&cobj.contract; const bal=cobj?(cobj.balance||0):0;
    return `<div class="card" style="margin-bottom:12px">
      <div class="row" style="margin-bottom:8px">
        <span class="nm" style="font-size:15px"><i class="ti ti-building-store"></i> ${cn}${isC?' <span class="pill pill--s" style="font-size:10px">合約制</span>':''}</span>
        <span class="muted" style="font-size:12px;font-weight:600;cursor:pointer" onclick="A.toggleInvVendor('${cn}')">${items.every(p=>p.invSel)?'全不選':'全選'}</span>
      </div>
      ${isC?`<div class="sub" style="margin-bottom:4px">合約餘額：<b style="color:${bal>=tot?'var(--s)':'var(--w)'}">${money(bal)}</b>${bal<tot?'（不足，差額將改開收款單）':''}</div>`:''}
      ${items.map(p=>{
        if(!p.feeSelPlans) p.feeSelPlans=['shared'];
        const selPlans=p.feeSelPlans;
        const itemTotal=PIF_PLANS.filter(pl=>selPlans.includes(pl.id)).reduce((s,pl)=>s+pl.amt,0);
        p.feeSel=itemTotal;
        return `
        <div style="border-top:1px solid var(--line);padding:10px 0 4px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span class="ck ${p.invSel?'on':''}" data-inv="${p.id}" onclick="A.toggleInv('${p.id}')" style="cursor:pointer;flex:none"><i class="ti ti-check"></i></span>
            <span style="flex:1;cursor:pointer;min-width:0" onclick="A.toggleInv('${p.id}')">
              <span class="nm">${p.name}</span>
              <span class="sub" style="margin-left:6px">${p.batch||''}</span>
            </span>
            <span class="amt" style="font-size:15px;font-weight:700;color:${p.invSel?'var(--s)':'var(--faint)'};flex:none">${money(itemTotal)}</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;padding-left:34px">
            ${PIF_PLANS.map(pl=>{
              const on=selPlans.includes(pl.id);
              return `<button onclick="A.toggleInvPlan('${p.id}','${pl.id}')"
                style="border:1.5px solid ${on?'var(--accent)':'var(--line2)'};
                       background:${on?'var(--accent-tint)':'var(--surface)'};
                       color:${on?'var(--accent)':'var(--muted)'};
                       border-radius:6px;padding:3px 10px;cursor:pointer;
                       font-size:11.5px;font-family:inherit;font-weight:${on?'700':'400'}">
                ${pl.label}&nbsp;<b>${money(pl.amt)}</b></button>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
      <div class="total" style="margin-top:12px">
        <span class="muted">${cn} 合計</span>
        <span class="amt" style="font-size:20px" data-inv-tot="${cn}">${money(tot)}</span>
      </div>
      ${cn===ELG_SELF
        ? `<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
            <button class="btn btn--ok btn--sm" style="width:auto;padding:0 16px" onclick="A.waiveInvoice('${cn}')"><i class="ti ti-check"></i> 批量免收款（依洛嘉自有）</button>
            <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px" onclick="A.issueInvoiceFor('${cn}')"><i class="ti ti-send"></i> 正常開單</button>
           </div>`
        : isC
          ? `<button class="btn btn--ok btn--sm" style="margin-top:10px" ${tot?'':'disabled'} onclick="A.settleByContract('${cn}')"><i class="ti ti-wallet"></i> 依合約餘額自動結算（不足改開收款單）</button>`
          : `<button class="btn btn--sm" style="margin-top:10px" ${tot?'':'disabled'} data-inv-btn="${cn}" onclick="A.issueInvoiceFor('${cn}')"><i class="ti ti-send"></i> 開收款單給 ${cn}（合計 ${money(tot)}）</button>`}
    </div>`;
  }).join('') : `<div class="card faint" style="text-align:center;padding:16px">沒有待開單的樣品</div>`;
  } // end invTab==='recv'

  // ===== 已開單 =====
  if(invTab==='issued'){
  h += `<div class="row sect"><span>已開收款單（待客戶匯款）</span><span class="pill pill--i">${issued.length}</span></div>`;
  if(issued.length){
    const icusts=[...new Set(issued.map(p=>custName(p)))];
    h += icusts.map(cn=>{
      const its=issued.filter(p=>custName(p)===cn);
      const tot=its.reduce((s,p)=>s+(p.charge||0),0);
      return `<div class="card" style="margin-bottom:12px;border-color:var(--w)">
        <div class="row" style="margin-bottom:6px">
          <span class="nm" style="font-size:15px"><i class="ti ti-receipt-2"></i> ${cn}</span>
          <span class="pill pill--w">待匯款</span>
        </div>
        ${its.map(p=>`
          <div class="miniline" style="align-items:center">
            <span style="flex:1">${p.name}</span>
            <span style="margin-right:10px">${money(p.charge||0)}</span>
            <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 8px;font-size:12px;color:#C0392B;border-color:#E7C3BD" onclick="A.voidInvoiceItem('${p.id}')" title="撤回此筆收款單">
              <i class="ti ti-arrow-back-up"></i> 撤回
            </button>
          </div>`).join('')}
        <div class="total" style="margin-top:8px">
          <span class="muted">${cn} 收款單合計</span>
          <span class="amt">${money(tot)}</span>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
          <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px;color:#C0392B;border-color:#E7C3BD" onclick="A.voidInvoiceAll('${cn}')">
            <i class="ti ti-x"></i> 整張撤回（全部退回待請款）
          </button>
          <button class="btn btn--ok btn--sm" style="width:auto;padding:0 14px" onclick="A.markAllReported('${cn}')">
            <i class="ti ti-check"></i> 客戶已匯款（整批轉查帳）
          </button>
        </div>
        <div class="note" style="margin-top:8px"><i class="ti ti-info-circle"></i>撤回後品項回到「待開收款單」，可修改費用或廠商後重新開單。</div>
      </div>`;
    }).join('');
  } else {
    h += `<div class="card faint" style="text-align:center;padding:16px">尚無已開出的收款單</div>`;
  }
  } // end invTab==='issued'

  // ===== 查帳 =====
  if(invTab==='check'){
  h += `<div class="row sect"><span>收款查帳（客戶已回報匯款）</span><span class="pill pill--w">${toCheck.length}</span></div>`;
  if(toCheck.length){
    const checkCusts=[...new Set(toCheck.map(p=>custName(p)))];
    h+=checkCusts.map(cn=>{
      const items=toCheck.filter(p=>custName(p)===cn);
      const tot=items.reduce((s,p)=>s+(p.charge||0),0);
      const payNote=items.map(p=>p.payNote).filter(Boolean)[0]||'—';
      return `<div class="card" style="border-color:var(--w);margin-bottom:12px">
        <div class="row" style="margin-bottom:8px">
          <span>
            <span class="nm" style="font-size:15px"><i class="ti ti-building-store"></i> ${cn}</span><br>
            <span class="sub">${items.length} 筆 · 應收合計 ${money(tot)}</span>
          </span>
          <span class="pill pill--w">待查帳</span>
        </div>
        <div class="sub" style="margin-bottom:10px;padding:8px 12px;background:var(--n-bg);border-radius:8px">
          <i class="ti ti-cash"></i> 客戶匯款資訊：<b>${payNote}</b>
        </div>
        <table style="width:100%;font-size:13px;border-collapse:collapse;margin-bottom:10px">
          <tr style="color:var(--muted);font-size:12px;font-weight:600"><td style="padding:4px 8px">品名</td><td style="padding:4px 8px;text-align:right">應收金額</td></tr>
          ${items.map(p=>`<tr style="border-top:1px solid var(--line)">
            <td style="padding:6px 8px">${p.name}</td>
            <td style="padding:6px 8px;text-align:right;font-weight:700">${money(p.charge||0)}</td>
          </tr>`).join('')}
          <tr style="border-top:2px solid var(--accent);font-weight:700;font-size:14px">
            <td style="padding:8px">合計</td>
            <td style="padding:8px;text-align:right;color:var(--s)">${money(tot)}</td>
          </tr>
        </table>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px">
          <div style="flex:1;min-width:120px">

/* ---------- input methods ---------- */
function parseLines(text){
  return (text||'').split(/\n+/).map(s=>s.trim()).filter(Boolean)
    .filter(l=>!/^(客戶|您好|你好|哈囉|嗨|謝謝|感謝|麻煩|再麻煩|拜託|hi|hello|thanks|thank)/i.test(l))
    .map(l=>{
      let qty='', spec='', name=l;
      const qm=l.match(/(\d+)\s*(支|瓶|片|顆|盒|包|罐|組|入|條)/);
      if(qm){ qty=qm[0]; name=name.replace(qm[0],''); }
      const sm=l.match(/(\d+(?:\.\d+)?\s*(?:ml|g|kg|cc|毫升|公克|克)\s*\/?\s*(?:瓶|片|支|顆|包|盒)?)/i);
      if(sm){ spec=sm[0].trim(); name=name.replace(sm[0],''); }
      name=name.replace(/[，,：:。.、\-x×*]+/g,' ').replace(/\s+/g,' ').trim();
      return { name:name||l, en:'', spec:spec, qty:qty };
    });
}

        <input class="fld" value="${c.drive||''}" placeholder="貼上該客戶專屬資料夾連結" onchange="A.setCustDrive(${i},this.value)"></div>`;
    else act=`<div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn--sm" style="width:auto;padding:0 14px" onclick="A.enableCust(${i})"><i class="ti ti-rotate"></i> 重新啟用</button>
        <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px;color:#C0392B;border-color:#E7C3BD" onclick="A.delCustomer(${i})"><i class="ti ti-trash"></i> ${confirmDel==='ca'+i?'確認刪除？':'刪除帳號'}</button></div>`;
    const contractBlock = (c.status==='待審核'||c.status==='臨時') ? '' : `
      <div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13.5px;font-weight:600">
          <input type="checkbox" ${c.contract?'checked':''} onclick="A.toggleContract(${i})"> 合約制（送驗自動從預付餘額扣款）</label>
        ${c.contract?`<div style="margin-top:8px">
          <div class="sub">目前合約餘額：<b style="color:var(--s)">${money(c.balance||0)}</b></div>
          <div style="display:flex;gap:8px;margin-top:6px"><input class="fld fld--mini" id="bal_${i}" placeholder="輸入金額後設定" style="flex:1">
            <button class="btn btn--sm" style="width:auto;padding:0 14px" onclick="A.setBalance(${i})">設定餘額</button></div></div>`:''}
      </div>`;
    return `<div class="card"><div class="row"><span class="nm" style="font-size:15px">${c.name}</span>
      <span class="pill pill--${sc}">${c.status}</span></div>
      <div class="sub" style="margin-top:4px">${c.email||'尚未綁定'} · 登入：${c.login}</div>${act}${contractBlock}</div>`;
  };
  const temp=customers.filter(c=>c.status==='臨時');
  let h=`<div style="display:flex;gap:10px;margin:16px 0 14px;flex-wrap:wrap">
      <div class="card" style="flex:1;text-align:center;padding:12px;min-width:100px"><div style="font-size:24px;font-weight:700">${active.length}</div><div class="sub">已註冊</div></div>
      <div class="card" style="flex:1;text-align:center;padding:12px;min-width:100px;border-color:var(--accent)"><div style="font-size:24px;font-weight:700;color:var(--accent)">${temp.length}</div><div class="sub">臨時待啟用</div></div>
      <div class="card" style="flex:1;text-align:center;padding:12px;min-width:100px;border-color:var(--w)"><div style="font-size:24px;font-weight:700;color:var(--w)">${pend.length}</div><div class="sub">客戶申請</div></div>
    </div>`;

  // ===== 臨時帳號（最優先處理）=====
  if(temp.length){
    h+=`<div class="row sect"><span>臨時帳號 → 填 Gmail 即啟用</span><span class="pill pill--w">${temp.length}</span></div>`;
    h+=`<div class="note" style="margin:6px 0 10px"><i class="ti ti-user-plus"></i>這些公司是從匯入清單自動建立，尚未綁定 Gmail。填入客戶的 Gmail 後按「啟用」，客戶即可用 Google 登入查看產品進度與帳務。</div>`;
    h+=`<div class="stack">`+temp.map(card).join('')+`</div>`;
  }

  // ===== 客戶申請（待審核）=====
  if(pend.length){ h+=`<div class="sect mt">客戶申請（待審核）</div><div class="stack">`+pend.map(card).join('')+`</div>`; }

  // ===== 已註冊帳號 =====
  const reg=active.concat(off);
  h+=`<div class="sect mt">已註冊帳號（${reg.length}）· 公司名</div>`;
  h+= reg.length ? `<div class="stack">`+reg.map(card).join('')+`</div>`
    : `<div class="card faint" style="text-align:center;padding:18px">尚無已註冊帳號</div>`;
  if(custAddOpen){
    h += `<div class="card" style="margin-top:14px;border-color:var(--accent)">
      <p class="nm" style="font-size:15px;margin-bottom:6px"><i class="ti ti-building-plus"></i> 代註冊新客戶</p>
      <p class="sub" style="margin-bottom:12px">填入公司名與客戶 Gmail，客戶直接用那個 Gmail 登入就能進入客戶端，不需要另外申請。</p>
      <label class="lbl">公司名（廠商名）</label>
      <input id="c_name" class="fld" placeholder="例：晶寶企業行" style="margin-bottom:10px">
      <label class="lbl">客戶 Gmail（必填 · 用此信箱登入即自動開通）</label>
      <input id="c_mail" class="fld" type="email" placeholder="example@gmail.com" style="margin-bottom:10px">
      <label class="lbl">登入方式</label>
      <select id="c_login" class="fld" style="margin-bottom:12px">
        <option>Google</option><option>LINE</option><option>手動</option>
      </select>
      <div style="display:flex;gap:8px">
        <button class="btn btn--sm" style="width:auto;padding:0 16px" onclick="A.addCustomer()"><i class="ti ti-check"></i> 建立客戶帳號</button>
        <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 16px" onclick="A.closeCustAdd()">取消</button>
      </div>
    </div>`;
  } else {
    h += `<button class="btn btn--ghost" style="margin-top:14px" onclick="A.openCustAdd()"><i class="ti ti-plus"></i> 代註冊新客戶（填 Gmail 直接開通）</button>`;
    if(typeof FB!=='undefined'&&FB.on&&FB.db){
      h += `<button class="btn btn--ghost" style="margin-top:8px;color:#C0392B;border-color:#E7C3BD" onclick="A.clearFirestoreCustomers()">
        <i class="ti ti-trash"></i> ${confirmDel==='clear_custs'?'確認清除雲端所有客戶？':'清除雲端舊客戶資料（重新建立）'}</button>`;
    }
  }
  return h;
}

  setCustDriveByName(nm,v){ const c=customers.find(x=>x.name===nm); if(c){ c.drive=(v||'').trim(); if(!c.drive) c.driveAuth=false; save(); A.toast('已更新 PIF 資料夾連結'); render(); } },

  libAll(){ const rows=products.filter(p=> !libStatOff[p.status] && !libCustOff[custName(p)] && (!libQ||p.name.indexOf(libQ)>=0)); const all=rows.length&&rows.every(p=>batch[p.id]); rows.forEach(p=>batch[p.id]=all?false:true); render(); },

  importPaste(){

  async importPhoto(input){

    ocrBusy=true; render();

      const res=await Tesseract.recognize(file,'chi_tra+eng');
      const got=parseLines((res&&res.data&&res.data.text)||'');
      if(got.length){ libDrafts=libDrafts.concat(got.map(g=>({name:g.name||'',spec:g.spec||'',qty:g.qty||'',en:g.en||'',cust:'',t:null}))); libImpStatus='applied'; A.toast('辨識 '+got.length+' 筆，請核對後確認匯入'); }

    }catch(e){ A.toast('辨識失敗，請重試或改用手動'); }
    ocrBusy=false; render();

  async photoRecognized(input){
    const file=input&&input.files&&input.files[0]; if(!file) return;

    ocrBusy=true; render();
    try{
      const res=await Tesseract.recognize(file,'chi_tra+eng');
      const got=parseLines((res&&res.data&&res.data.text)||'');
      syncDrafts();
      if(got.length) drafts=drafts.concat(got); else drafts.push({name:'（未辨識到品名，請手動填）',en:'',spec:'',qty:''});
      A.toast('辨識完成，'+got.length+' 筆');
    }catch(e){ syncDrafts(); drafts.push({name:'（辨識失敗，請手動填）',en:'',spec:'',qty:''}); A.toast('辨識失敗，請手動填'); }
    ocrBusy=false; render();
  },
  async importSongyan(input){
    const file=input&&input.files&&input.files[0]; if(!file) return;
    if(typeof ExcelJS==='undefined'){ A.toast('Excel 函式庫未載入'); return; }
    try{
      const wb=new ExcelJS.Workbook();
      await wb.xlsx.load(await file.arrayBuffer());
      const ws=wb.worksheets[0]; if(!ws){ A.toast('讀不到工作表'); return; }
      let lastCo='', n=0; const staged=[];
      ws.eachRow((row,rn)=>{
        if(rn===1) return;
        const name=cellText(row.getCell(2).value).trim();
        if(!name) return;
        const en=cellText(row.getCell(3).value).trim();
        const spec=cellText(row.getCell(4).value).trim();
        const qty=cellText(row.getCell(5).value).trim();
        const f=cellText(row.getCell(6).value).trim()==='V';
        const g=cellText(row.getCell(7).value).trim()==='V';
        const hh=cellText(row.getCell(8).value).trim()==='V';
        let co=cellText(row.getCell(9).value).trim(); if(co) lastCo=co; else co=lastCo;
        const cm=parseCompany(co);
        staged.push({name,en,spec,qty,cust:cm.cname||'',caddr:cm.caddr||'', t:(f||g||hh)?{fang:f,chang:g,wen:hh}:null});
        n++;
      });
      if(!n){ A.toast('Excel 沒有讀到樣品列'); return; }
      libDrafts=libDrafts.concat(staged); libImpStatus='testing';
      render(); A.toast('已讀取 '+n+' 筆，請於「待確認」核對後匯入');
    }catch(e){ A.toast('匯入失敗：檔案格式不符'); }
  },
  async exportSongyan(explicitList){
    if(typeof ExcelJS==='undefined'){ A.toast('Excel 函式庫載入中，請稍候再按'); return; }
    const list=(explicitList && explicitList.length ? explicitList.slice() : products.filter(p=>p.status==='paid' && p.genSel!==false))
                       .sort((a,b)=>custName(a).localeCompare(custName(b),'zh-Hant'));

    const FN='E.L.G INTERNATIONAL TRADING CO., LTD.';
    const FA='No. 600, Zhaixing 2nd St., Jiaxing Vil., Jiali Dist., Tainan City 722013, Taiwan (R.O.C.)';
    const thin={style:'thin'}, BD={top:thin,left:thin,right:thin,bottom:thin};
    const wb=new ExcelJS.Workbook(), ws=wb.addWorksheet('Sheet1');
    [7.3,40.9,60.7,17.4,10.4,11.1,11.1,11.1,54.1,9.0].forEach((w,i)=>ws.getColumn(i+1).width=w);
    const heads=['序号','样品名称','英文名稱','型号规格','数量','防腐效能測驗\n$350','常規9項+念珠菌\n$320','穩定性測試\n$350','公司資料'];

      c.font={name:i===8?'新細明體':'仿宋',size:i===8?11:14};
      c.alignment={horizontal:'center',vertical:'middle',wrapText:true}; });
    hr.height=64.5;
    let r=2;
    list.forEach((p,idx)=>{
      const t=p.t||{}, row=ws.getRow(r);
      row.getCell(1).value=idx+1; row.getCell(2).value=p.name; row.getCell(3).value=p.en||'';
      row.getCell(4).value=p.spec; row.getCell(5).value=p.qty;
      row.getCell(6).value=t.fang?'V':null; row.getCell(7).value=t.chang?'V':null; row.getCell(8).value=t.wen?'V':null;
      const amt=(t.fang?350:0)+(t.chang?200:0)+(t.wen?350:0);
      row.getCell(10).value={formula:`IF(F${r}="V",350,0)+IF(G${r}="V",200,0)+IF(H${r}="V",350,0)`,result:amt};
      row.getCell(1).font={name:'新細明體',size:11}; row.getCell(1).alignment={horizontal:'center',vertical:'middle'};
      row.getCell(2).font={name:'新細明體',size:12}; row.getCell(2).alignment={vertical:'middle'};
      row.getCell(3).font={name:'新細明體',size:11}; row.getCell(3).alignment={vertical:'middle'};
      [4,5,6,7,8,10].forEach(c=>{ row.getCell(c).font={name:'新細明體',size:11}; row.getCell(c).alignment={horizontal:'center',vertical:'middle'}; });
      row.height=16.5; r++;
    });
    const last=r-1;
    let s=2;
    for(let i=2;i<=last+1;i++){
      const cur=i<=last?custName(list[i-2]):null, prev=custName(list[s-2]);
      if(cur!==prev){
        const e=i-1, pp=list[s-2], ic=ws.getCell(`I${s}`);
        ic.value=`公司名称：${custName(pp)}\n公司地址：${custAddr(pp)}\n工厂名称：${FN}\n工厂地址：${FA}`;
        ic.font={name:'新細明體',size:11}; ic.alignment={vertical:'middle',wrapText:true};
        if(e>s) ws.mergeCells(`I${s}:I${e}`);
        const n=e-s+1; if(n*16.5<66) ws.getRow(s).height=66-16.5*(n-1);
        s=i;
      }
    }
    const tr=last+1, cnt=k=>list.filter(p=>(p.t||{})[k]).length;
    ws.getCell(`F${tr}`).value={formula:`COUNTIF(F2:F${last},"V")*350`,result:cnt('fang')*350};
    ws.getCell(`G${tr}`).value={formula:`COUNTIF(G2:G${last},"V")*200`,result:cnt('chang')*200};
    ws.getCell(`H${tr}`).value={formula:`COUNTIF(H2:H${last},"V")*350`,result:cnt('wen')*350};
    const grand=cnt('fang')*350+cnt('chang')*200+cnt('wen')*350;
    ws.getCell(`I${tr}`).value={formula:`"共"&SUM(J2:J${last})&"元"`,result:`共${grand}元`};
    [6,7,8].forEach(c=>{ const cell=ws.getRow(tr).getCell(c); cell.font={name:'新細明體',size:11}; cell.alignment={horizontal:'center',vertical:'middle'}; });
    ws.getCell(`I${tr}`).font={name:'新細明體',size:11}; ws.getCell(`I${tr}`).alignment={vertical:'middle',wrapText:true};
    for(let row=1;row<=tr;row++) for(let col=1;col<=10;col++) ws.getRow(row).getCell(col).border=BD;
    ws.views=[{state:'frozen',ySplit:1}];
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob), a=document.createElement('a');
    a.href=url; a.download='送驗清單.xlsx'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);

const firebaseConfig = {
  apiKey: "AIzaSyDYZv3jPSYlpfD5SznvF8OfkQsILQTFJ8I",

let FB={on:false,db:null,auth:null,user:null,role:null,unsub:[],last:{},ready:false,syncT:null,seeded:false,cloudEmpty:false};
let SEED_SNAPSHOT=null;
function fbInit(){
  try{
    if(window.firebase && firebaseConfig.apiKey){
      firebase.initializeApp(firebaseConfig);
      FB.db=firebase.firestore(); FB.auth=firebase.auth(); FB.on=true;
    }
  }catch(e){ FB.on=false; console.warn('Firebase init failed',e); }
}
function fbHandleRedirect(){
  if(!FB.on) return;
  FB.auth.getRedirectResult().catch(e=>{
    if(e.code!=='auth/no-auth-event'&&e.code!=='auth/operation-not-supported-in-this-environment')
      console.warn('redirect result',e);
  });
}
function stripId(o){ const c=Object.assign({},o); delete c.id; return c; }
function fbDetach(){ FB.unsub.forEach(u=>{try{u();}catch(e){}}); FB.unsub=[]; FB.seeded=false; FB.cloudEmpty=false; }
function snapApply(name, arr, docs){
  // products 空（Firestore 尚未上傳）→ 保留本機種子，不清空
  if(name==='products' && docs.length===0 && arr.length>0){ FB.cloudEmpty=true; return; }
  if(name==='products' && docs.length>0){ FB.cloudEmpty=false; FB.seeded=true; }
  // 有 pending sync 還沒提交 → 跳過這次 snapshot，避免覆蓋本機最新狀態
  if(FB.syncT) return;
  // 其他集合若 products 尚未上傳也先保留
  if(FB.cloudEmpty && docs.length===0 && arr.length>0) return;
  arr.length=0; const m={};
  docs.forEach(d=>{ const o=Object.assign({}, d.data()); o.id=d.id; arr.push(o); m[d.id]=JSON.stringify(stripId(o)); });
  FB.last[name]=m;
}
function emailMap(){ const m={}; customers.forEach(c=>{ if(c.name) m[c.name]=c.email||''; }); m[ELG_SELF]=''; return m; }
function attachAdmin(){
  fbDetach();
  // 目前 Firestore 規則尚未開放，只做身分驗證，資料完全走本機種子
  // 等 Firestore 規則設好後，將下方 FB_SYNC_READY 改為 true 啟用同步
  if(!FB_SYNC_READY) return;
  const C=(name,arr)=>FB.unsub.push(FB.db.collection(name).onSnapshot(s=>{ snapApply(name,arr,s.docs); FB.ready=true; render(); }, e=>console.warn(name,e)));
  C('products',products); C('customers',customers); C('staff',staff); C('sharedPIF',sharedPIF); C('showcase',showcase);
}
function attachCustomer(email){
  fbDetach();
  if(!FB_SYNC_READY){
    FB.ready=true; render(); return;
  }
  // 訂閱 Firestore，若回傳空則保留本機資料（Firestore 尚未同步）
  FB.unsub.push(FB.db.collection('products').where('customerEmail','==',email).onSnapshot(s=>{
    if(s.docs.length>0){
      snapApply('products',products,s.docs); FB.ready=true; render();
    } else {
      // Firestore 空的 → 用本機資料，只顯示屬於這個客戶的品項
      FB.ready=true; FB.cloudEmpty=true; render();
    }
  }, e=>{ FB.ready=true; render(); console.warn(e); }));
  FB.unsub.push(FB.db.collection('customers').where('email','==',email).onSnapshot(s=>{
    if(s.docs.length>0) snapApply('customers',customers,s.docs);
    render();
  }, e=>console.warn(e)));
  FB.unsub.push(FB.db.collection('sharedPIF').where('state','in',['public','building']).onSnapshot(s=>{
    if(s.docs.length>0) snapApply('sharedPIF',sharedPIF,s.docs);
    render();
  }, e=>console.warn(e)));
  FB.unsub.push(FB.db.collection('showcase').onSnapshot(s=>{
    if(s.docs.length>0) snapApply('showcase',showcase,s.docs);
    render();
  }, e=>console.warn(e)));
}
function fbStart(){
  if(!FB.on) return;
  FB.auth.onAuthStateChanged(async user=>{
    FB.user=user;
    if(!user){ FB.role=null; FB.ready=false; fbDetach(); return; }
    try{
      // 如果從客戶入口登入，不檢查 staff，直接走客戶流程
      const fromCustomerPortal = window._loginSide==='customer';
      if(!fromCustomerPortal){
        const sd=await FB.db.collection('staff').doc(user.uid).get();
        if(sd.exists){
          FB.role='eloga'; role='eloga'; elgRole=(sd.data()&&sd.data().role)||'主要管理者'; zone='back'; elgTab='home'; view='app';
          attachAdmin(); render(); return;
        }
        // 方式 B：查 email 是否在邀請名單（Firestore staff）
        const sq=await FB.db.collection('staff').where('email','==',user.email.toLowerCase()).limit(1).get();
        if(!sq.empty){
          const inv=sq.docs[0].data(); const invId=sq.docs[0].id;
          await FB.db.collection('staff').doc(user.uid).set({
            name: inv.name||user.displayName||user.email,
            email: user.email.toLowerCase(),
            role: inv.role||'管理',
            uid: user.uid
          });
          if(invId!==user.uid) await FB.db.collection('staff').doc(invId).delete();
          FB.role='eloga'; role='eloga'; elgRole=inv.role||'管理'; zone='back'; elgTab='home'; view='app';
          attachAdmin(); render(); A.toast('帳號已自動開通，歡迎 '+(inv.name||user.email)); return;
        }
      }
      // 查是否為已知客戶（先查 Firestore lowercase，再查本機）
      const emailLower=user.email.toLowerCase();
      let q=await FB.db.collection('customers').where('email','==',emailLower).limit(1).get();
      if(q.empty) q=await FB.db.collection('customers').where('email','==',user.email).limit(1).get();
      const localCust=customers.find(c=>c.email&&c.email.toLowerCase()===emailLower);
      // 客戶登入後：先進資料確認頁，確認後才進主畫面
      const custData=!q.empty ? q.docs[0].data() : localCust || null;
      if(custData){
        FB.role='customer'; role='customer';
        // 設定 me 的基本資料
        me=Object.assign({}, me, {nameCh:custData.name, nameEn:custData.nameEn||'', addrCh:CINFO[custData.name]||custData.addrCh||me.addrCh||'', email:user.email, phone:custData.phone||me.phone||'', filled:false});
        attachCustomer(user.email);
        view='customer-confirm'; render(); // 先進確認頁
      } else {
        FB.role='pending'; role='guest'; view='fb-pending'; render();
      }
    }catch(e){ A.toast('登入後讀取失敗：'+e.message); console.warn(e); }
  });
}
function fbSync(){
  if(!FB.on||!FB.user||!FB.ready||FB.role==='pending') return;
  try{
    const em=emailMap();
    const cols = FB.role==='eloga' ? ['products','customers','staff','sharedPIF','showcase'] : ['products'];
    const ref={products,customers,staff,sharedPIF,showcase};
    const batch=FB.db.batch(); let ops=0;
    cols.forEach(name=>{
      const arr=ref[name]||[]; const last=FB.last[name]||{}; const seen={};
      arr.forEach(o=>{
        if(!o.id) o.id=FB.db.collection(name).doc().id;
        const data=stripId(o);
        if(name==='products' && !data.customerEmail) { data.customerEmail=em[data.cust]||''; o.customerEmail=data.customerEmail; }
        seen[o.id]=true;
        const j=JSON.stringify(data);
        if(last[o.id]!==j){ batch.set(FB.db.collection(name).doc(o.id),data); last[o.id]=j; ops++; }
      });
      Object.keys(last).forEach(id=>{ if(!seen[id]){ batch.delete(FB.db.collection(name).doc(id)); delete last[id]; ops++; } });
      FB.last[name]=last;
    });
    if(FB.role==='eloga'){ batch.set(FB.db.collection('meta').doc('config'),{CINFO},{merge:true}); ops++; }
    if(ops>0 && ops<=450) batch.commit().catch(e=>console.warn('sync',e));
  }catch(e){ console.warn('fbSync',e); }
}

async function fbUploadSeed(){
  if(!FB.on||!FB.user||FB.role!=='eloga'){ A.toast('需以依洛嘉管理者登入後再上傳'); return; }
  const S=SEED_SNAPSHOT; if(!S){ A.toast('找不到種子資料'); return; }
  try{
    const ex=await FB.db.collection('products').limit(1).get();
    if(!ex.empty){ A.toast('雲端已有資料，為避免覆蓋已略過'); return; }
    A.toast('上傳種子資料中…');
    const em={}; (S.customers||[]).forEach(c=>{ if(c.name) em[c.name]=c.email||''; }); em[ELG_SELF]='';
    const writeAll=async(name,arr,stamp)=>{ arr=arr||[]; for(let i=0;i<arr.length;i+=400){ const b=FB.db.batch(); arr.slice(i,i+400).forEach(o=>{ const id=o.id||FB.db.collection(name).doc().id; const data=stripId(o); if(stamp)stamp(data); b.set(FB.db.collection(name).doc(id),data); }); await b.commit(); } };
    await writeAll('products',S.products,d=>{ if(!d.customerEmail) d.customerEmail=em[d.cust]||''; });
    await writeAll('customers',S.customers);
    await writeAll('sharedPIF',S.sharedPIF);
    await writeAll('showcase',S.showcase);
    await FB.db.collection('staff').doc(FB.user.uid).set({role:elgRole||'主要管理者', name:'依洛嘉'},{merge:true});
    await FB.db.collection('meta').doc('config').set({CINFO:S.CINFO},{merge:true});
    A.toast('已上傳種子資料到雲端，畫面將自動更新');
  }catch(e){ A.toast('上傳失敗：'+e.message); console.warn(e); }
}
A.googleSignIn=function(){
  if(!FB.on){ A.toast('Firebase 尚未載入，請檢查網路'); return; }
  const p=new firebase.auth.GoogleAuthProvider();
  p.setCustomParameters({prompt:'select_account'});
  FB.auth.signInWithPopup(p).catch(e=>{
    if(e.code==='auth/popup-blocked'||e.code==='auth/operation-not-supported-in-this-environment'){
      // popup 被擋，改用 redirect
      FB.auth.signInWithRedirect(p).catch(e2=>A.toast('登入失敗：'+e2.message));
    } else {
      A.toast('登入失敗：'+e.message);
    }
  });
};
A.fbLogout=function(){ try{ if(FB.on&&FB.user) FB.auth.signOut(); }catch(e){} FB.user=null; FB.role=null; FB.ready=false; role='customer'; me={}; view='entry'; render(); };
A.fbUploadSeed=function(){ fbUploadSeed(); };
A.reloadPage=function(){
  if(typeof FB!=='undefined'&&FB.on&&FB.auth){
    const user=FB.user;
    if(user){ fbDetach(); fbStart(); }
    else { try{ location.reload(); }catch(e){} }
  } else { try{ location.reload(); }catch(e){} }
};

fbInit();
fbHandleRedirect();
SEED_SNAPSHOT = JSON.parse(JSON.stringify({products,customers,staff,sharedPIF,showcase,CINFO}));
load();
render();
fbStart();

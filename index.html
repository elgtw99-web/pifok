<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>依洛嘉送驗系統 · 流程原型</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.7.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js"></script>
<style>
  :root{
    --bg:#E8E6E0; --surface:#FFFFFF; --ink:#1A1A1C; --muted:#6E6E73; --faint:#A0A09A;
    --line:#EAE8E3; --line2:#DBD9D2; --accent:#0E7C6B; --accent-tint:#E2F0EC;
    --i:#1D4ED8; --i-bg:#EAEEFB; --w:#A45A09; --w-bg:#F7EEDC;
    --s:#15803D; --s-bg:#E7F2EB; --n:#5B5B60; --n-bg:#EFEEEA;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",Roboto,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:0;
  }
  .roleseg{
    display:flex; gap:4px; background:var(--surface); border:1px solid var(--line2);
    border-radius:13px; padding:4px; width:100%; max-width:390px; margin-bottom:14px;
  }
  .roleseg button{
    flex:1; border:0; background:transparent; color:var(--muted); font-size:15px; font-weight:600;
    padding:10px; border-radius:9px; cursor:pointer; font-family:inherit;
  }
  .roleseg button.on{ background:var(--ink); color:#fff; }

  .phone{
    width:100%; max-width:100%; height:100vh; height:100dvh; background:var(--surface);
    border:0; border-radius:0; overflow:hidden; position:relative;
    display:flex; flex-direction:column; box-shadow:none;
  }
  .hd{
    padding:18px 20px 14px; border-bottom:1px solid var(--line); display:flex;
    align-items:center; justify-content:space-between; gap:10px; flex:none;
  }
  .hd h1{ margin:0; font-size:19px; font-weight:700; letter-spacing:-.01em; }
  .hd p{ margin:3px 0 0; font-size:13px; color:var(--muted); }
  .hd .av{ width:38px;height:38px;border-radius:50%;background:var(--accent-tint);color:var(--accent);
    display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex:none;}
  .hd .ic{ font-size:23px;color:var(--faint); }

  .screen{ flex:1; overflow-y:auto; padding:18px 20px 24px; }
  .tabbar{ display:flex; border-top:1px solid var(--line); flex:none; background:var(--surface); }
  .tabbar button{
    flex:1; border:0; background:transparent; padding:9px 2px 12px; cursor:pointer; font-family:inherit;
    color:var(--faint); font-size:11px; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  .tabbar button i{ font-size:21px; }
  .tabbar button.on{ color:var(--ink); }

  .sect{ font-size:15px; font-weight:700; margin:0 0 10px; }
  .grphd{ display:flex;align-items:center;gap:7px;margin:16px 0 8px; }
  .grphd .dot{ width:8px;height:8px;border-radius:50%;flex:none; }
  .grphd .gn{ font-size:12px;font-weight:700;color:var(--muted); }
  .card.compact{ padding:11px 13px; }
  .srch{ display:flex;align-items:center;gap:8px;border:1px solid var(--line2);border-radius:10px;padding:0 12px;height:42px;margin:0 0 14px;background:var(--surface); }
  .srch i{ color:var(--faint);font-size:18px; }
  .srch input{ border:0;outline:0;background:transparent;flex:1;font:inherit;font-size:14px;color:var(--ink);height:100%; }
  .grp{ margin-bottom:4px; }
  .grphd2{ display:flex;align-items:center;gap:8px;padding:9px 4px;cursor:pointer;user-select:none; }
  .grphd2 .gn{ font-size:12.5px;font-weight:700;color:var(--muted); }
  .grphd2 .chev{ font-size:16px;color:var(--faint);transition:transform .15s; }
  .grp.collapsed .chev{ transform:rotate(-90deg); }
  .grp.collapsed .grpbody{ display:none; }
  .pifgrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(168px,1fr)); gap:10px; }
  .pifgrid .card{ padding:11px 12px; display:flex; flex-direction:column; gap:4px; }
  .screen.searching .grp .grpbody{ display:block; }
  .screen.searching .grp .chev{ transform:rotate(0deg); }
  .chips{ display:flex;flex-wrap:wrap;gap:7px;margin:0 0 12px; }
  .fchip{ font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:9px;border:1.5px solid var(--line2);color:var(--muted);cursor:pointer;user-select:none; }
  .fchip.on{ background:var(--ink);border-color:var(--ink);color:#fff; }
  .tablewrap{ overflow-x:auto;border:1px solid var(--line2);border-radius:12px;background:var(--surface); }
  table.dtable{ width:100%;border-collapse:collapse;font-size:13px;min-width:760px; }
  table.dtable th{ text-align:left;font-weight:700;font-size:11.5px;color:var(--muted);padding:10px 12px;border-bottom:1.5px solid var(--line2);white-space:nowrap;background:var(--n-bg); }
  table.dtable td{ padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle; }
  table.dtable tr:last-child td{ border-bottom:0; }
  table.dtable tr.sel td{ background:var(--i-bg); }
  table.dtable .ck{ width:20px;height:20px; }
  .libbar{ display:flex;flex-wrap:wrap;align-items:center;gap:8px; }
  input.fld--mini, select.fld--mini{ height:34px;padding:0 8px;font-size:12.5px;min-width:84px;margin:0;border-radius:8px; }
  table.dtable td .fld--mini{ width:100%; }
  .sect.mt{ margin-top:22px; }
  .muted{ color:var(--muted); } .faint{ color:var(--faint); }
  .card{ border:1px solid var(--line2); border-radius:14px; padding:15px; background:var(--surface); }
  .card+.card{ margin-top:10px; }
  .row{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .stack{ display:flex; flex-direction:column; gap:10px; }
  .nm{ font-size:15px; font-weight:600; }
  .sub{ font-size:13px; color:var(--muted); margin-top:3px; }

  .pill{ font-size:12px; font-weight:600; padding:4px 11px; border-radius:9px; white-space:nowrap; }
  .pill--n{ background:var(--n-bg); color:var(--n); }
  .pill--i{ background:var(--i-bg); color:var(--i); }
  .pill--w{ background:var(--w-bg); color:var(--w); }
  .pill--s{ background:var(--s-bg); color:var(--s); }

  .btn{ width:100%; border:0; background:var(--ink); color:#fff; font-size:16px; font-weight:600;
    height:50px; border-radius:13px; cursor:pointer; font-family:inherit;
    display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn i{ font-size:20px; }
  .btn:disabled{ opacity:.4; cursor:default; }
  .btn--sm{ height:44px; font-size:15px; }
  .btn--ghost{ background:var(--surface); color:var(--ink); border:1px solid var(--line2); }
  .btn--ok{ background:var(--accent); }

  .lnk{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:14px 15px;
    border:1px solid var(--line2); border-radius:14px; cursor:pointer; }
  .lnk .l{ display:flex; align-items:center; gap:12px; }
  .lnk i.lead{ font-size:23px; color:var(--accent); }

  .selrow{ display:flex; align-items:center; gap:12px; padding:13px 14px; border:1px solid var(--line2);
    border-radius:13px; cursor:pointer; }
  .selrow.on{ border-color:var(--accent); background:var(--accent-tint); }
  .ck{ width:22px;height:22px;border-radius:7px;border:2px solid var(--line2);flex:none;
    display:flex;align-items:center;justify-content:center;color:#fff; }
  .ck i{ font-size:15px; opacity:0; }
  .selrow.on .ck{ background:var(--accent); border-color:var(--accent); }
  .selrow.on .ck i{ opacity:1; }
  .ck.on{ background:var(--accent); border-color:var(--accent); }
  .ck.on i{ opacity:1; }

  .seg{ display:flex; gap:8px; margin-top:10px; }
  .seg button{ flex:1; height:42px; border:1px solid var(--line2); background:var(--surface); color:var(--ink);
    border-radius:11px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; }
  .seg button.on{ border-color:var(--accent); background:var(--accent-tint); color:var(--accent); }

  .total{ display:flex; align-items:baseline; justify-content:space-between; margin-top:14px;
    padding-top:13px; border-top:1px solid var(--line); }
  .total .amt{ font-size:24px; font-weight:700; }

  .note{ display:flex; gap:8px; align-items:flex-start; background:var(--n-bg); border-radius:12px;
    padding:11px 14px; font-size:13px; color:var(--muted); }
  .note i{ font-size:18px; margin-top:1px; }

  input.fld{ width:100%; height:44px; border:1px solid var(--line2); border-radius:11px; padding:0 13px;
    font-size:15px; font-family:inherit; color:var(--ink); background:var(--surface); }
  input.fld::placeholder{ color:var(--faint); }
  label.lbl{ display:block; font-size:13px; font-weight:600; color:var(--muted); margin:0 0 6px; }
  select.fld{ width:100%; height:46px; border:1px solid var(--line2); border-radius:12px; padding:0 12px;
    font-size:15px; font-family:inherit; background:var(--surface); color:var(--ink); }

  .addr{ background:var(--n-bg); border-radius:12px; padding:11px 14px; }
  .addr .t{ font-size:12px; color:var(--muted); } .addr .a{ font-size:13px; margin-top:2px; }

  .empty{ text-align:center; color:var(--faint); padding:48px 16px; font-size:14px; }
  .empty i{ font-size:34px; display:block; margin-bottom:10px; }

  .toast{ position:absolute; left:16px; right:16px; bottom:78px; background:var(--ink); color:#fff;
    padding:13px 16px; border-radius:13px; font-size:14px; text-align:center; opacity:0;
    transform:translateY(8px); transition:.25s; pointer-events:none; }
  .toast.show{ opacity:1; transform:translateY(0); }
  .miniline{ display:flex; justify-content:space-between; font-size:14px; padding:5px 0; }

  #app{ flex:1; display:flex; flex-direction:column; min-height:0; }
  /* 不同端的柔和底色，方便測試辨識 */
  #app.end-entry{ --endbg:var(--bg); }
  #app.end-customer{ --endbg:#EAF2F1; }   /* 客戶端 · 柔和湖綠 */
  #app.end-back{ --endbg:#F3EEE5; }        /* 依洛嘉後臺 · 柔和米砂 */
  #app.end-front{ --endbg:#ECE9F5; }       /* 依洛嘉前臺 · 柔和薰衣草 */
  #app.end-board{ --endbg:#ECF1EB; }       /* 共同看板 · 柔和淺鼠尾草 */
  #app .hd, #app .screen{ background:var(--endbg, var(--surface)); }
  .full{ flex:1; padding:28px 24px; display:flex; flex-direction:column; overflow-y:auto; }
  .brand{ text-align:center; margin-top:36px; }
  .logo{ width:64px;height:64px;border-radius:18px;background:var(--ink);color:#fff;font-size:28px;font-weight:700;
    display:flex;align-items:center;justify-content:center;margin:0 auto 16px; }
  .logo.sm{ width:52px;height:52px;font-size:22px;border-radius:15px;margin-bottom:14px; }
  .brand h1{ margin:0;font-size:23px;font-weight:700;letter-spacing:-.01em; }
  .brand p{ margin:6px 0 0; }
  .entrycard{ display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--surface);
    border:1px solid var(--line2);border-radius:16px;padding:16px;cursor:pointer;font-family:inherit; }
  .ec-ic{ width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex:none; }
  .ec-t{ flex:1;display:flex;flex-direction:column; } .ec-t .sub{ margin-top:2px; }
  .back{ background:transparent;border:0;color:var(--muted);font-size:15px;font-weight:600;font-family:inherit;
    display:flex;align-items:center;gap:6px;cursor:pointer;padding:0;margin-bottom:8px; }
  .back i{ font-size:19px; }
  .logintop{ text-align:center;margin:22px 0 26px; } .logintop h2{ margin:0;font-size:21px;font-weight:700; }
  .logintop p{ margin:4px 0 0; }
  .linebtn{ background:#06C755; }
  .iconbtn{ background:transparent;border:0;color:var(--faint);cursor:pointer;padding:0;display:flex;font-family:inherit; }
  .iconbtn i{ font-size:22px; }
  .ztog{ display:inline-flex; gap:3px; background:var(--n-bg); border-radius:11px; padding:3px; }
  .ztog button{ border:0; background:transparent; color:var(--muted); font-size:14px; font-weight:600;
    padding:7px 16px; border-radius:8px; cursor:pointer; font-family:inherit; }
  .ztog button.on{ background:var(--surface); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.10); }
  .hbtn{ display:inline-flex; align-items:center; gap:5px; border:1px solid var(--line2); background:var(--surface);
    color:var(--ink); font-size:13px; font-weight:600; padding:8px 11px; border-radius:10px; cursor:pointer; font-family:inherit; }
  .hbtn i{ font-size:17px; }
  .modeseg{ display:flex; gap:8px; }
  .modeseg button{ flex:1; height:44px; border:1px solid var(--line2); background:var(--surface); color:var(--muted);
    border-radius:11px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit;
    display:flex; align-items:center; justify-content:center; gap:5px; }
  .modeseg button.on{ border-color:var(--accent); background:var(--accent-tint); color:var(--accent); }
  .modeseg button i{ font-size:17px; }
  .uparea{ border:1.5px dashed var(--line2); border-radius:14px; padding:24px; text-align:center; }
  textarea.fld{ height:auto; padding:10px 13px; resize:none; }
  .btn--danger{ background:#C0392B; }
  .dash{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .metric{ background:var(--surface); border:1px solid var(--line2); border-radius:14px; padding:14px; cursor:pointer; }
  .metric:active{ transform:scale(.99); }
  .metric .mi{ width:34px; height:34px; border-radius:9px; background:var(--accent-tint); color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-size:19px; margin-bottom:8px; }
  .metric .mv{ font-size:26px; font-weight:700; line-height:1; }
  .metric .ml{ font-size:12.5px; color:var(--muted); margin-top:4px; }
  .devbtn{ position:absolute; right:14px; bottom:80px; z-index:60; display:inline-flex; align-items:center; gap:6px;
    background:var(--ink); color:#fff; border:0; border-radius:22px; padding:9px 14px; font-size:13px; font-weight:700;
    font-family:inherit; cursor:pointer; box-shadow:0 6px 18px -6px rgba(0,0,0,.45); opacity:.92; }
  .devbtn i{ font-size:16px; }
  .devmenu{ position:absolute; right:14px; bottom:80px; z-index:61; width:248px; background:var(--surface);
    border:1px solid var(--line2); border-radius:14px; box-shadow:0 14px 40px -12px rgba(0,0,0,.4); overflow:hidden; }
  .devmenu .devhd{ display:flex; justify-content:space-between; align-items:center; padding:11px 14px;
    font-size:13px; font-weight:700; background:var(--n-bg); border-bottom:1px solid var(--line); }
  .devmenu .devhd i{ cursor:pointer; font-size:17px; }
  .devmenu button{ display:flex; align-items:center; gap:9px; width:100%; text-align:left; border:0; background:transparent;
    padding:11px 14px; font-size:14px; font-family:inherit; cursor:pointer; color:var(--ink); border-bottom:1px solid var(--line); }
  .devmenu button:last-child{ border-bottom:0; }
  .devmenu button:active{ background:var(--n-bg); }
  .devmenu button i{ font-size:18px; color:var(--muted); }

  @media (min-width:821px){
    body{ padding:24px; justify-content:center; }
    .phone{ max-width:1320px; width:100%; height:92vh; max-height:900px; border:1px solid var(--line2);
      border-radius:18px; box-shadow:0 24px 70px -30px rgba(0,0,0,.32); }
    #app.mode-full .full{ max-width:460px; margin:0 auto; width:100%; }
    #app.mode-app .tabbar{ position:absolute; top:0; left:0; bottom:0; width:230px; flex-direction:column;
      align-items:stretch; justify-content:flex-start; border-top:0; border-right:1px solid var(--line);
      padding:18px 0; gap:2px; background:var(--surface); border-radius:18px 0 0 18px; overflow-y:auto; z-index:2; }
    #app.mode-app .tabbar button{ flex:none; flex-direction:row; justify-content:flex-start; gap:13px;
      padding:13px 18px; margin:0 12px; font-size:15px; border-radius:10px; }
    #app.mode-app .tabbar button i{ font-size:22px; }
    #app.mode-app .tabbar button.on{ background:var(--accent-tint); color:var(--accent); }
    #app.mode-app .hd, #app.mode-full .hd{ padding:20px 32px 16px; }
    #app.mode-app .hd{ margin-left:230px; }
    #app.mode-app .screen{ margin-left:230px; }
    .screen{ padding:26px 34px 40px; }
    .hd h1{ font-size:21px; }
    /* card lists tile into a responsive grid (dashboard feel) */
    .screen .stack{ display:grid; grid-template-columns:repeat(auto-fit,minmax(310px,1fr)); gap:12px; align-items:start; }
    /* section headers and notes span the full width above their grid */
    .screen .sect, .screen .note, .screen .addr{ max-width:none; }
    /* forms / detail views keep a comfortable single column */
    .pane{ max-width:640px; margin:0 auto; }
    .pane .stack{ display:flex; flex-direction:column; }
    .dash{ grid-template-columns:repeat(4,1fr); }
    .devbtn,.devmenu{ bottom:24px; right:24px; }
  }
  /* ===== MOBILE: 表格自動拆成乾淨卡片（電腦端維持表格匯總） ===== */
  @media (max-width:820px){
    .tablewrap{ border:0; overflow:visible; }
    table.dtable{ min-width:0; width:100%; display:block; }
    table.dtable thead{ display:none; }
    table.dtable tbody{ display:block; }
    table.dtable tr{ display:block; border:1px solid var(--line2); border-radius:13px; padding:12px 14px; margin-bottom:10px; }
    table.dtable tr.sel{ border-color:var(--accent); background:var(--accent-tint); }
    table.dtable td{ display:flex; align-items:center; justify-content:space-between; gap:12px; border:0; padding:5px 0; white-space:normal; }
    table.dtable td::before{ content:attr(data-label); font-size:12px; font-weight:700; color:var(--muted); flex:none; }
    table.dtable td[data-label=""]::before{ content:none; }
    table.dtable td[data-label=""]{ justify-content:flex-start; }
    table.dtable td .fld--mini{ width:auto; min-width:120px; flex:1; max-width:62%; }
    table.dtable td .nm{ text-align:right; }
  }
</style>
</head>

<script>
const CUST = '晶寶企業行';
const ADDR = '台南市佳里區佳興里宅興二街600號 · 洪莉晴 收';
const ELG_TEL = '06-7228888';
const FACTORY = 'E.L.G International Trading（依洛嘉）· 台南市佳里區佳興里宅興二街600號';
let view='entry', role='customer', custTab='submit', elgTab='receive', dataPid=null, editingProfile=false, devOpen=false, custView=null, batch={}, libStatOff={}, libCustOff={}, libQ='', libImpCust='', libDrafts=[], libImpStatus='applied', confirmDel=null;
let me={ nameCh:'', nameEn:'', addrCh:'', addrEn:'', phone:'', filled:false };
const SAMPLE_ME={ nameCh:'晶寶企業行', nameEn:'Jingbao Co., Ltd.', addrCh:'高雄市大寮區琉球里巷尾路89之1號', addrEn:'No.89-1, Xiangwei Rd., Daliao Dist., Kaohsiung', phone:'07-1234567' };
const SAMPLE_ME2={ nameCh:'芊奕田生技', nameEn:'Chianyitian Biotech Co., Ltd.', addrCh:'台南市安平區建平一街56號', addrEn:'No.56, Jianping 1st St., Anping Dist., Tainan', phone:'06-2991234' };
const custName = p => p.cust || CUST;
const CINFO = {
  '晶寶企業行':'高雄市大寮區琉球里巷尾路89之1號',
  '芊奕田生技':'台南市安平區建平一街56號',
  '夏芮蒂生物科技有限公司':'花蓮市中美路71-12號1樓'
};
const custAddr = p => CINFO[custName(p)] || (p.mine ? (me.addrCh||'') : '');
const ownedByMe = p => !!me.nameCh && (p.cust||CUST)===me.nameCh;
function vendorOpts(sel){
  const names=[...new Set([CUST].concat(customers.map(c=>c.name)).concat(products.map(p=>custName(p))))].filter(Boolean);
  return names.map(nm=>`<option ${nm===sel?'selected':''}>${nm}</option>`).join('');
}
function normalizeVendors(){ products.forEach(p=>{ if(!p.cust || p.cust==='（未標客戶）'){ p.cust=CUST; p.mine=true; } }); }
function srchBar(ph){ return `<div class="srch"><i class="ti ti-search"></i><input placeholder="${ph||'搜尋品名…'}" oninput="A.listSearch(this.value)"></div>`; }
function collGroup(cc,label,count,body){
  return `<div class="grp">
    <div class="grphd2" onclick="A.toggleGrp(this)">
      <i class="ti ti-chevron-down chev"></i>
      <span class="dot" style="background:var(--${cc})"></span>

function inferType(name){
  const s=name||'';
  if(/精油|護髮油|卸妝油|唇膏|護唇|膏|膠囊/.test(s)) return '油劑';
  if(/面膜|眼膜|頸膜|胸膜|腹膜|私密處膜|膜/.test(s)) return '面膜';
  if(/精華|乳|霜|露|凝膠|安瓶|卸妝|潔顏|去角質|水/.test(s)) return '液劑霜劑';

const tab = (cur,id,ic,label,fn) =>
  `<button class="${cur===id?'on':''}" onclick="${fn}('${id}')"><i class="ti ti-${ic}"></i>${label}</button>`;

/* ===================== CUSTOMER ===================== */
function custApp(){
  const right=`<div style="display:flex;align-items:center;gap:12px"><button class="iconbtn" onclick="A.logout()" title="登出"><i class="ti ti-logout"></i></button><div class="av">${(me.nameCh||'客')[0]}</div></div>`;
  return header('依洛嘉送驗', me.nameCh||'客戶', right) +
    `<div class="screen">${custScreen()}</div>` +
    `<div class="tabbar">
       ${tab(custTab,'submit','clipboard-plus','送驗','A.setCustTab')}
       ${tab(custTab,'billing','receipt','帳務','A.setCustTab')}
       ${tab(custTab,'board','layout-dashboard','進度看板','A.setCustTab')}
     </div>`;
}
function custScreen(){
  if(custTab==='submit') return custSubmit();
  if(custTab==='billing') return custBilling();
  return custBoard();
}
function custSubmit(){
  const applied = products.filter(p=>ownedByMe(p) && p.status==='applied');
  const approved = products.filter(p=>ownedByMe(p) && (p.status==='approved'||p.status==='pending'));
  const prog = products.filter(p=>ownedByMe(p) && ['shipped','received','invoiced','reported','paid','testing','reporting'].includes(p.status));
  const n = approved.filter(p=>p.shipSel).length;
  const myc = customers.find(c=>c.name===me.nameCh);
  let h = `<div class="lnk" onclick="A.editProfile()" style="margin-bottom:10px">
      <span class="l"><i class="ti ti-building-store lead"></i>
      <span><span class="nm">廠商資料 · 已填</span><br><span class="sub">${me.nameCh} · ${me.addrCh||''}</span></span></span>
      <span class="muted" style="font-size:13px;font-weight:600">編輯</span></div>`;
  h += `<div class="lnk" onclick="A.openSharedPIF()" style="margin-bottom:10px">
      <span class="l"><i class="ti ti-files lead"></i>
      <span><span class="nm">依洛嘉 PIF 共用清單</span><br><span class="sub">可共用 ${sharedPIF.length} 項</span></span></span>
      <i class="ti ti-chevron-right faint" style="font-size:20px"></i></div>`;
  h += `<div class="lnk" onclick="A.openMyFolder()">
      <span class="l"><i class="ti ti-cloud lead"></i>
      <span><span class="nm">我的 PIF 雲端資料夾</span><br><span class="sub">${(myc&&myc.drive&&myc.driveAuth)?'由依洛嘉提供，點擊開啟':(myc&&myc.drive?'依洛嘉尚未授權存取':'依洛嘉尚未提供連結')}</span></span></span>
      <i class="ti ti-external-link faint" style="font-size:18px"></i></div>`;

  h += `<div class="row sect mt"><span>我要送驗的產品</span><span class="muted" style="font-size:13px;font-weight:600;cursor:pointer" onclick="A.openAddItems('customer')">+ 新增送驗產品</span></div>`;

  if(drafts.length && addTarget==='customer'){
    h += `<div class="lnk" onclick="A.openAddItems('customer')" style="border-color:var(--w);margin-bottom:10px">
        <span class="l"><i class="ti ti-edit lead" style="color:var(--w)"></i>
        <span><span class="nm">未完成草稿（${drafts.length} 筆）</span><br><span class="sub">已自動暫存，點此繼續填寫</span></span></span>
        <span class="pill pill--w">繼續</span></div>`;
  }

  if(applied.length){
    h += `<div class="faint" style="font-size:13px;margin:0 0 8px">申請中（待依洛嘉確認 · 可自行撤銷）</div><div class="stack">`+ applied.map(p=>`
      <div class="card compact"><div class="row"><span><span class="nm" style="font-size:14px">${p.name}</span>${p.alias?`<br><span class="sub">別名：${p.alias}</span>`:''}</span>${pill(p.status)}</div>
        <button class="btn btn--ghost btn--sm" style="margin-top:10px;color:#C0392B;border-color:#E7C3BD" onclick="A.deleteMyProduct('${p.id}')"><i class="ti ti-trash"></i> 撤銷並刪除</button>
      </div>`).join('')+`</div>`;
  }
  if(approved.length){
    h += `<div class="faint" style="font-size:13px;margin:14px 0 8px">可寄送（依洛嘉已允許 · 勾選後安排寄送）</div><div class="stack">`+ approved.map(p=>`
      <div class="card compact">
        <div class="selrow ${p.shipSel?'on':''}" style="border:0;padding:0" onclick="A.toggleShip('${p.id}')">
          <span class="ck"><i class="ti ti-check"></i></span>
          <span style="flex:1"><span class="nm" style="font-size:14px">${p.name}</span><br><span class="sub">${p.alias?'別名：'+p.alias+' · ':''}${p.spec} · ${p.qty}</span></span>
        </div>
        ${p.cancelReq
          ? `<div class="sub" style="margin-top:8px;color:var(--w)"><i class="ti ti-clock"></i> 撤銷申請中，待依洛嘉同意 · <span style="cursor:pointer;text-decoration:underline" onclick="A.undoCancelReq('${p.id}')">取消申請</span></div>`
          : `<button class="btn btn--ghost btn--sm" style="margin-top:8px" onclick="A.requestCancel('${p.id}')"><i class="ti ti-ban"></i> 申請撤銷</button>`}
      </div>`).join('') + `</div>`;
    h += `<div class="addr" style="margin-top:12px"><div class="t">寄送至</div><div class="a">${ADDR}</div><div class="a" style="margin-top:2px">電話 ${ELG_TEL}</div></div>`;
    h += `<button class="btn" style="margin-top:10px" ${n?'':'disabled'} onclick="A.arrange()">
            <i class="ti ti-truck-delivery"></i> 安排寄送（${n}）</button>`;
  }
  if(!applied.length && !approved.length){
    h += `<div class="card faint" style="text-align:center;padding:22px">尚無待處理的送驗產品</div>`;
  }

  h += `<div class="sect mt">進行中</div>`;
  if(prog.length){
    const porder=['shipped','received','invoiced','reported','paid','testing','reporting','completed'];
    const cancelable=['shipped','received','invoiced','reported','paid'];
    const present=porder.filter(k=>prog.some(p=>p.status===k));
    h += srchBar('搜尋進行中品名…');
    h += present.map(k=>{
      const grp=prog.filter(p=>p.status===k);
      const canCancel=cancelable.includes(k);
      const body=`<div class="stack">`+ grp.map(p=>{
        let right;
        if(p.paused) right=`<span class="pill pill--n" style="font-size:11px"><i class="ti ti-player-pause"></i> 已暫停</span>`;
        else if(canCancel) right = p.cancelReq
            ? `<span class="sub" style="color:var(--w);white-space:nowrap"><i class="ti ti-clock"></i> 撤銷申請中 · <span style="cursor:pointer;text-decoration:underline" onclick="A.undoCancelReq('${p.id}')">取消</span></span>`
            : `<span class="sub" style="color:#C0392B;cursor:pointer;white-space:nowrap" onclick="A.requestCancel('${p.id}')"><i class="ti ti-ban"></i> 申請撤銷</span>`;
        else right=`<span class="sub faint" style="white-space:nowrap">送驗中不可撤銷</span>`;
        return `<div class="card compact" data-nm="${p.name}"><div class="row" style="align-items:center;gap:10px">
            <span class="nm" style="font-size:14px;flex:1">${p.name}</span>${right}</div></div>`;
      }).join('')+`</div>`;
      return collGroup(SM[k][1], SM[k][0], grp.length, body);
    }).join('');
  } else {
    h += `<div class="empty"><i class="ti ti-progress"></i>還沒有進行中的樣品</div>`;
  }
  return h;
}
function custBilling(){
  const inv = products.filter(p=>ownedByMe(p) && p.status==='invoiced');
  const batches=[...new Set(inv.map(p=>p.batch))];
  let h = '';
  const myc=customers.find(c=>c.name===me.nameCh);
  if(myc && myc.contract){
    const led=(myc.ledger||[]).slice(0,8);
    h += `<div class="card" style="border-color:var(--s)">
        <div class="row"><span class="nm"><i class="ti ti-wallet"></i> 合約預付餘額</span><span class="amt" style="color:var(--s)">${money(myc.balance||0)}</span></div>
        <div class="sub" style="margin-top:4px">送驗檢驗費會自動從此餘額扣除，餘額不足的品項才會另開收款單。</div>
        ${led.length?`<div style="margin-top:10px;border-top:1px solid var(--line);padding-top:8px">
          <div class="sub" style="margin-bottom:4px">近期扣款</div>
          ${led.map(e=>`<div class="miniline"><span>${e.t} · ${e.name}</span><span>-${money(e.amt)} · 餘 ${money(e.bal)}</span></div>`).join('')}
        </div>`:''}
      </div>`;
  }
  h += `<div class="sect${myc&&myc.contract?' mt':''}">待匯款</div>`;
  if(batches.length){
    h += batches.map(b=>{
      const items=inv.filter(p=>p.batch===b);
      const tot=items.reduce((s,p)=>s+p.charge,0);
      return `<div class="card" style="border-color:var(--w)">
        <div class="row"><span class="nm">${b} 收款單</span><span class="pill pill--w">待匯款</span></div>
        <div class="sub" style="margin-bottom:8px">${items.length} 項樣品</div>
        ${items.map(p=>`<div class="miniline"><span>${p.name}</span><span>${money(p.charge)}</span></div>`).join('')}
        <div class="total"><span class="muted">整批合計</span><span class="amt">${money(tot)}</span></div>
        <label class="lbl" style="margin-top:12px">匯款末五碼 或 匯款人姓名</label>
        <input class="fld" id="pn_${b}" placeholder="例：12345 或 王小明">
        <button class="btn" style="margin-top:10px" onclick="A.reportPay('${b}')"><i class="ti ti-check"></i> 匯款回報</button>
      </div>`;
    }).join('');
  } else {
    h += `<div class="card faint" style="text-align:center;padding:22px">目前沒有待匯款的批次</div>`;
  }
  const recent = products.filter(p=>ownedByMe(p) && ['reported','paid','testing','reporting','completed'].includes(p.status));
  h += `<div class="sect mt">近期批次</div>`;
  if(recent.length){
    h += srchBar('搜尋批次品名…');
    const rorder=['reported','paid','testing','reporting','completed'];
    const present=rorder.filter(k=>recent.some(p=>p.status===k));
    h += present.map(k=>{
      const grp=recent.filter(p=>p.status===k);
      const body=`<div class="stack">`+ grp.map(p=>`
        <div class="card compact row" data-nm="${p.name}"><span><span class="nm" style="font-size:13.5px">${p.name}</span><br><span class="sub">${p.batch||''} 批次 · ${money(p.charge||0)}</span></span>
        ${p.status==='completed'?`<button class="btn btn--ghost btn--sm" style="width:auto;padding:0 12px" onclick="A.openDrive('${p.id}')"><i class="ti ti-download"></i> PIF</button>`:''}</div>`).join('')+`</div>`;
      return collGroup(SM[k][1], SM[k][0], grp.length, body);
    }).join('');
  } else {
    h += `<div class="empty"><i class="ti ti-history"></i>尚無紀錄</div>`;
  }
  return h;
}
function custBoard(){
  const order=['applied','approved','shipped','received','invoiced','reported','paid','testing','reporting','completed'];
  const mine=products.filter(p=>ownedByMe(p)).slice().sort((a,b)=>order.indexOf(a.status)-order.indexOf(b.status));
  const myc=customers.find(c=>c.name===me.nameCh);
  let h=`<div class="lnk" onclick="A.openMyFolder()" style="margin-bottom:12px">
      <span class="l"><i class="ti ti-cloud lead"></i>
      <span><span class="nm">我的 PIF 雲端資料夾</span><br><span class="sub">${(myc&&myc.drive&&myc.driveAuth)?'點此開啟下載 PIF':(myc&&myc.drive?'依洛嘉尚未授權存取':'依洛嘉尚未提供連結')}</span></span></span>
      <i class="ti ti-external-link faint" style="font-size:18px"></i></div>`;
  h+=`<div class="sect">我的產品進度</div>`;
  h+= srchBar('搜尋我的產品…');
  if(mine.length){
    const present=order.filter(k=>mine.some(p=>p.status===k));
    h+= present.map(k=>{
      const grp=mine.filter(p=>p.status===k);
      const body=`<div class="stack">`+ grp.map(p=>`
        <div class="card compact" data-nm="${p.name}"><div class="row"><span><span class="nm" style="font-size:13.5px">${p.name}</span>${p.paused?' <span class="pill pill--n" style="font-size:10px"><i class="ti ti-player-pause"></i> 已暫停</span>':''}${p.alias?`<br><span class="sub">配方名：${p.alias}</span>`:''}</span>
          ${p.status==='completed'?`<button class="btn btn--ghost btn--sm" style="width:auto;padding:0 12px" onclick="A.openDrive('${p.id}')"><i class="ti ti-download"></i> PIF</button>`:''}</div>
        </div>`).join('')+`</div>`;
      return collGroup(SM[k][1], SM[k][0], grp.length, body);
    }).join('');
  } else {
    h+=`<div class="empty"><i class="ti ti-clipboard"></i>還沒有產品，請到「送驗」新增</div>`;
  }
  h+=`<div class="sect mt">依洛嘉目前可共用的 PIF 產品</div>`;
  h+= collGroup('s','可共用 PIF', sharedPIF.length, `<div class="stack">`+ sharedPIF.map((it,i)=>`
      <div class="card compact row" data-nm="${it.name}"><span><span class="nm" style="font-size:13.5px">${it.name}</span><br><span class="sub">${it.type} · 已有 PIF</span></span>
        <button class="btn btn--ok btn--sm" style="width:auto;padding:0 14px" onclick="A.sharePIF(${i})">共用</button></div>`).join('')+`</div>`);
  h+=`<div class="faint" style="font-size:12px;margin-top:12px"><i class="ti ti-lock"></i> 只顯示你自己的產品與依洛嘉可共用清單，看不到其他客戶資料。</div>`;
  return h;
}

/* ===================== ELOGA ===================== */
function elgHeader(){
  const gear = (elgRole==='主要管理者') ? `<button class="hbtn" onclick="A.openAccounts()"><i class="ti ti-settings"></i> 帳號</button>` : '';
  return `<div class="hd">
    <div><h1 style="font-size:20px">依洛嘉後臺</h1><p style="margin:5px 0 0;font-size:12px" class="muted">${elgRole} · 可檢視與管理全部客戶</p></div>
    <div style="display:flex;align-items:center;gap:12px">${gear}<button class="iconbtn" onclick="A.logout()" title="登出"><i class="ti ti-logout"></i></button></div>
  </div>`;
}
function elgApp(){
  const TI={ home:['layout-dashboard','總覽'], customers:['users','客戶'], library:['database','樣品庫'], receive:['package-import','收件'], apply:['list-check','申請'], data:['file-spreadsheet','送驗資料'], invoice:['receipt-2','請款'], pif:['clipboard-check','完成 PIF'] };
  const allowed = ELG_TABS[elgRole]||ELG_TABS['主要管理者'];
  if(!allowed.includes(elgTab)) elgTab=allowed[0];
  const tabs=allowed.map(id=>tab(elgTab,id,TI[id][0],TI[id][1],'A.setElgTab')).join('');
  return elgHeader() +
    `<div class="screen">${elgScreen()}</div>` +
    `<div class="tabbar">${tabs}</div>`;
}
function elgScreen(){
  if(elgTab==='home') return elgHome();
  if(elgTab==='customers') return elgCustomers();
  if(elgTab==='library') return elgLibrary();
  if(elgTab==='receive') return elgReceive();
  if(elgTab==='apply') return elgApply();
  if(elgTab==='data') return elgData();
  if(elgTab==='invoice') return elgInvoice();
  if(elgTab==='board') return boardBody();
  return elgPif();
}
function boardBody(){
  if(role==='customer') return custBoard();
  // 公共平臺（未登入）：唯讀。只揭露可共用 PIF 明細，不顯示任何特定客戶資料。
  let h=`<div class="note" style="margin-bottom:12px"><i class="ti ti-lock"></i>這是客戶公共平臺（唯讀）。登入後可查看「自己已寄送樣品」的收發狀態；未登入僅顯示下方可共用的 PIF 明細。</div>`;
  h+=`<div class="sect">可共用 PIF 明細</div>`;
  h+= srchBar('搜尋可共用 PIF…');
  h+= sharedPIF.length ? collGroup('s','可共用 PIF', sharedPIF.length,
      `<div class="stack">`+ sharedPIF.map(it=>`
        <div class="card compact" data-nm="${it.name} ${it.type||''}"><div class="row" style="align-items:center;gap:8px">
          <span style="flex:1;min-width:0"><span class="nm" style="font-size:13.5px">${it.name}</span><br><span class="sub">${it.type||'—'} · 已有 PIF</span></span>
          <span class="pill pill--s" style="font-size:11px">可共用</span></div></div>`).join('')+`</div>`)
    : `<div class="card faint" style="text-align:center;padding:18px">目前沒有可共用的 PIF</div>`;
  h+=`<div class="faint" style="font-size:12px;margin-top:12px"><i class="ti ti-login"></i> 想查自己樣品的收發狀態？請以客戶身分登入。</div>`;
  return h;
}
function boardScreen(){
  return `<div class="hd"><div><h1>客戶公共平臺</h1><p>樣品收發狀態與可共用 PIF</p></div>
      <button class="iconbtn" onclick="A.backEntry()" title="關閉"><i class="ti ti-x"></i></button></div>
    <div class="screen">${boardBody()}</div>`;
}
function elgApply(){
  const list=products.filter(p=>p.status==='applied');
  let h=`<div class="row sect"><span>送驗申請（待確認允許寄送）</span><span class="pill pill--w">${list.length}</span></div>`;
  h+=`<div class="note" style="margin:8px 0 12px"><i class="ti ti-list-check"></i>客戶送來的送驗申請，確認後即「允許寄送」，回送客戶端讓他們備樣寄出。</div>`;
  h+= list.length ? `<div class="stack">`+ list.map(p=>`
      <div class="card">
        <div class="row"><span><span class="nm" style="font-size:15px">${p.name}</span>
          <br><span class="sub">${custName(p)}${p.alias?' · 配方名：'+p.alias:''}</span></span>
          <span class="pill pill--w">申請中</span></div>
        <div class="sub" style="margin-top:6px">${p.spec||'—'} · ${p.qty||'—'}</div>
        <button class="btn btn--ok btn--sm" style="margin-top:10px" onclick="A.allowShip('${p.id}')"><i class="ti ti-check"></i> 確認並允許寄送</button>
      </div>`).join('')+`</div>`
    : `<div class="empty"><i class="ti ti-inbox"></i>目前沒有待確認的送驗申請</div>`;
  const cancels=products.filter(p=>p.cancelReq);
  h+=`<div class="row sect mt"><span>撤銷申請（已確認項目 · 待同意）</span><span class="pill pill--w">${cancels.length}</span></div>`;
  h+= cancels.length ? `<div class="stack">`+ cancels.map(p=>`
      <div class="card" style="border-color:var(--w)">
        <div class="row"><span><span class="nm" style="font-size:15px">${p.name}</span>
          <br><span class="sub">${custName(p)} · 目前：${SM[p.status][0]}</span></span></div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn btn--sm" style="background:#C0392B" onclick="A.approveCancel('${p.id}')"><i class="ti ti-trash"></i> 同意撤銷</button>
          <button class="btn btn--ghost btn--sm" onclick="A.rejectCancel('${p.id}')">駁回</button>
        </div>
      </div>`).join('')+`</div>`
    : `<div class="card faint" style="text-align:center;padding:16px">目前沒有撤銷申請</div>`;
  return h;
}
function elgHome(){
  const c=st=>products.filter(p=>p.status===st).length;
  const reg=customers.filter(x=>x.status==='已啟用').length;
  const pend=customers.filter(x=>x.status==='待審核').length;
  const cards=[
    ['applied','等待確認','list-check','apply'],
    ['shipped','待收件','package-import','receive'],
    ['received','待開收款單','receipt-2','invoice'],
    ['reported','待查帳','cash','invoice'],
    ['paid','待生成送驗','file-invoice','data'],
    ['testing','送驗中','flask','pif'],
    ['reporting','PIF製作中','clipboard-text','pif'],
    ['completed','已完成 PIF','circle-check','pif']
  ];
  let h=`<div class="note" style="margin-bottom:14px"><i class="ti ti-layout-dashboard"></i>全流程總覽 · 點任一階段直接前往處理。</div>`;
  h+=`<div class="dash">`+ cards.map(([st,lbl,ic,tab])=>`
      <div class="metric" onclick="A.go('${tab}')"><div class="mi"><i class="ti ti-${ic}"></i></div>
        <div class="mv">${c(st)}</div><div class="ml">${lbl}</div></div>`).join('')+`</div>`;
  h+=`<div class="sect mt">客戶帳號</div>
    <div class="dash">
      <div class="metric"><div class="mi" style="background:var(--s-bg);color:var(--s)"><i class="ti ti-users"></i></div><div class="mv">${reg}</div><div class="ml">已註冊</div></div>
      <div class="metric ${pend?'':''}" ${elgRole==='主要管理者'?'onclick="A.openAccounts()"':''}><div class="mi" style="background:var(--w-bg);color:var(--w)"><i class="ti ti-user-plus"></i></div><div class="mv">${pend}</div><div class="ml">客戶申請</div></div>
    </div>`;
  return h;
}
function elgLibrary(){
  const order=['applied','approved','shipped','received','invoiced','reported','paid','testing','reporting','completed'];
  const allCusts=[...new Set(products.map(p=>custName(p)))];
  const stPresent=order.filter(k=>products.some(p=>p.status===k));
  const rows=products.filter(p=> !libStatOff[p.status] && !libCustOff[custName(p)] && (!libQ || p.name.indexOf(libQ)>=0))
    .slice().sort((a,b)=> custName(a).localeCompare(custName(b),'zh-Hant') || order.indexOf(a.status)-order.indexOf(b.status));
  const selN=rows.filter(p=>batch[p.id]).length;
  const opts=order.map(k=>`<option value="${k}">${SM[k][0]}</option>`).join('');
  let h=`<div class="note" style="margin-bottom:12px"><i class="ti ti-database"></i>樣品庫 · 所有客戶送出／已收款／完成的樣品總表。可上傳 Excel／照片辨識匯入，篩選後勾選批量套用狀態並同步客戶看板。</div>`;
  // 匯入庫：Excel + 照片 OCR
  const impCusts=[...new Set(products.map(p=>custName(p)))].concat(customers.map(c=>c.name)).filter((v,i,a)=>v&&a.indexOf(v)===i);
  const tgt=libImpCust||impCusts[0]||'';
  h+=`<div class="card" style="margin-bottom:14px">
      <div class="nm" style="font-size:14px;margin-bottom:10px"><i class="ti ti-upload"></i> 匯入到樣品庫</div>
      <label class="btn btn--ghost" style="display:flex;cursor:pointer"><i class="ti ti-file-spreadsheet"></i> 上傳 Excel 樣品清單（自動辨識公司與樣品）
        <input type="file" accept=".xlsx" style="display:none" onchange="A.importSongyan(this)"></label>
      <div style="display:flex;gap:8px;margin-top:10px;align-items:flex-end;flex-wrap:wrap">
        <div style="flex:1;min-width:150px"><label class="lbl">照片辨識歸入客戶</label>
          <select class="fld fld--mini" onchange="A.setLibImpCust(this.value)">${impCusts.length?impCusts.map(nm=>`<option ${nm===tgt?'selected':''}>${nm}</option>`).join(''):'<option>（尚無客戶）</option>'}</select></div>
        <label class="btn btn--ghost" style="flex:none;width:auto;padding:0 16px;display:flex;cursor:pointer;margin:0"><i class="ti ti-camera"></i> 上傳照片辨識
          <input type="file" accept="image/*" style="display:none" onchange="A.importPhoto(this)"></label>
      </div>
      <label class="lbl" style="margin-top:10px">貼上文字辨識（LINE／Excel 複製，一行一品）</label>
      <textarea class="fld" id="libPaste" rows="3" placeholder="例：&#10;玫瑰精油  100ml  4瓶&#10;B5安瓶  30ml  5瓶"></textarea>
      <button class="btn btn--ghost btn--sm" style="margin-top:8px" onclick="A.importPaste()"><i class="ti ti-clipboard-check"></i> 辨識文字（進待確認）</button>
      ${ocrBusy?`<div class="sub" style="margin-top:10px"><i class="ti ti-loader"></i> 照片辨識中，首次需下載辨識模型，請稍候…</div>`:''}
      <div class="faint" style="font-size:12px;margin-top:8px">照片／文字會先進下方「待確認」清單，核對後再歸入客戶端（Excel 例外，依「公司資料」欄自動建立客戶並直接匯入）。</div>
    </div>`;
  // 待確認辨識結果（核對後再歸入客戶端）
  if(libDrafts.length){
    const order2=['applied','approved','shipped','received','invoiced','reported','paid','testing','reporting','completed'];
    h+=`<div class="card" style="margin-bottom:14px;border-color:var(--accent)">
        <div class="row" style="margin-bottom:8px"><span class="nm" style="font-size:14px"><i class="ti ti-checkup-list"></i> 待確認辨識結果（${libDrafts.length}）</span>
          <span class="muted" style="font-size:13px;font-weight:600;cursor:pointer" onclick="A.libClearDrafts()">清空</span></div>
        <div class="tablewrap"><table class="dtable">
          <thead><tr><th>客戶</th><th>品名</th><th>規格</th><th>數量</th><th style="width:40px"></th></tr></thead>
          <tbody>`+ libDrafts.map((d,i)=>`
            <tr>
              <td data-label="客戶"><input class="fld fld--mini" value="${(d.cust||'').replace(/"/g,'&quot;')}" placeholder="${tgt||'所選客戶'}" onchange="A.libDraftSet(${i},'cust',this.value)"></td>
              <td data-label="品名"><input class="fld fld--mini" value="${(d.name||'').replace(/"/g,'&quot;')}" onchange="A.libDraftSet(${i},'name',this.value)"></td>
              <td data-label="規格"><input class="fld fld--mini" value="${(d.spec||'').replace(/"/g,'&quot;')}" onchange="A.libDraftSet(${i},'spec',this.value)"></td>
              <td data-label="數量"><input class="fld fld--mini" value="${(d.qty||'').replace(/"/g,'&quot;')}" onchange="A.libDraftSet(${i},'qty',this.value)"></td>
              <td data-label=""><span style="cursor:pointer;color:#C0392B" onclick="A.libDraftDel(${i})"><i class="ti ti-trash"></i></span></td>
            </tr>`).join('')+`</tbody></table></div>
        <div style="display:flex;gap:8px;align-items:flex-end;margin-top:12px;flex-wrap:wrap">
          <div style="flex:1;min-width:150px"><label class="lbl">匯入後狀態</label>
            <select class="fld fld--mini" onchange="A.setLibImpStatus(this.value)">${order2.map(k=>`<option value="${k}" ${libImpStatus===k?'selected':''}>${SM[k][0]}</option>`).join('')}</select></div>
          <button class="btn" style="flex:none;width:auto;padding:0 16px;margin:0" onclick="A.libCommitDrafts()"><i class="ti ti-check"></i> 確認並匯入到客戶端</button>
        </div>
        <div class="faint" style="font-size:12px;margin-top:6px">未填客戶的列會歸入上方所選客戶；Excel 會自動帶入各列公司。客戶端與「申請」分頁可再確認。</div>
      </div>`;
  }
  h+=`<label class="lbl">狀態篩選（點選切換顯示）</label>
    <div class="chips">`+ stPresent.map(k=>`<span class="fchip ${libStatOff[k]?'':'on'}" onclick="A.libToggleStat('${k}')">${SM[k][0]} ${products.filter(p=>p.status===k).length}</span>`).join('')+`</div>`;
  h+=`<label class="lbl">客戶篩選</label>
    <div class="chips">`+ allCusts.map(nm=>`<span class="fchip ${libCustOff[nm]?'':'on'}" onclick="A.libToggleCust('${nm}')">${nm}</span>`).join('')+`</div>`;
  h+=`<input class="fld" placeholder="搜尋品名…" value="${libQ}" oninput="A.libSearch(this.value)" style="margin-bottom:12px">`;
  // 批量工具列
  h+=`<div class="card libbar" style="background:var(--n-bg);border:0;margin-bottom:14px">
      <span class="nm" style="font-size:14px" data-selcount="lib">已選 ${selN} / ${rows.length} 筆</span>
      <span class="muted" style="font-size:13px;font-weight:600;cursor:pointer" data-selall="lib" onclick="A.libAll()">${selN===rows.length&&rows.length?'取消全選':'全選目前清單'}</span>
      <span style="flex:1"></span>
      <select class="fld" id="batchSt" style="width:auto;min-width:150px">${opts}</select>
      <button class="btn btn--sm" style="width:auto;padding:0 14px" data-needsel ${selN?'':'disabled'} onclick="A.libApply()"><i class="ti ti-send"></i> 套用狀態並同步客戶看板</button>
      <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px" data-needsel ${selN?'':'disabled'} onclick="A.batchGen()"><i class="ti ti-file-stack"></i> 生成合約＋清單</button>
      <button class="btn btn--sm" style="width:auto;padding:0 14px;background:${confirmDel==='batch'?'#C0392B':'#B23A3A'}" data-needsel ${selN?'':'disabled'} onclick="A.batchDelete()"><i class="ti ti-trash"></i> ${confirmDel==='batch'?'確認刪除？':'刪除所選'}</button>
      <select class="fld fld--mini" id="batchCust" style="width:auto;min-width:130px">${vendorOpts('')}</select>
      <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 12px" data-needsel ${selN?'':'disabled'} onclick="A.batchReassign()"><i class="ti ti-arrows-exchange"></i> 轉移廠商</button>
    </div>`;
  // 總表
  h+=`<div class="tablewrap"><table class="dtable">
    <thead><tr><th style="width:34px"></th><th>客戶</th><th>品名</th><th>規格</th><th>數量</th><th>檢驗項目</th><th>費用</th><th>狀態</th><th style="width:40px"></th></tr></thead>
    <tbody>`+ (rows.length ? rows.map(p=>`
      <tr class="${batch[p.id]?'sel':''}" data-nm="${p.name}">
        <td data-label=""><span class="ck ${batch[p.id]?'on':''}" data-ckid="${p.id}" onclick="A.toggleBatch('${p.id}')" style="cursor:pointer"><i class="ti ti-check"></i></span></td>
        <td data-label="客戶" style="white-space:nowrap">${custName(p)}</td>
        <td data-label="品名"><span class="nm" style="font-size:13.5px">${p.name}</span>${p.alias?`<br><span class="sub">配方名：${p.alias}</span>`:''}${p.cancelReq?`<br><span class="sub" style="color:var(--w)">客戶申請撤銷中</span>`:''}</td>
        <td data-label="規格" style="white-space:nowrap">${p.spec||'—'}</td>
        <td data-label="數量" style="white-space:nowrap">${p.qty||'—'}</td>
        <td data-label="檢驗項目" style="white-space:nowrap">${testText(p.t)}</td>
        <td data-label="費用" style="white-space:nowrap">${money(feeOf(p.t))}</td>
        <td data-label="狀態">${pill(p.status)}</td>
        <td data-label=""><span style="cursor:pointer;color:${confirmDel===p.id?'#C0392B':'var(--faint)'}" title="刪除" onclick="A.delProduct('${p.id}')"><i class="ti ti-trash"></i></span></td>
      </tr>`).join('') : `<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--muted)">目前篩選沒有符合的樣品</td></tr>`)
    +`</tbody></table></div>`;
  return h;
}
function elgCustomers(){
  const order=['applied','approved','shipped','received','invoiced','reported','paid','testing','reporting','completed'];
  // 客戶列表（含各廠商狀態分佈）
  if(!custView){
    const names=[...new Set(products.map(p=>custName(p)))].concat(customers.map(c=>c.name)).filter((v,i,a)=>v&&a.indexOf(v)===i);
    let h=`<div class="note" style="margin-bottom:12px"><i class="ti ti-users"></i>各廠商送驗狀態總覽 · 點廠商進入詳情，可逐件查看與手動修改狀態。</div>`;
    h+= srchBar('搜尋廠商…');
    h+=`<div class="stack">`+ names.map(nm=>{
      const its=products.filter(p=>custName(p)===nm);
      const cobj=customers.find(c=>c.name===nm);
      const chips=order.filter(k=>its.some(p=>p.status===k)).map(k=>{
        const n=its.filter(p=>p.status===k).length;
        return `<span class="pill pill--${SM[k][1]}" style="font-size:11px">${SM[k][0]} ${n}</span>`;
      }).join(' ');
      return `<div class="card" data-nm="${nm}" onclick="A.openCust('${nm}')" style="cursor:pointer">
        <div class="row"><span class="nm" style="font-size:15px"><i class="ti ti-building-store"></i> ${nm}</span>
          <span class="muted" style="font-size:13px">${its.length} 件 <i class="ti ti-chevron-right faint"></i></span></div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px">${chips||'<span class="faint" style="font-size:12px">尚無送驗商品</span>'}</div>
        ${cobj&&cobj.drive?`<div class="sub" style="margin-top:6px"><i class="ti ti-cloud"></i> ${cobj.driveAuth?'雲端硬碟已授權客戶':'雲端硬碟已設、未授權'}</div>`:''}
      </div>`;
    }).join('')+`</div>`;
    return h;
  }
  // 客戶詳情：狀態儀表板 + 依狀態分組 + 逐件詳細＋手動修改
  const nm=custView;
  const its=products.filter(p=>custName(p)===nm);
  const cobj=customers.find(c=>c.name===nm);
  const selN=its.filter(p=>batch[p.id]).length;
  const optsel=order.map(k=>`<option value="${k}">${SM[k][0]}</option>`).join('');
  let h=`<div class="row" style="margin-bottom:10px"><span class="nm" style="font-size:17px;cursor:pointer" onclick="A.openCust(null)"><i class="ti ti-arrow-left"></i> ${nm}</span>
      <span class="pill pill--i">${its.length} 件</span></div>`;
  // 狀態儀表板
  const present=order.filter(k=>its.some(p=>p.status===k));
  h+=`<div class="dash" style="margin-bottom:14px">`+ present.map(k=>`
      <div class="metric"><div class="mi" style="background:var(--${SM[k][1]}-bg);color:var(--${SM[k][1]})"><i class="ti ti-circle-dot"></i></div>
        <div class="mv">${its.filter(p=>p.status===k).length}</div><div class="ml">${SM[k][0]}</div></div>`).join('')
    + (present.length?'':`<div class="card faint" style="grid-column:1/-1;text-align:center;padding:16px">此廠商尚無送驗商品</div>`) +`</div>`;
  // 雲端硬碟：儲存 + 授權
  const dv=cobj?(cobj.drive||''):'';
  const auth=!!(cobj&&cobj.driveAuth);
  h+=`<div class="card" style="margin-bottom:12px">
      <div class="row" style="margin-bottom:8px"><span class="nm" style="font-size:14px"><i class="ti ti-cloud"></i> 雲端硬碟（PIF 資料夾）</span>
        <span class="pill pill--${auth?'s':'n'}">${auth?'已授權客戶':'未授權'}</span></div>
      <label class="lbl">資料夾連結（儲存）</label>
      <input class="fld" value="${dv}" placeholder="貼上分配給此客戶的 Google 雲端資料夾連結" onchange="A.setCustDriveByName('${nm}',this.value)">
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn--sm" style="${auth?'background:#C0392B':''}" ${dv?'':'disabled'} onclick="A.toggleCustAuth('${nm}')">
          <i class="ti ti-${auth?'lock':'lock-open'}"></i> ${auth?'取消授權':'授權客戶存取'}</button>
        ${dv?`<button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px" onclick="A.openCustDrive('${nm}')"><i class="ti ti-external-link"></i> 開啟</button>`:''}
      </div>
      <div class="faint" style="font-size:12px;margin-top:8px">${dv?(auth?'客戶已可在自己的看板開啟／下載此資料夾的 PIF。':'已儲存連結，但尚未授權；客戶端目前看不到。按「授權客戶存取」開放。'):'尚未儲存資料夾連結。'}</div>
    </div>`;
  // 批量工具列
  h+=`<div class="card" style="background:var(--n-bg);border:0;margin-bottom:12px">
      <div class="row"><span class="nm" data-selcount="cust">批量處理（已選 ${selN}）</span>
        <span class="muted" style="font-size:13px;font-weight:600;cursor:pointer" data-selall="cust" onclick="A.batchAll('${nm}')">${selN===its.length&&its.length?'取消全選':'全選'}</span></div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        <select class="fld" id="batchSt" style="flex:1;min-width:130px">${optsel}</select>
        <button class="btn btn--sm" style="width:auto;padding:0 14px" data-needsel ${selN?'':'disabled'} onclick="A.batchStatus()">套用狀態</button>
      </div>
      <button class="btn btn--sm" style="margin-top:8px" data-needsel ${selN?'':'disabled'} onclick="A.batchGen()"><i class="ti ti-file-stack"></i> 批量生成合約＋清單（已選 ${selN}）</button>
      <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
        <select class="fld fld--mini" id="batchCust" style="flex:1;min-width:140px">${vendorOpts(nm)}</select>
        <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px" data-needsel ${selN?'':'disabled'} onclick="A.batchReassign()"><i class="ti ti-arrows-exchange"></i> 轉移所選到此廠商</button>
      </div>
      <button class="btn btn--sm" style="margin-top:8px;background:${confirmDel==='batch'?'#C0392B':'#B23A3A'}" data-needsel ${selN?'':'disabled'} onclick="A.batchDelete()"><i class="ti ti-trash"></i> ${confirmDel==='batch'?'確認刪除？再按一次':'刪除所選'}</button>
    </div>`;
  // 表格式清單：勾選 + 可改規格/數量 + 內嵌狀態下拉
  const sorted=its.slice().sort((a,b)=> order.indexOf(a.status)-order.indexOf(b.status));
  h+=`<div class="tablewrap"><table class="dtable">
    <thead><tr><th style="width:34px"></th><th>品名</th><th>規格</th><th>數量</th><th>檢驗項目</th><th>費用</th><th>狀態（可改）</th></tr></thead>
    <tbody>`+ (sorted.length ? sorted.map(p=>`
      <tr class="${batch[p.id]?'sel':''}">
        <td data-label=""><span class="ck ${batch[p.id]?'on':''}" data-ckid="${p.id}" onclick="A.toggleBatch('${p.id}')" style="cursor:pointer"><i class="ti ti-check"></i></span></td>
        <td data-label="品名"><span class="nm" style="font-size:13.5px">${p.name}</span>${p.alias?`<br><span class="sub">配方名：${p.alias}</span>`:''}${p.cancelReq?`<br><span class="sub" style="color:var(--w)">客戶申請撤銷中</span>`:''}</td>
        <td data-label="規格"><input class="fld fld--mini" value="${p.spec||''}" onchange="A.setField('${p.id}','spec',this.value)"></td>
        <td data-label="數量"><input class="fld fld--mini" value="${p.qty||''}" onchange="A.setField('${p.id}','qty',this.value)"></td>
        <td data-label="檢驗項目" style="white-space:nowrap">${testText(p.t)}</td>
        <td data-label="費用" style="white-space:nowrap">${money(feeOf(p.t))}</td>
        <td data-label="狀態"><select class="fld fld--mini" onchange="A.setStatus('${p.id}',this.value)">
          ${order.map(o=>`<option value="${o}" ${p.status===o?'selected':''}>${SM[o][0]}</option>`).join('')}
        </select>
        <button class="btn btn--ghost btn--sm" style="margin-top:6px;width:100%;${p.paused?'color:#C0392B':''}" onclick="A.togglePause('${p.id}')"><i class="ti ti-player-${p.paused?'play':'pause'}"></i> ${p.paused?'已暫停 · 點此恢復':'暫停（不退款）'}</button></td>
      </tr>`).join('') : `<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--muted)">此廠商尚無送驗商品</td></tr>`)
    +`</tbody></table></div>`;
  return h;
}
function elgReceive(){
  const waiting=P('shipped');
  const recent=P('received');
  let h=`<div class="dash" style="margin-bottom:16px">
      <div class="metric"><div class="mi" style="background:var(--w-bg);color:var(--w)"><i class="ti ti-truck-loading"></i></div><div class="mv">${waiting.length}</div><div class="ml">待收件</div></div>
      <div class="metric"><div class="mi" style="background:var(--s-bg);color:var(--s)"><i class="ti ti-package"></i></div><div class="mv">${recent.length}</div><div class="ml">已收樣</div></div>
    </div>`;
  h += `<div class="addr" style="margin-bottom:16px"><div class="t">收件地址（客戶寄樣到此）</div><div class="a">${ADDR}</div><div class="a" style="margin-top:2px">電話 ${ELG_TEL}</div></div>`;
  h += `<div class="row sect"><span>待收件</span><span class="pill pill--w">${waiting.length}</span></div>`;
  h += waiting.length ? `<div class="stack">`+ waiting.map(p=>`
      <div class="card" style="border-color:var(--w)"><div class="row">
        <span><span class="nm">${p.name}</span><br><span class="sub">${custName(p)} · ${p.qty}</span></span>
        <button class="btn btn--ok btn--sm" style="width:auto;padding:0 16px" onclick="A.receive('${p.id}')">接收</button>
      </div></div>`).join('')+`</div>`
    : `<div class="card faint" style="text-align:center;padding:20px">沒有待收件樣品</div>`;
  h += `<div class="row sect mt"><span>已接收</span><span class="pill pill--s">${recent.length}</span></div>`;
  h += recent.length ? `<div class="stack">`+ recent.map(p=>`
      <div class="card row"><span><span class="nm" style="font-size:15px">${p.name}</span><br><span class="sub">${custName(p)}</span></span>
      <span class="pill pill--s"><i class="ti ti-check"></i> 已接收</span></div>`).join('')+`</div>`
    : `<div class="empty" style="padding:24px"><i class="ti ti-inbox"></i>尚未接收</div>`;
  return h;
}
function elgData(){
  const pool=products.filter(p=>p.status==='paid');
  if(!pool.length) return `<div class="empty"><i class="ti ti-file-off"></i>沒有待送驗的項目（需先完成收款查帳）</div>`;
  if(!dataPid || !pool.find(p=>p.id===dataPid)) dataPid=pool[0].id;
  const p=byId(dataPid); p.t=p.t||{fang:true,chang:true,wen:false};
  const prices={fang:500,chang:200,wen:350};
  const sum=Object.keys(prices).reduce((s,k)=>s+(p.t[k]?prices[k]:0),0);
  const trow=(k,label,price)=>`

function elgInvoice(){
  const recv=P('received');
  const issued=P('invoiced');
  const toCheck=P('reported');
  if(!recv.length && !issued.length && !toCheck.length) return `<div class="empty"><i class="ti ti-receipt-off"></i>目前沒有待請款／已開單／待查帳的項目</div>`;
  const custs=[...new Set(recv.map(p=>custName(p)))];
  recv.forEach(p=>{ if(p.invSel===undefined) p.invSel=true; if(!p.feeSel) p.feeSel=5000; });
  let h=`<div class="note" style="margin-bottom:14px"><i class="ti ti-users"></i>收款單依客戶分開：各客戶獨立勾選樣品與檢驗費（$5,000／$10,000），分別開單回送該客戶。</div>`;
  h += `<div class="row sect"><span>開收款單（已收樣）</span><span class="pill pill--i">${recv.length}</span></div>`;
  h += recv.length ? custs.map(cn=>{
    const items=recv.filter(p=>custName(p)===cn);
    const tot=items.filter(p=>p.invSel).reduce((s,p)=>s+(p.feeSel||0),0);
    const cobj=customers.find(c=>c.name===cn); const isC=cobj&&cobj.contract; const bal=cobj?(cobj.balance||0):0;
    return `<div class="card" style="margin-bottom:12px">
      <div class="row" style="margin-bottom:8px"><span class="nm" style="font-size:15px"><i class="ti ti-building-store"></i> ${cn}${isC?' <span class="pill pill--s" style="font-size:10px">合約制</span>':''}</span><span class="pill pill--i">${items.length} 項</span></div>
      ${isC?`<div class="sub" style="margin-bottom:4px">合約餘額：<b style="color:${bal>=tot?'var(--s)':'var(--w)'}">${money(bal)}</b>${bal<tot?'（不足，差額將改開收款單）':''}</div>`:''}
      ${items.map(p=>`
        <div style="border-top:1px solid var(--line);padding-top:10px;margin-top:10px">
          <div class="selrow ${p.invSel?'on':''}" style="border:0;padding:0" onclick="A.toggleInv('${p.id}')">

            <span style="flex:1"><span class="nm">${p.name}</span><br><span class="sub">${p.batch||''} · ${p.qty||''}</span></span>
          </div>
          <div class="seg" style="margin-top:8px">
            <button class="${p.feeSel===5000?'on':''}" onclick="A.setFee('${p.id}',5000)">$5,000 檢驗費</button>
            <button class="${p.feeSel===10000?'on':''}" onclick="A.setFee('${p.id}',10000)">$10,000 檢驗費</button>
          </div>
        </div>`).join('')}
      <div class="total" style="margin-top:10px"><span class="muted">${cn} 合計</span><span class="amt">${money(tot)}</span></div>
      ${isC
        ? `<button class="btn btn--ok btn--sm" style="margin-top:10px" ${tot?'':'disabled'} onclick="A.settleByContract('${cn}')"><i class="ti ti-wallet"></i> 依合約餘額自動結算（不足改開收款單）</button>`
        : `<button class="btn btn--sm" style="margin-top:10px" ${tot?'':'disabled'} onclick="A.issueInvoiceFor('${cn}')"><i class="ti ti-send"></i> 開收款單給 ${cn}</button>`}
    </div>`;
  }).join('') : `<div class="card faint" style="text-align:center;padding:16px">沒有待開單的樣品</div>`;

  h += `<div class="row sect mt"><span>已開收款單（待客戶匯款）</span><span class="pill pill--i">${issued.length}</span></div>`;
  if(issued.length){
    const icusts=[...new Set(issued.map(p=>custName(p)))];
    h += icusts.map(cn=>{
      const its=issued.filter(p=>custName(p)===cn);
      const tot=its.reduce((s,p)=>s+(p.charge||0),0);
      return `<div class="card" style="margin-bottom:12px">
        <div class="row" style="margin-bottom:6px"><span class="nm" style="font-size:15px"><i class="ti ti-receipt-2"></i> ${cn}</span><span class="pill pill--w">待匯款</span></div>
        ${its.map(p=>`<div class="miniline"><span>${p.name}</span><span>${money(p.charge||0)}</span></div>`).join('')}
        <div class="total"><span class="muted">${cn} 收款單合計</span><span class="amt">${money(tot)}</span></div>
      </div>`;
    }).join('');
  } else {
    h += `<div class="card faint" style="text-align:center;padding:16px">尚無已開出的收款單</div>`;
  }

  h += `<div class="row sect mt"><span>收款查帳（客戶已回報匯款）</span><span class="pill pill--w">${toCheck.length}</span></div>`;
  h += toCheck.length ? `<div class="stack">`+ toCheck.map(p=>`
      <div class="card" style="border-color:var(--w)"><div class="row">
        <span><span class="nm">${p.name}</span><br><span class="sub">${custName(p)} · ${money(p.charge)}</span></span></div>
        <div class="sub" style="margin-top:6px"><i class="ti ti-cash"></i> 匯款資訊：${p.payNote||'—'}</div>
        <button class="btn btn--ok btn--sm" style="margin-top:10px" onclick="A.confirmPay('${p.id}')"><i class="ti ti-checkbook"></i> 確認收到貨款</button>
      </div>`).join('')+`</div>`
    : `<div class="card faint" style="text-align:center;padding:16px">沒有待查帳項目</div>`;
  return h;
}

/* ---------- input methods ---------- */
function parseLines(text){
  return (text||'').split(/\n+/).map(s=>s.trim()).filter(Boolean)
    .filter(l=>!/^(客戶|您好|你好|哈囉|嗨|謝謝|感謝|麻煩|再麻煩|拜託|hi|hello|thanks|thank)/i.test(l))
    .map(l=>{
      let qty='', spec='', name=l;
      const qm=l.match(/(\d+)\s*(支|瓶|片|顆|盒|包|罐|組|入|條)/);
      if(qm){ qty=qm[0]; name=name.replace(qm[0],''); }
      const sm=l.match(/(\d+(?:\.\d+)?\s*(?:ml|g|kg|cc|毫升|公克|克)\s*\/?\s*(?:瓶|片|支|顆|包|盒)?)/i);
      if(sm){ spec=sm[0].trim(); name=name.replace(sm[0],''); }
      name=name.replace(/[，,：:。.、\-x×*]+/g,' ').replace(/\s+/g,' ').trim();
      return { name:name||l, en:'', spec:spec, qty:qty };
    });
}

function customerSection(){
  const pend=customers.filter(c=>c.status==='待審核');
  const active=customers.filter(c=>c.status==='已啟用');
  const off=customers.filter(c=>c.status==='已停用');
  const card=(c)=>{
    const i=customers.indexOf(c);
    const sc=c.status==='已啟用'?'s':(c.status==='待審核'?'w':'n');
    let act='';
    if(c.status==='待審核') act=`<div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn--ok btn--sm" onclick="A.approveCust(${i})"><i class="ti ti-check"></i> 審核通過</button>
        <button class="btn btn--ghost btn--sm" onclick="A.disableCust(${i})">拒絕</button></div>`;
    else if(c.status==='已啟用') act=`<div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px" onclick="A.disableCust(${i})"><i class="ti ti-ban"></i> 停用</button>
        <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px;color:#C0392B;border-color:#E7C3BD" onclick="A.delCustomer(${i})"><i class="ti ti-trash"></i> ${confirmDel==='ca'+i?'確認刪除？':'刪除帳號'}</button></div>
      <div style="margin-top:10px"><label class="lbl">PIF Google 資料夾連結</label>
        <input class="fld" value="${c.drive||''}" placeholder="貼上該客戶專屬資料夾連結" onchange="A.setCustDrive(${i},this.value)"></div>`;
    else act=`<div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn--sm" style="width:auto;padding:0 14px" onclick="A.enableCust(${i})"><i class="ti ti-rotate"></i> 重新啟用</button>
        <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 14px;color:#C0392B;border-color:#E7C3BD" onclick="A.delCustomer(${i})"><i class="ti ti-trash"></i> ${confirmDel==='ca'+i?'確認刪除？':'刪除帳號'}</button></div>`;
    const contractBlock = (c.status==='待審核') ? '' : `
      <div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13.5px;font-weight:600">
          <input type="checkbox" ${c.contract?'checked':''} onclick="A.toggleContract(${i})"> 合約制（送驗自動從預付餘額扣款）</label>
        ${c.contract?`<div style="margin-top:8px">
          <div class="sub">目前合約餘額：<b style="color:var(--s)">${money(c.balance||0)}</b></div>
          <div style="display:flex;gap:8px;margin-top:6px"><input class="fld fld--mini" id="bal_${i}" placeholder="輸入金額後設定" style="flex:1">
            <button class="btn btn--sm" style="width:auto;padding:0 14px" onclick="A.setBalance(${i})">設定餘額</button></div></div>`:''}
      </div>`;
    return `<div class="card"><div class="row"><span class="nm" style="font-size:15px">${c.name}</span>
      <span class="pill pill--${sc}">${c.status}</span></div>
      <div class="sub" style="margin-top:4px">${c.email||'尚未綁定'} · 登入：${c.login}</div>${act}${contractBlock}</div>`;
  };
  let h=`<div style="display:flex;gap:10px;margin:16px 0 14px">
      <div class="card" style="flex:1;text-align:center;padding:12px"><div style="font-size:24px;font-weight:700">${active.length}</div><div class="sub">已註冊帳號</div></div>
      <div class="card" style="flex:1;text-align:center;padding:12px;border-color:var(--w)"><div style="font-size:24px;font-weight:700;color:var(--w)">${pend.length}</div><div class="sub">客戶申請</div></div>
    </div>
    <div class="note" style="margin-bottom:12px"><i class="ti ti-user-check"></i>客戶以 Google／LINE 自由註冊，管理者在此審核或停用。</div>`;
  if(pend.length){ h+=`<div class="sect">客戶申請（待審核）</div><div class="stack">`+pend.map(card).join('')+`</div>`; }
  const reg=active.concat(off);
  h+=`<div class="sect mt">已註冊帳號（${reg.length}）· 公司名</div>`;
  h+= reg.length ? `<div class="stack">`+reg.map(card).join('')+`</div>`
    : `<div class="card faint" style="text-align:center;padding:18px">尚無已註冊帳號</div>`;
  if(custAddOpen){
    h += `<div class="card" style="margin-top:14px;border-color:var(--accent)">
      <p class="nm" style="font-size:15px;margin-bottom:10px"><i class="ti ti-building-plus"></i> 手動新增客戶</p>
      <label class="lbl">公司名（廠商名）</label><input id="c_name" class="fld" placeholder="例：晶寶企業行" style="margin-bottom:10px">
      <label class="lbl">Email（選填）</label><input id="c_mail" class="fld" placeholder="name@example.com" style="margin-bottom:10px">
      <label class="lbl">登入方式</label>
      <select id="c_login" class="fld" style="margin-bottom:12px"><option>手動</option><option>Google</option><option>LINE</option><option>匯入</option></select>
      <div style="display:flex;gap:8px">
        <button class="btn btn--sm" style="width:auto;padding:0 16px" onclick="A.addCustomer()"><i class="ti ti-check"></i> 建立客戶</button>
        <button class="btn btn--ghost btn--sm" style="width:auto;padding:0 16px" onclick="A.closeCustAdd()">取消</button>
      </div>
    </div>`;
  } else {
    h += `<button class="btn btn--ghost" style="margin-top:14px" onclick="A.openCustAdd()"><i class="ti ti-plus"></i> 手動新增客戶</button>`;
  }
  return h;
}

/* ---------- actions ---------- */
const A = {
  setRole(r){ role=r; render(); },

  setZone(z){ zone=z; if(view==='eloga-accounts') view='app'; render(); },

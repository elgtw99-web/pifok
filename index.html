  manualMarkInvPaid(id){
    if(!id){ A.toast('找不到收款單'); return; }
    if(confirmDel!=='mmip'+id){ confirmDel='mmip'+id; render(); A.toast('再按一次確認：手動標記 '+id+' 已收款（免匯款）'); return; }
    const ds=new Date().toLocaleDateString('zh-TW');
    const rec=invoiceRecs.find(r=>r.id===id);
    if(rec){
      // invoiceRecs 有記錄 → 走正常流程
      if(rec.status==='paid'){ confirmDel=null; render(); A.toast('⚠ 收款單 '+id+' 已是已收款狀態'); return; }
      rec.status='paid'; rec.paidAt=new Date().toISOString();
      rec.items.forEach(it=>{
        const p=byId(it.pid); if(!p) return;
        const iv=Array.isArray(p.invoices)?p.invoices.find(x=>x.id===rec.id):null;
        if(iv){
          const pd=(iv.payRecords||[]).reduce((s,r)=>s+(r.amt||0),0);
          const due=Math.max(0,(iv.amount||0)-pd);
          iv.payRecords=iv.payRecords||[];
          if(due>0) iv.payRecords.push({date:ds, amt:due, method:'手動確認', note:'手動確認免匯款 '+rec.id});
          iv.status='paid';
        } else {
          p.payRecords=p.payRecords||[];
          if(!p.payRecords.some(r=>r.note==='PIF費 '+rec.id)){
            p.payRecords.push({date:ds, amt:it.amt, method:'手動確認', note:'PIF費 '+rec.id+'（手動確認免匯款）'});
            p.paidAmt=(p.paidAmt||0)+it.amt;
          }
          if(rec.kind==='pif'){ p.pifFeePaid=true; p.pifCharge=it.amt; }
        }
      });
    } else {
      // invoiceRecs 找不到（舊資料） → 直接從 product 的 pifFeeInvoice 標記
      const affected=products.filter(p=>p.pifFeeInvoice===id && !p.pifFeePaid);
      if(!affected.length){ confirmDel=null; render(); A.toast('找不到與收款單 '+id+' 相關的品項，可能已收款'); return; }
      affected.forEach(p=>{
        const amt=p.pifCharge||0;
        p.payRecords=p.payRecords||[];
        if(!p.payRecords.some(r=>r.note==='PIF費 '+id)){
          p.payRecords.push({date:ds, amt, method:'手動確認', note:'PIF費 '+id+'（手動確認免匯款）'});
          p.paidAmt=(p.paidAmt||0)+amt;
        }
        p.pifFeePaid=true;
      });
    }
    confirmDel=null; save(); render();
    A.toast('✓ 已手動確認 '+id+' 收款，客戶端已更新狀態');
  },
  markInvPaid(id){
    const rec=invoiceRecs.find(r=>r.id===id); if(!rec) return;
    if(rec.status==='paid'){ A.toast('⚠ 收款單 '+id+' 已經是「已收款」狀態，無需重複標記', 3500); return; }
    rec.status='paid'; rec.paidAt=new Date().toISOString();
    rec.items.forEach(it=>{
      const p=byId(it.pid); if(!p) return;
      // 優先更新分期帳本中對應這張單的記錄（id === rec.id）
      const iv=Array.isArray(p.invoices)?p.invoices.find(x=>x.id===rec.id):null;
      if(iv){
        const pd=(iv.payRecords||[]).reduce((s,r)=>s+(r.amt||0),0);
        const due=Math.max(0,(iv.amount||0)-pd);
        iv.payRecords=iv.payRecords||[];
        if(due>0) iv.payRecords.push({date:rec.date, amt:due, method:rec.method, note:'確認收款 '+rec.id});
        iv.status='paid';
      } else {
        // 舊資料相容：沒有分期帳本就用舊欄位
        p.payRecords=p.payRecords||[];
        if(!p.payRecords.some(r=>r.note==='PIF費 '+rec.id)){
          p.payRecords.push({date:rec.date, amt:it.amt, method:rec.method, note:'PIF費 '+rec.id});
          p.paidAmt=(p.paidAmt||0)+it.amt;
        }
        if(rec.kind==='pif'){ p.pifFeePaid=true; p.pifCharge=it.amt; }
        else { p.charge=(p.charge||0)+it.amt; }
      }
    });
    save(); render(); A.toast('收款單 '+id+' 已標記收款完成');
  },
  deleteInvRec(id){
    const idx=invoiceRecs.findIndex(r=>r.id===id); if(idx<0) return;
    const rec=invoiceRecs[idx];
    // 撤回 product 的 PIF 費標記與收款記錄
    rec.items.forEach(it=>{
      const p=byId(it.pid); if(!p) return;
      p.payRecords=(p.payRecords||[]).filter(r=>r.note!=='PIF費 '+id && r.note!=='收款單 '+id);
      if(rec.status==='paid'){ p.paidAmt=Math.max(0,(p.paidAmt||0)-it.amt); p.charge=Math.max(0,(p.charge||0)-it.amt); }
      if(p.pifFeeInvoice===id){ delete p.pifFeeInvoice; delete p.pifFeePaid; delete p.pifCharge; }
    });
    invoiceRecs.splice(idx,1);

function fbHandleRedirect(){

function stripId(o){ const c=Object.assign({},o); delete c.id; return c; }
function fbDetach(){ FB.unsub.forEach(u=>{try{u();}catch(e){}}); FB.unsub=[]; FB.seeded=false; FB.cloudEmpty=false; }
function snapApply(name, arr, docs){
  // products 空（Firestore 尚未上傳）→ 保留本機種子，不清空
  if(name==='products' && docs.length===0 && arr.length>0){ FB.cloudEmpty=true; return; }
  if(name==='products' && docs.length>0){ FB.cloudEmpty=false; FB.seeded=true; }
  // 有 pending sync 還沒提交 → 跳過這次 snapshot，避免覆蓋本機最新狀態
  if(FB.syncT) return;
  // 其他集合若 products 尚未上傳也先保留
  if(FB.cloudEmpty && docs.length===0 && arr.length>0) return;
  arr.length=0; const m={};
  docs.forEach(d=>{ const o=Object.assign({}, d.data()); o.id=d.id; arr.push(o); m[d.id]=JSON.stringify(stripId(o)); });
  FB.last[name]=m;
}
function emailMap(){ const m={}; customers.forEach(c=>{ if(c.name) m[c.name]=c.email||''; }); m[ELG_SELF]=''; return m; }
function attachAdmin(){
  fbDetach();
  if(!FB_SYNC_READY) return;
  const C=(name,arr)=>FB.unsub.push(FB.db.collection(name).onSnapshot(s=>{ snapApply(name,arr,s.docs); FB.ready=true; render(); }, e=>{
    console.warn(name,e);
    if(e.code==='permission-denied'){ A.toast('⚠ 雲端讀取被拒（'+name+'）：Firestore 安全規則未開放，請設定規則允許登入者讀寫', 6000); }
    else { A.toast('雲端讀取錯誤（'+name+'）：'+(e.code||e.message), 5000); }
  }));
  C('products',products); C('customers',customers); C('staff',staff); C('sharedPIF',sharedPIF); C('showcase',showcase); C('publicShowcase',publicShowcase);
}
function attachCustomer(email){
  fbDetach();
  if(!FB_SYNC_READY){
    FB.ready=true; render(); return;
  }
  const myName=me.nameCh||'';
  // 訂閱 Firestore：抓 customerEmail 匹配的產品
  FB.unsub.push(FB.db.collection('products').where('customerEmail','==',email).onSnapshot(s=>{
    if(s.docs.length>0){
      snapApply('products',products,s.docs); FB.ready=true; render();
    } else {
      FB.ready=true; FB.cloudEmpty=true; render();
    }
  }, e=>{ FB.ready=true; render(); console.warn(e); }));
  // 額外訂閱：抓公司名匹配但沒 customerEmail 的舊產品，並補上 customerEmail
  if(myName){
    FB.unsub.push(FB.db.collection('products').where('cust','==',myName).onSnapshot(s=>{
      s.docs.forEach(d=>{
        const data=d.data();
        if(!data.customerEmail){
          // 補寫 customerEmail，讓之後的 ownedByMe 與訂閱都能對應
          FB.db.collection('products').doc(d.id).update({customerEmail:email}).catch(()=>{});
        }
        // 合併進本機 products（若不存在）
        if(!products.some(p=>p.id===d.id)){
          const o=Object.assign({},data); o.id=d.id; o.customerEmail=o.customerEmail||email;
          products.push(o);
        }
      });
      if(s.docs.length>0){ FB.ready=true; render(); }
    }, e=>console.warn(e)));
  }
  FB.unsub.push(FB.db.collection('customers').where('email','==',email).onSnapshot(s=>{
    if(s.docs.length>0) snapApply('customers',customers,s.docs);
    render();
  }, e=>console.warn(e)));
  FB.unsub.push(FB.db.collection('sharedPIF').where('state','in',['public','building']).onSnapshot(s=>{
    if(s.docs.length>0) snapApply('sharedPIF',sharedPIF,s.docs);
    render();
  }, e=>console.warn(e)));
  FB.unsub.push(FB.db.collection('showcase').onSnapshot(s=>{
    if(s.docs.length>0) snapApply('showcase',showcase,s.docs);
    render();
  }, e=>console.warn(e)));
}
function fbStart(){
  if(!FB.on) return;
  FB.auth.onAuthStateChanged(async user=>{
    FB.user=user;
    if(!user){ FB.role=null; FB.ready=false; fbDetach(); return; }
    try{
      // 如果從客戶入口登入，不檢查 staff，直接走客戶流程
      const fromCustomerPortal = window._loginSide==='customer';
      if(!fromCustomerPortal){
        const sd=await FB.db.collection('staff').doc(user.uid).get();
        if(sd.exists){
          FB.role='eloga'; role='eloga'; elgRole=(sd.data()&&sd.data().role)||'主要管理者'; zone='back'; elgTab='home'; view='app';
          attachAdmin(); render(); return;
        }
        // 方式 B：查 email 是否在邀請名單（Firestore staff）
        const sq=await FB.db.collection('staff').where('email','==',user.email.toLowerCase()).limit(1).get();
        if(!sq.empty){
          const inv=sq.docs[0].data(); const invId=sq.docs[0].id;
          await FB.db.collection('staff').doc(user.uid).set({
            name: inv.name||user.displayName||user.email,
            email: user.email.toLowerCase(),
            role: inv.role||'管理',
            uid: user.uid
          });
          if(invId!==user.uid) await FB.db.collection('staff').doc(invId).delete();
          FB.role='eloga'; role='eloga'; elgRole=inv.role||'管理'; zone='back'; elgTab='home'; view='app';
          attachAdmin(); render(); A.toast('帳號已自動開通，歡迎 '+(inv.name||user.email)); return;
        }
      }
      // 查是否為已知客戶（先查 Firestore lowercase，再查本機）
      const emailLower=user.email.toLowerCase();
      let q=await FB.db.collection('customers').where('email','==',emailLower).limit(1).get();
      if(q.empty) q=await FB.db.collection('customers').where('email','==',user.email).limit(1).get();
      const localCust=customers.find(c=>c.email&&c.email.toLowerCase()===emailLower);
      // 客戶登入後：先進資料確認頁，確認後才進主畫面
      const custData=!q.empty ? q.docs[0].data() : localCust || null;
      if(custData){
        FB.role='customer'; role='customer';
        // 設定 me 的基本資料
        me=Object.assign({}, me, {nameCh:custData.name, nameEn:custData.nameEn||'', addrCh:CINFO[custData.name]||custData.addrCh||me.addrCh||'', email:user.email, phone:custData.phone||me.phone||'', filled:false});
        attachCustomer(user.email);
        view='customer-confirm'; render(); // 先進確認頁
      } else {
        FB.role='pending'; role='guest'; view='fb-pending'; render();
      }
    }catch(e){ A.toast('登入後讀取失敗：'+e.message); console.warn(e); }
  });
}
function fbSync(){
  if(!FB.on||!FB.user||!FB.ready||FB.role==='pending') return;
  // 安全鎖：本機尚未從雲端載入資料時（cloudEmpty 為 false 代表雲端有資料，但本機 products 為空），
  // 禁止同步，避免空資料把雲端洗掉。
  if(FB.role==='eloga' && products.length===0 && !FB.cloudEmpty && !FB._allowEmptySync){
    console.warn('fbSync 已跳過：本機產品為空，避免覆蓋雲端');
    return;
  }
  try{
    const em=emailMap();
    const cols = FB.role==='eloga' ? ['products','customers','staff','sharedPIF','showcase','publicShowcase'] : ['products'];
    const ref={products,customers,staff,sharedPIF,showcase,publicShowcase};
    const batch=FB.db.batch(); let ops=0;
    cols.forEach(name=>{
      const arr=ref[name]||[]; const last=FB.last[name]||{}; const seen={};
      arr.forEach(o=>{
        if(!o.id) o.id=FB.db.collection(name).doc().id;
        const data=stripId(o);
        if(name==='products' && !data.customerEmail) { data.customerEmail=em[data.cust]||''; o.customerEmail=data.customerEmail; }
        seen[o.id]=true;
        const j=JSON.stringify(data);
        if(last[o.id]!==j){ batch.set(FB.db.collection(name).doc(o.id),data); last[o.id]=j; ops++; }
      });
      // 安全鎖：只在本機這個集合「非空」時，才刪除雲端多出的（避免空陣列清空雲端）
      if(arr.length>0){
        Object.keys(last).forEach(id=>{ if(!seen[id]){ batch.delete(FB.db.collection(name).doc(id)); delete last[id]; ops++; } });
      }
      FB.last[name]=last;
    });
    if(FB.role==='eloga'){ batch.set(FB.db.collection('meta').doc('config'),{CINFO},{merge:true}); ops++; }
    if(ops>0 && ops<=450) batch.commit().catch(e=>{
      console.warn('sync',e);
      if(e.code==='permission-denied'){ A.toast('⚠ 雲端寫入被拒：Firestore 安全規則未開放，資料無法上傳同步', 6000); }
    });
  }catch(e){ console.warn('fbSync',e); }
}

      <p class="nm" style="color:var(--s)"><i class="ti ti-check"></i> 申請成功</p>

}

async function fbUploadSeed(){
  if(!FB.on||!FB.user||FB.role!=='eloga'){ A.toast('需以依洛嘉管理者登入後再上傳'); return; }
  const S=SEED_SNAPSHOT; if(!S){ A.toast('找不到種子資料'); return; }
  try{
    const ex=await FB.db.collection('products').limit(1).get();
    if(!ex.empty){ A.toast('雲端已有資料，為避免覆蓋已略過'); return; }
    A.toast('上傳種子資料中…');
    const em={}; (S.customers||[]).forEach(c=>{ if(c.name) em[c.name]=c.email||''; }); em[ELG_SELF]='';
    const writeAll=async(name,arr,stamp)=>{ arr=arr||[]; for(let i=0;i<arr.length;i+=400){ const b=FB.db.batch(); arr.slice(i,i+400).forEach(o=>{ const id=o.id||FB.db.collection(name).doc().id; const data=stripId(o); if(stamp)stamp(data); b.set(FB.db.collection(name).doc(id),data); }); await b.commit(); } };
    await writeAll('products',S.products,d=>{ if(!d.customerEmail) d.customerEmail=em[d.cust]||''; });
    await writeAll('customers',S.customers);
    await writeAll('sharedPIF',S.sharedPIF);
    await writeAll('showcase',S.showcase);
    await FB.db.collection('staff').doc(FB.user.uid).set({role:elgRole||'主要管理者', name:'依洛嘉'},{merge:true});
    await FB.db.collection('meta').doc('config').set({CINFO:S.CINFO},{merge:true});
    A.toast('已上傳種子資料到雲端，畫面將自動更新');
  }catch(e){ A.toast('上傳失敗：'+e.message); console.warn(e); }
}
// 把「目前本機實際資料」整批推送到雲端（用於這台電腦有資料、雲端沒有的情況）
async function fbPushLocal(force){
  if(!FB.on||!FB.user||FB.role!=='eloga'){ A.toast('需以依洛嘉管理者登入後再上傳'); return; }
  try{
    const ex=await FB.db.collection('products').limit(1).get();
    if(!ex.empty && !force){
      A.toast('⚠ 雲端已有 '+ex.size+' 筆以上資料。若要用本機覆蓋雲端，請再按一次「強制上傳」', 5000);
      return 'exists';
    }
    A.toast('上傳本機 '+products.length+' 筆產品到雲端中…', 4000);
    const em=emailMap();
    const writeAll=async(name,arr,stamp)=>{ arr=arr||[]; for(let i=0;i<arr.length;i+=400){ const b=FB.db.batch(); arr.slice(i,i+400).forEach(o=>{ const id=o.id||FB.db.collection(name).doc().id; const data=stripId(o); if(stamp)stamp(data); b.set(FB.db.collection(name).doc(id),data); }); await b.commit(); } };
    await writeAll('products',products,d=>{ if(!d.customerEmail) d.customerEmail=em[d.cust]||''; });
    await writeAll('customers',customers);
    await writeAll('staff',staff);
    await writeAll('sharedPIF',sharedPIF);
    await writeAll('showcase',showcase);
    await writeAll('publicShowcase',publicShowcase);
    await FB.db.collection('meta').doc('config').set({CINFO},{merge:true});
    A.toast('✓ 已上傳 '+products.length+' 筆產品到雲端，其他裝置登入即可看到', 5000);
  }catch(e){ A.toast('上傳失敗：'+(e.code||e.message)); console.warn(e); }
}
A.googleSignIn=function(){
  if(!FB.on){ A.toast('Firebase 尚未載入，請檢查網路'); return; }
  const p=new firebase.auth.GoogleAuthProvider();
  p.setCustomParameters({prompt:'select_account'});
  FB.auth.signInWithPopup(p).catch(e=>{
    if(e.code==='auth/popup-blocked'||e.code==='auth/operation-not-supported-in-this-environment'){
      // popup 被擋，改用 redirect
      FB.auth.signInWithRedirect(p).catch(e2=>A.toast('登入失敗：'+e2.message));
    } else {
      A.toast('登入失敗：'+e.message);
    }
  });
};
A.fbLogout=function(){ try{ if(FB.on&&FB.user) FB.auth.signOut(); }catch(e){} FB.user=null; FB.role=null; FB.ready=false; role='customer'; me={}; view='entry'; render(); };
A.fbUploadSeed=function(){ fbUploadSeed(); };
A.fbPushLocal=async function(){
  const r=await fbPushLocal(false);
  if(r==='exists'){ A._pushForce=true; render(); }
};
A.fbPushLocalForce=function(){ A._pushForce=false; fbPushLocal(true); };
A.cancelPushForce=function(){ A._pushForce=false; render(); };
A.fbDiagnose=async function(){
  const el=document.getElementById('fb_diag');
  const set=(msg,color)=>{ if(el){ el.innerHTML=msg; el.style.color=color||'var(--muted)'; } };
  if(!(FB.on&&FB.db&&FB.user)){ set('✗ 尚未雲端登入，無法測試','#C0392B'); return; }
  set('測試中…請稍候');
  const lines=[];
  let writeOk=false, cloudProducts=null, ruleBlocked=false;
  // 1. 寫入測試
  try{
    await FB.db.collection('meta').doc('_diag').set({ts:new Date().toISOString(), by:FB.user.email||''});
    lines.push('✓ 雲端寫入正常'); writeOk=true;
  }catch(e){ lines.push('✗ 雲端寫入失敗：'+(e.code||e.message)); if((e.code||'').includes('permission')) ruleBlocked=true; }
  // 2. 讀取測試（各 collection 筆數）
  const cols=['products','customers','staff','sharedPIF'];
  for(const c of cols){
    try{ const s=await FB.db.collection(c).limit(500).get(); lines.push('✓ '+c+'：雲端 '+s.size+' 筆'); if(c==='products') cloudProducts=s.size; }
    catch(e){ lines.push('✗ '+c+' 讀取失敗：'+(e.code||e.message)); if((e.code||'').includes('permission')) ruleBlocked=true; }
  }
  // 3. 本機 vs 雲端
  lines.push('· 本機目前產品 '+products.length+' 筆');
  // 4. 白話結論 + 下一步
  lines.push('<hr style="border:0;border-top:1px solid var(--line);margin:6px 0">');
  if(ruleBlocked){
    lines.push('<b style="color:#C0392B">⚠ 問題：Firestore 安全規則沒開放</b>');
    lines.push('→ 到 Firebase 主控台設定規則允許登入者讀寫（見下方說明），這是手機看不到資料的主因。');
  } else if(cloudProducts===0 && products.length>0){
    lines.push('<b style="color:#C0392B">⚠ 問題：雲端沒有資料，但這台有 '+products.length+' 筆</b>');
    lines.push('→ 請按上方「上傳本機資料到雲端」，手機才看得到。');
  } else if(cloudProducts>0){
    lines.push('<b style="color:var(--s)">✓ 雲端有 '+cloudProducts+' 筆資料，同步管道正常</b>');
    lines.push('→ 手機請用「同一個管理者 Google 帳號」登入即可看到。新帳號需先被邀請為員工或建檔為客戶。');
  } else {
    lines.push('· 雲端與本機都沒有產品資料。');
  }
  const ok=writeOk && !ruleBlocked && (cloudProducts>0 || products.length===0);
  set(lines.join('<br>'), ok?'var(--s)':'#C0392B');
  A.toast(ok?'雲端同步正常':'發現問題，請看診斷訊息與下一步', 4000);
};
A.reloadPage=function(){
  if(typeof FB!=='undefined'&&FB.on&&FB.auth){
    const user=FB.user;
    if(user){ fbDetach(); fbStart(); }
    else { try{ location.reload(); }catch(e){} }
  } else { try{ location.reload(); }catch(e){} }
};

fbInit();
fbHandleRedirect();
SEED_SNAPSHOT = JSON.parse(JSON.stringify({products,customers,staff,sharedPIF,showcase,CINFO}));
load();
render();
fbStart();
</script>
